ksi_id: KSI-AC-05
title: Separation of Duties
category: iam
description: Conflicting duties and areas of responsibility must be separated to reduce opportunities for unauthorized or unintended access or modification.
security_objective: Prevent insider threat and fraud by ensuring no single user can complete a sensitive operation without a second party involved.
related_controls:
  - AC-5
  - AC-6
validation_type: automated
evidence_sources:
  - entra_id
  - graph_api
pass_criteria:
  description: "Privileged role assignments are reviewed quarterly. No single account holds conflicting administrative roles. SoD violations trigger automated alerts."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 48 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - separation-of-duties
  - insider-threat
  - privileged-access
