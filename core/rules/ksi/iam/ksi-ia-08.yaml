ksi_id: KSI-IA-08
title: Identification and Authentication (Non-Organizational Users)
category: iam
description: Non-organizational users (contractors, partners, guests) accessing GCC systems must be uniquely identified and authenticated using approved methods.
security_objective: Ensure external users cannot access GCC resources without proper identity verification and access controls equivalent to internal users.
related_controls:
  - IA-8
  - IA-8(1)
  - IA-8(2)
  - IA-8(4)
validation_type: automated
evidence_sources:
  - entra_id
  - entra_b2b
pass_criteria:
  description: "All non-organizational users access GCC through Entra B2B with MFA enforced. Guest accounts are reviewed quarterly and removed when no longer needed."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - external-users
  - guest-access
  - b2b
