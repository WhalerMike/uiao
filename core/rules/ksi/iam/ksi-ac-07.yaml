ksi_id: KSI-AC-07
title: Unsuccessful Logon Attempts
category: iam
description: Systems must enforce limits on consecutive failed logon attempts and automatically lock accounts after threshold is exceeded.
security_objective: Prevent brute-force and credential-stuffing attacks by locking accounts after repeated failed authentication attempts.
related_controls:
  - AC-7
validation_type: automated
evidence_sources:
  - entra_id
  - sentinel
pass_criteria:
  description: "Account lockout triggers after no more than 5 consecutive failed attempts. All lockout events are logged and alerted within 15 minutes."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 4 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - account-lockout
  - brute-force-protection
  - authentication
