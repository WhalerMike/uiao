ksi_id: KSI-AC-11
title: Device Lock
category: iam
description: Systems must automatically lock after a defined period of inactivity and require re-authentication before resuming access.
security_objective: Prevent unauthorized access to unattended GCC workstations and sessions through automatic locking.
related_controls:
  - AC-11
  - AC-11(1)
validation_type: automated
evidence_sources:
  - intune
  - entra_id
pass_criteria:
  description: "All managed devices lock automatically after 15 minutes of inactivity. Screen lock requires re-authentication. Compliance rate is 100%."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
