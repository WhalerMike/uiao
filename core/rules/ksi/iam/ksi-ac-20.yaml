ksi_id: KSI-AC-20
title: Use of External Systems
category: iam
description: Use of external information systems to access GCC resources must be authorized, controlled, and subject to security requirements equivalent to internal systems.
security_objective: Prevent uncontrolled access to GCC data from untrusted or unmanaged external systems.
related_controls:
  - AC-20
validation_type: automated
evidence_sources:
