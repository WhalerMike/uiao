  - conditional_access
pass_criteria:
  description: "Only approved external systems may access GCC resources. Conditional Access policies enforce compliance and MFA for all external system access."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 4 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
