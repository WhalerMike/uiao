ksi_id: KSI-PS-03
title: Personnel Termination and Transfer Procedures
category: planning-personnel
description: Access must be immediately revoked upon termination or role transfer, with automated processes for all accounts and systems.
security_objective: Prevent former or transferred personnel from retaining unauthorized access to GCC systems and data.
related_controls:
  - PS-4
  - PS-5
validation_type: automated
evidence_sources:
  - entra_id
  - hr_system
pass_criteria:
  description: "Access revocation occurs within 1 hour of HR termination or role-change notification for all accounts and systems."
  type: boolean
  threshold: 1
  measurement_frequency: per-event
  remediation_sla: 1 hour
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - termination-procedures
  - access-revocation
  - offboarding
