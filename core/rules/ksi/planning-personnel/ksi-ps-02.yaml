ksi_id: KSI-PS-02
title: Personnel Screening and Background Checks
category: planning-personnel
description: All personnel requiring system access must undergo role-appropriate screening and background checks prior to access grant.
security_objective: Ensure only trustworthy individuals are granted access to sensitive systems and data through consistent vetting.
related_controls:
  - PS-2
  - PS-3
validation_type: automated
evidence_sources:
  - hr_system
  - entra_id
pass_criteria:
  description: "100% of personnel with system access have completed required screening and background checks prior to account creation."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: per-onboarding
  remediation_sla: before-access-grant
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - personnel-screening
  - background-checks
  - onboarding
