ksi_id: KSI-CM-02
title: Secure Baseline Configuration Identification and Maintenance
category: configuration-management
description: Approved secure baseline configurations must be identified, documented, and actively maintained for all system components and services.
security_objective: Ensure every system starts from and remains on a known, hardened, and compliant configuration.
related_controls:
  - CM-2
  - CM-2(2)
  - CM-2(3)
validation_type: automated
evidence_sources:
  - azure_policy
  - graph_api
pass_criteria:
  description: "All production systems match approved secure baselines. Drift is detected and remediated within 24 hours."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - baseline-configuration
  - drift-detection
