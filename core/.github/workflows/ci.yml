name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# uiao-core ships canonical data (YAML/JSON/Markdown) plus thin Python helpers
# under ``tools/`` and ``scripts/``. The runtime library, CLI, and test suite
# live in the sibling ``uiao-impl`` repository. This workflow therefore:
#   * installs the lightweight canon-enforcement deps (``pyyaml``, ``jsonschema``)
#     via ``pip install -e ".[dev]"``,
#   * lints and type-checks the helper scripts we do own,
#   * runs a dependency audit,
# and intentionally does NOT import ``uiao_core`` as a package, run the
# ``uiao`` CLI, run pytest (no tests live here), or generate an SBOM — those
# are covered by uiao-impl's CI.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify pyproject metadata
        run: |
          python -c "import tomllib, pathlib; data = tomllib.loads(pathlib.Path('pyproject.toml').read_text()); print('uiao-core', data['project']['version'])"

      - name: Lint helper scripts with ruff
        run: |
          ruff check tools/ scripts/

      - name: Type-check helper scripts with mypy
        run: |
          mypy --ignore-missing-imports tools/ scripts/
        continue-on-error: true

      - name: Install audit tools
        run: pip install pip-audit safety

      - name: Dependency vulnerability audit (pip-audit)
        continue-on-error: true
        run: >-
          pip-audit --format json --output pip-audit-report.json
          --ignore-vuln CVE-2024-6345
          --ignore-vuln PYSEC-2025-49

      - name: Dependency vulnerability audit (safety)
        run: safety check --json --output safety-report.json
        continue-on-error: true

      - name: Upload audit reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: dep-audit-py${{ matrix.python-version }}
          path: |
            pip-audit-report.json
            safety-report.json
          retention-days: 30
