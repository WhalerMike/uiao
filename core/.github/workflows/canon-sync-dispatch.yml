name: Canon sync — dispatch to uiao-docs

# Fires when canonical adapter-registry artifacts change on main.
# Sends a `canon-updated` repository_dispatch event to WhalerMike/uiao-docs
# which the receiver workflow (canon-sync-receive.yml) consumes to run
# sync_canon.py and open a labeled PR.
#
# See uiao-core/ARCHITECTURE.md §4 for the three-layer cross-repo sync model.
# This workflow is Layer 1 (real-time push).
#
# REQUIRED SECRETS:
#   CANON_SYNC_DISPATCH_TOKEN  Fine-grained PAT (or classic PAT with `repo`
#                              scope) that has Contents:write on
#                              WhalerMike/uiao-docs. See tools/README.md for
#                              the exact setup steps.

on:
  push:
    branches: [main]
    paths:
      - 'canon/adapter-registry.yaml'
      - 'canon/modernization-registry.yaml'
      - 'schemas/adapter-registry/**'

concurrency:
  group: canon-sync-dispatch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch canon-updated event
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout uiao-core
        uses: actions/checkout@v4

      - name: Validate registries before dispatch
        run: |
          python3 -m pip install --quiet jsonschema==4.23.0 PyYAML==6.0.2
          python3 - <<'PY'
          import json, sys, yaml
          from jsonschema import Draft7Validator
          schema = json.load(open('schemas/adapter-registry/adapter-registry.schema.json'))
          validator = Draft7Validator(schema)
          all_ok = True
          for p, expected in [('canon/modernization-registry.yaml', 'modernization'),
                              ('canon/adapter-registry.yaml', 'conformance')]:
              data = yaml.safe_load(open(p))
              errs = sorted(validator.iter_errors(data), key=lambda e: list(e.absolute_path))
              if errs:
                  all_ok = False
                  print(f"::error file={p}::{len(errs)} validation error(s)")
                  for e in errs:
                      print(f"  [{'/'.join(str(x) for x in e.absolute_path) or '<root>'}] {e.message}")
              if data.get('registry-class') != expected:
                  all_ok = False
                  print(f"::error file={p}::registry-class mismatch (expected {expected}, got {data.get('registry-class')})")
          sys.exit(0 if all_ok else 1)
          PY

      - name: Send repository_dispatch to uiao-docs
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CANON_SYNC_DISPATCH_TOKEN }}
          repository: WhalerMike/uiao-docs
          event-type: canon-updated
          client-payload: |-
            {
              "source_sha": "${{ github.sha }}",
              "source_repo": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_actor": "${{ github.actor }}",
              "source_commit_message": ${{ toJson(github.event.head_commit.message) }},
              "triggered_at": "${{ github.event.head_commit.timestamp }}"
            }

      - name: Summary
        run: |
          {
            echo "## Canon sync dispatched"
            echo ""
            echo "- **Source SHA:** \`${{ github.sha }}\`"
            echo "- **Target repo:** \`WhalerMike/uiao-docs\`"
            echo "- **Event type:** \`canon-updated\`"
            echo ""
            echo "Receiver workflow: https://github.com/WhalerMike/uiao-docs/actions/workflows/canon-sync-receive.yml"
          } >> "$GITHUB_STEP_SUMMARY"
