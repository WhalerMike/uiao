parameters:
  - id: PARAM-RA-005-2-001
    description: >-
      Frequency at which vulnerability definitions and scan
      configurations are updated to include new vulnerabilities.
    value: "Continuously via automated cloud-delivered updates; manual review within 24 hours of critical CVE or CISA KEV publication"
  - id: PARAM-RA-005-2-002
    description: >-
      Sources used to update the list of vulnerabilities to be
      scanned for the UIAO system.
    value: "NVD/CVE database, CISA Known Exploited Vulnerabilities (KEV) catalog, Microsoft Security Response Center (MSRC), vendor security advisories"
  - id: PARAM-RA-005-2-003
    description: >-
      Process for incorporating newly disclosed vulnerabilities
      into active scan configurations within required timelines.
    value: "Automated cloud-delivered definition updates for Defender tools; ad hoc scan trigger within 24 hours of critical advisory"

narrative: |
  **Automated Vulnerability Definition Updates**
  The organization updates the vulnerabilities scanned as part of
  the UIAO vulnerability monitoring program to ensure that newly
  disclosed vulnerabilities are incorporated into active scan
  configurations in a timely manner (PARAM-RA-005-2-001). Microsoft
  Defender for Cloud and Microsoft Defender for Endpoint Threat and
  Vulnerability Management (TVM) receive continuous, automated
  cloud-delivered vulnerability definition updates from Microsoft
  Security Intelligence, incorporating new CVEs, configuration
  vulnerability checks, and software flaw signatures as they are
  published without requiring manual intervention.

  **Vulnerability Source Integration**
  The vulnerability scanning program incorporates threat intelligence
  from multiple authoritative sources (PARAM-RA-005-2-002): the
  National Vulnerability Database (NVD) and CVE database, the
  CISA Known Exploited Vulnerabilities (KEV) catalog, the Microsoft
  Security Response Center (MSRC) advisory feed, and vendor security
  bulletins from Cisco, Palo Alto Networks, Infoblox, and CyberArk.
  CISA KEV additions receive priority treatment, triggering immediate
  scan verification and remediation escalation per the vulnerability
  management SLA in **RA-5** within 24 hours of publication.

  **Ad Hoc Scan Triggering**
  When critical vulnerability advisories are published outside the
  automated update cycle (PARAM-RA-005-2-003), the ISSO initiates
  ad hoc targeted scans of affected UIAO system components within
  24 hours. Microsoft Sentinel threat intelligence analytics rules
  correlate newly ingested CVE data against the UIAO component
  inventory from **CM-8** to identify potentially affected assets
  and prioritize scan targeting. ServiceNow vulnerability response
  records are created for each scan trigger event documenting the
  advisory source, CVE identifiers, affected components, and
  scan completion status.

  **Scan Configuration Version Control**
  Changes to the vulnerability scan configuration and scope are
  tracked in ServiceNow as standard changes, providing an audit
  trail of when new vulnerability classes were added to the scan
  profile. This supports the audit requirements of **AU-2** (Event
  Logging) and demonstrates to assessors that the organization
  maintains a current and comprehensive vulnerability scanning
  capability aligned to the evolving threat landscape.

