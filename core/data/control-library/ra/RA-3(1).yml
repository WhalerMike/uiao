narrative: |
  **Supply Chain Risk Assessment Program**
  The organization conducts supply chain risk assessments for the
  UIAO system to identify, assess, and mitigate risks arising from
  the supply chain for system components, software, and services
  (PARAM-RA-003-1-001). Assessments follow NIST SP 800-161 Rev 1
  Cybersecurity Supply Chain Risk Management (C-SCRM) practices
  (PARAM-RA-003-1-004) and are conducted annually as part of the
  broader risk assessment cycle under **RA-3** (Risk Assessment)
  and prior to any significant supply chain additions or changes.

  **Scope of Supply Chain Assessments**
  Supply chain risk assessments cover all elements contributing to
  the UIAO system's hardware, software, and service delivery
  (PARAM-RA-003-1-002): hardware manufacturers and component suppliers
  for network infrastructure (Cisco, Palo Alto, Infoblox) and endpoint
  devices; software vendors including Microsoft (Azure, Sentinel,
  Intune, Entra ID) and CyberArk; cloud service providers operating
  the platform infrastructure; managed service providers with
  privileged access to UIAO systems; and the development tool chains
  used in system configuration management and deployment pipelines.

  **Assessment Methodology and Vendor Evaluation**
  Each supplier is evaluated against a structured security questionnaire
  aligned to NIST SP 800-161 Rev 1, addressing software development
  lifecycle security practices, incident response capabilities,
  background investigation requirements for personnel with access
  to UIAO data, data handling and sovereignty controls, and sub-tier
  supplier oversight. High-risk findings are documented in the
  ServiceNow Third-Party Risk Register with risk owner assignment
  and remediation timelines. CISA ICT SCRM resources and the NSA/CISA
  supply chain risk advisories inform the threat landscape assessment.

  **Dissemination and Integration**
  Supply chain risk assessment results are disseminated to the AO,
  ISSO, System Owner, CISO, and procurement officials
  (PARAM-RA-003-1-003) to inform procurement decisions, contract
  requirements, and ongoing oversight activities. Identified supply
  chain risks are incorporated into the overall UIAO risk register
  and may generate POA&M items per **CA-5** (Plan of Action and
  Milestones). Microsoft Defender for Cloud monitors for supply
  chain-related indicators of compromise, including anomalous
  software behavior patterns that may indicate a compromised
  component, supporting **SI-7** (Software Integrity) objectives.

