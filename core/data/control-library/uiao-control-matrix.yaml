# UIAO Control Matrix
# Cross-references UIAO capabilities to compliance frameworks
# Used by validation tooling and compliance dashboards

metadata:
  title: UIAO Control Matrix
  version: 1.0.0
  last_updated: 2025-05-22
  frameworks:
    - NIST SP 800-53 Rev5
    - FedRAMP Moderate
    - NIST SP 800-63-3
    - EO 14028 (Zero Trust)

capabilities:
  - id: CAP-001
    name: Identity Lifecycle Management
    domain: identity
    description: Automated provisioning, modification, and deprovisioning of user accounts
    controls:
      - framework: NIST 800-53
        ids: [AC-2, AC-2(1), AC-2(2), AC-2(3), AC-2(4), IA-4]
      - framework: FedRAMP
        ids: [AC-2, IA-4]
      - framework: EO-14028
        ids: [ZT-1.1, ZT-1.2]
    maturity: managed
    automation_level: full

  - id: CAP-002
    name: Authentication Services
    domain: identity
    description: Multi-factor authentication with PIV/CAC and federated IdP support
    controls:
      - framework: NIST 800-53
        ids: [IA-2, IA-2(1), IA-2(2), IA-2(6), IA-2(12), IA-5]
      - framework: NIST 800-63
        ids: [AAL2, AAL3]
      - framework: FedRAMP
        ids: [IA-2, IA-5]
    maturity: managed
    automation_level: full

  - id: CAP-003
    name: Policy Engine
    domain: access
    description: Role-based and attribute-based access control policy enforcement
    controls:
      - framework: NIST 800-53
        ids: [AC-3, AC-6, AC-6(1), AC-6(5), AC-6(10)]
      - framework: FedRAMP
        ids: [AC-3, AC-6]
      - framework: EO-14028
        ids: [ZT-2.1, ZT-2.3]
    maturity: managed
    automation_level: full

  - id: CAP-004
    name: Zero Trust Gateway
    domain: access
    description: Continuous verification for remote and network access
    controls:
      - framework: NIST 800-53
        ids: [AC-17, AC-17(1), AC-17(2), SC-7, SC-7(7)]
      - framework: EO-14028
        ids: [ZT-3.1, ZT-3.2, ZT-3.3]
    maturity: developing
    automation_level: partial

  - id: CAP-005
    name: Audit and Monitoring
    domain: operations
    description: Event logging, audit trail, and compliance monitoring
    controls:
      - framework: NIST 800-53
        ids: [AU-2, AU-3, AU-6, AU-6(1), AU-7, AU-12]
      - framework: FedRAMP
        ids: [AU-2, AU-6]
    maturity: managed
    automation_level: full

  - id: CAP-006
    name: Federation Broker
    domain: identity
    description: External identity provider integration and trust management
    controls:
      - framework: NIST 800-53
        ids: [IA-8, IA-8(1), IA-8(2), IA-8(4)]
      - framework: NIST 800-63
        ids: [FAL2, FAL3]
      - framework: FedRAMP
        ids: [IA-8]
    maturity: developing
    automation_level: partial

  - id: CAP-007
    name: Configuration Management
    domain: operations
    description: Baseline configuration enforcement and drift detection
    controls:
      - framework: NIST 800-53
        ids: [CM-2, CM-2(1), CM-6, CM-6(1), CM-8]
      - framework: FedRAMP
        ids: [CM-2, CM-6]
    maturity: managed
    automation_level: full

  - id: CAP-008
    name: Cryptographic Services
    domain: operations
    description: FIPS-validated encryption and key management
    controls:
      - framework: NIST 800-53
        ids: [SC-8, SC-8(1), SC-13, SC-28]
      - framework: FedRAMP
        ids: [SC-8, SC-13]
    maturity: managed
    automation_level: full

  - id: CAP-009
    name: Compliance Dashboard
    domain: compliance
    description: Real-time compliance posture and POA&M tracking
    controls:
      - framework: NIST 800-53
        ids: [CA-7, CA-7(1), PM-4, PM-6]
      - framework: FedRAMP
        ids: [CA-7]
    maturity: developing
    automation_level: partial

maturity_levels:
  - initial: Ad-hoc processes, no automation
  - developing: Documented processes, partial automation
  - managed: Standardized processes, full automation
  - optimizing: Continuous improvement with metrics

automation_levels:
  - none: Manual process only
  - partial: Some automated steps
  - full: End-to-end automation
  - adaptive: Self-healing with AI/ML
