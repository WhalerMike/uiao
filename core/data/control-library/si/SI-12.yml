title: "Information Management and Retention"
family: System and Information Integrity
status: not-implemented

implemented_by:
  - servicenow
  - entra-id
  - sharepoint-policy-library
  - microsoft-sentinel

evidence:
  - information-management-retention-policy-sharepoint
