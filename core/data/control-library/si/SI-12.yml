parameters:
  - id: PARAM-SI-012-001
    description: >-
      Retention requirements for information output from the UIAO
      system, consistent with applicable laws, regulations, and
      organizational policies.
    value: "Security audit logs retained 1 year online, 2 years archived; system documentation retained for ATO period plus 3 years; incident records retained 3 years"
  - id: PARAM-SI-012-002
    description: >-
      Disposal requirements for UIAO system information and output
      when retention periods expire.
    value: "Automated disposal via Azure storage lifecycle policies and ServiceNow retention rules; secure deletion for sensitive information; destruction certificates for classified media"
  - id: PARAM-SI-012-003
    description: >-
      Applicable laws, directives, and organizational standards
      governing information management and retention requirements.
    value: "NARA records schedules, FISMA recordkeeping requirements, FedRAMP Moderate continuous monitoring requirements, and organizational records management policy"

narrative: |
  **Information Retention Policy**
  The organization manages and retains information within the UIAO
  system in accordance with applicable laws, regulations, standards,
  and organizational policies (PARAM-SI-012-001, PARAM-SI-012-003).
  The Information Management and Retention Policy, maintained in
  SharePoint, defines retention schedules for all UIAO information
  categories aligned with NARA records schedules, FISMA recordkeeping
  requirements, and FedRAMP continuous monitoring documentation
  obligations. Security audit logs are retained for one year online
  and two years in archived storage, consistent with FedRAMP ConMon
  requirements. System documentation is retained for the ATO period
  plus three years.

  **Automated Retention Enforcement**
  Information retention requirements are enforced through automated
  mechanisms (PARAM-SI-012-002). Azure Storage lifecycle management
  policies automatically transition data to cooler storage tiers
  during the archival phase and delete data upon retention period
  expiration. ServiceNow record retention rules enforce retention
  periods for ITSM records including incident, change, and problem
  records. Microsoft 365 retention policies enforce email and
  document retention for the Microsoft 365 tenant.

  **Secure Disposal**
  When information retention periods expire, secure disposal processes
  are applied based on information sensitivity. Azure Storage
  cryptographic erasure enables verifiable deletion of cloud-hosted
  data by destroying the encryption key. Physical media disposal
  follows NIST SP 800-88 media sanitization guidance. Destruction
  certificates are generated and retained for sensitive media
  disposal events, tracked in ServiceNow.

  **Audit Log Retention Monitoring**
  Microsoft Sentinel monitors audit log ingestion completeness and
  retention status, alerting the ISSO when log gaps or unexpected
  deletions are detected. This monitoring ensures the integrity and
  availability of retained information, consistent with **AU-9**
  (Protection of Audit Information) and **AU-11** (Audit Record
  Retention) requirements.

