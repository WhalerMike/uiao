parameters:
  - id: PARAM-SI-004-5-001
    description: >-
      Personnel or roles that receive system-generated alerts when
      indicators of compromise or significant security events are detected.
    value: "ISSO, SOC analysts, system owner, and Incident Response team receive alerts; severity-based routing via ServiceNow and email"
  - id: PARAM-SI-004-5-002
    description: >-
      Alert generation threshold and conditions that trigger automated
      notification of security personnel.
    value: "High and critical severity Sentinel alerts generate immediate P1/P2 ServiceNow incidents; medium severity alerts generate P3 within 4 hours"

narrative: |
  **Automated Alert Generation and Routing**
  The organization generates alerts when system monitoring activities
  detect indicators of compromise and other potentially adverse events
  (PARAM-SI-004-5-001). Microsoft Sentinel analytics rules generate
  automated security alerts when monitored conditions match detection
  logic. Alerts are routed by severity to appropriate personnel through
  Sentinel integration with ServiceNow and email notification. The
  ISSO, SOC analysts, and system owner receive alerts according to
  defined notification matrices, ensuring the right people are
  informed of potential security events without delay.

  **Alert Severity and Response Timelines**
  Alert generation thresholds and notification timelines are defined
  to enable timely response (PARAM-SI-004-5-002). High and critical
  severity Sentinel alerts generate P1 and P2 ServiceNow incidents
  immediately, triggering oncall notifications to SOC analysts and
  the ISSO. Medium severity alerts generate P3 incidents within
  four hours. Alert thresholds are calibrated to balance detection
  sensitivity with alert fatigue, and threshold adjustments are
  reviewed by the ISSO quarterly.

  **Entra ID Risk Alerts**
  Microsoft Entra ID Identity Protection generates risk-based alerts
  for suspicious authentication activity including impossible travel,
  leaked credentials, and anomalous sign-in patterns. High-risk
  user and sign-in events automatically trigger Conditional Access
  enforcement actions including MFA step-up or session blocking,
  while simultaneously generating Sentinel alerts for SOC review.
  This provides automated response capability for identity-based
  threats aligned with **IR-4** (Incident Handling).

  **Palo Alto Threat Alerts**
  Palo Alto NGFW generates real-time threat alerts for detected
  intrusion attempts, malware, command-and-control traffic, and
  data exfiltration indicators. These alerts are forwarded to
  Microsoft Sentinel for correlation with other event sources and
  automated response playbook execution. Alert correlation reduces
  false positive rates and improves investigative context for
  SOC analysts responding to ServiceNow incidents.

