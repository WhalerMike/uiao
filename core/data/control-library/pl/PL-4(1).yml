narrative: |
  **Social Media Usage Restrictions**
  The organization's rules of behavior include explicit restrictions
  on social media usage for all personnel with access to UIAO systems
  (PARAM-PL-004-1-001). Personnel are prohibited from posting
  organizational information, system configuration details, network
  topology data, or work activities on public social media platforms,
  consistent with OPSEC requirements and the insider threat awareness
  training delivered under **AT-2(3)** (Social Engineering and Mining).
  The restrictions address both work-device usage of social media and
  the risks of social media oversharing regardless of device, given
  the OSINT-mining threat vector identified in the risk assessment.

  **External Website and Application Controls**
  Technical enforcement of external site and application restrictions
  is implemented through Palo Alto NGFW URL filtering policies that
  categorize and restrict access to external websites based on risk
  classification (PARAM-PL-004-1-002). High-risk categories including
  personal file sharing, unauthorized cloud storage, anonymizing
  proxies, and certain social media platforms are blocked on
  organizational networks. Microsoft Defender for Cloud Apps
  (CASB) provides shadow IT discovery and enforces sanctioned app
  policies, blocking access to unsanctioned cloud applications that
  could be used to exfiltrate organizational data. Approved external
  applications are documented in the sanctioned app catalog.

  **User Acknowledgment and Enforcement**
  Social media and external application restrictions are incorporated
  into the Rules of Behavior document acknowledged by all users
  before system access and re-acknowledged annually per **PL-4**
  (Rules of Behavior). Acknowledgment records are tracked in
  ServiceNow. Entra ID Terms of Use policies enforce digital
  acknowledgment as a Conditional Access requirement. Violations
  are subject to disciplinary action up to and including access
  revocation and termination (PARAM-PL-004-1-003) per **PS-8**
  (Personnel Sanctions) and **AC-2** (Account Management) procedures.

  **Monitoring and Anomaly Detection**
  Palo Alto NGFW and Defender for Cloud Apps generate logs of all
  external application access and blocked attempts, which are
  ingested by Microsoft Sentinel for anomaly detection. Sentinel
  analytics rules alert the SOC to unusual patterns of external
  data transfer, unauthorized cloud app usage, or policy bypass
  attempts, supporting **SI-4** (System Monitoring) and the
  continuous monitoring strategy.

