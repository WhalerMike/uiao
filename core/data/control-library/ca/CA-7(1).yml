parameters:
  - id: ca_7_1_independent_assessment_frequency
    description: >-
      Frequency at which an independent assessor evaluates a subset of
      security controls as part of the continuous monitoring program.
    value: "Annually for full control assessment; monthly subset reviews per FedRAMP ConMon requirements with 3PAO validation of high-impact findings"
  - id: ca_7_1_conmon_control_subset
    description: >-
      Method for selecting the control subset reviewed by independent
      assessors during continuous monitoring cycles.
    value: "Risk-based selection per FedRAMP Continuous Monitoring Strategy Guide; prioritizing controls with prior findings, high-risk ratings, or significant change impact"

narrative: |
  **Independent Assessment within Continuous Monitoring**
  The UIAO continuous monitoring program incorporates independent assessment
  activities conducted by a FedRAMP-recognized 3PAO, ensuring that ongoing
  security control evaluations are performed by parties without organizational
  conflicts of interest relative to system operations. The independent
  assessment function within ConMon extends the initial CA-2(1) assessment
  engagement into an ongoing cycle of control validation, preventing assessment
  complacency and ensuring objective assurance across the authorization
  lifecycle. The 3PAO reviews a risk-prioritized control subset each assessment
  cycle as defined in PARAM ca_7_1_conmon_control_subset, with full-baseline
  assessment conducted annually per PARAM ca_7_1_independent_assessment_frequency.

  **Automated Monitoring Supporting Independent Review**
  Microsoft Sentinel serves as the primary continuous monitoring platform,
  aggregating security telemetry from Azure Entra ID, Palo Alto NGFW, Cisco
  ISE, Infoblox, CyberArk, and Intune into unified dashboards and automated
  alerting workflows. Sentinel analytics rules generate ConMon metrics including
  vulnerability scan coverage, patch compliance rates, account anomaly detection
  events, and boundary protection rule change frequency. These metrics are
  packaged into monthly ConMon reports delivered to the Authorizing Official
  and FedRAMP PMO, with independent assessors validating the accuracy and
  completeness of automated monitoring outputs during quarterly reviews.
  This supports **AU-6** (Audit Record Review) and **SI-4** (System Monitoring).

  **ConMon Findings and Disposition Tracking**
  Security findings identified through independent ConMon assessments are
  entered into ServiceNow GRC as POA&M items consistent with **CA-5** (Plan
  of Action and Milestones) requirements. The ISSM reviews all independent
  assessment findings within five business days of report delivery and assigns
  remediation owners with target dates aligned to FedRAMP risk-based
  timeframes. Sentinel dashboards provide continuous visibility into the
  technical remediation status of findings, and the 3PAO validates closure
  evidence prior to removing findings from the active POA&M. This integrated
  workflow supports **CA-6** (Authorization) ongoing authorization decisions
  and **RA-3** (Risk Assessment) risk posture maintenance.

