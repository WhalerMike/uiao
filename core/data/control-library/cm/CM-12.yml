# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : CM-12
# Title      : Information Location
# Schema     : data/control-library (uiao-core canonical format)

control_id: CM-12
title: "Information Location"
family: Configuration Management
status: not-implemented

implemented_by:
  - microsoft-purview
  - azure-information-protection
  - servicenow-cmdb
  - microsoft-365

evidence:
  - purview-data-classification-scan-report
  - uiao-information-location-inventory-document
  - azure-resource-tag-data-classification-report
  - purview-sensitive-information-type-discovery-report

parameters:
  - id: cm_12_information_types_in_scope
    description: >-
      Categories of information for which location identification
      and tracking is required within the system boundary.
    value: "Controlled Unclassified Information (CUI), Personally Identifiable Information (PII), Federal Contract Information (FCI), sensitive system configuration data, and audit records"
  - id: cm_12_location_inventory_review
    description: >-
      Frequency at which the information location inventory is
      reviewed and updated for accuracy.
    value: "Information location inventory reviewed and updated semi-annually by ISSO; automated Microsoft Purview scan results reviewed quarterly"

narrative: |
  **Information Location Identification**
  The UIAO organization identifies and documents the location
  of information types defined in PARAM cm_12_information_types_in_scope
  within the system boundary, maintaining a current, accurate
  information location inventory. Microsoft Purview Information
  Protection performs automated sensitive information type
  discovery across Microsoft 365 workloads (SharePoint, OneDrive,
  Exchange, Teams), Azure Storage accounts, and SQL databases,
  identifying locations where CUI, PII, and other sensitive
  information types reside. Discovery results are reviewed by
  the ISSO and documented in the UIAO Information Location
  Inventory, which maps information types to specific storage
  repositories, Azure resource identifiers, and data owner
  assignments. The inventory is reviewed at the frequency defined
  in PARAM cm_12_location_inventory_review and maintained in
  the SharePoint Compliance Library. This satisfies the CM-12
  requirement for information location identification and
  supports **RA-2** (Security Categorization) and **MP-2**
  (Media Access) objectives.

  **Azure Resource Tagging for Information Classification**
  All Azure resources that store or process organizational
  information are tagged with a data classification label
  indicating the highest information type category stored.
  Azure Policy enforces the presence of required classification
  tags on all storage accounts, databases, and key vaults,
  flagging untagged resources as non-compliant. The resource
  tag inventory provides a machine-readable information location
  map that complements the Purview discovery-based approach,
  enabling automated queries of where specific information types
  are stored across the Azure environment.

  **Information Flow and Boundary Tracking**
  The information location inventory documents not only where
  information is stored at rest, but also the primary data flows
  into and out of each location, including integration points
  with external systems identified in system interconnection
  agreements under **CA-3** (Information Exchange). This flow
  documentation supports data protection controls under **SC-28**
  (Protection of Information at Rest) and **SC-8** (Transmission
  Confidentiality and Integrity) by ensuring that all information
  locations and flows are protected at the appropriate level.

  **New Information Location Detection**
  Microsoft Sentinel and Microsoft Defender for Cloud Apps
  monitor for new storage repositories and SaaS application
  usage that may represent previously unknown information
  locations (shadow IT). Newly identified information locations
  trigger a review workflow to classify the information type,
  assess controls, and update the information location inventory.
  This continuous detection capability ensures that the inventory
  remains accurate as the system evolves.

related_controls:
