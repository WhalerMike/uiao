parameters:
  - id: PARAM-MA-005-1-001
    description: >-
      Security measures implemented when maintenance is performed
      by personnel without appropriate access authorizations or
      security clearances.
    value: "Continuous escort by cleared, authorized personnel; all system information sanitized or disabled prior to maintenance; CyberArk session recording active throughout"
  - id: PARAM-MA-005-1-002
    description: >-
      Actions required to prepare the UIAO system before allowing
      maintenance access by individuals without appropriate access.
    value: "Remove or disable sensitive data access; enforce least-privilege CyberArk vault; activate enhanced Sentinel monitoring"
  - id: PARAM-MA-005-1-003
    description: >-
      Post-maintenance verification requirements after individuals
      without appropriate access have completed maintenance activities.
    value: "ISSO review of CyberArk session recordings; Sentinel anomaly scan; ServiceNow closure with supervisor sign-off"

narrative: |
  **Controls for Unauthorized-Access Maintenance Personnel**
  When UIAO system maintenance must be performed by individuals who do
  not have appropriate security clearances or access authorizations
  (e.g., third-party hardware vendors, OEM field engineers), the
  organization implements enhanced protective measures to safeguard
  system information and integrity (PARAM-MA-005-1-001). These personnel
  are never granted unescorted, unsupervised access to UIAO systems.
  An authorized, cleared organization employee serves as a continuous
  escort for the entire duration of the maintenance activity.

  **Pre-Maintenance System Preparation**
  Before granting access to personnel without appropriate authorizations,
  the system is prepared to minimize exposure of sensitive information
  (PARAM-MA-005-1-002). Sensitive data repositories and administrative
  interfaces are temporarily disabled or access-controlled through
  Entra ID Conditional Access policies scoped to the maintenance account.
  CyberArk just-in-time access is provisioned with the minimum privilege
  necessary for the specific maintenance task, with all other vault
  credentials locked for the duration. Microsoft Sentinel receives an
  advance notification of the maintenance window and activates enhanced
  monitoring analytics rules for the affected system components.

  **Escort and Supervision Procedures**
  The escorting official maintains visual and/or logical contact with
  the maintenance individual throughout the activity. All actions
  performed on UIAO systems during the maintenance session are recorded
  via CyberArk Privileged Session Manager, providing a complete keystroke
  and screen capture log. The escort is responsible for immediately
  halting the maintenance activity and notifying the ISSO if any
  unauthorized access or unusual behavior is observed, triggering
  **IR-4** (Incident Handling) procedures.

  **Post-Maintenance Review and Verification**
  Upon completion of maintenance by unauthorized-access personnel,
  the ISSO reviews the CyberArk session recordings and Microsoft Sentinel
  activity logs to verify that no unauthorized actions were taken
  (PARAM-MA-005-1-003). ServiceNow maintenance records are closed only
  after supervisor sign-off confirming that the post-maintenance review
  is complete and the system has been verified clean. This process
  supports **AU-2** (Event Logging) and **MA-5** (Maintenance Personnel)
  baseline requirements.

