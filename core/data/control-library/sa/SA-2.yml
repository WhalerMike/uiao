parameters:
  - id: PARAM-SA-002-001
    description: >-
      Process by which information security requirements are determined and
      documented within organizational capital planning and investment control
      processes.
    value: "Annual budget cycle integrated with information security program planning; reviewed by ISSM and AO"
  - id: PARAM-SA-002-002
    description: >-
      Method for documenting information security resource requirements as
      distinct budget line items within organizational budget requests.
    value: "Dedicated information security budget line items in Azure Cost Management and ServiceNow ITSM financial module"

narrative: |
  **Capital Planning Integration**
  The organization determines, documents, and allocates the resources
  required to protect the UIAO system as part of the annual capital
  planning and investment control process (PARAM-SA-002-001). The ISSM
  collaborates with the Authorizing Official (AO) and finance leadership
  during annual budget planning to identify and quantify information
  security resource requirements. Security requirements derived from
  the risk assessment, POA&M, and continuous monitoring activities
  are translated into budget requests and tracked through ServiceNow's
  financial management module.

  **Budget Documentation and Visibility**
  Information security resource requirements are documented as discrete
  budget line items (PARAM-SA-002-002) within Azure Cost Management,
  providing visibility into security tool licensing, personnel, and
  infrastructure costs. This separation ensures security investments are
  explicitly tracked against planned expenditures and that shortfalls are
  escalated to leadership. Azure Cost Management alerts notify the ISSO
  when security-related spending approaches or exceeds allocated thresholds,
  supporting **PM-3** (Information Security and Privacy Resources) objectives.

  **Resource Allocation for Security Controls**
  Specific resource allocations cover Azure Entra ID, Microsoft Sentinel,
  Palo Alto NGFW, CyberArk, Infoblox, Intune, and ServiceNow licensing and
  operational support. The ISSM reviews resource sufficiency quarterly,
  ensuring continuous monitoring, incident response, and compliance
  assessment activities are adequately staffed and funded. Entra ID
  role-based access enforces segregation of duties between budget approvers
  and expenditure submitters, supporting **AC-5** (Separation of Duties).

  **System Security Plan Alignment**
  Resource allocation documentation is incorporated into the system
  security plan and reviewed during **CA-2** assessments and **CA-6**
  authorization renewals to confirm ongoing adequacy of security funding.

