parameters:
  - id: PARAM-SA-004-1-001
    description: >-
      Requirement for developers and system integrators to provide descriptions
      of the functional properties of security controls employed within
      acquired systems and components.
    value: "Vendors must provide functional descriptions of all security controls in vendor-supplied security documentation prior to contract award"
  - id: PARAM-SA-004-1-002
    description: >-
      Level of detail required in functional property descriptions provided
      by vendors for security controls implemented in acquired components.
    value: "Control objectives, implementation mechanisms, and configuration parameters as defined in FedRAMP SSP Appendix format"

narrative: |
  **Functional Properties Requirement**
  The organization requires developers and vendors of acquired information
  systems, system components, and services to provide a description of the
  functional properties of the security controls employed (PARAM-SA-004-1-001).
  Contract templates maintained in SharePoint include a mandatory security
  documentation annex requiring vendors to describe security control
  implementations, configuration parameters, and operational behaviors.
  This requirement applies to all technology acquisitions including
  hardware, software, and cloud services integrated into the UIAO environment.

  **Documentation Standards and Review**
  Vendors must deliver functional property descriptions at the level of
  detail specified in PARAM-SA-004-1-002, aligning with FedRAMP System
  Security Plan appendix format where applicable. The ISSO reviews
  vendor-supplied control descriptions during the acquisition assessment
  phase, recorded in ServiceNow as part of the vendor assessment workflow.
  Azure DevOps tracks integration of vendor components and links to
  corresponding security documentation reviews.

  **FedRAMP Authorization Verification**
  For FedRAMP-authorized cloud services, the FedRAMP Marketplace SSP
  and associated control implementation summaries satisfy the functional
  properties documentation requirement. The ISSO verifies Marketplace
  listings and downloads current control implementation summaries for
  inclusion in the UIAO authorization package. Entra ID application
  registration records cross-reference vendor services to their
  corresponding security documentation artifacts.

  **Gap Analysis and Risk Acceptance**
  When vendor-supplied functional property descriptions are incomplete
  or do not meet organizational standards, the ISSO documents identified
  gaps in ServiceNow and performs a risk assessment. Unacceptable gaps
  trigger contract renegotiation or risk acceptance documentation
  signed by the AO prior to system integration, supporting
  **SA-4** base control requirements.

