control_id: MP-7
title: Media Use
family: Media Protection (MP)
status: Implemented
implemented_by:
  - Microsoft Intune
  - Microsoft Defender for Endpoint
  - CrowdStrike Falcon
evidence:
  - artifact: Intune Removable Media Policy
    location: Intune Admin Center > Device Configuration > Removable Storage
    format: Policy Export
  - artifact: Endpoint Protection Alerts
    location: Microsoft Sentinel > SecurityAlert > Removable Media
    format: KQL Query Export
parameters:
  - id: PARAM-MP-007-001
    text: Use of removable media is restricted on organizational systems
    value: USB mass storage blocked by default via Intune
  - id: PARAM-MP-007-002
    text: Approved removable media types are defined and enforced
    value: Encrypted USB drives from approved vendor list only
narrative: |
  **Media Use Restrictions**
  The organization restricts the use of removable media on
  information systems (PARAM-MP-007-001). Microsoft Intune
  device configuration profiles block USB mass storage class
  drivers by default on all managed Windows endpoints.
  CrowdStrike Falcon USB device control provides secondary
  enforcement.

  **Approved Media Types**
  Only organization-approved encrypted USB storage devices are
  permitted (PARAM-MP-007-002). Approved devices are hardware-
  encrypted drives from the organization's approved products
  list. Device identifiers for approved media are whitelisted
  in Intune and CrowdStrike device control policies.

  **Exception Process**
  Exceptions to the removable media restriction require a
  ServiceNow change request with business justification,
  data owner approval, and ISSO authorization. Exceptions are
  time-limited and automatically expire. Intune targeted policy
  assignments grant temporary access to specific devices.

  **Monitoring**
  Microsoft Defender for Endpoint and CrowdStrike Falcon
  monitor all removable media activity. Unauthorized media
  connection attempts generate alerts in Microsoft Sentinel
  and trigger SOC investigation under IR-4.
