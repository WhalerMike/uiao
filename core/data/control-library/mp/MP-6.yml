control_id: MP-6
title: Media Sanitization
family: Media Protection (MP)
status: Implemented
implemented_by:
  - NIST SP 800-88 Procedures
  - ServiceNow Asset Management
  - Microsoft Defender for Endpoint
evidence:
  - artifact: Media Sanitization Records
    location: ServiceNow > Asset Management > Sanitization Log
    format: CMDB Export
  - artifact: Certificate of Destruction
    location: SharePoint > UIAO Compliance > Evidence > MP Sanitization
    format: DOCX/PDF
parameters:
  - id: PARAM-MP-006-001
    text: Media is sanitized prior to disposal or reuse using NIST SP 800-88 methods
    value: Clear, Purge, or Destroy per NIST SP 800-88 Rev 1
  - id: PARAM-MP-006-002
    text: Sanitization actions are documented and verified
    value: Dual-witness verification with ServiceNow record
narrative: |
  **Sanitization Requirements**
  The organization sanitizes information system media prior to
  disposal, release out of organizational control, or release
  for reuse using NIST SP 800-88 Rev 1 guidelines
  (PARAM-MP-006-001). Sanitization methods are selected based
  on the sensitivity of the information and the type of media.

  **Sanitization Methods**
  Clear: Software-based overwrite for media remaining within
  the organization. BitLocker crypto-erase is used for SSD and
  NVMe drives. Purge: Degaussing for magnetic media or
  cryptographic erase for self-encrypting drives. Destroy:
  Physical destruction (shredding, incineration) for media
  containing highly sensitive data or media that cannot be
  purged.

  **Verification and Documentation**
  All sanitization actions are verified by a second authorized
  individual (PARAM-MP-006-002) and documented in ServiceNow
  with media identifier, sanitization method, date, and
  personnel involved. Certificates of destruction are obtained
  from authorized destruction vendors.

  **Equipment Maintenance**
  Media sanitization is performed before equipment leaves the
  facility for maintenance per MA-2. Microsoft Defender for
  Endpoint verifies drive encryption status before any
  equipment transfer.
