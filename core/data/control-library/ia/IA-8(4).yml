parameters:
  - id: ia_8_4_approved_profiles
    description: >-
      Defined identity and authentication profiles used for
      non-organizational user authentication and authorization.
    value: "NIST SP 800-63 IAL2/AAL2 profile for contractors and partners; PIV/PIV-I profile for federal agency personnel; Login.gov IAL2 profile for verified public users; each profile defines accepted authenticator types, assurance level, access scope, and account lifecycle"
  - id: ia_8_4_profile_assignment_process
    description: >-
      Process for assigning non-organizational users to the
      appropriate authentication and authorization profile.
    value: "Profile assignment documented in ServiceNow external user provisioning request; ISSO review and approval required; Entra ID Access Package assigns appropriate entitlements based on approved profile"

narrative: |
  **Profile-Based External User Authentication**
  The UIAO system employs defined identity and authentication
  profiles for non-organizational users, ensuring that external
  user access is governed by a standardized framework that
  specifies acceptable authenticator types, assurance levels,
  and access scope for each category of external user. The
  profiles defined in PARAM ia_8_4_approved_profiles are
  implemented through Entra ID External Identities configuration
  and Access Package assignments that enforce the technical
  requirements of each profile. The profile assignment process
  defined in PARAM ia_8_4_profile_assignment_process ensures
  that ISSO review and approval is obtained before any external
  user is granted access, providing risk-based governance over
  the scope of external identity acceptance. This satisfies the
  IA-8(4) requirement for use of defined profiles for
  non-organizational user authentication and supports **IA-8**
  (Identification and Authentication for Non-Organizational Users)
  and **IA-8(2)** (Acceptance of External Authenticators).

  **Federal Agency User Profile Implementation**
  Non-organizational users from federal agencies are assigned
  the PIV/PIV-I profile, which requires authentication using
  a valid PIV or PIV-I certificate issued by a CA in the
  Federal PKI hierarchy trusted by the UIAO system per
  **IA-8(1)** (Acceptance of PIV Credentials from Other Agencies).
  The federal agency user profile restricts access to the
  specific resources covered by the agency's interconnection
  security agreement (ISA) or data sharing agreement, enforced
  through Entra ID Conditional Access policies and Access
  Package role assignments scoped to authorized resources.

  **Contractor and Partner Profile Implementation**
  Contractors and business partners are assigned the IAL2/AAL2
  profile, requiring identity verification at NIST SP 800-63
  IAL2 (either through the organizational onboarding process
  or via Login.gov) and authentication using an AAL2-compliant
  authenticator registered through the Entra ID B2B invitation
  and onboarding flow. Contractor access is scoped to the
  minimum resources required for the contracted work, with
  access packages that expire upon contract completion and
  require renewal with ISSO approval for extensions.

  **Profile Compliance Monitoring**
  Microsoft Sentinel monitors all external user authentication
  events and validates that authentication method and assurance
  claims match the profile assigned to each external user.
  External users authenticating with a lower assurance method
  than required by their assigned profile are blocked by
  Conditional Access and generate Sentinel alerts for
  investigation. Profile assignments are reviewed quarterly
  through Entra ID Access Reviews to ensure that external
  users remain in the appropriate profile and that profile
  definitions continue to reflect current NIST SP 800-63
  guidance.

