parameters:
  - id: ia_5_1_password_complexity
    description: >-
      Password complexity and minimum length requirements enforced
      for all password-based authentication within the system.
    value: "Minimum 16 characters; must not be in Microsoft's 100,000+ banned password list or NIST-known compromised passwords; no complexity character class requirements per NIST SP 800-63B Rev 2 guidance"
  - id: ia_5_1_password_change_policy
    description: >-
      Policy governing when passwords must be changed, including
      expiration, compromise response, and initial password handling.
    value: "No scheduled expiration for passwords meeting complexity threshold; immediate change required upon known or suspected compromise detected by Entra ID Identity Protection; temporary passwords expire on first use"

narrative: |
  **Password Complexity and Length Enforcement**
  The UIAO system enforces password-based authentication requirements
  through Entra ID Password Protection and Active Directory password
  policies, implementing the requirements defined in PARAM
  ia_5_1_password_complexity. Microsoft Entra ID Password Protection
  globally bans passwords from a continuously updated list of
  commonly used, compromised, and organization-specific prohibited
  passwords, supplementing the minimum length requirement with
  semantic strength evaluation that prevents easily guessed passwords
  regardless of whether they meet traditional complexity rules.
  This approach aligns with NIST SP 800-63B Rev 2 guidance that
  prioritizes password length and compromised password detection
  over prescriptive character class requirements. This satisfies
  the IA-5(1) password requirements and supports **IA-5**
  (Authenticator Management) and **IA-2** (Identification and
  Authentication) objectives.

  **No Routine Password Expiration Policy**
  Consistent with NIST SP 800-63B and FedRAMP guidance permitting
  risk-based password management, UIAO does not enforce routine
  scheduled password expiration for accounts using MFA, as defined
  in PARAM ia_5_1_password_change_policy. Research demonstrates that
  forced expiration without evidence of compromise leads to predictable
  password patterns (incrementing numbers, seasonal substitutions)
  that reduce effective security. Instead, Entra ID Identity Protection
  continuously monitors for compromised credentials using Microsoft's
  threat intelligence feeds and forces immediate password reset when
  a user's credentials are found in breach data, providing targeted
  forced changes based on actual risk rather than arbitrary time cycles.

  **CyberArk Password Management for Privileged Accounts**
  CyberArk Central Policy Manager (CPM) manages and rotates
  passwords for all privileged accounts in the CyberArk vault
  according to platform-specific rotation policies. Privileged
  account passwords are generated by CyberArk using cryptographically
  random 30+ character strings that exceed the complexity requirements
  of any target platform, and are rotated after each use and on
  a maximum age schedule. Individual users never know privileged
  account passwords, as CyberArk manages the full lifecycle of
  credential generation, storage, injection, and rotation.

  **Temporary Password and First-Use Controls**
  Temporary passwords generated for new accounts and password
  resets expire on first use as specified in PARAM
  ia_5_1_password_change_policy, requiring users to set a
  new password meeting all UIAO requirements before accessing
  system resources. Self-Service Password Reset (SSPR) in
  Entra ID requires MFA authentication before allowing a
  password change, preventing account takeover through
  unauthenticated password reset.

