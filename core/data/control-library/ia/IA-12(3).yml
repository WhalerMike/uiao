parameters:
  - id: ia_12_3_evidence_requirements
    description: >-
      Identity evidence types required during identity proofing
      to validate and verify applicant identity.
    value: "NIST SP 800-63A IAL2: one SUPERIOR evidence (US Passport, federal PIV, or state driver's license) plus one STRONG evidence (secondary government ID or financial institution document); verified by HR personnel using in-person or supervised remote proofing"
  - id: ia_12_3_verification_method
    description: >-
      Methods used to verify that identity evidence presented
      during proofing is genuine and belongs to the applicant.
    value: "In-person I-9 verification by HR; remote proofing via video call with live document check and facial comparison for remote hires; document authenticity validated against issuing authority security features"

narrative: |
  **Identity Evidence Requirements**
  The UIAO organization validates and verifies the identity of
  individuals through an identity proofing process that requires
  presentation and verification of identity evidence meeting the
  standards defined in PARAM ia_12_3_evidence_requirements. The
  identity proofing standard aligns with NIST SP 800-63A Identity
  Assurance Level 2 (IAL2), requiring at least one piece of SUPERIOR
  evidence and one piece of STRONG evidence, as defined by the
  National Institute of Standards and Technology. HR personnel
  are responsible for conducting identity proofing during employee
  onboarding using the verification methods defined in PARAM
  ia_12_3_verification_method, and verification outcomes are
  recorded in ServiceNow linked to the new user provisioning
  request. This satisfies the IA-12(3) requirement for identity
  evidence validation and verification, supports **IA-12**
  (Identity Proofing) and **IA-12(2)** (Supervisor Authorization),
  and establishes the IAL2 foundation required for subsequent
  enrollment of AAL2/AAL3 authenticators.

  **I-9 and In-Person Verification Process**
  For employees reporting to an organizational facility,
  identity proofing is conducted through the Form I-9
  Employment Eligibility Verification process, which requires
  presentation of List A (single document proving identity
  and work authorization) or List B + List C (two documents
  proving identity and work authorization separately). HR
  personnel physically inspect documents for security features,
  photograph completeness, and consistency with the applicant's
  appearance, providing in-person binding of the identity
  evidence to the individual. I-9 records are maintained
  in Workday HR per regulatory requirements.

  **Remote Identity Proofing for Remote Employees**
  For employees hired remotely, identity proofing is conducted
  via a supervised video call session facilitated by HR in
  which the applicant presents original identity documents to
  the camera for live review. The session includes a real-time
  facial comparison between the applicant and the photograph
  on the identity documents, and the session is recorded in
  Workday with a timestamp and HR verifier identity. Remote
  proofing is treated as equivalent to in-person proofing
  for IAL2 purposes when conducted using this supervised
  video method with contemporaneous documentation.

  **Contractor Identity Verification**
  Contractors and third-party personnel are subject to the
  same identity evidence requirements as employees. The
  contractor's organization may conduct the initial identity
  proofing if they operate a compliant IAL2 proofing program,
  in which case a proofing attestation from the contractor
  organization is accepted as evidence. UIAO HR validates
  the attestation and retains a copy in ServiceNow before
  proceeding with account provisioning.

