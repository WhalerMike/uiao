narrative: |
  **Mobile Device Enrollment and Compliance Enforcement**
  The organization controls access to federal information systems from
  mobile devices through Microsoft Intune MDM enrollment and compliance
  policy enforcement. All corporate-owned mobile devices must be enrolled
  in Intune and pass compliance checks — including OS version, encryption
  state, and jailbreak/root detection — before Entra ID Conditional Access
  grants access to organizational applications and data. BYOD devices
  accessing organizational email or collaboration tools are subject to
  Intune Mobile Application Management (MAM) policies, protecting
  organizational data within managed app containers without requiring full
  device enrollment.

  **Conditional Access and Zero Trust Enforcement**
  Entra ID Conditional Access policies evaluate device compliance signals
  from Intune in real time, enforcing the Zero Trust principle of
  continuous verification for every mobile access request. Non-compliant
  devices are blocked from accessing Microsoft 365, SharePoint, and other
  organizational cloud services regardless of user credential validity,
  directly supporting **AC-3** (Access Enforcement) and **IA-2**
  (Identification and Authentication). Privileged access from mobile
  devices is further restricted via CyberArk PSM, which prohibits
  privileged session initiation from unmanaged endpoints.

  **Data Protection and Remote Wipe**
  Intune enforces data-at-rest encryption (AES-256) on all managed mobile
  devices and enables selective or full remote wipe capability for lost
  or compromised devices, satisfying **MP-6** (Media Sanitization)
  requirements. All mobile device compliance events and access attempts
  are forwarded to Microsoft Sentinel, supporting **AU-2** audit logging
  and **SI-4** continuous monitoring requirements across the mobile
  device fleet.

