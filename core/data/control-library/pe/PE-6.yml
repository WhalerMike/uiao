control_id: PE-6
title: Monitoring Physical Access
family: Physical and Environmental Protection (PE)
status: Implemented
implemented_by:
  - Physical Security Office
  - CCTV Monitoring System
  - Security Operations Center
evidence:
  - artifact: Physical Access Monitoring Logs
    location: Security Operations Center > Access Logs
    format: Database/CSV
parameters:
  - id: PARAM-PE-006-001
    text: Frequency of physical access log review
    value: Monthly
narrative: |
  **Monitoring Capabilities**
  The organization monitors physical access to the facility where the UIAO system resides to detect and respond to physical security incidents. CCTV cameras, intrusion detection sensors, and badge reader logs provide continuous monitoring.

  **Log Review**
  Physical access logs are reviewed monthly (PARAM-PE-006-001). Anomalous access patterns, after-hours access, and failed badge attempts are investigated by the Physical Security Office.

  **Incident Response**
  Unauthorized physical access attempts trigger real-time alerts to the Security Operations Center. Security personnel respond within 15 minutes to investigate. All incidents are documented in ServiceNow and reported per IR-6.
