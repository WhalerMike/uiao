parameters:
  - id: PARAM-PE-003-1-001
    description: >-
      Mechanism used to enforce physical access controls to
      information system components within UIAO facilities.
    value: "Badge reader access control integrated with Cisco ISE NAC; physical presence required for privileged access sessions"
  - id: PARAM-PE-003-1-002
    description: >-
      Controls applied to ensure that system access requires
      prior physical access authorization within UIAO secured areas.
    value: "Entra ID Conditional Access Named Locations; Cisco ISE device posture enforcement at physical access points"
  - id: PARAM-PE-003-1-003
    description: >-
      Monitoring approach for detecting unauthorized physical
      access to UIAO system components within secured spaces.
    value: "Microsoft Sentinel correlation of badge access events with logical authentication logs; real-time SOC alerting"

narrative: |
  **Physical-to-Logical Access Integration**
  The organization enforces physical access controls for direct
  access to UIAO information system components within secured
  facilities by integrating the physical access control system
  with logical network access enforcement (PARAM-PE-003-1-001).
  Badge reader systems at server room and network equipment room
  entry points are integrated with Cisco ISE Network Admission
  Control, ensuring that physical presence in authorized areas
  is a prerequisite for accessing sensitive system components.
  This integration prevents logical access to system infrastructure
  from outside physically secured perimeters.

  **Named Location and Conditional Access Enforcement**
  Microsoft Entra ID Conditional Access policies enforce Named
  Location restrictions that limit privileged administrative access
  to UIAO systems to approved physical network segments corresponding
  to secured facility areas (PARAM-PE-003-1-002). Personnel attempting
  privileged access from network segments outside the secured physical
  perimeter are denied access or required to complete step-up
  authentication through CyberArk PAM, ensuring that sensitive
  system administration is anchored to physical access controls.
  Cisco ISE device posture checks validate that connecting devices
  are compliant and originate from within authorized physical zones.

  **Correlation and Monitoring**
  Microsoft Sentinel correlates physical badge access events with
  logical authentication and system access logs to detect
  inconsistencies indicating unauthorized physical access or credential
  misuse (PARAM-PE-003-1-003). Analytics rules alert the SOC when
  logical access is observed from a network segment without a
  corresponding valid physical access event, or when physical access
  badge events are followed by unusual lateral movement within the
  logical network. This correlation approach extends the physical
  access monitoring requirements of **PE-6** (Monitoring Physical
  Access) into the security operations workflow.

  **Visitor and Contractor Physical Access to Systems**
  Visitors and contractors requiring direct physical access to UIAO
  system components are subject to the escort requirements of **MA-5**
  (Maintenance Personnel) and **PE-3** (Physical Access Control).
  Physical access to server racks and network equipment is logged
  by the badge management system and reviewed weekly by the Physical
  Security Officer. Access anomalies are reported to the ISSO for
  investigation per **IR-4** (Incident Handling).

