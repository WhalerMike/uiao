    location: IT Operations > Device Inventory
    format: XLSX/PDF
parameters:
  - id: PARAM-PE-005-001
    text: Frequency of output device placement review
    value: Annually
narrative: |
  **Output Device Controls**
  The organization controls physical access to output devices (printers, monitors, copiers, scanners) to prevent unauthorized individuals from viewing or obtaining sensitive output. Output devices processing CUI or sensitive UIAO data are located in controlled areas with restricted access.

  **Device Placement**
  Printers and display monitors in UIAO work areas are positioned to prevent unauthorized viewing. Secure print release (pull printing) is required for all networked printers within the system boundary. Output device placement is reviewed annually (PARAM-PE-005-001).

  **Secure Output Handling**
  Sensitive printed output is collected promptly. Uncollected print jobs are automatically purged after 4 hours. Screen privacy filters are required for workstations in shared or open areas.
