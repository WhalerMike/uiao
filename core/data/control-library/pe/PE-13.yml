narrative: |
  **Fire Detection and Suppression**
  The organization employs fire detection and suppression systems for the UIAO facility. Data centers use clean-agent fire suppression (FM-200/Novec). Office areas use wet-pipe sprinkler systems. Smoke detectors and heat sensors are installed throughout.

  **Monitoring and Alerts**
  Fire detection systems are connected to the building management system and local fire department. Alarms trigger immediate notification to the Security Operations Center and facility management.

  **Inspections**
  Fire suppression systems are inspected quarterly (PARAM-PE-013-001) by certified technicians. Fire extinguishers are inspected monthly. Results are documented per local fire codes.
