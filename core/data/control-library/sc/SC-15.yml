  - microsoft-sentinel-collaborative-device-monitoring-alerts

parameters:
  - id: PARAM-SC-015-001
    description: >-
      Prohibition on remote activation of collaborative computing devices
      and applications without indication to present users.
    value: "Remote activation of cameras, microphones, and screen sharing applications is prohibited without explicit user initiation and on-screen indicator"
  - id: PARAM-SC-015-002
    description: >-
      Indicators required to be provided to users when collaborative
      computing capabilities are active on their devices.
    value: "Hardware or software indicators (LED lights, on-screen banners) must be active when cameras, microphones, or screen sharing are in use"

narrative: |
  **Remote Activation Prohibition**
  The organization prohibits the remote activation of collaborative
  computing devices and applications, including cameras, microphones,
  and screen sharing functions, without providing an indication to
  users that those capabilities are active (PARAM-SC-015-001).
  This prohibition prevents surreptitious monitoring of organizational
  personnel and protects sensitive discussions. The collaborative
  computing acceptable use policy, maintained in SharePoint, documents
  this requirement and users' obligations regarding collaborative
  computing device usage.

  **User Presence Indicators**
  All collaborative computing applications in use within the UIAO
  environment are required to display clear on-screen indicators when
  cameras, microphones, or screen sharing are active (PARAM-SC-015-002).
  Approved collaboration platforms are evaluated for indicator compliance
  before adoption. Microsoft Intune application management policies
  restrict the installation of unapproved collaboration applications
  that do not provide required presence indicators on managed endpoints.

  **Entra ID Application Access Control**
  Entra ID controls access to approved collaboration applications,
  ensuring only authorized users and devices can access organizational
  collaboration platforms. Conditional Access policies enforce that
  collaboration applications are accessed only from compliant,
  managed devices that have been evaluated for indicator compliance.
  Third-party collaborative computing applications require ISSO review
  and approval, tracked in ServiceNow, before adoption.

  **Monitoring for Unauthorized Collaborative Applications**
  Microsoft Sentinel and Intune monitor managed endpoints for
  unauthorized collaborative computing applications. Intune application
  inventory reports identify unapproved applications installed on
  managed devices, triggering ServiceNow remediation tasks for removal.
  Microsoft Defender for Endpoint detects collaboration application
  behaviors that may indicate unauthorized activation, generating
  alerts for ISSO review consistent with **SI-4** (System Monitoring)
  requirements.

