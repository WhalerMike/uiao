title: "Mobile Code"
family: System and Communications Protection
status: not-implemented

implemented_by:
  - palo-alto-ngfw
  - intune-mdm
  - entra-id
  - microsoft-sentinel

evidence:
  - mobile-code-policy-sharepoint
  - palo-alto-mobile-code-filtering-configuration
  - intune-application-protection-policy-reports
  - microsoft-defender-mobile-code-detection-logs

parameters:
  - id: PARAM-SC-018-001
    description: >-
      Mobile code technologies that are acceptable for use within the
      UIAO system environment.
    value: "Approved mobile code: JavaScript (HTML5 applications only), Java applets prohibited, ActiveX prohibited, unsigned PowerShell prohibited"
  - id: PARAM-SC-018-002
    description: >-
      Usage restrictions and implementation guidance applied to
      acceptable mobile code technologies.
    value: "Approved mobile code must originate from trusted domains and be served over HTTPS; browser security settings enforce code origin restrictions"
  - id: PARAM-SC-018-003
    description: >-
      Actions taken when unacceptable mobile code is detected on
      UIAO systems or attempting to traverse the boundary.
    value: "Palo Alto NGFW blocks unacceptable mobile code at the boundary; Intune application protection policies prevent execution on managed endpoints"

narrative: |
  **Mobile Code Policy and Acceptable Use**
  The organization establishes usage restrictions and implementation
  guidance for acceptable mobile code technologies (PARAM-SC-018-001,
  PARAM-SC-018-002). The mobile code policy, maintained in SharePoint,
  defines approved and prohibited mobile code categories. JavaScript
  from HTTPS-served, trusted-domain origins is permitted for approved
  HTML5 applications. Java applets, ActiveX controls, and unsigned
  PowerShell scripts are prohibited due to their elevated attack surface
  and privilege escalation potential. Browser group policies enforced
  via Intune implement these restrictions at the endpoint level.

  **Boundary-Level Mobile Code Filtering**
  Palo Alto NGFW enforces mobile code restrictions at the organizational
  boundary (PARAM-SC-018-003). Application identification and threat
  prevention signatures detect and block prohibited mobile code types
  including Java applets and ActiveX content delivered from external
  sources. File type filtering prevents download of executable mobile
  code categories from unauthorized sources. URL category filtering
  restricts access to domains known to serve malicious mobile code.

  **Endpoint Mobile Code Controls**
  Microsoft Intune application protection policies and configuration
  profiles enforce mobile code restrictions on managed endpoints.
  Browser configurations delivered via Intune disable support for
  prohibited mobile code technologies and enforce security zone
  settings that limit the capabilities of permitted mobile code.
  Microsoft Defender for Endpoint detects and blocks mobile code
  execution attempts that bypass browser-level controls.

  **Monitoring and Response**
  Microsoft Sentinel correlates mobile code detection events from
  Palo Alto NGFW and Defender for Endpoint, identifying patterns
  that may indicate targeted mobile code delivery attempts. Significant
  mobile code incidents generate ServiceNow tickets for ISSO
  investigation. Entra ID Conditional Access restricts access to
  web applications to compliant devices with current browser
  configurations, reducing the risk of mobile code exploitation.

