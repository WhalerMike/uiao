# SC-13 - Cryptographic Protection
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: System and Communications Protection (SC)
# Last Reviewed: 2025-06-15

control_id: SC-13
family: System and Communications Protection
title: Cryptographic Protection
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **FIPS 140-2 Validated Cryptographic Modules**
  The UIAO platform implements FIPS 140-2 validated cryptographic
  modules for all cryptographic operations required by federal
  security policy. Azure cloud services utilize FIPS 140-2 Level 1
  validated cryptographic modules for data encryption at rest and in
  transit. Azure Active Directory (Entra ID) authentication services
  employ FIPS-compliant cryptographic algorithms for token generation,
  digital signatures, and secure session establishment. Microsoft
  Intune managed endpoints are configured to operate in FIPS mode,
  ensuring all local cryptographic operations utilize validated
  modules aligned with **SC-12** (Cryptographic Key Establishment
  and Management) requirements.

  **Encryption of Data in Transit and at Rest**
  All data in transit across the UIAO platform is protected using
  TLS 1.2 or higher with FIPS-approved cipher suites. Palo Alto NGFW
  enforces minimum TLS version requirements for all traffic
  traversing network boundaries and performs SSL/TLS decryption for
  inspection using FIPS-validated cryptographic engines. Cisco SD-WAN
  IPsec tunnels utilize AES-256 encryption with FIPS-validated
  modules for branch-to-hub connectivity. Data at rest is protected
  through Azure Storage Service Encryption (SSE) using AES-256,
  Azure Disk Encryption for virtual machine volumes, and CyberArk
  vault encryption for stored privileged credentials.

  **Cryptographic Standards Enforcement and Monitoring**
  Cryptographic protection standards are enforced through Azure
  Policy assignments that mandate minimum encryption requirements
  for all deployed resources. Microsoft Defender for Cloud
  continuously evaluates cryptographic configurations against
  security benchmarks and alerts on non-compliant resources.
  CrowdStrike Falcon monitors endpoints for use of deprecated or
  weak cryptographic protocols. Cryptographic compliance is assessed
  quarterly as part of the continuous monitoring program under
  **CA-7** (Continuous Monitoring) and validated during annual
  security assessments supporting **SC-8** (Transmission
  Confidentiality and Integrity) requirements.

