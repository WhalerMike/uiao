# CrowdStrike EDR/EPP vendor overlay for UIAO-Core
#
# Apply this overlay to replace the generic abstract component names with
# CrowdStrike Falcon-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  edr:
    name: CrowdStrike Falcon
    vendor: CrowdStrike
    abstract_type: EDR
    fedramp_families:
      - RA
      - SI
    capabilities:
      - Endpoint Detection and Response
      - Next-Gen Antivirus (NGAV)
      - Threat Intelligence
      - Vulnerability Management
      - Device Control

nist_mappings:
  SI-4:
    description: "CrowdStrike Falcon real-time endpoint detection and response"
    role: "Endpoint-layer EDR monitoring (primary for endpoints)"
    shared_with: "cisco (network DPI), paloalto (NGFW inspection), cyberark (privileged session analytics), infoblox (DNS threat intel)"
  IR-4: "CrowdStrike Falcon automated incident response and containment"
  SI-3:
    description: "CrowdStrike Falcon NGAV and exploit prevention"
    role: "Endpoint malware prevention (primary for endpoints)"
    shared_with: "paloalto (network-layer IPS and anti-malware)"
  SC-7:
    description: "CrowdStrike Falcon lateral movement blocking and device isolation"
    role: "Endpoint-level lateral movement containment (contributing)"
    shared_with: "cisco (SD-WAN fabric segmentation), paloalto (perimeter firewall zones)"
  RA-5: "CrowdStrike Falcon Spotlight vulnerability assessment"

evidence_sources:
  - name: CrowdStrike Falcon Console Sensor Policy
    type: api
    endpoint: /policy/queries/sensor-update/v1
  - name: CrowdStrike Falcon Detection Events
    type: siem_feed
    destination: Splunk / Microsoft Sentinel
  - name: CrowdStrike Falcon Prevention Policy Export
    type: api
    endpoint: /policy/queries/prevention/v1
