# data/vendor-overlays/scuba.yaml
# CISA SCuBA (Secure Cloud Business Applications) Vendor Overlay
# Produced by: ScubaGear - https://github.com/cisagov/ScubaGear
# Last reviewed: 2026-04-06

vendor: CISA SCuBA / ScubaGear
adapter_id: scuba
adapter_module: uiao_core.adapters.scuba_adapter.ScubaAdapter
version: "1.0"

description: >
  CISA SCuBA (Secure Cloud Business Applications) baseline assessment
  overlay. Maps ScubaGear policy results to UIAO KSI evidence and
  OSCAL implementation-status observations.

# -----------------------------------------------------------------------
# Supported M365 products and their SCuBA baseline prefixes
# -----------------------------------------------------------------------
products:
  aad:
    name: Azure Active Directory / Entra ID
    policy_prefix: MS.AAD
    oscal_component: Microsoft Entra ID
    ksi_categories: [iam, boundary-protection]
  defender:
    name: Microsoft Defender for Office 365
    policy_prefix: MS.DEFENDER
    oscal_component: Microsoft Defender
    ksi_categories: [monitoring-logging, configuration-management]
  exo:
    name: Exchange Online
    policy_prefix: MS.EXO
    oscal_component: Exchange Online
    ksi_categories: [boundary-protection, configuration-management]
  sharepoint:
    name: SharePoint / OneDrive
    policy_prefix: MS.SHAREPOINT
    oscal_component: SharePoint Online
    ksi_categories: [boundary-protection, iam]
  teams:
    name: Microsoft Teams
    policy_prefix: MS.TEAMS
    oscal_component: Microsoft Teams
    ksi_categories: [boundary-protection, iam]
  power_platform:
    name: Power Platform
    policy_prefix: MS.POWERPLATFORM
    oscal_component: Power Platform
    ksi_categories: [configuration-management]

# -----------------------------------------------------------------------
# KSI / OSCAL control mapping
# -----------------------------------------------------------------------
control_mappings:
  # Identity & Access
  - scuba_policy: MS.AAD.1.1v1
    control_id: AC-2
    ksi_id: ksi-ac-01
    description: Legacy authentication SHALL be blocked
    criticality: Shall
    fedramp_applicable: true
  - scuba_policy: MS.AAD.2.1v1
    control_id: IA-2
    ksi_id: ksi-ac-02
    description: MFA SHALL be required for all users
    criticality: Shall
    fedramp_applicable: true
  - scuba_policy: MS.AAD.2.3v1
    control_id: IA-2(1)
    ksi_id: ksi-ac-03
    description: Phishing-resistant MFA SHALL be used for privileged roles
    criticality: Shall
    fedramp_applicable: true
  - scuba_policy: MS.AAD.3.1v1
    control_id: AC-3
    ksi_id: ksi-ac-04
    description: Privileged users SHALL be assigned dedicated cloud-only accounts
    criticality: Shall
    fedramp_applicable: true
  - scuba_policy: MS.AAD.7.1v1
    control_id: IA-8
    ksi_id: ksi-ac-07
    description: Guest user access SHALL be restricted
    criticality: Shall
    fedramp_applicable: true
  # Monitoring & Logging
  - scuba_policy: MS.DEFENDER.2.1v1
    control_id: AU-2
    ksi_id: ksi-ml-01
    description: Audit logging SHALL be enabled
    criticality: Shall
    fedramp_applicable: true
  - scuba_policy: MS.DEFENDER.4.1v1
    control_id: IR-4
    ksi_id: ksi-ml-02
    description: Alerts SHALL be configured for high-severity events
    criticality: Shall
    fedramp_applicable: true
  # Boundary Protection
  - scuba_policy: MS.EXO.1.1v1
    control_id: SC-8
    ksi_id: ksi-bp-01
    description: Transport encryption SHALL be enforced
    criticality: Shall
    fedramp_applicable: true
  - scuba_policy: MS.SHAREPOINT.1.1v1
    control_id: AC-22
    ksi_id: ksi-bp-04
    description: External sharing SHALL be restricted
    criticality: Shall
    fedramp_applicable: true

# -----------------------------------------------------------------------
# Evidence collection settings
# -----------------------------------------------------------------------
evidence:
  source_type: file
  supported_formats: [json, yaml]
  scubagear_output_path: exports/scuba/
  evidence_retention_days: 365
  auto_collect: false  # Manual run via: uiao adapter run scuba

# -----------------------------------------------------------------------
# UIAO extension metadata
# -----------------------------------------------------------------------
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
  private_endpoint_enforcement: false
  fedramp_20x_aligned: true
  scuba_version_required: "0.5.0"

# -----------------------------------------------------------------------
# Provenance
# -----------------------------------------------------------------------
provenance:
  source: CISA SCuBA Baselines
  url: https://github.com/cisagov/ScubaGear
  license: Creative Commons Zero v1.0 Universal
  maintained_by: CISA
  last_validated: 2026-04-06
