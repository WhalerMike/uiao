# yaml-language-server: $schema=../schemas/image-registry/image-registry.schema.json
#
# UIAO Image Registry
# ===================
# Canonical registry of figures, diagrams, and images that are reusable across
# two or more UIAO documents. Doc-local single-use images are NOT registered
# here — they live beside the document that owns them.
#
# Canon invariants enforced on every entry:
#   * prompt_sha256  — SHA-256 of the prompt_file contents; the provenance
#                      certificate for the prompt. Drift → DRIFT-PROVENANCE.
#   * file_sha256    — SHA-256 of the rendered PNG bytes; the provenance
#                      certificate for the image. Drift → DRIFT-PROVENANCE.
#   * aspect         — Locked at creation; enforced by the pipeline.
#   * status         — draft | current | deprecated (see UIAO_202 §6).
#   * used_by        — The pipeline scanner maintains this; every reference
#                      in a .qmd/.md must resolve back to an entry here.
#
# Status lifecycle:
#   draft      → pipeline-generated, awaiting human promotion.
#   current    → approved; safe to reference from any document.
#   deprecated → replaced by superseded_by; references are stale.
#
# ID allocation:
#   UIAO-FIG-001 .. UIAO-FIG-999 — stable across versions. Never reused.
#
# Filename convention (rendered PNG):
#   docs/images/canonical/<id>-<slug>.png
#   docs/images/canonical/<id>-<slug>.png.json   (sidecar metadata)
#
# Prompt file convention:
#   core/canon/image-prompts/<id>.md
#
# Pair artifacts:
#   * core/schemas/image-registry/image-registry.schema.json — this schema
#   * docs/academy/image-pipeline-guide.qmd                 — operator guide
#   * UIAO_202 (this document) in core/canon/document-registry.yaml
#
# See also:
#   * core/canon/adapter-registry.yaml        — analogous structure
#   * core/canon/modernization-registry.yaml  — analogous structure
#   * UIAO_016 Drift Detection Standard       — drift semantics
#

metadata:
  document_id: UIAO_202
  title: "UIAO Image Registry"
  version: "1.0"
  status: Current
  classification: OPERATIONAL
  owner: Governance OS Program Office
  created_at: "2026-04-17"
  updated_at: "2026-04-17"
  boundary: GCC-Moderate

schema-version: "1.0.0"
updated: "2026-04-17"

# Images array is intentionally empty at registry inception. Entries are
# added by the image generation pipeline (docs/generate_images.py) when a
# new canonical image is drafted or promoted, and are subsequently reviewed
# and merged via PR. See docs/academy/image-pipeline-guide.qmd for the full
# author and operator workflow.
images: []
