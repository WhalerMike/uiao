# yaml-language-server: $schema=../schemas/workspace-contract/workspace-contract.schema.json
#
# UIAO Workspace Contract
# =======================
# Binds the local developer workspace to the canonical GitHub monorepo.
# Declares module paths, drift-scan roots, and build-output locations so
# that local tool invocations are deterministic regardless of operator
# host. Registered as UIAO_201 in core/canon/document-registry.yaml.
#
# Frontmatter conforms to core/schemas/metadata-schema.json.
# Body conforms to core/schemas/workspace-contract/workspace-contract.schema.json.
#
# Canon-consumer rule: impl/.claude/rules/canon-consumer.md
#   Tools MUST resolve canon paths via $UIAO_WORKSPACE_ROOT + module_paths,
#   never via hardcoded absolute paths. Violations are CI-blockable once
#   the repo-walker lands (follow-up).

metadata:
  document_id: UIAO_201
  title: "UIAO Workspace Contract"
  version: "1.0"
  status: Current
  classification: OPERATIONAL
  owner: WhalerMike
  created_at: "2026-04-17"
  updated_at: "2026-04-17"
  boundary: GCC-Moderate
  provenance:
    source: "canon/substrate-manifest.yaml (UIAO_200)"
    version: "1.0"
    derived_at: "2026-04-17"
    derived_by: "workspace-contract initialization"

local:
  root_env: UIAO_WORKSPACE_ROOT
  platform_examples:
    linux: "$HOME/src/uiao"
    macos: "$HOME/src/uiao"
    windows: "%USERPROFILE%\\src\\uiao"

remote:
  root: "https://github.com/WhalerMike/uiao"
  default_branch: main
  protected_branches:
    - main

module_paths:
  core: core
  docs: docs
  impl: impl

drift_scan_roots:
  - core
  - docs
  - impl

build_outputs:
  docs_site: docs/site
  docs_exports:
    - docs/exports/docx
    - docs/exports/pptx
    - docs/exports/html
  impl_dist: impl/dist

canon_consumer_rule: impl/.claude/rules/canon-consumer.md
