# generation-inputs/diagrams.yaml
# Canonical PlantUML diagram definitions for UIAO-Core.
# Auto-generated by generate-diagrams CLI command.
# Each entry is rendered to visuals/<key>.puml and assets/images/plantuml/<key>.png.
# NOTE: Mermaid has been fully replaced with PlantUML. Source files use @startuml/@enduml syntax.

diagrams:
  architecture_overview:
      type: component
          title: UIAO Architecture Overview
              description: >
                    High-level view of the five primary UIAO planes and their interconnections,
                          showing how Identity, Addressing, Overlay, Telemetry, and Management planes
                                interact within the unified architecture.
                                    content: |
                                          @startuml architecture_overview
                                                skinparam backgroundColor white
                                                      skinparam componentStyle rectangle

                                                            component "Identity Plane\n(AuthN / AuthZ)" as IP
                                                                  component "Addressing Plane\n(DNS / Service Mesh)" as AP
                                                                        component "Overlay Plane\n(Network Fabric / SD-WAN)" as OP
                                                                              component "Telemetry Plane\n(SIEM / Monitoring)" as TP
                                                                                    component "Management Plane\n(Policy / Orchestration)" as MP

                                                                                          MP --> IP : Governs
                                                                                                MP --> AP : Governs
                                                                                                      MP --> OP : Governs
                                                                                                            MP --> TP : Governs
                                                                                                                  IP --> AP : Token / Assertion
                                                                                                                        AP --> OP : Route Resolution
                                                                                                                              OP --> TP : Traffic Telemetry
                                                                                                                                    TP --> MP : Alerts / Feedback
                                                                                                                                          @enduml
                                                                                                                                          
                                                                                                                                            authorization_boundary:
                                                                                                                                                type: component
                                                                                                                                                    title: UIAO Authorization Boundary
                                                                                                                                                        description: >
                                                                                                                                                              Depicts the authorization boundary for UIAO, showing the flow from external
                                                                                                                                                                    users through CDN/WAF and the UIAO Gateway, into the Identity Plane, and
                                                                                                                                                                          finally to internal services and data stores.
                                                                                                                                                                              content: |
                                                                                                                                                                                    @startuml authorization_boundary
                                                                                                                                                                                          skinparam backgroundColor white
                                                                                                                                                                                          
                                                                                                                                                                                                actor "External Users" as EU
                                                                                                                                                                                                      component "CDN / WAF\n(DDoS / TLS termination)" as CDN
                                                                                                                                                                                                            component "UIAO Gateway\n(API Gateway / Load Balancer)" as GW
                                                                                                                                                                                                            
                                                                                                                                                                                                                  rectangle "Authorization Boundary" {
                                                                                                                                                                                                                          component "Identity Plane\n(Okta / CyberArk)" as IDP
                                                                                                                                                                                                                                  component "Internal Services\n(Microservices / APIs)" as SVC
                                                                                                                                                                                                                                          database "Data Stores\n(Encrypted at rest)" as DS
                                                                                                                                                                                                                                                  IDP --> SVC : Authorize
                                                                                                                                                                                                                                                          SVC --> DS : Queries
                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                      EU --> CDN
                                                                                                                                                                                                                                                                            CDN --> GW
                                                                                                                                                                                                                                                                                  GW --> IDP : Authenticate
                                                                                                                                                                                                                                                                                        @enduml
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                          data_flow:
                                                                                                                                                                                                                                                                                              type: sequence
                                                                                                                                                                                                                                                                                                  title: UIAO Data Flow
                                                                                                                                                                                                                                                                                                      description: >
                                                                                                                                                                                                                                                                                                            End-to-end data flow from a user request through authentication,
                                                                                                                                                                                                                                                                                                                  policy evaluation, service mesh routing, backend processing, and
                                                                                                                                                                                                                                                                                                                        telemetry collection.
                                                                                                                                                                                                                                                                                                                            content: |
                                                                                                                                                                                                                                                                                                                                  @startuml data_flow
                                                                                                                                                                                                                                                                                                                                        skinparam backgroundColor white
                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                              participant "User Request" as UR
                                                                                                                                                                                                                                                                                                                                                    participant "Authentication\n(Identity Plane)" as AUTH
                                                                                                                                                                                                                                                                                                                                                          participant "Policy Engine\n(OPA / Cedar)" as PE
                                                                                                                                                                                                                                                                                                                                                                participant "Service Mesh\n(Envoy / Istio)" as SM
                                                                                                                                                                                                                                                                                                                                                                      participant "Backend Services" as BE
                                                                                                                                                                                                                                                                                                                                                                            participant "Telemetry Collection\n(SIEM / Sentinel)" as TC
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                  UR -> AUTH : HTTPS
                                                                                                                                                                                                                                                                                                                                                                                        AUTH -> PE : JWT / SAML
                                                                                                                                                                                                                                                                                                                                                                                              PE -> SM : Permit / Deny
                                                                                                                                                                                                                                                                                                                                                                                                    SM -> BE : mTLS
                                                                                                                                                                                                                                                                                                                                                                                                          BE -> TC : Logs / Metrics
                                                                                                                                                                                                                                                                                                                                                                                                                TC -> AUTH : Alerts
                                                                                                                                                                                                                                                                                                                                                                                                                      @enduml
                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                        uiao_planes:
                                                                                                                                                                                                                                                                                                                                                                                                                            type: component
                                                                                                                                                                                                                                                                                                                                                                                                                                title: UIAO Seven-Layer Model
                                                                                                                                                                                                                                                                                                                                                                                                                                    description: >
                                                                                                                                                                                                                                                                                                                                                                                                                                          All seven UIAO layers / planes and their hierarchical relationships,
                                                                                                                                                                                                                                                                                                                                                                                                                                                from the physical infrastructure up to the governance layer.
                                                                                                                                                                                                                                                                                                                                                                                                                                                    content: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                          @startuml uiao_planes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                skinparam backgroundColor white
                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      component "L7 - Governance & Compliance Plane\n(FedRAMP / NIST / FISMA)" as L7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            component "L6 - Management Plane\n(Policy / Orchestration / Config)" as L6
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  component "L5 - Telemetry Plane\n(SIEM / Monitoring / Alerts)" as L5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        component "L4 - Identity Plane\n(AuthN / AuthZ / Zero-Trust)" as L4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              component "L3 - Overlay Plane\n(Network Fabric / SD-WAN / VPN)" as L3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    component "L2 - Addressing Plane\n(DNS / Service Discovery)" as L2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          component "L1 - Infrastructure Plane\n(Compute / Storage / Network HW)" as L1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                L7 --> L6 : Policies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      L6 --> L5 : Config Push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            L6 --> L4 : Config Push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  L6 --> L3 : Config Push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        L6 --> L2 : Config Push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              L6 --> L1 : Config Push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    L4 --> L3 : Token Enforcement
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          L2 --> L1 : Route to
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                L3 --> L1 : Encapsulates
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      L5 --> L6 : Feedback Loop
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            @enduml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              generation_pipeline:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  type: component
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      title: UIAO Document Generation Pipeline
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          description: >
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                The automated document generation pipeline showing how canon YAML flows
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      through Jinja2 templates to produce Markdown, MkDocs HTML, PlantUML PNGs,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            and finally DOCX/PPTX exports.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                content: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      @startuml generation_pipeline
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            skinparam backgroundColor white
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  component "Canon YAML\n(Single Source of Truth)" as CY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        component "Jinja2 Templates\n(templates/*.j2)" as J2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              component "Markdown Docs\n(docs/*.md)" as MD
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    component "MkDocs HTML\n(GitHub Pages)" as MK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          component "PlantUML Diagrams\n(visuals/*.puml)" as PU
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                component "PNG Images\n(assets/images/plantuml/)" as PNG
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      component "Exports\n(DOCX / PPTX / OSCAL)" as EXP
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            CY --> J2 : render_template()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  J2 --> MD : build_docs()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        MD --> MK : mkdocs build
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              CY --> PU : generate_diagrams_from_canon()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    PU --> PNG : render_plantuml_file()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          PNG --> EXP : embed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                MD --> EXP : build_rich_docx()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      @enduml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        zero_trust_journey:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            type: component
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                title: Zero Trust Maturity Journey
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    description: >
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Maturity progression from Traditional Perimeter-based security through
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Enhanced and Optimal stages to Advanced Zero Trust Architecture (ZTA),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      including key milestones at each stage.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          content: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                @startuml zero_trust_journey
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      skinparam backgroundColor white
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            component "Traditional Perimeter\n(Castle-and-Moat)\nVPN + Firewall only" as TP
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  component "Enhanced\n(Identity-Aware)\nMFA + SSO + RBAC" as EN
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        component "Optimal\n(Zero Trust Aligned)\nMicro-seg + ABAC + SIEM" as OP
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              component "Advanced ZTA\n(Continuous Verification)\nAI-driven + FedRAMP 20x" as ADV
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    TP --> EN : Adopt MFA + IdP
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          EN --> OP : Deploy Service Mesh + Policy Engine
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                OP --> ADV : Continuous Auth + ML Anomaly Detection
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      @enduml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
