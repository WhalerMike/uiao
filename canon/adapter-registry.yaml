# yaml-language-server: $schema=../schemas/adapter-registry/adapter-registry.schema.json
#
# UIAO Conformance Adapter Registry
# =================================
# Operational axis: `conformance` — read-only assessors that observe the state
# of a governed target and produce normalized findings without mutating the
# target. See ARCHITECTURE.md §3.2, §3.5, §16.4 and CONMON.md §3.
#
# Doctrinal axis (UIAO_003 §4.2–§4.5): three of the four canonical classes
# are still NEW (Proposed) as of canon v1.0. Mapping below reflects the
# dominant mission role each adapter plays:
#   * scubagear          → policy     (evaluates M365 state against SCuBA
#                                      OPA/Rego baseline policies)
#   * vuln-scan          → telemetry  (observes vulnerability state; produces
#                                      normalized timestamped records)
#   * stig-compliance    → policy     (evaluates config against STIG baselines)
#   * patch-state        → telemetry  (observes patch state; produces records)
#
# Four slots total in Phase 1. Only `scubagear` is active; the three remaining
# slots are reserved names for Phase 2+ expansion per ARCHITECTURE.md §3.5.
#
# Canon invariants enforced on every entry:
#   * gcc-boundary: gcc-moderate
#   * ssot-mutation: never
#   * certificate-anchored: true
#   * object-identity-only: true
#
# Pair registry: canon/modernization-registry.yaml (modernization class)
# Schema:        schemas/adapter-registry/adapter-registry.schema.json
# Program:       CONMON.md (Continuous Monitoring Program)

schema-version: "1.0.0"
registry-class: conformance
updated: "2026-04-14"

adapters:

  - id: scubagear
    name: CISA ScubaGear (M365 SCuBA Assessor)
    class: conformance
    mission-class: policy
    status: active
    phase: phase-1
    vendor: CISA
    license: CC0-1.0
    runtime: powershell-7.4
    runtime-version: "1.5.1"
    runner-class: github-hosted
    tenancy: per-customer
    policy-engine: opa-rego
    policy-pin: main
    scope:
      - aad
      - defender
      - exo
      - powerbi
      - powerplatform
      - sharepoint
      - teams
    outputs:
      - findings.json
      - metadata.json
      - scubagear-report.html
      - scubagear-report.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
      - schedule
    evidence-class: interval
    retention-years: 3
    controls:
      - CA-2
      - CA-5
      - CA-7
      - CM-6
      - CM-8
      - RA-5
    automation-domain:
      - configuration-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-002
      - UIAO-CANON-003
      - ADR-025
      - https://github.com/cisagov/ScubaGear
    notes: >-
      Paired with modernization adapter `scuba` (canon/modernization-registry.yaml)
      which applies the baseline that ScubaGear assesses. Pin policy: track main
      + monthly pin bump as Routine Recurring Change per CONMON.md §6.

  - id: vuln-scan
    name: Vulnerability Scanner (Reserved Slot)
    class: conformance
    mission-class: telemetry
    status: reserved
    phase: phase-planning
    tenancy: per-customer
    policy-engine: none
    scope: []
    outputs:
      - findings.json
      - metadata.json
    triggers:
      - workflow_dispatch
      - schedule
    evidence-class: interval
    retention-years: 3
    controls:
      - RA-5
      - RA-5(5)
      - CA-7
      - SI-2
    automation-domain:
      - vulnerability-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
      - ADR-025
    notes: >-
      Slot reserved per ARCHITECTURE.md §3.5 and §13 open decision ODA-14.
      Candidate implementations include Tenable, Qualys, or open-source
      scanner wrappers. Authenticated scanning required per RA-5(5) for
      Moderate/High baselines. Selection deferred to Phase 2 planning.

  - id: stig-compliance
    name: STIG Compliance Checker (Reserved Slot)
    class: conformance
    mission-class: policy
    status: reserved
    phase: phase-planning
    tenancy: per-customer
    policy-engine: none
    scope: []
    outputs:
      - findings.json
      - metadata.json
    triggers:
      - workflow_dispatch
      - schedule
    evidence-class: interval
    retention-years: 3
    controls:
      - CM-6
      - CM-7
      - CA-7
    automation-domain:
      - configuration-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
      - ADR-025
    notes: >-
      Slot reserved per ARCHITECTURE.md §3.5 and §13 open decision ODA-14.
      Candidates include SCAP/OpenSCAP, STIG Viewer automation, or OPA-based
      STIG rule engines. Selection deferred to Phase 2 planning.

  - id: patch-state
    name: Patch State Observer (Reserved Slot)
    class: conformance
    mission-class: telemetry
    status: reserved
    phase: phase-planning
    tenancy: per-customer
    policy-engine: none
    scope: []
    outputs:
      - findings.json
      - metadata.json
    triggers:
      - workflow_dispatch
      - schedule
    evidence-class: interval
    retention-years: 3
    controls:
      - SI-2
      - CM-8
      - CA-7
    automation-domain:
      - patch-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
      - ADR-025
    notes: >-
      Slot reserved per ARCHITECTURE.md §3.5 and §13 open decision ODA-14.
      Candidates include Azure Arc Update Manager (read-only mode), Intune
      compliance reports, or WSUS reporting exports. Selection deferred to
      Phase 2 planning.
