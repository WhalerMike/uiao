# Lychee link checker config — uiao-core
# Docs: https://lychee.cli.rs/usage/config/

# ── Runtime ────────────────────────────────────────────────────────────
max_concurrency = 16
max_retries = 3
retry_wait_time = 5
timeout = 20
cache = true
max_cache_age = "14d"

# ── Verbosity ──────────────────────────────────────────────────────────
verbose = true
no_progress = true

# ── Acceptance ─────────────────────────────────────────────────────────
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 304, 307, 308, 403, 429]

# ── Exclusions ─────────────────────────────────────────────────────────
exclude_path = [
  "node_modules",
  ".venv",
  ".pytest_cache",
  "tools/__pycache__",
]

exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^https?://(www\\.)?example\\.(com|org|net)",
  "^https?://.*\\.local(/|$)",
  "^mailto:",
  "^tel:",
]

# ── GitHub token ───────────────────────────────────────────────────────
# Use GITHUB_TOKEN env var to avoid anonymous rate limits on github.com.
