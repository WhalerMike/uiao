# Lychee link checker config — uiao-core
# Docs: https://lychee.cli.rs/usage/config/

# ── Runtime ────────────────────────────────────────────────────────────
max_concurrency = 16
max_retries = 3
retry_wait_time = 5
timeout = 20
cache = true
max_cache_age = "14d"

# ── Verbosity ──────────────────────────────────────────────────────────
verbose = "info"
no_progress = true

# ── Acceptance ─────────────────────────────────────────────────────────
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 304, 307, 308, 403, 429]

# ── Exclusions ─────────────────────────────────────────────────────────
exclude_path = [
  "node_modules",
  ".venv",
  ".pytest_cache",
  "tools/__pycache__",
  "CHANGELOG.md",         # auto-generated; tag-compare + issue refs are noise
]

exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^https?://(www\\.)?example\\.(com|org|net)",
  "^https?://.*\\.local(/|$)",
  "^mailto:",
  "^tel:",
  # PlantUML render URLs (encoded diagram payloads, not real docs)
  "^https?://www\\.plantuml\\.com/plantuml/",
  # non-HTTP schemes that lychee tries to resolve
  "^postgresql://",
  "^computer://",
  # JSON Schema $id templates embedded in docs as inline code
  "^https?://github\\.com/[^/]+/uiao-core/schemas/",
  # GSA/fedramp-automation — archived July 2025, repo later removed (now 404).
  # Cited in compliance/reference/fedramp-rev5/README.md as historical origin
  # of local Rev 5 OSCAL reference materials; the README already documents the
  # archived/offline state. No active successor repo exists per FedRAMP PMO.
  "^https?://github\\.com/GSA/fedramp-automation/?$",
]

# ── GitHub token ───────────────────────────────────────────────────────
# Use GITHUB_TOKEN env var to avoid anonymous rate limits on github.com.
