      (Windows Server 2025 + IIS). RESERVED — promoted to active when
      ADR-041 moves from draft to accepted and the implementation
      guides land under docs/docs/ops/git-server/. Observes service
      health (IIS app-pool state, `git http-backend` availability),
      TLS posture (certificate expiry, chain validity), repository
      inventory (count + quota), and access audit (IIS request log
      summary). Pair document: ADR-041. Does NOT modernize the Git
      service itself; provisioning is handled via IaC (Terraform /
      DSC) outside the adapter fabric.
