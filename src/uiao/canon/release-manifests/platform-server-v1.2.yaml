# Release manifest — UIAO Platform Server build v1.2
#
# Authority: this file pins every external binary the Phase 0-13 runbook in
# docs/customer-documents/platform/platform-server-build.qmd (UIAO_SBG_001
# v1.3) downloads onto the Windows Server 2025 host. Each entry carries:
#
#   - canonical_url:   the GitHub-Releases / Microsoft-CDN URL the build
#                      guide cites in its inline PowerShell.
#   - filename:        the exact filename the runbook expects on disk.
#   - version:         the pinned version string.
#   - sha256:          SHA-256 of the binary at canonical_url.
#                      Placeholder "TBD-<asset>" entries must be replaced
#                      with the actual hash before this manifest can be
#                      promoted from `status: draft` to `status: pinned`.
#   - verify_command:  the PowerShell one-liner the runbook uses to verify
#                      the hash on the host before installation.
#   - upstream_source: the project / vendor that publishes the binary.
#   - notes:           anything an operator needs to know that the URL alone
#                      does not convey.
#
# Internal-mirror operators (Phase 0.5) substitute canonical_url with their
# Artifactory / Azure Artifacts mirror URL; sha256 is unchanged.
#
# Promotion path: draft -> pinned (all sha256 filled) -> accepted (governance
# review per ADR-041). Updates that change any pinned version emit
# DRIFT-SCHEMA per UIAO_163.

id: platform-server-v1.2
status: partial
date: 2026-05-12
applies_to:
  - docs/customer-documents/platform/platform-server-build.qmd@v1.3
adr: ADR-041
boundary: gcc-moderate

# Status semantics:
#   draft     — all sha256 fields are TBD-* placeholders
#   partial   — some sha256 fields verified against publisher .sha256, others
#               still TBD because the verifying host could not reach the
#               vendor CDN (e.g. Microsoft download.microsoft.com, aka.ms)
#   pinned    — every sha256 field carries a verified hash
#   accepted  — pinned + governance review per ADR-041

assets:

  # ── PowerShell runtime ──────────────────────────────────────────────
  - name: PowerShell 7.4 (Windows AMD64)
    role: shell-runtime
    version: 7.4.6
    canonical_url: https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/PowerShell-7.4.6-win-x64.msi
    filename: PowerShell-7.4.6-win-x64.msi
    sha256: ed331a04679b83d4c013705282d1f3f8d8300485eb04c081f36e11eaf1148bd0
    sha256_provenance: >
      Verified 2026-05-12 against
      https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/hashes.sha256
      (`PowerShell-7.4.6-win-x64.msi` row). 109,203,456 bytes.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: github.com/PowerShell/PowerShell
    notes: |
      Phase 0.2 baseline shell. Installed alongside Windows PowerShell 5.1,
      which is retained only for Install-WindowsFeature and legacy IIS
      cmdlets. All Gitea hooks use the `#!/usr/bin/env pwsh` shebang.

  # ── Git CLI ─────────────────────────────────────────────────────────
  - name: Git for Windows
    role: git-cli
    version: 2.44.0
    canonical_url: https://github.com/git-for-windows/git/releases/download/v2.44.0.windows.1/Git-2.44.0-64-bit.exe
    filename: Git-2.44.0-64-bit.exe
    sha256: 914ffc96cee0631d09049b9d87d4cd8ac9c98ead9a9f9a094d3341348324a9ec
    sha256_provenance: >
      Computed 2026-05-12 from a direct download of canonical_url; the
      git-for-windows project does not publish a sibling .sha256 file, so
      provenance is the HTTPS-fetched artifact itself. 65,350,776 bytes.
      Cross-check the signed installer's Authenticode signature on the
      target host (`Get-AuthenticodeSignature`) before install.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: github.com/git-for-windows/git
    notes: |
      Used by Phase 8 (`git clone`/`fetch`/`update-ref`) and by the
      pull-mirror scheduled task. Installed silently per the §2 of the
      build guide; `/COMPONENTS` flag drops shell-here registration to
      reduce attack surface.

  # ── Gitea (canonical SSOT service) ─────────────────────────────────
  - name: Gitea (Windows AMD64)
    role: git-service
    version: 1.21.11
    canonical_url: https://github.com/go-gitea/gitea/releases/download/v1.21.11/gitea-1.21.11-windows-4.0-amd64.exe
    filename: gitea.exe
    sha256: 498e2e6d00ccd9c94dc1c6ce204df897722b4b6113524853829c6dcb48532e5c
    sha256_provenance: >
      Verified 2026-05-12 against
      https://github.com/go-gitea/gitea/releases/download/v1.21.11/gitea-1.21.11-windows-4.0-amd64.exe.sha256
      (publisher-signed). 208,516,960 bytes.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: github.com/go-gitea/gitea
    notes: |
      Phase 4. Pinned to the 1.21.x LTS line. Service-installed under the
      `corp\svc-uiao-gitea$` gMSA, bound to 127.0.0.1:3000, fronted by
      IIS on :443.

  # ── IIS extensions (out-of-band MSIs not bundled with Windows) ─────
  - name: IIS URL Rewrite Module 2.1
    role: iis-extension
    version: 7.2.1993
    canonical_url: https://download.microsoft.com/download/D/8/1/D81E5DD6-1ABB-46B0-9B4B-21894E18B77F/rewrite_amd64_en-US.msi
    canonical_page: https://www.iis.net/downloads/microsoft/url-rewrite
    filename: rewrite_amd64_en-US.msi
    sha256: TBD-iis-url-rewrite-2.1-amd64
    sha256_provenance: >
      TBD — verifying host (Linux sandbox) blocked from reaching
      download.microsoft.com; the WS2025 build host with the §0.5 egress
      allowlist applied can resolve this URL and compute the hash via
      `Get-FileHash -Algorithm SHA256 $path` at install time.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: download.microsoft.com / iis.net
    notes: |
      Phase 2.a. Required by the reverse-proxy rewrite rules at Phase 5.b.
      Microsoft has rotated the direct MSI URL in the past — if a 404
      surfaces, fetch the current MSI from canonical_page and update
      both canonical_url and sha256 here.

  - name: IIS Application Request Routing 3.0
    role: iis-extension
    version: 3.0.1985
    canonical_url: https://download.microsoft.com/download/E/9/8/E9849D6A-020E-47E4-9FD0-A023E99B54EB/requestRouter_amd64.msi
    canonical_page: https://www.iis.net/downloads/microsoft/application-request-routing
    filename: requestRouter_amd64.msi
    sha256: TBD-iis-arr-3.0-amd64
    sha256_provenance: >
      TBD — same egress restriction as URL Rewrite above; compute on the
      WS2025 build host.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: download.microsoft.com / iis.net
    notes: |
      Phase 2.a. Enables the IIS proxy mode that Phase 5 turns on via
      `system.webServer/proxy/@enabled = true`.

  - name: IIS HttpPlatformHandler 1.2
    role: iis-extension
    version: 1.2.0
    canonical_url: https://download.microsoft.com/download/A/8/0/A80747C3-41BD-45DF-B505-E9710D2744E0/httpPlatformHandler_amd64.msi
    canonical_page: https://www.iis.net/downloads/microsoft/httpplatformhandler
    filename: httpPlatformHandler_amd64.msi
    sha256: TBD-iis-httpplatformhandler-1.2
    sha256_provenance: >
      TBD — same egress restriction; compute on the WS2025 build host.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: download.microsoft.com / iis.net
    notes: |
      Phase 2.a. Required by deploy/windows-server/web.config for the
      FastAPI service in src/uiao/api/. Not used by the Gitea reverse
      proxy itself.

  - name: .NET 8 hosting bundle
    role: runtime
    version: 8.0.6
    canonical_url: https://builds.dotnet.microsoft.com/dotnet/aspnetcore/Runtime/8.0.6/dotnet-hosting-8.0.6-win.exe
    canonical_page: https://dotnet.microsoft.com/download/dotnet/8.0
    filename: dotnet-hosting-8.0.6-win.exe
    sha256: TBD-dotnet-hosting-8.0.6-win
    sha256_provenance: >
      TBD — builds.dotnet.microsoft.com not reachable from the verifying
      sandbox; compute on the WS2025 build host.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: builds.dotnet.microsoft.com
    notes: |
      Phase 2.a. Provides the ASP.NET Core module IIS uses to host the
      three out-of-band IIS extensions above.

  - name: Visual C++ 2015–2022 redistributable (x64)
    role: runtime
    version: 14.40.x
    canonical_url: https://aka.ms/vs/17/release/vc_redist.x64.exe
    filename: vc_redist.x64.exe
    sha256: TBD-vc-redist-x64-latest
    sha256_provenance: >
      TBD — aka.ms shortlinks not reachable from the verifying sandbox.
      Note: aka.ms always serves the latest VS 17 release, so the hash
      drifts over time; re-verify on each upgrade and record both the
      hash and the resolved release version here.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: aka.ms (Microsoft VS 17 release channel)
    notes: |
      Required by Gitea on Windows and by several native PowerShell
      modules.

  # ── Azure Arc enrollment agent ─────────────────────────────────────
  - name: Azure Connected Machine Agent
    role: arc-agent
    version: latest
    canonical_url: https://aka.ms/AzureConnectedMachineAgent
    filename: AzureConnectedMachineAgent.msi
    sha256: TBD-azcmagent-latest
    sha256_provenance: >
      TBD — aka.ms not reachable from the verifying sandbox. As with
      vc_redist above, this resolves to the current Arc agent release
      and the hash drifts on each upstream release; capture the resolved
      version + hash on the build host at install time.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: aka.ms (Microsoft Azure Arc release channel)
    notes: |
      Phase 11.b. Onboards UIAO-GIT01 as an Arc resource so Azure
      Policy, Guest Configuration, and Defender for Servers extend to
      the on-prem host.

  # ── GPG (signed-commit verification) ──────────────────────────────
  - name: Gpg4win
    role: signing-toolchain
    version: 4.3.1
    canonical_url: https://www.gpg4win.org/get-gpg4win.html
    filename: gpg4win-4.3.1.exe
    sha256: TBD-gpg4win-4.3.1
    sha256_provenance: >
      TBD — gpg4win.org not reachable from the verifying sandbox.
      Cross-check against the SHA-256 listed at
      https://www.gpg4win.org/package-integrity.html for the matching
      installer; record both the verified hash and the package-integrity
      page URL at install time.
    verify_command: '(Get-FileHash -Algorithm SHA256 $path).Hash'
    upstream_source: gpg4win.org
    notes: |
      Phase 0.6 / Phase 9. Provides `gpg.exe` for verifying signed
      commits in the pre-receive hook chain. canonical_url is the
      release landing page; the direct installer URL rotates per
      release and should be derived from it at install time.

# ── Verification harness ───────────────────────────────────────────────
verification:
  process: |
    1. Download each asset from canonical_url.
    2. Compute `Get-FileHash -Algorithm SHA256 $path` on the downloaded file.
    3. Compare against the `sha256` field above. Reject install on mismatch.
       For entries with sha256 starting `TBD-`, populate the value at
       install time and update sha256_provenance to record the source.
    4. Submit the verified hash to UIAO_163 as a DRIFT-PROVENANCE check via
       `Submit-DriftReport -Engine UIAO_163 -Payload @{ manifest = '...' }`.

