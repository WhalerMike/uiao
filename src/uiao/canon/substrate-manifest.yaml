# yaml-language-server: $schema=../schemas/substrate-manifest/substrate-manifest.schema.json
#
# UIAO Substrate Manifest
# =======================
# Top-level declaration of the UIAO monorepo substrate: modules, roles,
# canon authority relationships, and drift-scan scope. Registered as
# UIAO_200 in src/uiao/canon/document-registry.yaml.
#
# Frontmatter conforms to src/uiao/schemas/metadata-schema.json.
# Body conforms to src/uiao/schemas/substrate-manifest/substrate-manifest.schema.json.
#
# Vocabulary: see docs/docs/00_CorePrinciples.qmd (SSOT, Canon, Substrate,
# Overlay, Control Plane, Adapter, Pillar).
# Drift taxonomy: see docs/docs/16_DriftDetectionStandard.qmd.

metadata:
  document_id: UIAO_200
  title: "UIAO Substrate Manifest"
  version: "2.0"
  status: Current
  classification: OPERATIONAL
  owner: WhalerMike
  created_at: "2026-04-17"
  updated_at: "2026-04-23"
  boundary: GCC-Moderate
  provenance:
    source: "src/uiao/canon/adr/adr-044-substrate-governance-realignment.md"
    version: "2.0"
    derived_at: "2026-04-23"
    derived_by: "ADR-044 follow-through on ADR-032 single-package consolidation"

workspace:
  root_env: UIAO_WORKSPACE_ROOT
  fallbacks:
    linux: "$HOME/src/uiao"
    macos: "$HOME/src/uiao"
    windows: "%USERPROFILE%\\src\\uiao"

github:
  root: "https://github.com/WhalerMike/uiao"
  default_branch: main

# Post-ADR-032 topology. The pre-consolidation 3-module tree
# (`core` + `docs` + `impl`) was flattened into a single installable
# Python package at `src/uiao/`. Canon ships inside the package via
# importlib.resources; schemas, rules, and the KSI library are package
# data. The modules below are the actual top-level directories of the
# repository as of v2.0.
modules:
  - name: uiao
    path: src/uiao
    role: package
    canon_consumer: false
    summary: >-
      The installable `uiao` Python distribution. Contains canon
      (src/uiao/canon/), schemas (src/uiao/schemas/), rules, KSI library,
      adapters, CLI, governance engine, OSCAL/SSP generators, evidence
      pipeline, substrate walker, orchestrator. Canon authority and
      runtime code coexist in one package; canon is read via
      importlib.resources, never mutated at runtime (invariant I4).
    registry_refs:
      - src/uiao/canon/document-registry.yaml
      - src/uiao/canon/adapter-registry.yaml
      - src/uiao/canon/modernization-registry.yaml
      - src/uiao/canon/reciprocal-consumption-registry.yaml

  - name: tests
    path: tests
    role: consumer
    canon_consumer: true
    summary: >-
      Test suite. Unit, integration, adapter conformance, substrate
      drift. Imports canon via the installed `uiao` package.

  - name: docs
    path: docs
    role: consumer
    canon_consumer: true
    summary: >-
      Derived documentation. Quarto source (`.qmd`/`.md`), articles,
      guides, playbooks, narratives. Every published doc traces
      provenance to canon under `src/uiao/canon/`.

  - name: scripts
    path: scripts
    role: tooling
    canon_consumer: true
    summary: >-
      Workspace tooling — schema validators, canon sync, doc
      generators, one-shot migration helpers. Short-lived; not
      imported at runtime.

  - name: inbox
    path: inbox
    role: staging
    canon_consumer: false
    summary: >-
      Draft-staging surface. Agent-authored content that is not yet
      canon. Promoted to `src/uiao/canon/` or `docs/` when ready.

  - name: deploy
    path: deploy
    role: deploy
    canon_consumer: false
    summary: >-
      Deployment artifacts for the uiao API service. Windows-Server
      IIS entrypoint (`deploy/windows-server/run.py`, uvicorn) and
      related config. Referenced by `src/uiao/api/app.py`.

# Sub-boundaries inside the `uiao` package that individual CI gates
# or canon-change processes care about.
sub_boundaries:
  uiao:
    - name: canon
      path: src/uiao/canon
      role: canon-authority
    - name: schemas
      path: src/uiao/schemas
      role: schema-authority
    - name: rules
      path: src/uiao/rules
      role: rules-library
    - name: ksi
      path: src/uiao/ksi
      role: ksi-library
    - name: adapters
      path: src/uiao/adapters
      role: connectors
    - name: cli
      path: src/uiao/cli
      role: entrypoint

drift_scan:
  classes:
    - DRIFT-SCHEMA
    - DRIFT-PROVENANCE
  roots:
    - src/uiao
    - tests
    - docs
    - scripts
  severity_model: P1

registry_refs:
  document_registry: src/uiao/canon/document-registry.yaml
  adapter_registry: src/uiao/canon/adapter-registry.yaml
  modernization_registry: src/uiao/canon/modernization-registry.yaml
  metadata_schema: src/uiao/schemas/metadata-schema.json
  adapter_registry_schema: src/uiao/schemas/adapter-registry/adapter-registry.schema.json
  # WS-A5 OrgTree Readiness bundle schema (UIAO_200 / Phase 1.5 M8)
  orgtree_readiness_schema: src/uiao/schemas/orgtree-readiness/orgtree-readiness.schema.json

# Slugs retired by an ADR. The substrate walker scans canon/ and docs/
# for any literal occurrence (with word boundaries) and emits a P2
# DRIFT-PROVENANCE advisory naming the replacement. Use this to make
# future references to the old slug actionable rather than silent.
#
# Authoring rule: when an ADR retires a slug, the same PR adds an
# entry here. ADR-060's deprecation-window mistake (a redirect table
# with no walker hook) was the explicit lesson behind this mechanism;
# keep the table and the enforcement in lockstep.
retired_slugs:
