# yaml-language-server: $schema=../schemas/reciprocal-consumption/registry.schema.json
#
# UIAO Reciprocal-Consumption Entitlement Registry
# =================================================
# Canonical record of attribute-level reciprocal-consumption
# entitlements between authorities of record and consumers.
# Established by ADR-055 (Customer Identity Canon Block).
#
# Each entitlement authorizes a consumer (federal agency, state,
# employer, or external party) to fetch a specific attribute
# (e.g., SSN, TIN, UEI, immigration status) from an authority of
# record (SSA, IRS, GSA SAM.gov, USCIS, etc.) under a documented
# legal basis. Required reading: UIAO_141 §6 and UIAO_142 §5.
#
# Canon invariants enforced on every entry by JSON Schema:
#   * legal_basis is mandatory (Privacy Act SORN routine use,
#     CMPPA matching agreement, statute, customer consent, or
#     interagency MOU)
#   * authority_of_record must resolve to an entry in
#     adapter-registry.yaml or modernization-registry.yaml
#   * freshness_window_hours sets the DRIFT-SEMANTIC threshold
#     for cached consumer copies
#
# This registry starts empty. Entitlements are added via PR
# with Privacy Officer / General Counsel sign-off on the
# legal-basis citation.
#
# Pair documents:
#   src/uiao/canon/specs/customer-identity-model.md (UIAO_141)
#   src/uiao/canon/specs/customer-kyc-runbook.md (UIAO_142)
# Schema: src/uiao/schemas/reciprocal-consumption/registry.schema.json

schema-version: "1.0.0"
updated: "2026-05-05"

entitlements: []
