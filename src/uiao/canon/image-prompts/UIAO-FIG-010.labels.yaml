# UIAO-FIG-010 — Drift Fabric label overlay spec
#
# Applied AFTER Gemini render, BEFORE PNG tEXt metadata embed.
# Coordinates are in the rendered PNG's pixel space (1024x1024).
#
# Defects this spec corrects (observed in run 25516309532 / v2):
#   - "Drift Compaator" -> "Drift Comparator"
#   - "Drift Classiffier" -> "Drift Classifier"
#   - "canoical state records" -> "canonical state records"

font_family: DejaVuSans
default_font_size: 11
default_text_color: "#FFFFFF"

overlays:
  # Node 2: detected bbox [248, 472, 383, 534] (135x62)
  - text: "Drift\nComparator"
    cover_box: [251, 476, 380, 530]
    cover_fill: "#0D1B2E"
    font_size: 14
    align: center
    valign: middle

  # Node 3: detected bbox [428, 472, 562, 534] (134x62)
  - text: "Drift\nClassifier"
    cover_box: [431, 476, 559, 530]
    cover_fill: "#0D1B2E"
    font_size: 14
    align: center
    valign: middle

  # Inbound annotation above arrow into node 1: "canoical state records"
  # Detected text region: y=433-479, x=25-219 — cover generously to fully wipe.
  - text: "canonical state records"
    cover_box: [22, 430, 230, 482]
    cover_fill: "#FFFFFF"
    text_color: "#5A5A5A"
    font_size: 11
    align: left
    valign: middle
