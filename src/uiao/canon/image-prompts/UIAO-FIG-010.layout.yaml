# UIAO-FIG-010 — Drift Fabric, Detection Pipeline
# Layout spec consumed by render_pil_canon_layout() in scripts/generate_images.py.
# 1920x1080 canvas, federal-whitepaper palette, amber accent for HIGH/CRITICAL.

canvas:
  width: 1920
  height: 1080
  background: "#FFFFFF"

palette:
  navy: "#0D1B2E"
  teal: "#1E8C8C"
  amber: "#D4A017"
  grey: "#5A5A5A"
  white: "#FFFFFF"

font_family: "DejaVuSans"

nodes:
  - id: state_reader
    shape: rect
    bbox: [200, 480, 440, 600]
    fill: navy
    text: "Truth Fabric\nState Reader"
    text_color: white
    font_size: 26

  - id: drift_comparator
    shape: rect
    bbox: [520, 480, 760, 600]
    fill: navy
    text: "Drift\nComparator"
    text_color: white
    font_size: 28

  - id: drift_classifier
    shape: rect
    bbox: [840, 460, 1080, 620]
    fill: navy
    text: "Drift\nClassifier"
    text_color: white
    font_size: 32
    font_bold: true

  - id: evidence_writer
    shape: rect
    bbox: [1160, 480, 1400, 600]
    fill: navy
    text: "Evidence\nFabric Writer"
    text_color: white
    font_size: 26

  - id: reconciliation_trigger
    shape: rect
    bbox: [1480, 480, 1720, 600]
    fill: navy
    text: "Reconciliation\nTrigger"
    text_color: white
    font_size: 26

  # Severity legend chips, beneath the Drift Classifier
  - id: chip_low
    shape: pill
    bbox: [730, 660, 830, 700]
    fill: teal
    text: "LOW"
    text_color: white
    font_size: 20
    font_bold: true

  - id: chip_moderate
    shape: pill
    bbox: [850, 660, 950, 700]
    fill: teal
    text: "MODERATE"
    text_color: white
    font_size: 18
    font_bold: true

  - id: chip_high
    shape: pill
    bbox: [970, 660, 1070, 700]
    fill: amber
    text: "HIGH"
    text_color: navy
    font_size: 20
    font_bold: true

  - id: chip_critical
    shape: pill
    bbox: [1090, 660, 1190, 700]
    fill: amber
    text: "CRITICAL"
    text_color: navy
    font_size: 18
    font_bold: true

  # Governance Plane in upper-right corner — amber outline indicates escalation target
  - id: governance_plane
    shape: rect
    bbox: [1500, 240, 1820, 380]
    fill: navy
    outline: amber
    outline_width: 6
    text: "Governance Plane"
    text_color: white
    font_size: 28
    font_bold: true

arrows:
  # Inbound stub
  - start: [110, 540]
    end: [200, 540]
    color: teal
    width: 4

  # Pipeline
  - from: state_reader
    to: drift_comparator
    color: teal
    width: 4
  - from: drift_comparator
    to: drift_classifier
    color: teal
    width: 4
  - from: drift_classifier
    to: evidence_writer
    color: teal
    width: 4
  - from: evidence_writer
    to: reconciliation_trigger
    color: teal
    width: 4

  # Drift Records — outbound DOWN from Evidence Fabric Writer
  - start: [1280, 600]
    end: [1280, 720]
    color: teal
    width: 4

  # HIGH/CRITICAL escalation — amber arrow UP from Reconciliation Trigger to Governance Plane
  - start: [1600, 480]
    end: [1600, 380]
    color: amber
    width: 5

annotations:
  - text: "UIAO Drift Fabric — Detection Pipeline"
    position: [960, 90]
    anchor: mt
    color: navy
    font_size: 42
    bold: true

  - text: "canonical state records"
    position: [115, 490]
    anchor: lt
    color: grey
    font_size: 20

  - text: "Severity Legend"
    position: [960, 630]
    anchor: mt
    color: grey
    font_size: 18

  - text: "Drift Records"
    position: [1280, 740]
    anchor: mt
    color: grey
    font_size: 22

  - text: "HIGH/CRITICAL\nescalation"
    position: [1620, 410]
    anchor: lt
    color: amber
    font_size: 22
    bold: true

  - text: "Source of truth: src/uiao/canon/image-prompts/UIAO-FIG-010.layout.yaml"
    position: [960, 1010]
    anchor: mt
    color: grey
    font_size: 16
