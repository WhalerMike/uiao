# UIAO-FIG-009 — Truth Fabric label overlay spec
#
# Applied AFTER Gemini render, BEFORE PNG tEXt metadata embed. Used
# to correct text-fidelity defects in the Gemini render. Coordinates
# are in the rendered PNG's pixel space (1024x1024).
#
# Defects this spec corrects (observed in run 25516309532 / v2):
#   - "Canoical State Store" -> "Canonical State Store"
#     (Gemini drops the second 'n' in "Canonical"; spelling-callout
#     in the prompt does not reliably correct it.)
#
# Cover_fill colors match the underlying node fill so the overlay
# is invisible apart from the corrected text.

font_family: DejaVuSans
default_font_size: 11
default_text_color: "#FFFFFF"

overlays:
  # Central teal cylinder: "Canoical State Store" -> "Canonical State Store"
  # Detected cylinder bbox: [482, 486, 557, 538] (75x52)
  - text: "Canonical\nState Store"
    cover_box: [485, 491, 555, 535]
    cover_fill: "#1E8C8C"
    font_size: 10
    align: center
    valign: middle
