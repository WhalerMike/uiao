# UIAO-FIG-011 — Evidence Fabric, Write Pipeline + Storage Tiers
# Layout spec consumed by render_pil_canon_layout() in scripts/generate_images.py.
# 1920x1080 canvas, federal-whitepaper palette, mid-blue cylinders for storage.

canvas:
  width: 1920
  height: 1080
  background: "#FFFFFF"

palette:
  navy: "#0D1B2E"
  teal: "#1E8C8C"
  midblue: "#2E75B6"
  grey: "#5A5A5A"
  white: "#FFFFFF"

font_family: "DejaVuSans"

nodes:
  - id: event_ingress
    shape: rect
    bbox: [120, 420, 320, 540]
    fill: navy
    text: "Event\nIngress"
    text_color: white
    font_size: 28

  - id: signature_verifier
    shape: rect
    bbox: [380, 420, 580, 540]
    fill: navy
    text: "Signature\nVerifier"
    text_color: white
    font_size: 28

  - id: countersigner
    shape: rect
    bbox: [640, 420, 880, 540]
    fill: navy
    text: "Evidence Fabric\nCountersigner"
    text_color: white
    font_size: 24

  - id: hash_chain_writer
    shape: rect
    bbox: [940, 420, 1140, 540]
    fill: navy
    text: "Hash Chain\nWriter"
    text_color: white
    font_size: 28

  - id: active_storage
    shape: cylinder
    bbox: [1220, 380, 1380, 600]
    fill: midblue
    text: "Active\nStorage"
    text_color: white
    font_size: 24
    font_bold: true

  - id: archive_storage
    shape: cylinder
    bbox: [1430, 410, 1570, 570]
    fill: midblue
    text: "Archive\nStorage"
    text_color: white
    font_size: 22
    font_bold: true

  - id: correlation_engine
    shape: rect
    bbox: [1240, 720, 1560, 820]
    fill: teal
    text: "Correlation Engine"
    text_color: white
    font_size: 28
    font_bold: true

arrows:
  # Inbound stub
  - start: [40, 480]
    end: [120, 480]
    color: teal
    width: 4

  # Pipeline 1->2
  - from: event_ingress
    to: signature_verifier
    color: teal
    width: 4

  # Pipeline 2->3 with dedup label
  - from: signature_verifier
    to: countersigner
    color: teal
    width: 4
    label_above: "dedup"
    label_color: grey
    label_font_size: 20

  # Pipeline 3->4
  - from: countersigner
    to: hash_chain_writer
    color: teal
    width: 4

  # Fork from hash_chain_writer to Active Storage
  - from: hash_chain_writer
    to: active_storage
    color: teal
    width: 4

  # Fork from hash_chain_writer to Archive Storage (explicit endpoints to avoid auto-anchor on bottom-half cylinder)
  - start: [1140, 470]
    end: [1430, 480]
    color: teal
    width: 4

  # Read arrows DOWN from cylinders into Correlation Engine
  - start: [1300, 600]
    end: [1300, 720]
    color: teal
    width: 4
  - start: [1500, 570]
    end: [1500, 720]
    color: teal
    width: 4

  # Outbound RIGHT from Correlation Engine
  - start: [1560, 770]
    end: [1660, 770]
    color: teal
    width: 4

annotations:
  - text: "UIAO Evidence Fabric — Write Pipeline & Storage Tiers"
    position: [960, 90]
    anchor: mt
    color: navy
    font_size: 40
    bold: true

  - text: "adapter-signed\ngovernance events"
    position: [25, 440]
    anchor: lt
    color: grey
    font_size: 20

  - text: "≤ 90 days"
    position: [1300, 615]
    anchor: mt
    color: grey
    font_size: 20

  - text: "3–7 year retention"
    position: [1500, 585]
    anchor: mt
    color: grey
    font_size: 20

  - text: "read"
    position: [1320, 650]
    anchor: lt
    color: grey
    font_size: 18

  - text: "read"
    position: [1455, 615]
    anchor: lt
    color: grey
    font_size: 18

  - text: "correlation and\ndiff queries"
    position: [1675, 750]
    anchor: lt
    color: grey
    font_size: 20

  - text: "Source of truth: src/uiao/canon/image-prompts/UIAO-FIG-011.layout.yaml"
    position: [960, 1010]
    anchor: mt
    color: grey
    font_size: 16
