# UIAO-FIG-011 — Evidence Fabric, Write Pipeline + Storage Tiers
# Layout spec consumed by render_pil_canon_layout() in scripts/generate_images.py.
# 1920x1080 canvas, federal-whitepaper palette, mid-blue cylinders for storage.
#
# v2 layout adjustments (post-v4 review):
# - Restructured storage flow from a fork-from-Hash-Chain-Writer (which
#   put one of the two arrows passing through Active Storage) to a
#   linear flow: Hash Chain Writer -> Active Storage -> Archive Storage,
#   with a "≥ 90 days" annotation on the Active->Archive arrow. This
#   matches the actual lifecycle (writes hit Active first, age out to
#   Archive) and avoids needing polyline arrow support in the renderer.
# - Widened gap between Signature Verifier (node 2) and Evidence Fabric
#   Countersigner (node 3) from 60 -> 100 px so the "dedup" annotation
#   stops overlapping the Countersigner node.
# - Inbound annotation moved ABOVE node 1.

canvas:
  width: 1920
  height: 1080
  background: "#FFFFFF"

palette:
  navy: "#0D1B2E"
  teal: "#1E8C8C"
  midblue: "#2E75B6"
  grey: "#5A5A5A"
  white: "#FFFFFF"

font_family: "DejaVuSans"

nodes:
  - id: event_ingress
    shape: rect
    bbox: [120, 420, 320, 540]
    fill: navy
    text: "Event\nIngress"
    text_color: white
    font_size: 28

  - id: signature_verifier
    shape: rect
    bbox: [380, 420, 580, 540]
    fill: navy
    text: "Signature\nVerifier"
    text_color: white
    font_size: 28

  - id: countersigner
    shape: rect
    bbox: [680, 420, 920, 540]
    fill: navy
    text: "Evidence Fabric\nCountersigner"
    text_color: white
    font_size: 24

  - id: hash_chain_writer
    shape: rect
    bbox: [980, 420, 1180, 540]
    fill: navy
    text: "Hash Chain\nWriter"
    text_color: white
    font_size: 28

  - id: active_storage
    shape: cylinder
    bbox: [1260, 380, 1420, 600]
    fill: midblue
    text: "Active\nStorage"
    text_color: white
    font_size: 24
    font_bold: true

  - id: archive_storage
    shape: cylinder
    bbox: [1500, 410, 1660, 570]
    fill: midblue
    text: "Archive\nStorage"
    text_color: white
    font_size: 22
    font_bold: true

  - id: correlation_engine
    shape: rect
    bbox: [1280, 720, 1640, 820]
    fill: teal
    text: "Correlation Engine"
    text_color: white
    font_size: 28
    font_bold: true

arrows:
  # Inbound stub
  - start: [40, 480]
    end: [120, 480]
    color: teal
    width: 4

  # Pipeline 1->2
  - from: event_ingress
    to: signature_verifier
    color: teal
    width: 4

  # Pipeline 2->3 with dedup label (gap widened to 100 px so the label fits)
  - from: signature_verifier
    to: countersigner
    color: teal
    width: 4
    label_above: "dedup"
    label_color: grey
    label_font_size: 20

  # Pipeline 3->4
  - from: countersigner
    to: hash_chain_writer
    color: teal
    width: 4

  # Hash Chain Writer -> Active Storage (auto-anchored)
  - from: hash_chain_writer
    to: active_storage
    color: teal
    width: 4

  # Active Storage -> Archive Storage (linear flow, "≥ 90 days" annotation above)
  - start: [1420, 490]
    end: [1500, 490]
    color: teal
    width: 4
    label_above: "≥ 90 days"
    label_color: grey
    label_font_size: 18

  # Read arrows DOWN from cylinders into Correlation Engine
  - start: [1340, 600]
    end: [1340, 720]
    color: teal
    width: 4
  - start: [1580, 570]
    end: [1580, 720]
    color: teal
    width: 4

  # Outbound RIGHT from Correlation Engine
  - start: [1640, 770]
    end: [1740, 770]
    color: teal
    width: 4

annotations:
  - text: "UIAO Evidence Fabric — Write Pipeline & Storage Tiers"
    position: [960, 90]
    anchor: mt
    color: navy
    font_size: 40
    bold: true

  # Inbound annotation ABOVE node 1
  - text: "adapter-signed\ngovernance events"
    position: [220, 380]
    anchor: mb
    color: grey
    font_size: 20

  - text: "≤ 90 days"
    position: [1340, 615]
    anchor: mt
    color: grey
    font_size: 20

  - text: "3–7 year retention"
    position: [1580, 585]
    anchor: mt
    color: grey
    font_size: 20

  - text: "read"
    position: [1360, 650]
    anchor: lt
    color: grey
    font_size: 18

  - text: "read"
    position: [1535, 615]
    anchor: lt
    color: grey
    font_size: 18

  - text: "correlation and\ndiff queries"
    position: [1755, 750]
    anchor: lt
    color: grey
    font_size: 20

  - text: "Source of truth: src/uiao/canon/image-prompts/UIAO-FIG-011.layout.yaml"
    position: [960, 1010]
    anchor: mt
    color: grey
    font_size: 16
