# UIAO-FIG-009 — Truth Fabric, Claim Intake Pipeline
# Layout spec consumed by render_pil_canon_layout() in scripts/generate_images.py.
# 1920x1080 canvas, federal-whitepaper palette, deterministic PIL rendering.

canvas:
  width: 1920
  height: 1080
  background: "#FFFFFF"

palette:
  navy: "#0D1B2E"
  teal: "#1E8C8C"
  midblue: "#2E75B6"
  grey: "#5A5A5A"
  white: "#FFFFFF"

font_family: "DejaVuSans"

nodes:
  - id: claim_ingress
    shape: rect
    bbox: [90, 460, 290, 580]
    fill: navy
    text: "Claim\nIngress API"
    text_color: white
    font_size: 28

  - id: schema_validator
    shape: rect
    bbox: [340, 460, 540, 580]
    fill: navy
    text: "Schema\nValidator"
    text_color: white
    font_size: 28

  - id: signature_verifier
    shape: rect
    bbox: [590, 460, 790, 580]
    fill: navy
    text: "Signature\nVerifier"
    text_color: white
    font_size: 28

  - id: identity_anchoring
    shape: rect
    bbox: [840, 460, 1040, 580]
    fill: navy
    text: "Identity\nAnchoring\nEngine"
    text_color: white
    font_size: 26

  - id: state_store
    shape: cylinder
    bbox: [1090, 400, 1330, 640]
    fill: teal
    text: "Canonical\nState Store"
    text_color: white
    font_size: 30
    font_bold: true

  - id: control_mapping
    shape: rect
    bbox: [1380, 460, 1580, 580]
    fill: navy
    text: "Control\nMapping\nEngine"
    text_color: white
    font_size: 26

  - id: drift_fabric_interface
    shape: rect
    bbox: [1630, 460, 1830, 580]
    fill: navy
    text: "Drift Fabric\nInterface"
    text_color: white
    font_size: 26

arrows:
  # Inbound stub from off-canvas left
  - start: [20, 520]
    end: [90, 520]
    color: teal
    width: 4

  # Pipeline arrows
  - from: claim_ingress
    to: schema_validator
    color: teal
    width: 4
  - from: schema_validator
    to: signature_verifier
    color: teal
    width: 4
    label_above: "accept"
    label_below: "reject"
    label_color: grey
    label_font_size: 22
  - from: signature_verifier
    to: identity_anchoring
    color: teal
    width: 4
  - from: identity_anchoring
    to: state_store
    color: teal
    width: 4
  - from: state_store
    to: control_mapping
    color: teal
    width: 4
  - from: control_mapping
    to: drift_fabric_interface
    color: teal
    width: 4

  # Compliance Attestations — outbound DOWN from Control Mapping Engine
  - start: [1480, 580]
    end: [1480, 720]
    color: teal
    width: 4

  # Outbound RIGHT from Drift Fabric Interface
  - start: [1830, 520]
    end: [1900, 520]
    color: teal
    width: 4

annotations:
  # Title
  - text: "UIAO Truth Fabric — Claim Intake Pipeline"
    position: [960, 90]
    anchor: mt
    color: navy
    font_size: 42
    bold: true

  # Inbound arrow label
  - text: "signed Canonical Claims\nfrom adapters"
    position: [25, 470]
    anchor: lt
    color: grey
    font_size: 20

  # Compliance Attestations under the down-arrow from Control Mapping Engine
  - text: "Compliance Attestations"
    position: [1480, 740]
    anchor: mt
    color: grey
    font_size: 22

  # Outbound right of Drift Fabric Interface (right-anchored to keep on-canvas)
  - text: "canonical state\nqueries"
    position: [1900, 500]
    anchor: rt
    color: grey
    font_size: 20

  # Footer caption
  - text: "Source of truth: src/uiao/canon/image-prompts/UIAO-FIG-009.layout.yaml"
    position: [960, 1010]
    anchor: mt
    color: grey
    font_size: 16
