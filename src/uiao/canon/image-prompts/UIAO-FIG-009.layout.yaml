# UIAO-FIG-009 — Truth Fabric, Claim Intake Pipeline
# Layout spec consumed by render_pil_canon_layout() in scripts/generate_images.py.
# 1920x1080 canvas, federal-whitepaper palette.
#
# C3 rewrite (2026-05-09): switched from explicit per-node bbox coords to
# pipeline auto-layout. The renderer measures each node from its text +
# padding, then places members along axis_position with the configured
# `gap`. Authoring stays focused on content (labels, palette) instead of
# pixel arithmetic.

canvas:
  width: 1920
  height: 1080
  background: "#FFFFFF"

palette:
  navy: "#0D1B2E"
  teal: "#1E8C8C"
  midblue: "#2E75B6"
  grey: "#5A5A5A"
  white: "#FFFFFF"

font_family: "DejaVuSans"

pipelines:
  - direction: horizontal
    axis_position: 540
    start: 90
    # Tuned so 7 auto-sized nodes (rect default 36 padx + cylinder min_width 240)
    # fit within 1920 px canvas. v6 with gap=80 clipped the rightmost node at
    # x=2075. accept/reject branch labels still fit at gap=50 because they sit
    # on the same arrow centerline (label_above and label_below stack).
    gap: 50
    members:
      - claim_ingress
      - schema_validator
      - signature_verifier
      - identity_anchoring
      - state_store
      - control_mapping
      - drift_fabric_interface

nodes:
  - id: claim_ingress
    shape: rect
    text: "Claim\nIngress API"
    fill: navy
    text_color: white
    font_size: 28

  - id: schema_validator
    shape: rect
    text: "Schema\nValidator"
    fill: navy
    text_color: white
    font_size: 28

  - id: signature_verifier
    shape: rect
    text: "Signature\nVerifier"
    fill: navy
    text_color: white
    font_size: 28

  - id: identity_anchoring
    shape: rect
    text: "Identity\nAnchoring\nEngine"
    fill: navy
    text_color: white
    font_size: 26

  # Cylinder gets its own padding so the elliptical caps fit above/below
  # the text, and a min_width to read as the "central authority" node.
  - id: state_store
    shape: cylinder
    text: "Canonical\nState Store"
    fill: teal
    text_color: white
    font_size: 30
    font_bold: true
    padding_x: 40
    padding_y: 60
    min_width: 240

  - id: control_mapping
    shape: rect
    text: "Control\nMapping\nEngine"
    fill: navy
    text_color: white
    font_size: 26

  - id: drift_fabric_interface
    shape: rect
    text: "Drift Fabric\nInterface"
    fill: navy
    text_color: white
    font_size: 26

arrows:
  # Inbound stub from off-canvas left
  - start: [20, 540]
    end: [90, 540]
    color: teal
    width: 4

  # Pipeline arrows — auto-anchored from→to
  - from: claim_ingress
    to: schema_validator
    color: teal
    width: 4
  - from: schema_validator
    to: signature_verifier
    color: teal
    width: 4
    label_above: "accept"
    label_below: "reject"
    label_color: grey
    # 16pt fits within the auto-layout's 50px gap between nodes 2 and 3
    # without clipping into Schema Validator's right edge. At 22pt the
    # labels overflow ~11px on each side. Per-arrow `min_gap_after` would
    # be the structural fix — see C3.1 follow-up.
    label_font_size: 16
  - from: signature_verifier
    to: identity_anchoring
    color: teal
    width: 4
  - from: identity_anchoring
    to: state_store
    color: teal
    width: 4
  - from: state_store
    to: control_mapping
    color: teal
    width: 4
  - from: control_mapping
    to: drift_fabric_interface
    color: teal
    width: 4

  # Compliance Attestations — outbound DOWN from Control Mapping Engine.
  # control_mapping center predicted at x=1539 with gap=50 (derived from
  # v6 layout-log measurements: control_mapping was at x=1597-1781 with
  # gap=80, shifting left by 30*5=150 with gap=50 → center moves to
  # ~1539). Future renderer enhancement: arrow `anchor_from: bottom`
  # to compute this edge automatically.
  - start: [1539, 600]
    end: [1539, 720]
    color: teal
    width: 4

  # Outbound RIGHT from Drift Fabric Interface — start.x at node's right
  # edge. With gap=50, drift_fabric_interface ends at predicted x~1895.
  - start: [1895, 540]
    end: [1920, 540]
    color: teal
    width: 4

annotations:
  - text: "UIAO Truth Fabric — Claim Intake Pipeline"
    position: [960, 90]
    anchor: mt
    color: navy
    font_size: 42
    bold: true

  # Inbound annotation ABOVE node 1 (claim_ingress center predicted ~203)
  - text: "signed Canonical Claims\nfrom adapters"
    position: [203, 430]
    anchor: mb
    color: grey
    font_size: 20

  # Compliance Attestations under the down-arrow (control_mapping center ~1539)
  - text: "Compliance Attestations"
    position: [1539, 740]
    anchor: mt
    color: grey
    font_size: 22

  # Outbound annotation ABOVE node 7 (drift_fabric_interface center ~1788)
  - text: "canonical state\nqueries"
    position: [1788, 430]
    anchor: mb
    color: grey
    font_size: 20

  - text: "Source of truth: src/uiao/canon/image-prompts/UIAO-FIG-009.layout.yaml"
    position: [960, 1010]
    anchor: mt
    color: grey
    font_size: 16
