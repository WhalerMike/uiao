# UIAO-FIG-009 — Truth Fabric, Claim Intake Pipeline
# Layout spec consumed by render_pil_canon_layout() in scripts/generate_images.py.
# 1920x1080 canvas, federal-whitepaper palette.
#
# C3 rewrite (2026-05-09): switched from explicit per-node bbox coords to
# pipeline auto-layout. The renderer measures each node from its text +
# padding, then places members along axis_position with the configured
# `gap`. Authoring stays focused on content (labels, palette) instead of
# pixel arithmetic.

canvas:
  width: 1920
  height: 1080
  background: "#FFFFFF"

palette:
  navy: "#0D1B2E"
  teal: "#1E8C8C"
  midblue: "#2E75B6"
  grey: "#5A5A5A"
  white: "#FFFFFF"

font_family: "DejaVuSans"

pipelines:
  - direction: horizontal
    axis_position: 540
    start: 90
    gap: 80  # generous so accept/reject branch labels fit cleanly
    members:
      - claim_ingress
      - schema_validator
      - signature_verifier
      - identity_anchoring
      - state_store
      - control_mapping
      - drift_fabric_interface

nodes:
  - id: claim_ingress
    shape: rect
    text: "Claim\nIngress API"
    fill: navy
    text_color: white
    font_size: 28

  - id: schema_validator
    shape: rect
    text: "Schema\nValidator"
    fill: navy
    text_color: white
    font_size: 28

  - id: signature_verifier
    shape: rect
    text: "Signature\nVerifier"
    fill: navy
    text_color: white
    font_size: 28

  - id: identity_anchoring
    shape: rect
    text: "Identity\nAnchoring\nEngine"
    fill: navy
    text_color: white
    font_size: 26

  # Cylinder gets its own padding so the elliptical caps fit above/below
  # the text, and a min_width to read as the "central authority" node.
  - id: state_store
    shape: cylinder
    text: "Canonical\nState Store"
    fill: teal
    text_color: white
    font_size: 30
    font_bold: true
    padding_x: 40
    padding_y: 60
    min_width: 240

  - id: control_mapping
    shape: rect
    text: "Control\nMapping\nEngine"
    fill: navy
    text_color: white
    font_size: 26

  - id: drift_fabric_interface
    shape: rect
    text: "Drift Fabric\nInterface"
    fill: navy
    text_color: white
    font_size: 26

arrows:
  # Inbound stub from off-canvas left
  - start: [20, 540]
    end: [90, 540]
    color: teal
    width: 4

  # Pipeline arrows — auto-anchored from→to
  - from: claim_ingress
    to: schema_validator
    color: teal
    width: 4
  - from: schema_validator
    to: signature_verifier
    color: teal
    width: 4
    label_above: "accept"
    label_below: "reject"
    label_color: grey
    label_font_size: 22
  - from: signature_verifier
    to: identity_anchoring
    color: teal
    width: 4
  - from: identity_anchoring
    to: state_store
    color: teal
    width: 4
  - from: state_store
    to: control_mapping
    color: teal
    width: 4
  - from: control_mapping
    to: drift_fabric_interface
    color: teal
    width: 4

  # Compliance Attestations — outbound DOWN from Control Mapping Engine.
  # Arrow start.x must match the auto-laid-out node's center x. With
  # the C3 defaults (rect padding 36,28; gap 80; start 90), the renderer
  # places control_mapping at approximately x=1370-1550 → center ~1460.
  # The renderer prints `[layout] <id>: bbox=...` lines so this can be
  # tightened against actual CI output. Future enhancement: arrow
  # `anchor_from: bottom` / `from: <node_id>` to compute this edge.
  - start: [1460, 600]
    end: [1460, 720]
    color: teal
    width: 4

  # Outbound RIGHT from Drift Fabric Interface — start.x at node's right
  # edge. Predicted CI position: ~x=1820 (rightmost node ends ~1820).
  - start: [1820, 540]
    end: [1900, 540]
    color: teal
    width: 4

annotations:
  - text: "UIAO Truth Fabric — Claim Intake Pipeline"
    position: [960, 90]
    anchor: mt
    color: navy
    font_size: 42
    bold: true

  # Inbound annotation ABOVE node 1 (claim_ingress center ~x=190)
  - text: "signed Canonical Claims\nfrom adapters"
    position: [190, 430]
    anchor: mb
    color: grey
    font_size: 20

  # Compliance Attestations under the down-arrow (control_mapping center ~1460)
  - text: "Compliance Attestations"
    position: [1460, 740]
    anchor: mt
    color: grey
    font_size: 22

  # Outbound annotation ABOVE node 7 (drift_fabric_interface center ~1720)
  - text: "canonical state\nqueries"
    position: [1720, 430]
    anchor: mb
    color: grey
    font_size: 20

  - text: "Source of truth: src/uiao/canon/image-prompts/UIAO-FIG-009.layout.yaml"
    position: [960, 1010]
    anchor: mt
    color: grey
    font_size: 16
