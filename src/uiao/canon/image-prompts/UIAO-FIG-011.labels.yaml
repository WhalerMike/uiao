# UIAO-FIG-011 — Evidence Fabric label overlay spec
#
# Applied AFTER Gemini render, BEFORE PNG tEXt metadata embed.
# Coordinates are in the rendered PNG's pixel space (1024x1024).
#
# Defects this spec corrects (observed in run 25516309532 / v2):
#   - "correlation\nand diff querlys" -> "correlation\nand diff queries"
#     (right-edge outbound annotation; Gemini consistently mis-spells
#     the word "queries" no matter how the prompt phrases it.)

font_family: DejaVuSans
default_font_size: 11
default_text_color: "#1E8C8C"

overlays:
  # Right-edge outbound annotation: "correlation and diff querlys"
  # Detected text bbox y=444-544, x=730-980. Cover generously to fully
  # wipe both lines, and start past the Archive cylinder right edge.
  - text: "correlation\nand diff queries"
    cover_box: [770, 478, 998, 535]
    cover_fill: "#FFFFFF"
    text_color: "#1E8C8C"
    font_size: 11
    align: left
    valign: middle
