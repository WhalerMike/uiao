id: epl:enforce-mfa
description: >-
  Require MFA on every privileged identity. Fires when DRIFT-SEMANTIC
  detects an IA-2 / IA-2.1 control whose `mfa_enabled` posture has
  weakened. Compliance Orchestrator alerts the security owner and
  remediation runbook re-enables MFA via the relevant adapter.
when:
  drift_class:
    - DRIFT-SEMANTIC
  controls:
    - IA-2
    - IA-2.1
    - IA-2.2
  severity_min: Medium
then:
  action: remediate
  actor: compliance-orchestrator
  sla_hours: 24
  runbook: src/uiao/canon/specs/Compliance-Orchestrator.md#runbook-enforce-mfa
