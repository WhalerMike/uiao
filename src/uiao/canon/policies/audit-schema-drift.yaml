id: epl:audit-schema-drift
description: >-
  Structural canon-declaration drift (missing module path, missing
  `scope:` / `trust-anchor:` / `ztmm-pillars:`, dangling code refs)
  doesn't gate runtime trust the way DRIFT-AUTHZ / DRIFT-IDENTITY
  do, but it does mean the substrate's hygiene gates can't enforce
  what they're supposed to. Alert the substrate owner so the
  declaration lands in the next PR.
when:
  drift_class:
    - DRIFT-SCHEMA
  severity_min: Medium
then:
  action: alert
  actor: substrate-walker
  sla_hours: 24
  runbook: src/uiao/substrate/walker.py
