id: epl:fix-broken-issuer-chain
description: >-
  An adapter's certificate chain not resolving to its declared
  trust anchor (or a missing trust-anchor declaration on a
  `certificate-anchored: true` adapter) is a UIAO_110 §0.5
  identity-trust-contract violation. Compliance Orchestrator alerts,
  Issuer-Resolver remediation runbook re-issues the leaf or updates
  the anchor declaration after operator review.
when:
  drift_class:
    - DRIFT-IDENTITY
  severity_min: High
then:
  action: remediate
  actor: compliance-orchestrator
  sla_hours: 8
  runbook: src/uiao/governance/issuer_resolution.py
