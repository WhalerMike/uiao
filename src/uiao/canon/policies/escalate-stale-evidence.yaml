id: epl:escalate-stale-evidence
description: >-
  Stale evidence past the adapter's freshness window risks signing
  off on an authorization decision against snapshots that no longer
  reflect reality. UIAO_016 / §1.1 DRIFT-SEMANTIC flags this; high-
  severity findings escalate to the security operations center within
  4 hours, the standard ConMon expectation for stale telemetry.
when:
  drift_class:
    - DRIFT-SEMANTIC
  severity_min: High
then:
  action: escalate
  actor: security-operations-center
  sla_hours: 4
  runbook: src/uiao/freshness/drift_semantic.py
