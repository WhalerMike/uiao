id: epl:block-out-of-scope
description: >-
  An adapter accessing object types outside its declared canon
  `scope:` is a substrate trust-contract violation (UIAO_110 §0.4
  consent envelope). Block the adapter dispatch immediately and
  raise to the security operations center for review.
when:
  drift_class:
    - DRIFT-AUTHZ
  severity_min: Low
then:
  action: block
  actor: substrate-walker
  sla_hours: 0
  runbook: src/uiao/canon/specs/drift.md#consent-envelope
