# UIAO Charter Registry
# =====================
# Canonical source of truth for CHARTER-NNN foundational document
# allocations. Charter docs are the architectural intent that scopes
# the substrate canon — they are authority FOR substrate work, not
# part of it. Distinct registry signals that distinction.
#
# Reserved CHARTER- IDs:
#   CHARTER-001            UIAO-V1 Main Specification (current authoritative charter)
#   CHARTER-001-APPENDICES AtoBZ_clean.md master appendix file (pending PR-A2b)
#   CHARTER-002            V4U Core Canon and Introduction (scaffolding/intro)
#   CHARTER-003            V4U Master Reference (strategic content + crosswalks)
#   CHARTER-004-NPE        Federal Identity Fragmentation + NPE Assurance Model (cross-reference to CHARTER-003 §FILE 5)
#   CHARTER-005-SOA        Source of Authority Location InterAgency (cross-reference to CHARTER-003 §FILE 4)
#   CHARTER-V3-LEGACY-INTRO    V3 long-form Introduction (Deprecated, superseded by CHARTER-001)
#   CHARTER-V3-LEGACY-TWOPAGER V3 TwoPager (Deprecated, superseded by CHARTER-001)
#   CHARTER-EVIDENCE-TELEMETRY Federal Cloud Telemetry Gap white paper ($16.3B Blind Ticket Tax)
#   CHARTER-001-DIAGRAMS   V4U reference diagrams (3 .jpg files under charter/diagrams/)
#
# All CHARTER-* docs carry:
#   tier: foundational
#   supersedable: false (except CHARTER-V3-LEGACY)
#   load_order: 0
#
# Distinct from src/uiao/canon/document-registry.yaml, which tracks
# UIAO_NNN substrate canon docs.
#
# Governance: see ADR-070 (Foundational Primacy — Charter Tier and
# Amendment Process) for the supersession chain, ingestion sequencing,
# and amendment procedure.

