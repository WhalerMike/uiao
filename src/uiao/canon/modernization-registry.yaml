      `infoblox` adapter). Requires on-prem-self-hosted runner with network
      access to the BlueCat API. Reference implementation migrated from
      uiao-gos (2026-04-17) to
      impl/src/uiao/impl/directory_migration/adapters/ipam/bluecat/.

