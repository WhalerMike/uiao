      directory-migration engagements. Requires on-prem-self-hosted runner
      with network access to the Infoblox WAPI. Reference implementation
      migrated from uiao-gos (2026-04-17) to
      impl/src/uiao/impl/directory_migration/adapters/ipam/infoblox/.
      Tier-1 conformance status: EXCLUDED per UIAO_131 §5.1 (no public
      developer sandbox; vendor evaluation channel is closed-eval-only).
      Compensating evidence per UIAO_131 §5.1.1: vendor-attested test
      report from Infoblox OR agency-operated sandbox capture, plus
      exhaustive tier-2 fixture matrix covering every WAPI operation the
      adapter exposes. The §5.1.1 compensating-evidence artifact lands at
      docs/findings/compensating-evidence/infoblox/ when filed.
    implementation:
      python_module: src/uiao/adapters/infoblox_adapter.py
      supporting_modules:
        - src/uiao/adapters/infoblox_parser.py
      tests: tests/test_infoblox_adapter.py

