      systems (user/group/service-principal provisioning, conditional-access
      policy updates). Classified per resolved ODA-15 (UIAO_003 §4.7).
    status: active
    phase: phase-1
    vendor: Microsoft
    license: Commercial
    runtime: powershell-7.4
    runner-class: github-hosted
    tenancy: per-customer
    scope:
      - user-objects
      - group-objects
      - service-principals
      - conditional-access-policies
    outputs:
      - migration-manifest.json
      - migration-audit.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    freshness-window-hours: 24
    controls:
