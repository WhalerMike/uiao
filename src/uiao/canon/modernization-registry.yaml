    phase: phase-1
    vendor: HashiCorp / OpenTofu Foundation
    license: MPL-2.0
    runtime: python-3.12
    runner-class: github-hosted
    tenancy: per-customer
    scope:
      - terraform-state
      - terraform-plan
      - hcl-configuration
    outputs:
      - terraform-claim-manifest.json
      - terraform-drift-report.json
      - terraform-ksi-bundle.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    freshness-window-hours: 24
    controls:
      - CM-2
      - CM-3
      - CM-6
      - CM-8
      - CA-7
    automation-domain:
      - configuration-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    trust-anchor:
      subject: "CN=ISRG Root X1, O=Internet Security Research Group, C=US"
    object-identity-only: true
    ztmm-pillars:
      - applications-and-workloads
      - networks
    references:
      - UIAO-CANON-003
      - https://www.terraform.io
      - https://opentofu.org
    notes: >-
      Adapter shipped in uiao as `TerraformAdapter(DatabaseAdapterBase)`
      (WhalerMike/uiao#8, commit 3635110). Status flipped from
      `reserved` to `active` per the three-stage lifecycle: canon (Stage 1,
      uiao#183), docs scaffolds (Stage 2, uiao-docs#26), impl code
      (Stage 3, uiao#8). Five Terraform-specific extension methods
      (`extract_terraform_state`, `parse_hcl_config`,
      `consume_terraform_plan`, `detect_terraform_drift`,
      `generate_terraform_evidence`) are currently stubs; real parsing
      ships as a follow-up when `python-hcl2` dependency is added.
    implementation:
      python_module: src/uiao/adapters/terraform_adapter.py
      supporting_modules:
        - src/uiao/adapters/terraform_parser.py
      tests: tests/test_terraform_adapter.py

