# yaml-language-server: $schema=../schemas/adapter-registry/adapter-registry.schema.json
#
# UIAO Modernization Adapter Registry
# ===================================
# Operational axis: `modernization` — change-making adapters that write to
# target environments (e.g., Entra ID migration, M365 tenant configuration,
# ticket creation, firewall rule updates).
#
# Doctrinal axis (UIAO_003 §4.2–§4.7): five canonical classes — Identity,
# Telemetry, Policy, Enforcement, Integration. Per resolved ODA-15
# (2026-04-15, Option a), the `integration` class covers change-making
# actions against a target environment, and every adapter below declares
# `mission-class: integration`. See ARCHITECTURE.md §13 (resolution) and
# UIAO_003 §4.7 (Integration Adapter Class).
#
# Canon invariants enforced on every entry:
#   * gcc-boundary: gcc-moderate (Amazon Connect exception noted per-adapter)
#   * ssot-mutation: never
#   * certificate-anchored: true
#   * object-identity-only: true
#
# Pair registry: canon/adapter-registry.yaml (conformance class)
# Schema:        schemas/adapter-registry/adapter-registry.schema.json
# Governance:    ARCHITECTURE.md §3.2, §3.5, §15.2, §16.4

schema-version: "1.0.0"
registry-class: modernization
updated: "2026-05-05"

adapters:

  - id: entra-id
    name: Microsoft Entra ID
    class: modernization
    mission-class: integration
    mission-class-notes: >-
      Modernization adapter — performs change-making actions against identity
      systems (user/group/service-principal provisioning, conditional-access
      policy updates). Classified per resolved ODA-15 (UIAO_003 §4.7).
    status: active
    phase: phase-1
    vendor: Microsoft
    license: Commercial
    runtime: powershell-7.4
    runner-class: github-hosted
    tenancy: per-customer
    scope:
      - user-objects
      - group-objects
      - service-principals
      - conditional-access-policies
    outputs:
      - migration-manifest.json
      - migration-audit.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    freshness-window-hours: 24
    controls:
      - CM-8
      - IA-2
      - IA-4
      - AC-2
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    trust-anchor:
      subject: "CN=Microsoft RSA Root Certificate Authority 2017, O=Microsoft Corporation, C=US"
    object-identity-only: true
    ztmm-pillars:
      - identity
      - devices
      - applications-and-workloads
    references:
      - UIAO-CANON-002
      - UIAO-CANON-003

