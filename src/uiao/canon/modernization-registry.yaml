    status: active
    phase: phase-1
    vendor: BlueCat
    license: Commercial
    runtime: python-3.12
    runner-class: on-prem-self-hosted
    tenancy: per-customer
    scope:
      - dns-records
      - dhcp-scopes
      - ip-allocations
      - side-by-side-ad
    outputs:
      - dns-change-manifest.json
      - ipam-audit.json
      - event-stream.ndjson
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    controls:
      - SC-20
      - SC-21
      - CM-8
    automation-domain:
      - network-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
    notes: >-
      Tier 4 adapter. Product: BlueCat Address Manager. Not FedRAMP-authorized
