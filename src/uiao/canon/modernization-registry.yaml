      produce object-keyed canonical claims with KSI provenance, supports
      three-way drift detection (live ↔ state ↔ HCL), and enables controlled
      change-making actions against target environments (per UIAO_003 §4.7
      Integration Adapter Class). Implementation planned in uiao
      (`src/uiao/impl/adapters/terraform_adapter.py`) subclassing
      `DatabaseAdapterBase`.
