    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003

  - id: scuba
    name: CISA SCuBA M365 Secure Baseline (Target)
    class: modernization
    mission-class: integration
    mission-class-notes: >-
      Modernization adapter — applies the declarative CISA SCuBA security
      posture (change-making) to M365 tenants. Distinct from `scubagear`
      (the read-only conformance assessor) in canon/adapter-registry.yaml.
      Classified per resolved ODA-15 (UIAO_003 §4.7).
    status: active
    phase: phase-1
    vendor: CISA
    license: CC0-1.0
    runtime: powershell-7.4
    runner-class: github-hosted
    tenancy: per-customer
    policy-engine: none
    scope:
      - aad-baseline
      - defender-baseline
      - exo-baseline
      - powerbi-baseline
      - powerplatform-baseline
      - sharepoint-baseline
      - teams-baseline
    outputs:
      - baseline-apply-manifest.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    controls:
      - CM-2
      - CM-6
      - CM-7
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-002
      - https://github.com/cisagov/ScubaGoggles
    notes: >-
      Pair with conformance adapter `scubagear` (canon/adapter-registry.yaml)
      which assesses the applied baseline without mutating it.

  - id: terraform
    name: Terraform / OpenTofu Evidence Adapter
    class: modernization
    mission-class: integration
    mission-class-notes: >-
      Consumes Terraform / OpenTofu state, plans, and HCL configuration to
      produce object-keyed canonical claims with KSI provenance, supports
      three-way drift detection (live ↔ state ↔ HCL), and enables controlled
      change-making actions against target environments (per UIAO_003 §4.7
      Integration Adapter Class). Implementation planned in uiao-impl
      (`src/uiao/impl/adapters/terraform_adapter.py`) subclassing
      `DatabaseAdapterBase`.
    status: active
    phase: phase-1
    vendor: HashiCorp / OpenTofu Foundation
    license: MPL-2.0
    runtime: python-3.12
    runner-class: github-hosted
    tenancy: per-customer
    scope:
      - terraform-state
      - terraform-plan
      - hcl-configuration
    outputs:
      - terraform-claim-manifest.json
      - terraform-drift-report.json
      - terraform-ksi-bundle.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    controls:
      - CM-2
      - CM-3
      - CM-6
      - CM-8
      - CA-7
    automation-domain:
      - configuration-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
      - https://www.terraform.io
      - https://opentofu.org
    notes: >-
      Adapter shipped in uiao-impl as `TerraformAdapter(DatabaseAdapterBase)`
      (WhalerMike/uiao-impl#8, commit 3635110). Status flipped from
      `reserved` to `active` per the three-stage lifecycle: canon (Stage 1,
      uiao-core#183), docs scaffolds (Stage 2, uiao-docs#26), impl code
      (Stage 3, uiao-impl#8). Five Terraform-specific extension methods
      (`extract_terraform_state`, `parse_hcl_config`,
      `consume_terraform_plan`, `detect_terraform_drift`,
      `generate_terraform_evidence`) are currently stubs; real parsing
      ships as a follow-up when `python-hcl2` dependency is added.

  - id: cyberark
    name: CyberArk Credential Rotation Adapter
    class: modernization
    mission-class: integration
    mission-class-notes: >-
      Credential rotation and privileged access management — change-making
      actions against vault/PAM systems. Rotates secrets, certificates, and
      service account credentials with certificate-anchored provenance.
      Classified per UIAO_003 §4.7 Integration Adapter Class.
    status: active
    phase: phase-1
    vendor: CyberArk
    license: Commercial
    runtime: python-3.12
    runner-class: on-prem-self-hosted
    tenancy: per-customer
    scope:
      - privileged-accounts
      - service-credentials
      - certificate-rotation
      - vault-policies
    outputs:
      - rotation-manifest.json
      - credential-audit.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
      - schedule
    evidence-class: baseline
    retention-years: 3
    controls:
      - IA-5
      - IA-5(1)
      - AC-2
      - AC-6
    automation-domain:
      - configuration-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
    notes: >-
      Tier 4 adapter. Requires on-prem-self-hosted runner with network
      access to CyberArk vault API. Cited in ODA-15 resolution as a
      future integration-class adapter example.

  - id: infoblox
    name: Infoblox NIOS DNS / IPAM Adapter
    class: modernization
    mission-class: integration
    mission-class-notes: >-
      DNS, DHCP, and IP Address Management — change-making actions against
      network infrastructure (DNS records, DHCP scopes, IP allocations,
      network views). Supports side-by-side AD and event-stream egress for
      directory-migration flows. Classified per UIAO_003 §4.7 Integration
      Adapter Class.
    status: active
    phase: phase-1
    vendor: Infoblox
    license: Commercial
    runtime: python-3.12
    runtime-version: ">=8.0"
    runner-class: on-prem-self-hosted
    tenancy: per-customer
    scope:
      - dns-records
      - dhcp-scopes
      - ip-allocations
      - network-views
      - side-by-side-ad
    outputs:
      - dns-change-manifest.json
      - ipam-audit.json
      - event-stream.ndjson
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    controls:
      - SC-20
      - SC-21
      - CM-8
    automation-domain:
      - network-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
    notes: >-
      Tier 4 adapter. Product: Infoblox NIOS (>=8.0). FedRAMP-authorized
      (Moderate). CDM-integrated. Federal-preferred IPAM for GCC-Moderate
      directory-migration engagements. Requires on-prem-self-hosted runner
      with network access to the Infoblox WAPI. Reference implementation
      migrated from uiao-gos (2026-04-17) to
      impl/src/uiao/impl/directory_migration/adapters/ipam/infoblox/.

  - id: bluecat-address-manager
    name: BlueCat Address Manager
    class: modernization
    mission-class: integration
    mission-class-notes: >-
      DNS, DHCP, and IP Address Management — change-making actions against
      network infrastructure (DNS records, DHCP scopes, IP allocations).
      Supports side-by-side AD and event-stream egress for
      directory-migration flows. Classified per UIAO_003 §4.7 Integration
