    license: Commercial
    runtime: python-3.12
    runner-class: github-hosted
    tenancy: per-customer
    scope:
      - incident-tickets
      - change-requests
      - problem-records
    outputs:
      - ticket-manifest.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: incident
    retention-years: 3
    controls:
      - IR-4
      - IR-5
      - IR-6
      - CM-3
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003

  - id: palo-alto
    name: Palo Alto Networks (Firewall / NGFW)
    class: modernization
    mission-class: integration
    mission-class-notes: >-
      Modernization adapter — performs change-making actions against network
      enforcement points (security policies, NAT rules, threat-prevention
      profiles). Classified per resolved ODA-15 (UIAO_003 §4.7).
    status: active
    phase: phase-1
    vendor: Palo Alto Networks
    license: Commercial
    runtime: python-3.12
    runner-class: on-prem-self-hosted
    tenancy: per-customer
    scope:
      - security-policies
      - nat-rules
      - threat-prevention-profiles
    outputs:
      - firewall-config-manifest.json
      - rule-change-audit.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
    evidence-class: baseline
    retention-years: 3
    controls:
