      - AC-6
      - CM-8
    automation-domain:
      - configuration-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
      - UIAO_007
    notes: >-
      Binds to MOD_B (Dynamic Group Library) through ADR-036; executable
      canon at canon/data/orgpath/dynamic-groups.yaml, JSON Schema at
      schemas/orgpath/dynamic-groups.schema.json. Implementation:
      src/uiao/adapters/entra_dynamic_groups.py. plan() and
      apply(dry_run=True) are offline-safe; apply(dry_run=False) issues
      POST /groups and PATCH /groups/{id} against Microsoft Graph.

