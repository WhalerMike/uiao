# ============================================================================
# UIAO Vendor Overlay Template
# ============================================================================
# Copy this directory to create an overlay for your agency's technology stack.
# For example, to add an Okta + Palo Alto + AWS stack:
#   1. Copy data/overlays/example/ -> data/overlays/okta/
#   2. Rename this file to match the product (e.g., okta-identity.yaml)
#   3. Fill in your vendor-specific details below
#   4. Add your vendor name to data/overlay-config.yml
#   5. Run: python scripts/generate_docs.py
#
# See data/overlays/README.md for the full overlay mechanism.
# See data/overlays/cisco/sd-wan.yml for a real-world example.
# ============================================================================

overlay_meta:
  vendor: "your-vendor-name"           # e.g., okta, paloalto, aws, crowdstrike
  product: "your-product-name"         # e.g., workforce-identity, panorama, guardduty
  description: "Brief description of this vendor overlay"

# ----------------------------------------------------------------------------
# Control Plane Overrides
# ----------------------------------------------------------------------------
# Each entry targets a control plane ID from data/control-planes.yml.
# Valid IDs: identity, network, endpoint, data, monitoring
# Only include the planes your product touches.
control_plane_overrides:

  # --- Identity Provider ---
  - id: identity
    subtitle: "Your Identity Provider Name"
    components:
      - name: "Identity Platform"
        role: "Primary identity provider"
        capabilities:
          - "SSO and federation"
          - "MFA enforcement"
          - "Lifecycle management"

  # --- Network ---
  - id: network
    subtitle: "Your Network Platform Name"
    components:
      - name: "Network Appliance"
        role: "Network security and segmentation"
        capabilities:
          - "Firewall policy enforcement"
          - "Traffic inspection and logging"

  # --- Endpoint ---
  - id: endpoint
    subtitle: "Your Endpoint Platform Name"
    components:
      - name: "EDR Agent"
        role: "Endpoint detection and response"
        capabilities:
          - "Real-time threat detection"
          - "Automated remediation"

  # --- SIEM / Monitoring ---
  - id: monitoring
    subtitle: "Your SIEM Platform Name"
    components:
      - name: "SIEM Platform"
        role: "Security event aggregation"
        capabilities:
          - "Log collection and correlation"
          - "Alerting and incident response"
