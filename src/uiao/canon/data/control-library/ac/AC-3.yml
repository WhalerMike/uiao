parameters:
    - id: PARAM-AC-003-001
      description: >-
          Approved authorization mechanisms used to enforce logical
          access to system resources.
      value: "Entra ID Conditional Access policies for session-level enforcement; Azure RBAC for resource-level enforcement; Entra ID Privileged Identity Management (PIM) for just-in-time elevation; Microsoft Purview sensitivity labels for data-layer enforcement"
    - id: PARAM-AC-003-002
      description: >-
          Approved access-decision telemetry sources used to validate
