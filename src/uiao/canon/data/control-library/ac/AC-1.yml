parameters:
    - id: PARAM-AC-001-001
      description: >-
          Organization-defined personnel or roles to whom the Access
          Control policy and procedures are disseminated.
      value: "All UIAO personnel with access to any GCC-Moderate boundary system, including federal employees, contractors, and approved third-party operators"
    - id: PARAM-AC-001-002
      description: >-
          Senior official designated to manage the development,
          documentation, and dissemination of the Access Control
          policy and procedures.
      value: "UIAO Chief Information Security Officer (CISO)"
    - id: PARAM-AC-001-003
      description: >-
          Frequency at which the Access Control policy is reviewed
          and updated.
      value: "Annually, and following any significant change to system architecture, authorization boundary, regulatory mandate, or threat landscape"
    - id: PARAM-AC-001-004
      description: >-
          Frequency at which the Access Control procedures are
          reviewed and updated.
      value: "Annually, and immediately following any change to the underlying policy, control implementation, or vendor surface"
    - id: PARAM-AC-001-005
      description: >-
          Events that trigger an out-of-cycle review of the Access
          Control policy and procedures.
      value: "Authorization boundary change, FedRAMP baseline revision, NIST 800-53 catalog update, major incident or breach, GAO/OIG finding, or Solicitation-driven contractual change"

narrative: |
  **Policy Authorship and Authorization**
  The UIAO Access Control Policy is authored by the UIAO Chief
  Information Security Officer under the authority of the System
  Owner and approved by the Authorizing Official. The policy
  addresses purpose, scope, roles, responsibilities, management
  commitment, coordination among organizational entities, and
  regulatory compliance with NIST SP 800-53 Rev 5, FedRAMP Moderate,
  CISA Zero Trust Maturity Model v2.0, and applicable Solicitation
  clauses including 24322626R0007 Amendment 4 Clause 1752.224-70.
  The policy is maintained as a versioned canonical document in
  SharePoint Online with full revision history, ensuring traceability
  of every change from authorship through approval to publication.
  Policy authorization aligns with **PM-1** (Information Security
  Program Plan) and **CA-1** (Assessment, Authorization, and
  Monitoring Policy).

  **Dissemination and Acknowledgement**
  The policy is disseminated to all personnel identified in PARAM
  AC-001-001 through the UIAO security portal hosted on SharePoint
  Online with role-based access control enforced by Entra ID.
  Initial dissemination occurs at onboarding via the ServiceNow
  onboarding workflow, which routes the policy to each new user for
  electronic acknowledgement before access provisioning completes.
  Subsequent dissemination occurs immediately on every policy
  revision through a Microsoft Power Automate flow that emails all
  affected personnel and re-opens an acknowledgement task. Failure
  to acknowledge within the configured grace window triggers an
  Entra ID Conditional Access block on the user's session until the
  acknowledgement is recorded. This satisfies the dissemination
  requirement and supports **AT-2** (Awareness Training) and
  **AT-3** (Role-Based Training).

  **Procedural Implementation**
  Procedures implementing the Access Control policy are documented
  as a companion document set in SharePoint Online, organized by
  control family and cross-referenced to the policy section that
  each procedure implements. Procedures cover account provisioning,
  modification, suspension, disablement, and termination; access
  enforcement; information flow control; separation of duties; least
  privilege; remote access; and wireless access. Each procedure
  identifies the responsible role, the system or vendor surface that
  executes the procedure, the evidence artifact generated by
  execution, and the audit cadence that verifies adherence.
  Procedural enforcement is automated through Azure Policy guardrails
  and Entra ID Conditional Access where the procedure is amenable to
  policy-as-code; remaining procedural steps are tracked through
  ServiceNow workflow records that produce dated, immutable evidence
  per execution.

  **Annual Review and Change Triggers**
  The policy and procedures undergo formal review at the cadence
  defined in PARAM AC-001-003 and PARAM AC-001-004 respectively.
  The CISO convenes the Access Control Working Group, which includes
  representatives from Identity Engineering, Compliance, Audit, and
  the Authorizing Official's office, to review the policy against
  current threat intelligence, control catalog updates, and lessons
  learned from operational incidents. Out-of-cycle reviews are
  triggered by the events defined in PARAM AC-001-005. Every review
  produces a dated review record stored alongside the policy and
  linked to the prior version, providing complete review provenance
  for auditor inspection.

  **Audit and Traceability**
  All policy and procedure documents carry a document_id, version,
  approval signatures, and a hash-stamped release manifest. The
  manifest is signed by the CISO and stored in the UIAO evidence
  ledger, providing tamper-evident proof that the artifact in
  evidence is the artifact that was approved. Acknowledgement
  records, revision history, and review records are exportable to
  the OSCAL SSP via the UIAO governance pipeline, supporting
  **CA-2** (Control Assessment) and **AU-12** (Audit Record
  Generation).

