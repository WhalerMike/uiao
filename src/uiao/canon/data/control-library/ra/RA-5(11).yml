narrative: |
  **Vulnerability Disclosure Policy**
  The organization establishes and publishes a Vulnerability Disclosure
  Policy (VDP) that defines a clear, accessible mechanism for external
  security researchers, members of the public, and partners to report
  discovered vulnerabilities in UIAO systems or services
  (PARAM-RA-005-11-001). The VDP is published on the organization's
  public website and specifies the reporting channel, scope of systems
  covered, safe harbor commitment for good-faith researchers, and
  expected response timelines. This program aligns with Binding
  Operational Directive (BOD) 20-01 requirements for federal agencies
  to establish VDP programs.

  **Disclosure Intake and Acknowledgment**
  External vulnerability reports are received through the dedicated
  VDP submission channel and automatically logged as incidents in
  ServiceNow for triage and tracking (PARAM-RA-005-11-002). The ISSO
  acknowledges receipt of each submission within 5 business days and
  provides status updates to the reporter at 30-day intervals until
  resolution. Reporter identities are handled in accordance with the
  safe harbor commitments in the VDP, and reports are processed
  confidentially to prevent premature public disclosure that could
  enable exploitation.

  **Triage, Validation, and Remediation**
  The ISSO validates externally reported vulnerabilities within
  5 business days to determine applicability, severity (CVSS scoring),
  and affected UIAO components (PARAM-RA-005-11-003). Confirmed
  vulnerabilities are entered into the ServiceNow Vulnerability
  Response module with the same remediation SLA timelines as
  internally discovered vulnerabilities per **RA-5**: critical
  within 15 days, high within 30 days, and moderate within 90 days.
  Microsoft Sentinel is used to correlate the reported vulnerability
  with existing threat intelligence and active scan findings to
  assess whether exploitation has already been attempted.

  **Program Governance and Reporting**
  The VDP program is governed by the ISSO with oversight by the CISO.
  Annual metrics on VDP submissions, validation rates, remediation
  timelines, and researcher interactions are reported to organizational
  leadership. Coordinated disclosure notifications are provided to
  reporters upon remediation completion where appropriate. VDP program
  effectiveness is evaluated as part of the annual **CA-2** (Security
  Assessment) review to ensure the program continues to provide
  meaningful value in identifying vulnerabilities not detected through
  internal scanning programs.

