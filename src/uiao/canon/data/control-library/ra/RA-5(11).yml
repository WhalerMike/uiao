parameters:
  - id: PARAM-RA-005-11-001
    description: >-
      Public-facing mechanism established for external researchers
      to report discovered vulnerabilities in UIAO systems.
    value: "Published Vulnerability Disclosure Policy (VDP) with dedicated reporting email and web form; response within 5 business days"
  - id: PARAM-RA-005-11-002
    description: >-
      Timeline for acknowledging receipt of externally reported
