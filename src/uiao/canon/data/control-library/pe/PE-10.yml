# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-10
# Title      : Emergency Shutoff
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Fully inherited from Microsoft Azure FedRAMP P-ATO

control_id: PE-10
title: Emergency Shutoff
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-service-trust-portal-attestation-package  # [TBD: pull current package version from STP at SSP submission]
    - microsoft-azure-datacenter-attestation  # [TBD: insert reference from STP]
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-010-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-10 is reviewed.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Emergency power-shutoff capability for the datacenters that
  host the UIAO authorization boundary is owned and operated by
  Microsoft Azure as the cloud service provider. Microsoft's
  datacenter emergency power-off mechanisms, the procedures
  governing their activation, and the testing cadence are
  attested in the Microsoft FedRAMP authorization package. [TBD:
  insert current Microsoft Azure FedRAMP P-ATO package identifier
  and the supporting datacenter attestation reference at SSP
  submission.]

  **No Tenant-Operated Shutoff Surface**
  The substrate has no tenant-operated power-shutoff capability
  because it has no tenant-operated power infrastructure. PE-10
  has no tenant-side implementation; the entire control is
  inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-010-001. Reviews validate that
  Microsoft's emergency shutoff capability satisfies the inherited
  PE-10 implementation requirement. Review outcomes are recorded
  in the inheritance-attestation review record consistent with
  **CA-7** (Continuous Monitoring) and the substrate contingency
  plan under **CP-2**.

related_controls:
    - CA-7   # Continuous Monitoring
    - CP-2   # Contingency Plan
    - PE-1   # Policy and Procedures
    - PE-9   # Power Equipment and Cabling
    - PE-11  # Emergency Power
