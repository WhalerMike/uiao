# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-16
# Title      : Delivery and Removal
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Fully inherited from Microsoft Azure FedRAMP P-ATO

control_id: PE-16
title: Delivery and Removal
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-azure-fedramp-marketplace-record  # Azure Commercial Cloud F1209051525 (FedRAMP High since 2019-05-03; fedramp.gov/marketplace/products/F1209051525/) OR Azure Government F1603087869 (FedRAMP High Class D since 2020-04-29, DOD IL4/IL5; fedramp.gov/marketplace/products/F1603087869/); substrate operator cites the applicable package per actual deployment
    - microsoft-azure-datacenter-attestation  # [TBD: insert datacenter-specific attestation references from authenticated Microsoft Service Trust Portal at SSP submission]
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-016-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-16 is reviewed.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Delivery and removal of system components for the datacenters
  that host the UIAO authorization boundary is owned and managed
  by Microsoft Azure as the cloud service provider. Microsoft's
  delivery and removal procedures (authorized-receipt workflow,
  chain-of-custody documentation, media-sanitization at end of
  life per NIST SP 800-88, secure disposal partners) are attested
  in the Microsoft FedRAMP authorization package. The Microsoft
  Azure FedRAMP High P-ATO is publicly recorded in the FedRAMP
  Marketplace as Azure Commercial Cloud package F1209051525
  (authorized 2019-05-03) at
  fedramp.gov/marketplace/products/F1209051525/ and Azure
  Government package F1603087869 (authorized 2020-04-29, FedRAMP
  High Class D, DOD IL4/IL5 compliant) at
  fedramp.gov/marketplace/products/F1603087869/; the substrate
  operator cites the applicable package per actual deployment.
  [TBD: insert any datacenter-specific attestation references
  requiring authenticated Service Trust Portal access at SSP
  submission.]

  **No Tenant-Operated Asset Movement**
  The substrate has no tenant-operated facility into which IT
  equipment is delivered or from which it is removed. All
  substrate compute, storage, and network assets exist as
  Microsoft-managed Azure resources; there are no tenant-side
  physical asset movements to authorize, monitor, or log. Asset
  inventory of substrate components is maintained logically per
  **CM-8** (System Component Inventory). PE-16 has no tenant-side
  implementation; the entire control is inherited.

  **Cross-Reference: Media Sanitization**
  Microsoft's media-sanitization process for retired datacenter
  storage media (the substrate-side relevance of PE-16 / MP-6) is
  inherited and attested. The Service Trust Portal publishes the
  Microsoft media-sanitization attestation referenced under
  **MP-6** (Media Sanitization).

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-016-001. Reviews validate that
  Microsoft's delivery and removal procedures satisfy the
  inherited PE-16 implementation requirement consistent with
  **CA-7** (Continuous Monitoring).

related_controls:
    - CA-7   # Continuous Monitoring
    - CM-8   # System Component Inventory
    - MP-5   # Media Transport
    - MP-6   # Media Sanitization
    - PE-1   # Policy and Procedures
    - PE-3   # Physical Access Control
