narrative: |
  **Delivery and Removal Controls**
  The organization authorizes, monitors, and controls all UIAO system components entering and exiting the facility. All deliveries and removals of IT equipment are logged, verified against authorized transfer orders, and inspected by the Physical Security Office.

  **Authorization**
  Equipment delivery and removal requires documented authorization from the system owner or designated representative. ServiceNow tickets track all asset movements with chain-of-custody documentation.

  **Monitoring**
  Delivery and removal logs are reviewed monthly (PARAM-PE-016-001). Discrepancies are investigated and reported to the ISSM.
