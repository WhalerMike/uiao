parameters:
    - id: PARAM-PE-001-001
      description: >-
          Senior official designated to manage the development,
          documentation, and dissemination of the Physical and
          Environmental Protection policy and procedures.
      value: "UIAO Information System Security Officer (ISSO), under the authority of the System Owner and the Authorizing Official"
    - id: PARAM-PE-001-002
      description: >-
          Frequency at which the Physical and Environmental
          Protection policy is reviewed and updated.
      value: "Annually, and immediately following any change to the FedRAMP authorization boundary, the Microsoft Azure attestation package, or the tenant-side residual responsibility set"
    - id: PARAM-PE-001-003
      description: >-
          Scope of tenant-side policy coverage given the
          cloud-substrate inheritance model.
      value: "Tenant-side policy covers: (a) the alternate-work-site and telework provisions under PE-17 for federal-personnel and contractor users with substrate access; (b) the substrate-tenant network endpoint hygiene for PE-4 (in-tenant transmission paths); (c) the personnel-physical-access-authorization process under PE-2 where the substrate operator authorizes named personnel to access agency-side facilities housing operator workstations; (d) the inheritance-attestation review process that validates Microsoft Azure FedRAMP attestation continues to satisfy the inherited PE controls"

narrative: |
  **Substrate Inheritance Model**
  The UIAO authorization boundary is a cloud-native federal workload
  hosted on Microsoft Azure. The Physical and Environmental
  Protection (PE) controls applicable to the underlying datacenter,
  power, environmental, and physical-access surfaces are inherited
  from Microsoft as the cloud service provider under its FedRAMP
  authorization. Microsoft's authorization package documents the
  Microsoft-side implementation of PE-2, PE-3, PE-4, PE-5, PE-6,
  PE-8, PE-9, PE-10, PE-11, PE-12, PE-13, PE-14, PE-15, and PE-16
  for the datacenters supporting the agency boundary. The package
  reference is [TBD: insert current Microsoft Azure FedRAMP P-ATO
  package identifier and ATO date from the Microsoft Service Trust
  Portal at the time of SSP submission].

  **Tenant-Side Residual Responsibility**
  The substrate tenant retains the residual PE responsibilities
  enumerated in PARAM PE-001-003. This control (PE-1) explicitly
  covers the tenant-side policy and procedures that govern the
  residual surface; the Microsoft side is governed by Microsoft's
  own corporate PE policy as documented in the inherited
  attestation package.

  **Policy Authorship and Authorization**
  The UIAO Physical and Environmental Protection Policy is authored
  by the UIAO ISSO under the authority of the System Owner and
  approved by the Authorizing Official. The policy addresses
  purpose, scope (limited to the tenant-side residual), roles,
  responsibilities, management commitment, and the explicit
  inheritance-attestation review process that validates Microsoft's
  continued satisfaction of the inherited PE controls. The policy
  is maintained as a versioned canonical document in SharePoint
  Online with full revision history.

  **Procedures**
  Procedures implementing the tenant-side residual responsibility
  cover: alternate-work-site / telework provisioning per **PE-17**
  for personnel with substrate access; transmission-path hardening
  per **PE-4** within the tenant VNet boundary; physical-access
  authorization per **PE-2** for any tenant-operated workstation
  location; and the inheritance-attestation review per the
  Continuous Monitoring cycle defined in **CA-7**. Procedures are
  documented in the UIAO security portal hosted on SharePoint
  Online with role-based access control enforced by Entra ID.

  **Dissemination and Acknowledgement**
  The policy is disseminated through the UIAO security portal at
  onboarding via the ServiceNow workflow, with electronic
  acknowledgement required before access provisioning completes.
  Policy revisions trigger re-acknowledgement for all affected
  personnel; failure to acknowledge within the grace window
  produces a Conditional Access block on the user's session until
  the acknowledgement is recorded, consistent with **AT-2**
  (Awareness Training).

  **Annual Review and Inheritance Attestation**
  The policy is reviewed at the cadence defined in PARAM PE-001-002.
  Reviews validate that Microsoft's current FedRAMP attestation
  continues to satisfy the inherited PE controls and that the
  tenant-side residual responsibility set has not expanded due to
  agency-side change. Out-of-cycle reviews are triggered by any
  change to the Microsoft attestation package, any change to the
  FedRAMP authorization boundary, or any change to the agency's
  PE responsibility-matrix scoping. Review records are dated,
  signed, and stored alongside the policy.

