# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-17
# Title      : Alternate Work Site
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Hybrid — tenant owns the substrate-administrator alternate-
#              work-site control surface; Microsoft Azure datacenter
#              inheritance does not apply (no alternate datacenter from
#              the tenant's perspective)

control_id: PE-17
title: Alternate Work Site
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - entra-id
    - entra-conditional-access
    - intune
    - microsoft-defender-for-endpoint
    - microsoft-sentinel
    - azure-virtual-desktop

evidence:
    - telework-policy-current-version-pdf
    - intune-device-compliance-report
    - conditional-access-named-locations-policy-export
    - avd-session-host-configuration
    - sentinel-remote-access-detection-rules

parameters:
    - id: PARAM-PE-017-001
      description: >-
          Authorized alternate-work-site categories for personnel
          with substrate-administration access.
      value: "Agency-approved telework locations (federal employee residence, agency-issued temporary duty location) with Intune-managed agency-issued endpoint; agency-approved hoteling office space within an agency facility; temporary travel locations with Intune-managed endpoint and approved Conditional Access named-location exception"
    - id: PARAM-PE-017-002
      description: >-
          Device-trust and authentication prerequisites for
          alternate-work-site substrate access.
      value: "Intune-enrolled endpoint with current compliance state (encryption enabled, EDR active, security patches current within 14 days, no high-severity Defender finding); phishing-resistant MFA per IA-2 (FIDO2 / PIV-CAC / Windows Hello for Business); Conditional Access named-location evaluation against the agency-authorized-geography list; session-frequency reauthentication per AC-17"
    - id: PARAM-PE-017-003
      description: >-
          Prohibited practices at any alternate work site for
          substrate-administration access.
      value: "Use of personal or unmanaged devices for substrate access (prohibited under AC-3 / AC-17); split-tunneling configurations that bypass Conditional Access evaluation (prohibited); public-Wi-Fi sessions without Conditional Access named-location step-up; visible-to-bystander session contexts in public-area work (mitigated via screen privacy filters); printing of substrate-classified output at non-agency locations (prohibited per PE-5)"

narrative: |
  **Tenant-Side Ownership**
  PE-17 is the tenant-owned PE control. Substrate-administration
  personnel and federal users with substrate access perform their
  work from a mix of agency-primary offices, agency-approved
  telework locations, and travel sites; the substrate enforces
  alternate-work-site security through identity-plane, device-
  trust, and session-policy controls rather than through
  physical-facility controls. PE-17 is implemented through the
  zero-trust remote-access architecture documented in **AC-17**
  (Remote Access) with the additional alternate-work-site-specific
  considerations enumerated below.

  **Identity-Plane and Device-Trust Prerequisites**
  Every substrate session from an alternate work site must satisfy
  the prerequisites in PARAM PE-017-002. Conditional Access
  policies enforce phishing-resistant MFA, Intune-managed device
  compliance, and named-location evaluation at every sign-in. The
  device-trust prerequisite is computed in real time from Intune
  + Defender for Endpoint signals; a device that drifts out of
  compliance during the session triggers Conditional Access
  continuous-access-evaluation and session revocation within
  seconds.

  **Approved Alternate Work Sites**
  Authorized alternate-work-site categories are enumerated in
  PARAM PE-017-001. Telework at the federal employee residence is
  governed by the agency telework policy and the supporting
  agreement that addresses workspace privacy, secured-network
  expectations, and reporting of lost or compromised endpoints.
  Hoteling office space within an agency facility inherits the
  primary-facility physical controls. Travel locations require an
  approved Conditional Access named-location exception with an
  expiration date.

  **Workload Surface Options**
  Substrate administration from an alternate work site uses one
  of two workload surfaces: (a) the Intune-managed corporate
  endpoint with direct Conditional-Access-mediated access to the
  Azure portal, Entra ID portal, and configuration-as-code
  pipeline; or (b) Azure Virtual Desktop session hosts for the
  substrate-administration workflow, with session-host security
  posture managed by Intune and session traffic terminated within
  the substrate boundary. Both options enforce the same device-
  trust and authentication prerequisites.

  **Prohibited Practices**
  The practices enumerated in PARAM PE-017-003 are prohibited at
  every alternate work site. Conditional Access blocks the
  unmanaged-device path; the substrate VPN-less zero-trust
  architecture eliminates the split-tunneling failure mode by
  design; Intune endpoint DLP and Purview sensitivity-label
  encryption block the unauthorized-output vectors; Microsoft
  Sentinel detection rules surface anomalous public-network
  patterns and impossible-travel indicators for SOC triage.

  **Continuous Monitoring**
  Alternate-work-site sessions are monitored continuously by
  Microsoft Sentinel with detection rules tuned for alternate-
  work-site indicators (anomalous geography, atypical device,
  unusual session duration, post-MFA token theft). Detection
  outcomes route to the SOC; high-confidence detections trigger
  automated session termination via Conditional Access continuous-
  access-evaluation consistent with **AC-17** (Remote Access) and
  **IR-4** (Incident Handling).

  **Annual Review and Telework Policy Maintenance**
  The substrate telework policy and the alternate-work-site
  Conditional Access policy are reviewed annually and on every
  agency-side telework-policy update. Reviews validate that the
  authorized-site categories, the device-trust prerequisites, and
  the prohibited-practices list remain aligned with the agency
  telework program and the FedRAMP Moderate baseline. Review
  outcomes are recorded consistent with **CA-7** (Continuous
  Monitoring) and **PL-2** (System Security Plan).

