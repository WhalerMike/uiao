# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-8
# Title      : Visitor Access Records
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Fully inherited from Microsoft Azure FedRAMP P-ATO

control_id: PE-8
title: Visitor Access Records
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-service-trust-portal-attestation-package  # [TBD: pull current package version from STP at SSP submission]
    - microsoft-soc-2-type-ii-report  # [TBD: insert current report date from STP]
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-008-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-8 is reviewed.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Visitor access records for the datacenters hosting the UIAO
  authorization boundary are owned and maintained by Microsoft
  Azure as the cloud service provider. Microsoft maintains visitor
  records (name, sponsoring Microsoft employee, purpose, date and
  time of entry and departure) for every authorized visitor to
  every datacenter, retains them per its FedRAMP-attested retention
  policy, and reviews them per its operational procedures.
  The Microsoft-side implementation is satisfied by the FedRAMP
  authorization package and the Service Trust Portal attestation
  referenced in the evidence list. [TBD: insert current Microsoft
  Azure FedRAMP P-ATO package identifier and the supporting SOC 2
  Type II report date at SSP submission.]

  **No Tenant-Side Visitor Surface**
  The substrate has no tenant-operated physical surface to which
  visitors might be granted access. There is no tenant-operated
  datacenter, server room, or co-located physical environment, so
  there are no tenant-side visitor records to maintain. PE-8 has
  no tenant-side implementation; the entire control is inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-008-001. Reviews validate that
  Microsoft's continued maintenance of visitor records satisfies
  the inherited PE-8 implementation requirement. Review outcomes
  are recorded in the inheritance-attestation review record
  consistent with **CA-7** (Continuous Monitoring).

related_controls:
    - CA-7   # Continuous Monitoring
    - PE-1   # Policy and Procedures
    - PE-2   # Physical Access Authorizations
    - PE-3   # Physical Access Control
    - PE-6   # Monitoring Physical Access
