# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-6
# Title      : Monitoring Physical Access
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Fully inherited from Microsoft Azure FedRAMP P-ATO

control_id: PE-6
title: Monitoring Physical Access
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-azure-fedramp-marketplace-record  # Azure Commercial Cloud F1209051525 (FedRAMP High since 2019-05-03; fedramp.gov/marketplace/products/F1209051525/) OR Azure Government F1603087869 (FedRAMP High Class D since 2020-04-29, DOD IL4/IL5; fedramp.gov/marketplace/products/F1603087869/); substrate operator cites the applicable package per actual deployment
    - microsoft-soc-2-type-ii-report  # Microsoft issues Azure SOC 2 Type II reports semi-annually with audit periods ending 31-Mar and 30-Sep, published ~6 weeks after period-end; reports cover Azure + Dynamics 365 + Power Platform + select M365 (per learn.microsoft.com/azure/compliance/offerings/offering-soc-2). [TBD at SSP submission: cite the current report period and publication date, downloaded from the authenticated Microsoft Service Trust Portal SOC section at servicetrust.microsoft.com/viewpage/SOC]
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-006-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-6 is reviewed.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Physical access monitoring for the datacenters hosting the UIAO
  authorization boundary is fully inherited from Microsoft Azure
  as the cloud service provider. Microsoft operates the physical
  access monitoring stack (CCTV, intrusion detection, badge-reader
  log aggregation, 24x7 security operations centers, alarm
  response, retention of physical-access logs) for every datacenter
  supporting the agency authorization boundary. The Microsoft-side
  implementation is satisfied by the Microsoft FedRAMP
  authorization package and the Service Trust Portal attestation
  referenced in the evidence list. The Microsoft Azure FedRAMP
  High P-ATO is publicly recorded in the FedRAMP Marketplace as
  Azure Commercial Cloud package F1209051525 (authorized
  2019-05-03) at fedramp.gov/marketplace/products/F1209051525/
  and Azure Government package F1603087869 (authorized
  2020-04-29, FedRAMP High Class D, DOD IL4/IL5 compliant) at
  fedramp.gov/marketplace/products/F1603087869/; the substrate
  operator cites the applicable package per actual deployment.
  [TBD: insert the current SOC 2 Type II report date from the
  authenticated Microsoft Service Trust Portal at SSP submission.]

  **No Tenant-Side Surface**
  The substrate has no tenant-operated physical surface subject to
  PE-6. The tenant has no datacenter CCTV, no intrusion sensors,
  no perimeter security monitoring, and no badge-reader logs to
  review. PE-6 has no tenant-side implementation; the entire
  control is inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-006-001. Reviews validate that the
  inherited PE-6 implementation continues to satisfy the FedRAMP
  Moderate baseline requirement. Review outcomes are recorded in
  the inheritance-attestation review record consistent with
  **CA-7** (Continuous Monitoring).

  **Incident Coordination**
  If Microsoft reports a physical-security incident affecting the
  inherited substrate datacenters, the substrate IR plan per
  **IR-4** (Incident Handling) and **IR-6** (Incident Reporting)
  invokes; the Microsoft notification is the trigger event, and
  the substrate-side response coordinates with Microsoft per the
  cloud-service incident-coordination procedures in the agency
  cloud-provider MOU.

