parameters:
    - id: PARAM-PE-004-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-4 is reviewed against the current Microsoft Azure
          FedRAMP package.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package or Azure network architecture attestation"

narrative: |
  **Physical Transmission Medium Inheritance**
  The physical transmission medium supporting the UIAO authorization
  boundary — datacenter cabling, inter-datacenter dark fiber,
  cross-region backbone, undersea cables where applicable, edge
  interconnects — is owned and protected by Microsoft Azure under
  its FedRAMP authorization. Microsoft's physical safeguards
  (secured conduits, locked telecommunications rooms, tamper-evident
  enclosures, controlled access to distribution frames, protected
  cross-connects to carrier interconnects) are documented in the
  Microsoft attestation package. [TBD: insert current Microsoft
  Azure FedRAMP P-ATO package identifier and the Azure network
  architecture attestation reference from the Service Trust Portal
  at SSP submission.]

  **No Tenant-Operated Physical Cabling**
  The substrate does not operate any tenant-side physical cabling.
  Tenant traffic traverses the Microsoft Azure network fabric
  exclusively; no on-premises uplink, no tenant-operated dark
  fiber, no agency-owned inter-site link is part of the substrate
  authorization boundary. PE-4 has no tenant-side physical
  implementation.

  **Logical-Layer Protection (Cross-Reference)**
  Confidentiality and integrity of transmitted information at the
  logical layer — TLS termination, cipher-suite enforcement,
  certificate management, prohibited-protocol blocking — is
  addressed under **SC-8** (Transmission Confidentiality and
  Integrity). PE-4 covers only the physical-medium dimension; SC-8
  covers the cryptographic dimension. The two controls together
  provide the layered transmission protection required by the
  FedRAMP Moderate baseline.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-004-001. Reviews validate that
  Microsoft's continued operation of the network fabric satisfies
  the inherited PE-4 implementation requirement and that no
  scope change has shifted responsibility to the tenant. Review
  outcomes are recorded in the inheritance-attestation review
  record consistent with **CA-7** (Continuous Monitoring).

