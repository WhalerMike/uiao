# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-4
# Title      : Access Control for Transmission
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Fully inherited from Microsoft Azure FedRAMP P-ATO for the
#              physical transmission medium; tenant addresses logical-layer
#              protection separately under SC-8

control_id: PE-4
title: Access Control for Transmission
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-service-trust-portal-attestation-package  # [TBD: pull current package version from STP at SSP submission]
    - microsoft-azure-network-architecture-attestation  # [TBD: insert reference from STP]
