narrative: |
  **Transmission Protection**
  The organization protects power equipment and cabling for the UIAO system from unauthorized interception, tampering, and damage. All network cabling within UIAO-designated facilities is routed through secured conduits, locked wiring closets, and controlled distribution frames.

  **Physical Safeguards**
  Telecommunications cabling is protected using enclosed cable trays, locked telecommunications rooms, and tamper-evident seals. Fiber optic cabling is used for high-security inter-building connections.

  **Monitoring and Review**
  Transmission medium protection measures are reviewed annually (PARAM-PE-004-001). Physical inspections verify cable integrity, conduit security, and wiring closet access controls.
