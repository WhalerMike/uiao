narrative: |
  **Inheritance from Microsoft Azure**
  Environmental controls (temperature, humidity, airflow, air
  quality) for the datacenters that host the UIAO authorization
  boundary are owned and operated by Microsoft Azure as the cloud
  service provider. Microsoft's precision HVAC infrastructure,
  the redundant cooling architecture, the environmental-sensor
  monitoring system, and the alerting and maintenance procedures
  are attested in the Microsoft FedRAMP authorization package.
  The Microsoft Azure FedRAMP High P-ATO is publicly recorded in
  the FedRAMP Marketplace as Azure Commercial Cloud package
  F1209051525 (authorized 2019-05-03) at
  fedramp.gov/marketplace/products/F1209051525/ and Azure
  Government package F1603087869 (authorized 2020-04-29, FedRAMP
  High Class D, DOD IL4/IL5 compliant) at
  fedramp.gov/marketplace/products/F1603087869/; the substrate
  operator cites the applicable package per actual deployment.
  [TBD: insert any datacenter-specific attestation references
  requiring authenticated Service Trust Portal access at SSP
  submission.]

  **No Tenant-Operated Environmental Surface**
  The substrate has no tenant-operated HVAC, no tenant-operated
  environmental-monitoring sensors, and no tenant-side temperature
  or humidity control. PE-14 has no tenant-side implementation;
  the entire control is inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-014-001. Reviews validate that
  Microsoft's environmental-control capability satisfies the
  inherited PE-14 implementation requirement consistent with
  **CA-7** (Continuous Monitoring) and the substrate contingency
  plan under **CP-2**.

