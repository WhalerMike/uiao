      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Water damage protection for the datacenters that host the UIAO
  authorization boundary is owned and operated by Microsoft Azure
  as the cloud service provider. Microsoft's water-detection
  sensor coverage, the automatic shutoff valves protecting
  critical equipment, the testing cadence, and the response
  procedures are attested in the Microsoft FedRAMP authorization
  package. The Microsoft Azure FedRAMP High P-ATO is publicly
  recorded in the FedRAMP Marketplace as Azure Commercial Cloud
  package F1209051525 (authorized 2019-05-03) at
  fedramp.gov/marketplace/products/F1209051525/ and Azure
  Government package F1603087869 (authorized 2020-04-29, FedRAMP
  High Class D, DOD IL4/IL5 compliant) at
  fedramp.gov/marketplace/products/F1603087869/; the substrate
  operator cites the applicable package per actual deployment.
  [TBD: insert any datacenter-specific attestation references
  requiring authenticated Service Trust Portal access at SSP
  submission.]

  **No Tenant-Operated Water-Detection Surface**
  The substrate has no tenant-operated water-detection sensors or
  shutoff infrastructure. PE-15 has no tenant-side implementation;
  the entire control is inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-015-001. Reviews validate that
  Microsoft's water-damage protection capability satisfies the
  inherited PE-15 implementation requirement consistent with
  **CA-7** (Continuous Monitoring) and the substrate contingency
  plan under **CP-2**.

related_controls:
    - CA-7   # Continuous Monitoring
    - CP-2   # Contingency Plan
    - PE-1   # Policy and Procedures
    - PE-13  # Fire Protection
    - PE-14  # Environmental Controls
