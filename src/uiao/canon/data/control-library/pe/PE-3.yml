# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-3
# Title      : Physical Access Control
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Fully inherited from Microsoft Azure FedRAMP P-ATO

control_id: PE-3
title: Physical Access Control
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-service-trust-portal-attestation-package  # [TBD: pull current package version from STP at SSP submission]
    - microsoft-soc-2-type-ii-report  # [TBD: insert current report date from STP]
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-003-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-3 is reviewed against the current Microsoft Azure
          FedRAMP package.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package; out-of-cycle on any agency-side change to the authorization boundary or PE responsibility-matrix scoping"

narrative: |
  **Inheritance from Microsoft Azure**
  Physical access control to the datacenters hosting the UIAO
  authorization boundary is fully inherited from Microsoft Azure
  as the cloud service provider. Microsoft operates the physical
  access control mechanisms (badge readers, biometric scanners,
  multi-factor physical authentication, perimeter security
  personnel, vehicle barriers, mantrap controlled-access vestibules
  where applicable) for every datacenter supporting the agency
  authorization boundary. The Microsoft-side implementation is
  satisfied by the FedRAMP authorization package and the Service
  Trust Portal attestation referenced in the evidence list. [TBD:
  insert current Microsoft Azure FedRAMP P-ATO package identifier
  and authorization date from the Service Trust Portal at SSP
  submission.]

  **No Tenant-Side Surface**
  The substrate has no tenant-operated datacenter or physical
  server-room surface. Tenant administration occurs exclusively
  through Microsoft Azure portal, Entra ID portal, and the
  configuration-as-code pipeline operating from agency-provided
  managed workstations. PE-3 does not apply to any tenant-operated
  physical surface.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-003-001. The review validates that
  the inherited PE-3 implementation continues to satisfy the
  FedRAMP Moderate baseline requirement, that no Microsoft-side
  scope change has shifted responsibility to the tenant, and that
  the supporting Service Trust Portal artifacts are current. Review
  outcomes are recorded in the inheritance-attestation review
  record consistent with **CA-7** (Continuous Monitoring).

  **Cross-Reference**
  Tenant-side agency-workstation physical access (for
  substrate-administration personnel) is governed by the agency's
  physical-access process under the tenant-side residual described
  in **PE-2** (Physical Access Authorizations). PE-3 itself has no
  tenant-side implementation; the entire control is inherited.

