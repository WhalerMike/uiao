    - uiao-isso
    - servicenow-itsm

evidence:
    - microsoft-azure-fedramp-marketplace-record  # Azure Commercial Cloud F1209051525 (FedRAMP High since 2019-05-03; fedramp.gov/marketplace/products/F1209051525/) OR Azure Government F1603087869 (FedRAMP High Class D since 2020-04-29, DOD IL4/IL5; fedramp.gov/marketplace/products/F1603087869/); substrate operator cites the applicable package per actual deployment
    - microsoft-soc-2-type-ii-report  # Microsoft issues Azure SOC 2 Type II reports semi-annually with audit periods ending 31-Mar and 30-Sep, published ~6 weeks after period-end; reports cover Azure + Dynamics 365 + Power Platform + select M365 (per learn.microsoft.com/azure/compliance/offerings/offering-soc-2). [TBD at SSP submission: cite the current report period and publication date, downloaded from the authenticated Microsoft Service Trust Portal SOC section at servicetrust.microsoft.com/viewpage/SOC]
    - servicenow-tenant-side-access-authorization-records
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-002-001
      description: >-
          Scope of physical-access authorizations the substrate
          tenant directly manages.
      value: "Microsoft Azure datacenter physical access is fully inherited from Microsoft (the substrate tenant has no datacenter authorization role). Tenant-side residual: authorization of named substrate-administration personnel to access any agency-operated workstation location used for substrate administration, governed by the agency physical-access authorization process referenced in the tenant SSP appendix"
    - id: PARAM-PE-002-002
      description: >-
          Frequency at which physical-access authorizations are
          reviewed for the tenant-side residual.
      value: "Quarterly review of agency-operated workstation physical-access authorizations for substrate-administration personnel, aligned with the Entra ID Access Review cadence under AC-2; immediate review on personnel separation per PS-4"

narrative: |
  **Inheritance from Microsoft Azure**
  Physical access authorization to the datacenters hosting the
  UIAO authorization boundary is owned by Microsoft Azure as the
  cloud service provider. Microsoft authorizes datacenter access
  exclusively to its vetted operations personnel; no agency
  personnel, tenant operator, or third party is authorized
  physical access to a Microsoft Azure datacenter. The Microsoft
  side of this control is satisfied by Microsoft's FedRAMP
  authorization package and the Service Trust Portal attestation
  references identified in the evidence list. The Microsoft
  Azure FedRAMP High P-ATO is publicly recorded in the FedRAMP
  Marketplace as Azure Commercial Cloud package F1209051525
  (authorized 2019-05-03) at
  fedramp.gov/marketplace/products/F1209051525/ and Azure
  Government package F1603087869 (authorized 2020-04-29, FedRAMP
  High Class D, DOD IL4/IL5 compliant) at
  fedramp.gov/marketplace/products/F1603087869/; the substrate
  operator cites the applicable package per actual deployment.
  [TBD: insert the current SOC 2 Type II report date from the
  authenticated Microsoft Service Trust Portal at SSP submission.]

  **Continuous Inheritance Validation**
  The UIAO ISSO reviews the Microsoft attestation package
  annually and on every Microsoft-published change. The review
  validates that the inherited PE-2 implementation continues to
  satisfy the FedRAMP Moderate baseline requirement and that no
  scope change has shifted PE-2 responsibility to the tenant.
  Review outcomes are recorded in the inheritance-attestation
  review record consistent with **CA-7** (Continuous Monitoring).

  **Tenant-Side Residual: Agency Workstation Access**
  Where substrate-administration personnel access agency-operated
  workstations to administer the substrate (e.g., agency-provided
  Intune-managed laptops in agency office space), the tenant-side
  residual physical-access authorization is governed by the
  agency's physical-access authorization process. The tenant
  maintains the inventory of substrate-administration personnel
  granted such authorization in ServiceNow and reviews the
  inventory at the cadence in PARAM PE-002-002. Personnel
  separation per **PS-4** triggers immediate revocation.

  **No Tenant-Operated Datacenter Surface**
  The substrate does not operate any tenant-side datacenter,
  server room, or co-located physical environment. All compute,
  storage, network, and key-management surfaces run on
  Microsoft-managed Azure infrastructure. The substrate has no
  cabling, no rack space, no power equipment, and no physical
  environmental controls of its own to authorize access to.

