# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PE-11
# Title      : Emergency Power
# Schema     : data/control-library (uiao canonical format)
# Inheritance: Fully inherited from Microsoft Azure FedRAMP P-ATO

control_id: PE-11
title: Emergency Power
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-service-trust-portal-attestation-package  # [TBD: pull current package version from STP at SSP submission]
    - microsoft-azure-datacenter-attestation  # [TBD: insert reference from STP]
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-011-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-11 is reviewed.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Emergency power supply (uninterruptible power supplies and
  backup generation) for the datacenters that host the UIAO
  authorization boundary is owned and operated by Microsoft Azure
  as the cloud service provider. Microsoft's UPS infrastructure,
  backup-generator capacity, automatic transfer mechanisms, fuel
  reserves, and the maintenance and load-test cadence are attested
  in the Microsoft FedRAMP authorization package. [TBD: insert
  current Microsoft Azure FedRAMP P-ATO package identifier and
  the supporting datacenter attestation reference at SSP
  submission.]

  **No Tenant-Operated Emergency-Power Surface**
  The substrate has no tenant-operated UPS, generator, or
  emergency-power equipment. PE-11 has no tenant-side
  implementation; the entire control is inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-011-001. Reviews validate that
  Microsoft's emergency power capability satisfies the inherited
  PE-11 implementation requirement and supports the substrate
  contingency objectives under **CP-2** (Contingency Plan).

related_controls:
