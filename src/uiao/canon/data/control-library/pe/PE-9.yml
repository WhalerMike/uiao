control_id: PE-9
title: Power Equipment and Cabling
family: Physical and Environmental Protection
status: implemented

implemented_by:
    - microsoft-azure-fedramp-attestation
    - uiao-isso

evidence:
    - microsoft-azure-fedramp-marketplace-record  # Azure Commercial Cloud F1209051525 (FedRAMP High since 2019-05-03; fedramp.gov/marketplace/products/F1209051525/) OR Azure Government F1603087869 (FedRAMP High Class D since 2020-04-29, DOD IL4/IL5; fedramp.gov/marketplace/products/F1603087869/); substrate operator cites the applicable package per actual deployment
    - microsoft-azure-datacenter-attestation  # [TBD: insert datacenter-specific attestation references from authenticated Microsoft Service Trust Portal at SSP submission]
    - inheritance-attestation-annual-review-record

parameters:
    - id: PARAM-PE-009-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-9 is reviewed.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Power equipment and power cabling supporting the datacenters
  that host the UIAO authorization boundary are owned, operated,
  and protected by Microsoft Azure as the cloud service provider.
  Microsoft's datacenter physical infrastructure (power
  distribution units, transformers, switchgear, busways, power
  cabling, redundant feeders) is documented and attested in the
  Microsoft FedRAMP authorization package. The Microsoft Azure
  FedRAMP High P-ATO is publicly recorded in the FedRAMP
  Marketplace as Azure Commercial Cloud package F1209051525
  (authorized 2019-05-03) at
  fedramp.gov/marketplace/products/F1209051525/ and Azure
  Government package F1603087869 (authorized 2020-04-29, FedRAMP
  High Class D, DOD IL4/IL5 compliant) at
  fedramp.gov/marketplace/products/F1603087869/; the substrate
  operator cites the applicable package per actual deployment.
  [TBD: insert any datacenter-specific attestation references
  requiring authenticated Service Trust Portal access at SSP
  submission.]

  **No Tenant-Operated Power Surface**
  The substrate has no tenant-operated power equipment, no
  tenant-operated power cabling, no UPS, no PDU, no electrical
  panel. PE-9 has no tenant-side implementation; the entire
  control is inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-009-001. Reviews validate that
  Microsoft's continued operation of power infrastructure
  satisfies the inherited PE-9 implementation requirement. Review
  outcomes are recorded in the inheritance-attestation review
  record consistent with **CA-7** (Continuous Monitoring).

