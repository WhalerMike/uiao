parameters:
    - id: PARAM-PE-013-001
      description: >-
          Frequency at which the inheritance attestation for
          PE-13 is reviewed.
      value: "Annually, and on every Microsoft-published change to the FedRAMP authorization package"

narrative: |
  **Inheritance from Microsoft Azure**
  Fire detection and suppression for the datacenters that host
  the UIAO authorization boundary is owned and operated by
  Microsoft Azure as the cloud service provider. Microsoft's fire
  protection infrastructure (very early smoke detection, clean-
  agent suppression in server halls, conventional suppression in
  ancillary spaces, monitored alarm integration with local fire
  authorities, the inspection cadence) is attested in the
  Microsoft FedRAMP authorization package. [TBD: insert current
  Microsoft Azure FedRAMP P-ATO package identifier and the
  supporting datacenter attestation reference at SSP submission.]

  **No Tenant-Operated Fire Protection Surface**
  The substrate has no tenant-operated fire detection or
  suppression equipment. PE-13 has no tenant-side implementation;
  the entire control is inherited.

  **Inheritance Attestation Review**
  The UIAO ISSO reviews the Microsoft attestation package at the
  cadence defined in PARAM PE-013-001. Reviews validate that
  Microsoft's fire-protection capability satisfies the inherited
  PE-13 implementation requirement consistent with **CA-7**
  (Continuous Monitoring) and the substrate contingency plan
  under **CP-2**.

related_controls:
