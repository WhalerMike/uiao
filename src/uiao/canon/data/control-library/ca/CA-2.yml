narrative: |
  **Security Assessment Overview**

  The organization conducts security control assessments of the
  UIAO system to determine the extent to which controls are
  implemented correctly, operating as intended, and producing the
  desired outcome with respect to meeting security requirements.
  Assessments are conducted at least annually (PARAM-CA-002-001)
  and upon significant system changes per NIST SP 800-53A Rev 5
  (Assessing Security and Privacy Controls).

  **Assessment Planning**

  The Security Assessment Plan (SAP) defines the scope, methodology,
  assessment team, schedule, and rules of engagement. The SAP
  identifies controls to be assessed, assessment procedures
  (examine, interview, test), and the depth and coverage of
  assessment activities. Assessment teams include independent
  assessors (PARAM-CA-002-003) who are not involved in system
  development or daily operations.

  **Automated Assessment Integration**

  Microsoft Defender for Cloud provides continuous automated
  assessment of Azure resource configurations against security
  benchmarks. The Secure Score quantifies the overall security
  posture and identifies remediation priorities. Microsoft
  Sentinel analytics rules continuously assess security control
  effectiveness through log correlation and anomaly detection.
  Automated assessment results supplement formal annual
  assessments.

  **Assessment Reporting and Remediation**

  The Security Assessment Report (SAR) documents findings,
  including identified weaknesses and recommended corrective
  actions. Assessment results are provided to the AO, ISSO,
  and CISO (PARAM-CA-002-002). Findings requiring remediation
  are entered into ServiceNow GRC and tracked through the
  POA&M process under CA-5. Assessment results inform the
  authorization decision under CA-6.

