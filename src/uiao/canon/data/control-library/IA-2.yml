control-id: IA-2
title: Identification and Authentication
narrative: |
  {{ organization.name }} requires unique identification and authentication for all
  users, processes, and devices.

  **Primary Authentication**
  All users authenticate using phishing-resistant multi-factor authentication (MFA)
  via the Identity Provider. This includes FIDO2/WebAuthn hardware security keys
  and Microsoft Authenticator with number matching.

  **Non-Organizational Users**
  Guests and contractors are required to use the same authentication standards
  with additional sponsor approval and time-limited access.

  **Device Authentication**
  Managed devices are identified and authenticated using device certificates
  and compliance checks enforced by Intune Conditional Access policies.
implemented-by:
  - IdentityProvider
  - Intune
status: implemented
evidence:
  - type: audit-log
    ref: IA-2-logs
related_controls:
