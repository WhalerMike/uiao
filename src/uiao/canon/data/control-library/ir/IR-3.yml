# IR-3 - Incident Response Testing
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Incident Response (IR)
# Last Reviewed: 2025-06-15

control_id: IR-3
family: Incident Response
title: Incident Response Testing
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Annual Incident Response Testing Program**
  The UIAO platform conducts annual incident response testing to
  evaluate the effectiveness of incident response capabilities and
  validate organizational readiness. Testing methodologies include
  tabletop exercises, functional walk-throughs, and simulated attack
  exercises that assess detection, analysis, containment, eradication,
  and recovery procedures. Test scenarios are developed based on
  current threat intelligence, previous incident lessons learned, and
  organizational risk assessments. Testing exercises involve all
  CSIRT personnel and key stakeholders to validate coordination and
  communication procedures defined in **IR-1** (Incident Response
  Policy and Procedures).

  **Technology-Specific Response Validation**
  Incident response tests validate detection and response capabilities
  across the UIAO technology stack. Microsoft Sentinel SOAR playbook
  execution is tested through simulated alert triggers to verify
  automated enrichment, notification, and containment actions.
  CrowdStrike Falcon EDR response capabilities are validated through
  controlled adversary simulation exercises testing Real Time Response
  containment and remediation workflows. Palo Alto NGFW emergency
  blocking procedures are tested through simulated network-based
  attack scenarios. CyberArk Privileged Access Security emergency
  credential rotation and session termination procedures are
  validated through privileged account compromise scenarios. Entra ID
  Conditional Access emergency policies are tested through simulated
  identity compromise scenarios.

  **After-Action Analysis and Plan Improvement**
  After-action reports are generated following each incident response
  test documenting exercise objectives, scenarios executed, response
  timelines achieved, gaps identified, and recommended improvements.
  Test results are reviewed by the ISSO and organizational leadership
  to determine necessary updates to the incident response plan.
  Identified deficiencies are tracked as POAMs in ServiceNow ITSM
  and remediated within established timelines. Lessons learned are
  incorporated into **IR-2** (Incident Response Training) content
  and used to refine Microsoft Sentinel analytics rules and SOAR
  playbooks supporting **SI-4** (System Monitoring) and **CA-7**
  (Continuous Monitoring) requirements.

