# IR-7 - Incident Response Assistance
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Incident Response (IR)
# Last Reviewed: 2025-06-15

control_id: IR-7
family: Incident Response
title: Incident Response Assistance
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Integrated Incident Response Support Resources**
  The UIAO platform provides incident response assistance to users
  and system operators through an integrated support structure that
  includes the organizations Computer Security Incident Response
  Team (CSIRT), vendor-provided security operations support, and
  external incident response resources. Users report suspected
  security incidents through ServiceNow ITSM self-service portal,
  dedicated security hotline, or direct communication with the
  Security Operations Center (SOC). ServiceNow automatically routes
  incident reports to the appropriate CSIRT analysts based on
  incident category and severity classification aligned with **IR-4**
  (Incident Handling) procedures.

  **Vendor and External Assistance Integration**
  The UIAO platform leverages vendor-provided incident response
  assistance through established support agreements. CrowdStrike
  Falcon Complete provides managed detection and response (MDR)
  services with 24x7 threat hunting and incident response support.
  Microsoft Premier Support provides escalation paths for Azure
  and Entra ID security incidents. Palo Alto Unit 42 incident
  response retainer provides on-demand forensic investigation and
  advanced threat analysis capabilities. CyberArk support provides
  emergency assistance for privileged access security incidents.
  External assistance from US-CERT and CISA is available for
  significant incidents requiring federal coordination.

  **Knowledge Management and Self-Service Resources**
  Incident response assistance is supplemented by comprehensive
  knowledge management resources maintained in the ServiceNow
  knowledge base. Self-service articles provide users with guidance
  on recognizing and reporting common security incidents including
  phishing attempts, malware infections, unauthorized access, and
  data spillage. The knowledge base includes step-by-step procedures
  for immediate user actions during suspected incidents, reducing
  response times and preserving evidence. Knowledge articles are
  updated following actual incidents and **IR-3** (Incident Response
  Testing) exercises to maintain currency and relevance, supporting
  **AT-3** (Role-Based Security Training) awareness objectives.

