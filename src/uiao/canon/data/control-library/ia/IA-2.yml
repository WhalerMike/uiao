parameters:
    - id: PARAM-IA-002-001
      description: >-
          Acceptable phishing-resistant authenticator types for
          organizational users authenticating to the substrate.
      value: "FIDO2 security keys conforming to WebAuthn Level 2; Windows Hello for Business with hardware-backed TPM; PIV/CAC smart cards anchored to the Federal Common Policy CA G2 chain or agency FPKI sub-CA"
    - id: PARAM-IA-002-002
      description: >-
          Authentication scope for which phishing-resistant MFA is
          mandatory at every sign-in.
      value: "All interactive sign-ins for federal personnel and contractor users; all administrator-role activations; all privileged sessions originating through CyberArk PAM; all access requests to Tier 0 management surfaces (Entra ID, Azure subscriptions, key vaults, conditional-access policies)"
    - id: PARAM-IA-002-003
      description: >-
          Authentication methods prohibited within the authorization
          boundary.
      value: "Password-only authentication; SMS-based one-time passcodes; voice-call MFA; security questions; static challenge-response tokens; basic authentication for legacy protocols (POP, IMAP, SMTP-AUTH); NTLMv1 (LSA-disabled per ADR-068)"

narrative: |
  **Unique-Identifier Authority**
  Microsoft Entra ID is the canonical Identity Provider of record
  for every organizational user within the UIAO authorization
  boundary. Each user is assigned a single unique identifier (the
  Entra ID object identifier) that travels with the user across
  every federated service. User identifier provenance flows from
  the authoritative HR source (Workday) through the SCIM
  provisioning connector defined by **AC-2** (Account Management);
  no identifier is minted outside this pipeline. Account
  identifiers are immutable for the duration of the user's
  employment, providing stable correlation for audit and incident
  response.

  **Phishing-Resistant Authentication as Default**
  Every interactive sign-in by an organizational user requires the
  phishing-resistant authentication strength defined in PARAM
  IA-002-001. Conditional Access policies enforce this strength at
  every sign-in for the scope defined in PARAM IA-002-002. The
  authentication path satisfies OMB M-22-09, CISA Binding
  Operational Directive 25-01, Solicitation 24322626R0007 Amendment
  4 Clause 1752.224-70 (PIV/CAC), and the Federal Zero Trust
  Strategy. Authentication strength evaluation uses the Entra ID
  authentication-strength taxonomy and is auditable per sign-in
  via the Conditional Access evaluation logs.

  **Privileged Authentication**
  All privileged-role activations require certificate-based
  authentication against the Federal Common Policy CA G2 chain per
  ADR-068. Entra Privileged Identity Management refuses to activate
  any privileged role for a session whose authentication strength
  does not include a certificate-based factor. CyberArk PAM
  enforces the same requirement for vaulted-credential check-out
  and recorded privileged sessions. This satisfies the intent of
  **IA-2(1)**, **IA-2(2)**, and **IA-2(12)** at the base-control
  level and supports **AC-6** (Least Privilege).

  **Prohibited Authentication Methods**
  The authentication methods listed in PARAM IA-002-003 are blocked
  at the tenant level. Legacy authentication is disabled via
  Conditional Access blocks; SMS-based MFA is blocked via the
  authentication-methods policy; basic authentication is disabled
  in Exchange Online; NTLMv1 is disabled at the LSA layer per the
  ADR-068 schedule with mandatory disablement by 2027-04-01 per
  Notice 0009. Exception requests require an ADR-068 per-app ADR
  with the compensating control documented.

  **Non-Person Entity Authentication**
  Workload identities (service principals and managed identities)
  authenticate using federated credentials per ADR-004
  (workload-identity-federation-default) rather than client secrets
  where the target supports OIDC federation. Where federation is
  unavailable, secrets are vaulted in Azure Key Vault with
  certificate-based caller authentication and rotated per **IA-5**.
  Service-principal sign-ins are logged in the Entra ID
  service-principal sign-in log and streamed to Microsoft Sentinel
  for correlation with **AU-12** (Audit Record Generation).

  **Telemetry, Detection, and Continuous Validation**
  Every sign-in produces a record in the Entra ID sign-in logs
  carrying the user identifier, the device identifier, the
  authentication-strength evidence, the Conditional Access
  evaluation, and the decision outcome. Microsoft Sentinel runs a
  curated detection pack (impossible-travel, anomalous-IP,
  authentication-method-downgrade, post-MFA token theft) and
  forwards high-confidence detections to ServiceNow Security
  Incident Response. Authentication telemetry is exported nightly
  to the UIAO evidence ledger for tamper-evident archival
  consistent with **AU-9** (Protection of Audit Information).

