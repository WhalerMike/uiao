# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : IA-7
# Title      : Cryptographic Module Authentication
# Schema     : data/control-library (uiao-core canonical format)

control_id: IA-7
title: Cryptographic Module Authentication
family: Identification and Authentication
status: implemented

implemented_by:
  - entra-id
  - cyberark-psm
  - cisco-catalyst
  - palo-alto-ngfw

evidence:
  - entra-id-fips-140-compliance-documentation
  - cyberark-vault-cryptographic-module-certification
  - cisco-catalyst-fips-mode-configuration
  - palo-alto-fips-cc-mode-validation-report

parameters:
  - id: ia_7_cryptographic_module_standard
    description: >-
      FIPS validation level required for all cryptographic modules used
      in authentication mechanisms within the information system.
    value: "FIPS 140-2 Level 1 minimum; Level 2 for privileged credential vaulting"

narrative: |
  **FIPS-Validated Cryptographic Module Enforcement**
  The organization implements mechanisms for authentication to
  cryptographic modules that meet the requirements of applicable
  federal laws, executive orders, directives, policies, regulations,
  and standards. All authentication transactions processed through
  Microsoft Entra ID utilize FIPS 140-2 validated cryptographic
  libraries for TLS negotiation, token signing, and credential hashing.
  FIDO2 security keys deployed for phishing-resistant MFA per
  **PARAM-IAM-001** employ FIPS 140-2 Level 2 certified hardware
  cryptographic modules, ensuring that all authentication operations
  meet federal cryptographic standards as required by **SC-12**
  (Cryptographic Key Establishment and Management).

  **Privileged Credential Vaulting Cryptography**
  CyberArk Digital Vault employs FIPS 140-2 Level 2 validated
  cryptographic modules for all privileged credential storage,
  retrieval, and session injection operations. Vault-to-vault
  replication and privileged session recording encryption utilize
  AES-256 with FIPS-validated key management, ensuring that privileged
  authentication workflows maintain cryptographic integrity throughout
  the credential lifecycle. This supports **IA-5** (Authenticator
  Management) and **SC-8** (Transmission Confidentiality and Integrity)
  requirements for privileged access channels.

  **Network Infrastructure Cryptographic Compliance**
  Cisco Catalyst switches and routers operate in FIPS mode, ensuring
  that all administrative authentication sessions (SSH, HTTPS, RADIUS)
  use FIPS 140-2 validated cryptographic implementations. Palo Alto
  NGFW operates in FIPS-CC mode, enforcing FIPS-validated cryptography
  for VPN authentication, management plane access, and certificate
  validation operations. Cryptographic module compliance is validated
  through periodic audits logged to Microsoft Sentinel, supporting
  **CM-6** (Configuration Settings) and **AU-2** (Event Logging).

related_controls:
  - IA-2   # Identification and Authentication
  - IA-5   # Authenticator Management
  - SC-8   # Transmission Confidentiality and Integrity
  - SC-12  # Cryptographic Key Establishment and Management
  - CM-6   # Configuration Settings
  - AU-2   # Event Logging
