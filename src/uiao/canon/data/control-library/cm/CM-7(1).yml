parameters:
  - id: cm_7_1_review_frequency
    description: >-
      Frequency at which the system is reviewed to identify and
      remove or disable unnecessary functions, ports, protocols,
      and services.
    value: "Quarterly review of installed applications, enabled services, and open ports conducted by ISSO with automated inventory inputs from Intune, CrowdStrike, and Azure Policy"
  - id: cm_7_1_review_scope
    description: >-
