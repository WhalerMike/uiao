    value: "Installed applications, running services, open network ports, enabled OS features, Azure resource types, and API endpoints across all system boundary components"

narrative: |
  **Quarterly Least Functionality Review Process**
  The UIAO system conducts periodic reviews of system components
  to identify and eliminate unnecessary functions, ports, protocols,
  software, and services at the frequency defined in PARAM
  cm_7_1_review_frequency. The quarterly review is led by the
  ISSO with input from automated inventory data from Microsoft
  Intune (installed applications and enabled features), CrowdStrike
  Falcon (running processes and open ports), and Azure Policy
  (enabled cloud services and resource types) covering the full
  scope defined in PARAM cm_7_1_review_scope. Review findings are
  documented in ServiceNow ITSM as configuration review records,
  and any functions identified as unnecessary are tracked through
  change management for removal or disablement. This satisfies the
  CM-7(1) requirement for periodic review of system functionality
  and supports **CM-7** (Least Functionality) and **CM-2**
  (Baseline Configuration) objectives.

  **Automated Inventory Inputs for Review**
  CrowdStrike Falcon continuously monitors running processes,
  active network connections, and listening ports across all
  managed endpoints, producing a comprehensive behavioral
  inventory that is compared against approved application and
  service allow-lists during the quarterly review. Microsoft Intune
  application inventory reports document all software installed on
  managed endpoints, enabling the ISSO to identify applications not
  in the approved software catalog. Azure Policy reports on Azure
  resource types and configurations that deviate from approved
  deployment templates, identifying services that may have been
  enabled without proper change management authorization.

  **Removal and Disablement of Unnecessary Functions**
  Functions, ports, protocols, and services identified during the
  quarterly review as unnecessary are processed through the
  ServiceNow change management workflow for removal or disablement.
  High-risk unnecessary functions (e.g., SMBv1, Telnet, unencrypted
  FTP) are flagged for immediate remediation outside the quarterly
  cycle when identified by CrowdStrike or Azure Policy. Intune
  compliance policies enforce restrictions on prohibited application
  categories and automatically flag non-compliant endpoints for
  remediation, preventing re-installation of prohibited software.

  **Documentation and Traceability**
  Each quarterly review produces a formal review record in
  ServiceNow documenting the components reviewed, findings
  identified, remediation actions taken, and ISSO sign-off.
  Review records are retained as audit evidence and incorporated
  into the continuous monitoring reporting submitted under **CA-7**
  (Continuous Monitoring) and the FedRAMP annual assessment
  evidence package under **CA-2** (Security Assessments).

