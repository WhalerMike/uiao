# CM-8 - System Component Inventory
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Configuration Management (CM)
# Last Reviewed: 2025-06-15

control_id: CM-8
family: Configuration Management
title: System Component Inventory
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Comprehensive System Component Inventory**
  The UIAO platform maintains a comprehensive inventory of all system
  components that accurately reflects the current information system
  boundary. The inventory is maintained in ServiceNow Configuration
  Management Database (CMDB) and includes Azure cloud resources,
  virtual machines, platform services, managed endpoints, network
  devices, and software applications. Azure Resource Graph provides
  real-time discovery and inventory of all cloud resources across
  subscriptions, automatically synchronizing with the ServiceNow CMDB
  through integration connectors. Microsoft Intune maintains the
  authoritative inventory of managed endpoints including hardware
  specifications, operating system versions, and installed software.

  **Automated Discovery and Inventory Reconciliation**
  Automated discovery mechanisms ensure inventory accuracy across all
  platform tiers. CrowdStrike Falcon asset discovery identifies all
  endpoints connected to the network, including unmanaged devices,
  and reconciles findings against the authorized inventory in
  ServiceNow CMDB. Palo Alto NGFW IoT Security module identifies
  network-connected devices through passive traffic analysis. Cisco
  SD-WAN vManage maintains an inventory of all branch and remote site
  network devices with firmware versions and configuration states.
  CyberArk Privileged Access Security maintains an inventory of all
  privileged accounts and credentials associated with system
  components, supporting **AC-2** (Account Management) requirements.

  **Inventory Review and Accountability**
  The system component inventory is reviewed and updated quarterly
  by the ISSO to verify accuracy, completeness, and proper component
  accountability. Each component is assigned to an accountable
  individual or group responsible for its security configuration and
  maintenance. Inventory changes are tracked through ServiceNow ITSM
  change records aligned with **CM-3** (Configuration Change Control).
  Discrepancies between discovered and authorized components trigger
  investigation and remediation under **IR-4** (Incident Handling)
  processes. The inventory supports boundary definition for **CA-3**
  (Information Exchange) and authorization decisions under **CA-6**
  (Authorization) requirements.

