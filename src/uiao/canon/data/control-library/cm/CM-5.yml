# CM-5 - Access Restrictions for Change
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Configuration Management (CM)
# Last Reviewed: 2025-06-15

control_id: CM-5
family: Configuration Management
title: Access Restrictions for Change
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Role-Based Access Restrictions for Configuration Changes**
  The UIAO platform enforces physical and logical access restrictions
  for configuration changes through role-based access control aligned
  with **AC-3** (Access Enforcement) and least privilege principles
  under **AC-6** (Least Privilege). Only authorized personnel with
  designated administrative roles in Azure Active Directory (Entra ID)
  are permitted to modify system configurations. CyberArk Privileged
  Access Security provides just-in-time privileged access through
  Privileged Identity Management (PIM), requiring multi-factor
  authentication and time-bound session elevation for all
  administrative operations. All privileged access requests are
  logged and monitored through CyberArk session recording and
  Microsoft Sentinel analytics.

  **Platform-Specific Change Access Controls**
  Azure resource configurations are protected through Azure RBAC
  assignments that restrict modification capabilities to designated
  Cloud Infrastructure Administrators. Palo Alto NGFW configuration
  changes require Panorama administrator credentials managed through
  CyberArk credential vaulting with dual-control access approval.
  Cisco SD-WAN vManage administrative access is restricted to
  Network Security Engineers with approved ServiceNow change tickets.
  Microsoft Intune device configuration profile modifications require
  Intune Administrator role assignment through Entra ID PIM with
  mandatory justification. Endpoint Detection and Response policy
  changes in CrowdStrike Falcon require Falcon Administrator
  privileges managed through a separate approval workflow.

  **Change Audit Trail and Accountability**
  All configuration change activities are captured in comprehensive
  audit trails supporting **AU-12** (Audit Record Generation) and
  **AU-6** (Audit Record Review) requirements. Microsoft Sentinel
  correlates privileged access events with configuration change
  records to detect unauthorized modification attempts. Azure Policy
  deny assignments prevent unauthorized changes to critical security
  configurations, and Azure Resource Locks protect production
  resources from accidental deletion or modification. Change access
  violations trigger automated alerts through Sentinel analytics
  rules for immediate investigation under **IR-4** (Incident
  Handling) procedures.

