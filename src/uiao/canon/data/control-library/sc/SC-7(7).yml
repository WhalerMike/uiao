parameters:
  - id: PARAM-SC-007-7-001
    description: >-
      Policy governing split tunneling for remote devices connecting
      to the UIAO system.
    value: "Split tunneling is prohibited for remote access to UIAO systems; all remote device traffic routed through organizational VPN and Palo Alto NGFW inspection"
  - id: PARAM-SC-007-7-002
    description: >-
      Technical enforcement mechanism preventing split tunneling on
      remote access devices.
    value: "Palo Alto GlobalProtect VPN enforces full-tunnel mode; Intune compliance policy blocks VPN profiles that permit split tunneling"

narrative: |
  **Split Tunneling Prohibition Policy**
  The organization prevents split tunneling for remote devices connecting
  to the UIAO system (PARAM-SC-007-7-001). Split tunneling allows remote
  devices to simultaneously maintain VPN connectivity to the organizational
  network and direct connectivity to external networks, creating a potential
  bypass path for malicious traffic or data exfiltration. The UIAO
  remote access policy explicitly prohibits split tunneling configurations,
  requiring that all remote device traffic be routed through the
  organizational VPN and inspected by Palo Alto NGFW.

  **Technical Enforcement via GlobalProtect and Intune**
  Palo Alto GlobalProtect VPN is configured in full-tunnel mode,
  routing all remote device traffic through the organizational security
  perimeter for inspection (PARAM-SC-007-7-002). GlobalProtect enforces
  this configuration by applying security policies that prevent direct
  internet access while the VPN is connected. Microsoft Intune compliance
  policies verify that VPN client configurations on managed endpoints
  enforce full-tunnel mode, flagging non-compliant configurations and
  restricting access to UIAO resources from non-compliant devices via
  Entra ID Conditional Access.

  **Entra ID Conditional Access Enforcement**
  Entra ID Conditional Access policies require that remote access
  to UIAO resources occurs only from compliant, managed devices.
  Devices that circumvent the full-tunnel VPN requirement would fail
  device compliance checks and be blocked from accessing organizational
  resources. This identity-layer enforcement complements the network-layer
  enforcement provided by GlobalProtect.

  **Monitoring and Detection**
  Microsoft Sentinel monitors GlobalProtect VPN telemetry for indicators
  of split tunneling attempts or unauthorized VPN configuration changes.
  Alerts on unusual traffic patterns from remote access sessions, such
  as traffic bypassing the VPN, are correlated with endpoint telemetry
  from Intune to identify potential policy violations. Findings generate
  ServiceNow incidents for ISSO investigation, supporting **AC-17**
  (Remote Access) monitoring requirements.

