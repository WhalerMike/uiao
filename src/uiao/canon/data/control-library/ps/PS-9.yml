# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : PS-9
# Title      : Position Descriptions
# Schema     : data/control-library (uiao-core canonical format)

control_id: PS-9
title: Position Descriptions
family: Personnel Security
status: not-implemented

implemented_by:
  - servicenow
  - sharepoint-compliance-library
  - entra-id

evidence:
  - position-description-documents-with-security-responsibilities
  - servicenow-hr-position-registry
  - entra-id-role-assignment-audit-report
  - annual-position-description-review-records

parameters:
  - id: PARAM-PS-009-001
    description: >-
      Security and privacy responsibilities that must be incorporated
      into position descriptions for UIAO system roles.
    value: "Security responsibilities, required clearance level, system access scope, data handling obligations, and reporting chain for security incidents"
  - id: PARAM-PS-009-002
    description: >-
      Frequency of review and update for position descriptions
      to reflect current security and privacy responsibilities.
    value: "Annually and upon significant change to role duties, system access scope, or organizational security policy"
  - id: PARAM-PS-009-003
    description: >-
      Organizational roles for which position descriptions must
      include explicit UIAO security and privacy responsibilities.
    value: "All positions with access to UIAO systems, privileged roles, and system administrator positions"

narrative: |
  **Security Responsibilities in Position Descriptions**
  The organization incorporates explicit security and privacy
  responsibilities into position descriptions for all roles with
  access to or accountability for UIAO systems (PARAM-PS-009-001
  and PARAM-PS-009-003). Position descriptions document the required
  security clearance or background investigation level, the scope of
  authorized system access, data handling and classification
  obligations, incident reporting responsibilities, and the
  individual's role in the security control implementation chain.
  Position descriptions serve as the authoritative basis for
  role-based access provisioning in Microsoft Entra ID and
  CyberArk PAM.

  **Privileged and Sensitive Role Descriptions**
  Position descriptions for system administrators, ISSO, security
  engineers, and other privileged roles include expanded security
  responsibility sections that define the boundaries of authorized
  privileged access, separation of duties requirements per **AC-5**,
  and accountability for maintaining system configuration baselines.
  These descriptions are used by the ISSM to validate that Entra ID
  role assignments and CyberArk vault access are appropriately scoped
  to the documented position responsibilities, supporting **AC-2**
  (Account Management) and **AC-6** (Least Privilege) compliance.

  **Position Description Registry and Governance**
  All UIAO position descriptions are maintained in ServiceNow HR
  module and stored in the SharePoint Compliance Library with version
  control (PARAM-PS-009-002). Position descriptions are reviewed
  annually by the ISSM and HR in coordination with system owners to
  ensure that security responsibilities remain accurate and reflect
  current system access scope and policy requirements. Reviews are
  triggered immediately when significant changes occur to role duties,
  system access boundaries, or organizational security policy.

  **Integration with Onboarding and Access Management**
  Position descriptions drive the access provisioning workflow:
  new personnel onboarding in ServiceNow references the position
  description to determine appropriate Entra ID group memberships,
  system access levels, and training requirements. Personnel whose
  position descriptions include privileged access requirements are
  automatically enrolled in role-based security training per
  **AT-3** (Role-Based Training) and are subject to enhanced
  background screening per **PS-3** (Personnel Screening).

related_controls:
  - PS-2   # Position Risk Designation
  - PS-3   # Personnel Screening
  - AC-2   # Account Management
  - AC-5   # Separation of Duties
  - AT-3   # Role-Based Security Training
