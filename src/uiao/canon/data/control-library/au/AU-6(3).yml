# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AU-6(3)
# Title      : Audit Record Review, Analysis, and Reporting | Correlate Audit Record Repositories
# Schema     : data/control-library (uiao-core canonical format)

