# AU-1 - Audit and Accountability Policy and Procedures
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Audit and Accountability (AU)
# Last Reviewed: 2025-06-15

control_id: AU-1
family: Audit and Accountability
title: Audit and Accountability Policy and Procedures
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Audit and Accountability Policy Framework**
  The UIAO platform maintains a comprehensive Audit and Accountability
  policy that establishes requirements for audit record generation,
  retention, protection, and review across all information system
  components. The policy defines organizational responsibilities for
  audit logging, specifies auditable event categories aligned with
  **AU-2** (Event Logging), and mandates centralized collection through
  Microsoft Sentinel as the authoritative SIEM platform. The policy
  is reviewed and updated annually by the ISSO in coordination with
  the Information System Owner and Authorizing Official, with interim
  updates triggered by significant system changes or emerging threats.

  **Procedural Implementation and Governance**
  Supporting procedures document the operational processes for audit
  log configuration, collection, analysis, and incident correlation
  across the UIAO technology stack. Procedures address audit record
  generation from Azure Active Directory (Entra ID), CrowdStrike
  Falcon EDR, Palo Alto NGFW, CyberArk Privileged Access Security,
  and Cisco SD-WAN components. All procedural documents are maintained
  in the organizations document management system with version control
  and are disseminated to relevant personnel through ServiceNow ITSM
  knowledge base articles.

  **Policy Review and Continuous Improvement**
  The audit and accountability policy and procedures undergo formal
  review on an annual basis or whenever significant changes occur to
  the system architecture, threat landscape, or regulatory requirements.
  Policy compliance is assessed through quarterly internal audits and
  annual third-party assessments supporting **CA-7** (Continuous
  Monitoring) and **CA-2** (Control Assessments) requirements. Findings
  are tracked as POAMs in ServiceNow and remediated within established
  timelines under **PM-4** (Plan of Action and Milestones) processes.

