# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : MA-6
# Title      : Timely Maintenance
# Schema     : data/control-library (uiao-core canonical format)

control_id: MA-6
title: Timely Maintenance
family: Maintenance
status: not-implemented

implemented_by:
  - servicenow
  - azure-update-manager
  - intune-mdm
  - microsoft-sentinel

evidence:
  - servicenow-maintenance-sla-compliance-report
  - azure-update-manager-patch-timeliness-report
  - intune-device-compliance-patch-status
  - sentinel-maintenance-window-monitoring-logs

parameters:
  - id: PARAM-MA-006-001
    description: >-
      Maximum time allowed for obtaining maintenance support or
      spare parts for critical UIAO system components following
      a maintenance requirement identification.
    value: "Critical components: maintenance initiated within 24 hours; spare parts obtained within 72 hours"
  - id: PARAM-MA-006-002
    description: >-
      Critical UIAO system components for which spare parts or
      maintenance support contracts are maintained.
    value: "Network infrastructure (Cisco ISE, Palo Alto), endpoint infrastructure (Intune-managed devices), Azure platform components"
  - id: PARAM-MA-006-003
    description: >-
      Alternative security safeguards to be implemented when
      scheduled maintenance cannot be completed on time.
    value: "Increased monitoring via Sentinel, network isolation of affected components, activation of contingency plan per CP-2"

narrative: |
  **Timely Maintenance Commitment**
  The organization obtains maintenance support or spare parts for
  critical UIAO system components within defined timelines to ensure
  system availability and minimize security risk from degraded
  components (PARAM-MA-006-001). Maintenance requirements are tracked
  in ServiceNow with automated SLA timers that trigger escalation
  alerts to the ISSO and System Owner when maintenance milestones
  are at risk. Critical component maintenance is initiated within
  24 hours of identification, and required spare parts are obtained
  within 72 hours.

  **Critical Component Inventory and Support Contracts**
  The organization maintains a current inventory of critical UIAO
  system components (PARAM-MA-006-002) including Cisco ISE network
  access control infrastructure, Palo Alto NGFW appliances, Infoblox
  IPAM/DNS systems, and Azure platform services. Vendor support
  contracts with defined response SLAs are maintained for all
  critical hardware components. Azure platform components are covered
  by Microsoft Enterprise Support agreements ensuring timely access
  to platform maintenance and incident response resources.

  **Maintenance Scheduling and Prioritization**
  ServiceNow Change Management prioritizes maintenance requests based
  on criticality ratings derived from the UIAO system component
  inventory and business impact analysis. Maintenance activities are
  sequenced to minimize operational disruption while meeting timeliness
  requirements. Azure Update Manager and Microsoft Intune enforce
  patching timelines consistent with the vulnerability management SLA
  defined in **RA-5**, ensuring that security-driven maintenance is
  completed within required windows.

  **Alternative Safeguards for Delayed Maintenance**
  When scheduled maintenance cannot be completed within required
  timelines, the organization activates alternative security safeguards
  (PARAM-MA-006-003) to compensate for the increased risk from the
  unmaintained component. Microsoft Sentinel monitoring rules are
  intensified for affected components, network isolation is applied
  via Palo Alto NGFW and Cisco ISE segmentation policies, and the
  System Owner evaluates whether the contingency plan under **CP-2**
  (Contingency Plan) should be activated. All deviations from
  maintenance timelines are documented in ServiceNow and reported
  to the AO.

