narrative: |
  **Policy Overview**
  The organization develops, documents, and disseminates a system
  maintenance policy that addresses purpose, scope, roles,
  responsibilities, management commitment, coordination among
  organizational entities, and compliance. The policy establishes
  the framework for controlled maintenance activities, maintenance
  tool management, and personnel oversight for the UIAO system.

  **Policy Maintenance**
  The system maintenance policy is approved by the ISSM and
  reviewed at least annually (PARAM-MA-001-001). The policy is
  maintained in the SharePoint Policy Library with version control
  and access logging. Policy updates trigger redistribution to all
  personnel with maintenance responsibilities (PARAM-MA-001-002)
  with acknowledgment tracking through ServiceNow.

  **Maintenance Procedures**
  The organization develops, documents, and maintains procedures
  to facilitate the implementation of the system maintenance
  policy. Procedures define preventive and corrective maintenance
  scheduling, approval workflows, tool authorization, remote
  maintenance requirements, and documentation standards.
  Procedures align with NIST SP 800-53 Rev 5 and are reviewed
  annually consistent with the policy review cycle.

  **Governance Integration**
  The system maintenance policy is integrated into the UIAO
  governance framework defined in the Operational Governance
  Charter. Maintenance activities are tracked through ServiceNow
  and feed the compliance posture score in the Executive
  Dashboard. The policy supports MA-2 (Controlled Maintenance),
  MA-3 (Maintenance Tools), and MA-5 (Maintenance Personnel).
