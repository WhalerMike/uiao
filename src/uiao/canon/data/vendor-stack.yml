# UIAO Vendor Stack - Core Technology Partners
# Tracks FedRAMP certification, required versions, and CISA directive compliance
# Referenced by: templates/fedramp-crosswalk.md.j2, scripts/generate_docs.py
# Vendor-neutral: supports overlay swaps (e.g., Okta for Entra ID) via data/overlays/

vendor_stack:
    - provider: "Infoblox"
      product: "BloxOne Threat Defense"
      uiao_pillar: "Addressing (A)"
      role: "Deterministic IPAM and DNS Security"
      certification_class: "Class C"
      fedramp_id: "FR1908234567"
      critical_version: "NIOS 9.0.8 / BloxOne 2026.1"
      status: "Authorized"
      nist_controls:
        - "CM-8: System Component Inventory"
        - "SC-20: Secure Name/Address Resolution"
      documentation_source: "https://docs.infoblox.com/space/BloxOneThreatDefense"
      ksi_mapping: "KSI-PIY"
      evidence_method: "BloxOne DDI API - Identity-to-IP Binding Logs"

    - provider: "Cisco"
      product: "Catalyst SD-WAN"
      uiao_pillar: "Overlay (O)"
      role: "Encrypted mTLS Service Chain and Fabric Transport"
      certification_class: "Class C"
      fedramp_id: "FR2104567890"
      minimum_ios_xe: "17.12.1a"
      status: "Authorized"
      nist_controls:
        - "AC-4: Information Flow Enforcement"
        - "SC-8: Transmission Confidentiality"
        - "SC-23: Session Authenticity"
      documentation_source: "https://www.cisco.com/c/en/us/td/docs/routers/sdwan/configuration/routing/v17-9/routing-book.html"
      hardening_guide: "https://sec.cloudapps.cisco.com/security/center/resources/Cisco-Catalyst-SD-WAN-HardeningGuide"
      ksi_mapping: "KSI-SVC"
      evidence_method: "Catalyst SD-WAN mTLS Configuration and IPFIX Flow Logs"
      compliance_notes:
        emergency_directive: "ED 26-03"
        cve: "CVE-2026-20127"
        status: "Patched"
        patch_date: "2026-02-28"

    - provider: "Microsoft"
      product: "Entra ID + Informed Network Routing (INR)"
      uiao_pillar: "Identity (U)"
      role: "Identity Provider and Network Telemetry Attribution"
      certification_class: "Class C"
      fedramp_id: "FR1612345678"
      status: "Authorized"
      nist_controls:
        - "IA-2: Identification and Authentication"
        - "IA-5: Authenticator Management"
        - "CA-7: Continuous Monitoring"
      documentation_source: "https://learn.microsoft.com/en-us/entra/identity/"
      ksi_mapping: "KSI-IAM"
      evidence_method: "Entra ID Conditional Access Logs and INR Telemetry Feed"
      authentication_methods:
        - "Phishing-Resistant MFA (FIDO2)"
        - "PIV/CAC Smart Card"
        - "Certificate-Based Authentication (CBA)"

    - provider: "Microsoft"
      product: "Intune Endpoint Management"
      uiao_pillar: "Identity (U) - Device Compliance"
      role: "Endpoint Management, Device Compliance Enforcement, and Configuration Baseline Deployment"
      certification_class: "Class C"
      fedramp_id: "FR1612345678"
      fedramp_level: "High"
      required_version: "2602 (March 2026 Service Release)"
      status: "Authorized"
      nist_controls:
        - "CM-2: Baseline Configuration"
        - "CM-6: Configuration Settings"
        - "CM-8: System Component Inventory"
        - "IA-3: Device Identification and Authentication"
        - "SC-7: Boundary Protection (Device Compliance Gates)"
        - "SI-2: Flaw Remediation"
      documentation_source: "https://learn.microsoft.com/en-us/mem/intune/"
      ksi_mapping: "KSI-IAM"
      evidence_method: "Intune Compliance Policy Audit Logs and Device Configuration Profiles"
      integration_points:
        - "Entra ID Conditional Access requires device compliance signal from Intune"
        - "Defender for Endpoint risk score feeds into Intune compliance policies"
        - "CMDB sync to ServiceNow for hardware and software inventory"
        - "Configuration baselines aligned to DISA STIGs and CIS Benchmarks"

    - provider: "Microsoft"
      product: "Defender for Endpoint (MDE)"
      uiao_pillar: "Overlay (O) - Endpoint Detection"
      role: "Endpoint Detection and Response, Threat Intelligence, and Automated Investigation"
      certification_class: "Class C"
      fedramp_id: "FR1612345678"
      fedramp_level: "High"
      status: "Authorized"
      nist_controls:
        - "SI-3: Malicious Code Protection"
        - "SI-4: System Monitoring"
        - "IR-4: Incident Handling"
        - "IR-5: Incident Monitoring"
        - "RA-5: Vulnerability Monitoring and Scanning"
        - "SC-7: Boundary Protection (Host-Based)"
      documentation_source: "https://learn.microsoft.com/en-us/defender-endpoint/"
      ksi_mapping: "KSI-SVC"
      evidence_method: "MDE Advanced Hunting Logs and Automated Investigation Audit Trail"
      integration_points:
        - "Risk score feeds into Intune device compliance policies"
        - "Threat alerts forwarded to Microsoft Sentinel for SIEM correlation"
        - "Incident tickets auto-created in ServiceNow via API connector"
        - "Network indicators shared with Palo Alto NGFW threat intelligence feed"

    - provider: "Microsoft"
      product: "Sentinel SIEM/SOAR"
      uiao_pillar: "Governance (G) - Security Operations"
      role: "Cloud-Native SIEM, Security Orchestration, Automated Response, and Continuous Monitoring"
      certification_class: "Class C"
      fedramp_id: "FR1612345678"
      fedramp_level: "High"
      required_version: "Azure Government"
      status: "Authorized"
      nist_controls:
        - "AU-6: Audit Record Review, Analysis, and Reporting"
        - "AU-12: Audit Record Generation"
        - "SI-4: System Monitoring"
        - "IR-4: Incident Handling"
        - "IR-5: Incident Monitoring"
        - "IR-6: Incident Reporting"
        - "CA-7: Continuous Monitoring"
      documentation_source: "https://learn.microsoft.com/en-us/azure/sentinel/"
      ksi_mapping: "KSI-GOV"
      evidence_method: "Sentinel Analytics Rules, Incident Logs, and Playbook Execution Audit Trail"
      data_connectors:
        - "Entra ID sign-in and audit logs"
        - "Defender for Endpoint alerts and raw events"
        - "Intune device compliance events"
        - "Palo Alto Networks NGFW syslog via CEF"
        - "Cisco SD-WAN IPFIX and syslog"
        - "Infoblox BloxOne Threat Defense DNS query logs"
        - "CyberArk Privileged Session audit events"
        - "ServiceNow incident and change record feeds"
        - "Splunk forwarded events (optional dual-SIEM)"

    - provider: "Palo Alto Networks"
      product: "Next-Generation Firewall (NGFW)"
      uiao_pillar: "Overlay (O) - Security Inspection"
      role: "Deep Packet Inspection within SD-WAN Service Chain"
      certification_class: "Class C"
      fedramp_id: "FR1905678901"
      status: "Authorized"
      nist_controls:
        - "SC-7: Boundary Protection"
        - "SI-4: System Monitoring"
      ksi_mapping: "KSI-SVC"
      evidence_method: "NGFW Threat Prevention Logs via Panorama API"

    - provider: "CyberArk"
      product: "Privileged Access Management"
      uiao_pillar: "Identity (U) - Privileged Access"
      role: "Privileged Identity Lifecycle and Session Recording"
      certification_class: "Class C"
      status: "Authorized"
      nist_controls:
        - "AC-6: Least Privilege"
        - "AU-10: Non-Repudiation"
      ksi_mapping: "KSI-IAM"
      evidence_method: "CyberArk Session Audit Logs"

    - provider: "ServiceNow"
      product: "IT Service Management (ITSM) + GRC"
      uiao_pillar: "Governance (G)"
      role: "IT Service Management, Incident Response, and Continuous Authorization Support"
      certification_class: "Class C"
      fedramp_id: "FR1710155498"
      fedramp_level: "High"
      required_version: "Xanadu"
      status: "Authorized"
      nist_controls:
        - "IR-4: Incident Handling"
        - "IR-5: Incident Monitoring"
        - "IR-6: Incident Reporting"
        - "SI-4: System Monitoring"
        - "CA-7: Continuous Monitoring"
        - "SA-9: External System Services"
      documentation_source: "https://docs.servicenow.com/bundle/xanadu-it-service-management/page/product/incident-management/concept/c_IncidentManagement.html"
      ksi_mapping: "KSI-GOV"
      evidence_method: "ServiceNow CMDB + Incident/Change Audit Trail"
      integration_points:
        - "CMDB auto-sync with Infoblox DDI for asset inventory"
        - "Incident tickets linked to CyberArk privileged session events"
        - "Change Advisory Board (CAB) workflow for vendor patch deployments"
        - "Continuous monitoring dashboards fed by Entra ID and Palo Alto logs"
      compliance_notes:
        bod_25_01: "SCuBA baseline compliance tracked via GRC module"
        conmon_reporting: "Automated POA&M generation from vulnerability scan imports"

    - provider: "Splunk"
      product: "Splunk Enterprise (GovCloud)"
      uiao_pillar: "Governance (G) - Log Analytics"
      role: "Operational Log Aggregation, Search Analytics, and Compliance Reporting"
      certification_class: "Class C"
      fedramp_id: "FR2009876543"
      fedramp_level: "Moderate"
      required_version: "9.2.x (GovCloud)"
      status: "Authorized"
      nist_controls:
        - "AU-2: Audit Events"
        - "AU-3: Content of Audit Records"
        - "AU-6: Audit Record Review, Analysis, and Reporting"
        - "AU-7: Audit Record Reduction and Report Generation"
        - "AU-12: Audit Record Generation"
        - "SI-4: System Monitoring"
      documentation_source: "https://docs.splunk.com/Documentation/SplunkCloud"
      ksi_mapping: "KSI-GOV"
      evidence_method: "Splunk Search Processing Language (SPL) Queries and Scheduled Report Audit Logs"
      integration_points:
        - "Receives syslog and CEF feeds from Cisco SD-WAN and Palo Alto NGFW"
        - "Ingests Infoblox DNS query logs for threat hunting"
        - "CyberArk session events forwarded for privileged activity analysis"
        - "Bidirectional feed with Microsoft Sentinel for dual-SIEM correlation"
        - "ServiceNow CMDB enrichment for asset-aware log correlation"
      compliance_notes:
        dual_siem: "Operates alongside Microsoft Sentinel for defense-in-depth log analytics"
        retention_policy: "Hot 90 days, Warm 1 year, Cold 7 years per NARA M-19-21"

external_baselines:
  ScubaGear:
    description: "CISA Secure Cloud Business Applications - Microsoft 365"
    repository: "https://github.com/cisagov/ScubaGear"
    latest_version: "TBD - auto-synced via scripts/sync-scuba.py"
    mandate: "BOD 25-01"
    reporting: "Continuous to CISA"
  ScubaGoggles:
    description: "CISA Secure Cloud Business Applications - Google Workspace"
    repository: "https://github.com/cisagov/ScubaGoggles"
    latest_version: "TBD - auto-synced via scripts/sync-scuba.py"
    mandate: "BOD 25-01"

active_directives:
  - id: "BOD 25-01"
    name: "Implementing Secure Practices for Cloud Services"
    status: "Active"
    tools_required:
      - "ScubaGear"
      - "ScubaGoggles"
    reporting_frequency: "Continuous"
  - id: "ED 26-03"
    name: "Mitigate Vulnerabilities in Cisco SD-WAN Systems"
    status: "Remediated"
    affected_vendor: "Cisco"
    patch_deadline: "2026-03-15"
    uiao_response: "Patched 2026-02-28 - Logged in compliance_notes"
