# ServiceNow Xanadu vendor overlay for UIAO-Core
#
# Apply this overlay to replace generic GRC abstract component names with
# ServiceNow Xanadu-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  grc_platform:
    name: ServiceNow Xanadu
    vendor: ServiceNow
    abstract_type: GRCPlatform
    release: Xanadu
    capabilities:
      - Integrated Risk Management (IRM)
      - Governance, Risk, and Compliance (GRC)
      - Continuous Authorization & Monitoring
      - Policy & Compliance Management
      - Vendor Risk Management
      - Audit Management
      - CMDB / Configuration Management

nist_mappings:
  PM-4: "ServiceNow IRM POA&M lifecycle and milestone tracking"
  CA-2: "ServiceNow GRC continuous assessment and authorization workflows"
  CA-7: "ServiceNow continuous monitoring dashboards and automation"
  RA-5: "ServiceNow Vulnerability Response integration with scan imports"
  SA-9: "ServiceNow Vendor Risk Management for external services"
  CM-8: "ServiceNow CMDB asset inventory and CI relationships"
  AU-6: "ServiceNow Security Incident Response (SIR) audit review"
  PL-2: "ServiceNow GRC security plan documentation and tracking"

evidence_sources:
  - name: ServiceNow GRC Policy Export
    type: api
    endpoint: /api/sn_grc/policy
  - name: ServiceNow IRM Risk Register
    type: api
    endpoint: /api/sn_risk/risk
  - name: ServiceNow CMDB CI Export
    type: api
    endpoint: /api/now/cmdb/instance
  - name: ServiceNow Continuous Authorization Dashboard
    type: dashboard
    module: Integrated Risk Management
