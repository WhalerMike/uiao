# yaml-language-server: $schema=../../../schemas/mssql-rationalization/abbreviation-dictionary.schema.json
#
# MS SQL Rationalization — Abbreviation Dictionary (seed)
# =======================================================
# Canonical source: spec §9.7 of
#   inbox/Modernization/sql-modernization-research/2026-05-17-orgpath-mssql-estate-rationalization-process.md
# Consumed by:      Phase 2 name-similarity heuristic (§3 semantic layer)
#
# Maps common federal-IT abbreviations (as they appear in column / table
# names) to canonical expansions. Phase 2 normalizes both sides of a
# similarity comparison through this dictionary before computing the
# string-similarity score.
#
# Convention: lowercase the column name, then substitute each token that
# matches an `abbreviation` (or one of its `aliases`) with the canonical
# `expansion` before similarity scoring.
#
# Agencies extend via PR + governance review.

schema-version: "1.0.0"
document_id: mssql-rationalization-abbreviation-dictionary
updated: "2026-05-18"

