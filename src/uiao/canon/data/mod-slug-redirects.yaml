# MOD_xxx → UIAO_NNN slug redirects
# =================================
# Per ADR-060 §7 (Deprecation window). The substrate walker reads this
# table and, when it encounters a MOD_* slug in any file inside
# `drift_scan.roots`, emits a P2 (advisory) DRIFT-PROVENANCE finding
# naming the redirect target. References fixed during the window are
# fixed permanently; this file is removed when the table no longer
# matches anything in the active tree.
#
# Window opens: 2026-05-10 (ADR-060 implementation merge)
# Window closes: 2026-06-09 (30 days)
#
# Schema:
#   - prior_id:   the retired MOD_* slug
#     new_id:     the canonical UIAO_NNN slot
#     new_path:   workspace-relative path to the renamed file
#     prior_path: workspace-relative path the file was moved from

