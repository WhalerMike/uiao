    ztmm_level: Advanced
    constraining_controls: [SI-4, AU-2, AU-3]
    impact:
      zero_trust: Inability to enforce or monitor cloud-only collaboration policies
      anomaly_detection: High - regression to legacy methods to bypass DLP
      insider_risk: High - users hoarding data via local copies
      forensics: Moderate - harder to establish intent

