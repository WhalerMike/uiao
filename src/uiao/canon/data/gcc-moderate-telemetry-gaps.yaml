# GCC-Moderate Telemetry Gap Matrix
#
# Machine-readable extraction of the gap matrix from the M365 GCC-Moderate
# Telemetry & Boundary Assessment (External v1.0, 2026-04-25). Each row
# names one telemetry signal that is unavailable, restricted, or inferred
# blocked under the FedRAMP Moderate authorization boundary, together with
# its ZTMM mapping and four impact dimensions (zero-trust, anomaly
# detection, insider risk, forensics).
#
# Provenance
#   source_doc: inbox/New_FedRAMP_Boundary/M365_GCC-Moderate_Telemetry_and_Boundary_Assessment_External_with_images.docx
#   source_section: "§6 Consolidated Telemetry-Gap Matrix"
#   extracted_on: 2026-04-27
#   extraction_method: manual transcription, normalized to the schema below
#
# Schema (per row)
#   id                Stable kebab-case slug.
#   signal            The specific field, metric, or capability missing.
#   source_dashboard  Microsoft surface that exposes it in commercial cloud.
#   documented        confirmed | inferred | restricted | retention-limited
#                       confirmed         - Microsoft documentation explicitly states unavailability.
#                       inferred          - No explicit doc; blocked by SI-4/AU-2/AU-3/SC-7 architecture.
#                       restricted        - Available with restrictions (e.g., Office Optional defaults to Required).
#                       retention-limited - Available but data lifetime caps create a forensic cliff.
#   ztmm_pillars      CISA ZTMM v2.0 pillars affected.
#   ztmm_level        Maturity tier most affected (Initial | Advanced | Optimal | range).
#   constraining_controls  NIST 800-53 controls that drive the constraint.
#   impact:           Free-text claims for each of the four dimensions.
#     zero_trust
#     anomaly_detection
#     insider_risk
#     forensics
#
# This file is consumed by:
#   - src/uiao/adapters/modernization/gcc_boundary_probe/  (validators emit per-row evidence)
#   - docs/customer-documents/compliance/boundary-authorization/  (rendered tables)
#   - docs/findings/fedramp-gcc-moderate-*.md                     (per-finding back-references)

gaps:
  - id: communication-patterns-chat-vs-email
    signal: Communication patterns (ChatCount vs EmailCount)
    source_dashboard: Adoption Score
    documented: confirmed
    ztmm_pillars: [identity, visibility-analytics]
    ztmm_level: Advanced
    constraining_controls: [SI-4, AU-2, AU-3]
    impact:
      zero_trust: No "expected communication behavior" baseline for identity verification
      anomaly_detection: No baseline for normal user-interaction volume
      insider_risk: Critical - loss of digital-disengagement / flight-risk signal
      forensics: Low - usage volume rarely the smoking gun

