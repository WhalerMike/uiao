# UIAO Crosswalk Index and Directory Structure
# Source: 04_Indexes/UIAO_Crosswalk_Index_v1.md + UIAO_Root_Directory_v4.md

crosswalk:
  version: "1.0"
  date: "2026-03"
  purpose: >-
    Single authoritative cross-reference matrix linking all UIAO components
  capabilities:
    - Traceability
    - Dependency mapping
    - Impact analysis
    - Canonical navigation
    - Future expansion

plane_crosswalk:
  - id: identity
    name: Identity
    control_plane_spec: IdentityControlPlane.md
    architecture_diagram: Identity Control Plane Architecture.png
    project_plans:
      - A1_Identity_ProjectPlan.md
    canon_volumes: ["A-M", "AA-AM"]
    modernization_appendix: Appendix A
    diagrams:
      - Identity Control Plane Architecture.png
      - Monitoring Domains Map.png
      - UIAO Five-Plane Architecture.png
  - id: network
    name: Network
    control_plane_spec: NetworkControlPlane.md
    architecture_diagram: Network Control Plane.png
    project_plans:
      - B1_Network_ProjectPlan.md
      - B1_SD-WAN_ProjectPlan.md
    canon_volumes: ["A-M", "AN-AZ"]
    modernization_appendix: Appendix B
    diagrams:
      - Network Control Plane.png
      - Server Operations Stack.png
      - UIAO Five-Plane Architecture.png
  - id: addressing
    name: Addressing / IPAM
    control_plane_spec: AddressingControlPlane.md
    architecture_diagram: "(covered within Network and Identity diagrams)"
    project_plans:
      - C1_Addressing_ProjectPlan.md
      - C1_IPAM_ProjectPlan.md
    canon_volumes: ["CA-CM", "CN-CZ"]
    modernization_appendix: Appendix C
    diagrams:
      - Network Control Plane.png
      - Identity Control Plane Architecture.png
      - UIAO Five-Plane Architecture.png
  - id: telemetry
    name: Telemetry
    control_plane_spec: TelemetryControlPlane.md
    architecture_diagram: Telemetry Signal Flow.png
    project_plans:
      - D1_Telemetry_ProjectPlan.md
    canon_volumes: ["DA-DM", "DN-DZ"]
    modernization_appendix: Appendix D
    diagrams:
      - Telemetry Signal Flow.png
      - Monitoring Domains Map.png
      - UIAO Five-Plane Architecture.png
  - id: endpoint
    name: Endpoint
    control_plane_spec: EndpointControlPlane.md
    architecture_diagram: "(covered within Five-Plane Architecture)"
    project_plans: []
    canon_volumes: ["EA-EM", "EN-EZ"]
    modernization_appendix: "(future)"
    diagrams:
      - UIAO Five-Plane Architecture.png
  - id: security
    name: Security
    control_plane_spec: SecurityControlPlane.md
    architecture_diagram: "(implicit across all diagrams)"
    project_plans: []
    canon_volumes: ["N-Z"]
    modernization_appendix: "(future)"
    diagrams:
      - Network Control Plane.png
      - Identity Control Plane Architecture.png
      - Telemetry Signal Flow.png
      - UIAO Five-Plane Architecture.png
  - id: unified-architecture
    name: Unified Architecture
    control_plane_spec: 03_Unified_Architecture.md
    architecture_diagram: UIAO Five-Plane Architecture.png
    project_plans: []
    canon_volumes: ["All"]
    modernization_appendix: Appendix E (TIC3)
    diagrams:
      - UIAO Five-Plane Architecture.png

cross_plane_dependencies:
  - planes: [identity, network]
    description: >-
      Identity depends on network reachability;
      Network depends on identity for segmentation and policy
  - planes: [network, addressing]
    description: >-
      Addressing is a sub-domain of network;
      IPAM drives routing, segmentation, and telemetry
  - planes: [telemetry, identity, network, addressing, endpoint, security]
    description: >-
      Telemetry consumes signals from all planes;
      Telemetry informs modernization sequencing
  - planes: [security, identity, network, addressing, telemetry, endpoint]
    description: >-
      Security overlays every plane;
      Security is a cross-cutting concern
  - planes: [endpoint, identity, network]
    description: >-
      Endpoints authenticate via identity;
      Endpoints connect via network

canon_expansion_rules:
  - Every new plane must include a control plane spec, diagram, project plan, canon volume coverage, and appendix mapping
  - Every new diagram must be added to 02_ArchitectureDiagrams (PNG) and 03_Diagrams (DRAWIO)
  - Every new appendix must map to a plane, modernization track, and canon volume

directory_structure:
  version: "4.0"
  principles:
    - Deterministic
    - Plane-aligned
    - Canon-aligned
    - Future-proof
    - Fully modular and infinitely expandable
  directories:
    - id: 00_Core
      purpose: Authoritative architectural specifications and control plane definitions
    - id: 01_Canon
      purpose: Publication-ready doctrine and executive-level artifacts
    - id: 01_ProjectPlans
      purpose: Modernization workstreams and plane-specific project plans
    - id: 02_Appendices
      purpose: Canonical appendices (00_Canon_Volumes) and individual expansions
    - id: 03_Appendices
      purpose: Modernization-specific appendices (A-E)
    - id: 02_ArchitectureDiagrams
      purpose: Rendered architecture diagrams (PNG) and markdown placeholders
    - id: 03_Diagrams
      purpose: Editable drawio source files
    - id: 04_Indexes
      purpose: Directory indexes, crosswalks, and repository metadata
    - id: 04_Templates
      purpose: Reusable templates for future volumes and documents
    - id: 05_Assets
      purpose: Images, diagrams, and placeholders for publication
    - id: 05_Reference
      purpose: External reference documents
    - id: 06_Drafts
      purpose: Sandbox for early drafts and experimental content
    - id: OldDocs
      purpose: Full provenance archive of pre-canonical files
    - id: Fix
      purpose: Reserved for repair operations and temporary staging
  placement_rules:
    - No files in root; all files must live in a subdirectory
    - Plane specs always live in 00_Core
    - Canon volumes always live in 01_Canon
    - PNG diagrams go to 02_ArchitectureDiagrams; drawio to 03_Diagrams
    - Canon volumes go to 02_Appendices/00_Canon_Volumes; modernization appendices to 03_Appendices
    - All legacy files remain in OldDocs until explicitly retired

