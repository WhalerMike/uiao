title: "ADR-029: Active Directory Survey Modernization Adapter"
status: proposed
date: 2026-04-19
deciders:
  - governance-steward
  - identity-engineer
  - security-steward

context: |
  The UIAO substrate currently has no adapter for reading on-premises
  Active Directory. The consolidated monorepo includes the gos directory-
  migration subsystem (merged per ADR-028) but the actual AD survey
  capability was specified in documents rather than implemented as a
  canonical modernization adapter.

  The forest archaeology problem (2003-era distributed forests, geographic
  OU topology, stale Sites and Services, undocumented service accounts)
  requires a formal adapter that:
    1. Runs read-only surveys against AD forests
    2. Classifies OU intent (functional vs geographic vs orphan)
    3. Derives or assigns OrgPath values per Appendix A codebook
    4. Writes OrgPath back to extensionAttributes in AD for Entra Connect pickup
    5. Emits DriftFinding objects compatible with the substrate walker

decision: |
  Introduce active-directory-survey-v1 as a modernization/identity adapter
  registered in modernization-registry.yaml.

  The adapter is split into:
    - survey.py   : read-only forest enumeration + OU intent classification
    - orgpath.py  : OrgPath assignment engine + AD write-back (Phase F.2/F.3)
    - __init__.py : adapter registration surface

  PowerShell fallback (Invoke-ADSurvey.ps1) provides survey capability on
  domain-joined Windows hosts where ldap3 is unavailable.

  The adapter uses the existing DriftFinding dataclass from walker.py so
  its findings merge cleanly into substrate reports without special casing.

consequences:
  positive:
    - Forest archaeology findings are first-class substrate drift findings
    - OrgPath assignment is deterministic and auditable per Principle 1
    - Entra Connect enrichment happens through standard attribute sync
    - No changes to Entra Connect rules required
    - Works alongside existing sync (no rip-and-replace)
  negative:
    - ldap3 is a new dependency in impl/
    - Write-back requires AD write permissions (principle of least privilege
      requires a dedicated service account)
    - Multi-forest identity collision resolution is not automated;
      requires HR export as authoritative source

supersedes: []
related_adrs: [ADR-028]
