# Configuration-latitude DRIFT-SCHEMA findings (UIAO_140 §5).
# Returns all configuration-latitude drift findings tagged with the
# configuration-latitude class so operators can triage tenant configs
# that fall outside the controlling SSP's enumerated latitude table.
#
# References:
#   - UIAO_140 §5
#   - ADR-054 (Single-ATO Reciprocity Model)
#   - ADR-058 (HRIT Productization Mission)
name: configuration-latitude-violations
description: >
  Returns all DRIFT-SCHEMA findings tagged with configuration-latitude
  class (UIAO_140 §5). A finding appears here when a consuming agency's
  observed configuration key is absent from the controlling SSP's latitude
  table (NOT_ENUMERATED) or its value lies outside the declared allowed set
  or pattern (OUT_OF_LATITUDE).
references:
  - UIAO_140 §5
  - ADR-054
  - ADR-058
source: findings
where:
  drift_class: DRIFT-SCHEMA
  tag: configuration-latitude
order_by: severity
order: asc
limit: 0
