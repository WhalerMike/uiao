ksi_id: KSI-SC-20
title: Secure Name/Address Resolution Service (Authoritative Source)
category: boundary-protection
description: GCC systems must implement secure DNS services with DNSSEC to prevent DNS spoofing, poisoning, and unauthorized name resolution.
security_objective: Protect GCC systems from DNS-based attacks by using authoritative, DNSSEC-signed name resolution services.
related_controls:
  - SC-20
validation_type: automated
evidence_sources:
  - azure_dns
  - azure_policy
pass_criteria:
  description: "All GCC DNS zones use Azure DNS with DNSSEC enabled. DNS query logs are retained for 90 days. Anomalous DNS activity triggers alerts within 15 minutes."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 1 hour
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - dns-security
  - dnssec
  - name-resolution
