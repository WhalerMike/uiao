ksi_id: KSI-SC-13
title: Cryptographic Protection
category: boundary-protection
description: GCC systems must implement FIPS-approved cryptographic algorithms and mechanisms to protect the confidentiality and integrity of sensitive information.
security_objective: Ensure all sensitive GCC data is protected using validated, approved cryptographic standards that cannot be broken by current attack methods.
related_controls:
  - SC-13
validation_type: automated
evidence_sources:
  - azure_policy
  - azure_key_vault
pass_criteria:
  description: "All encryption uses FIPS 140-2/3 approved algorithms (AES-256, RSA-2048+, SHA-256+). Non-compliant algorithms are blocked by policy and detected within 24 hours."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - cryptographic-protection
  - fips-approved
  - encryption-standards
