ksi_id: KSI-SC-04
title: Information in Shared System Resources
category: boundary-protection
description: Shared system resources must prevent residual information from being accessible to unauthorized users after resource release or reallocation.
security_objective: Prevent sensitive GCC data from being exposed through shared memory, storage, or processing resources.
related_controls:
  - SC-4
validation_type: automated
evidence_sources:
  - azure_policy
  - microsoft_defender
pass_criteria:
  description: "Shared resources are scrubbed upon release. No residual data is accessible after resource deallocation. Verified through configuration compliance scans quarterly."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - shared-resources
  - data-residual
  - memory-protection
