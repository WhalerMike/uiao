ksi_id: KSI-SC-07
title: Boundary Protection
category: boundary-protection
description: GCC systems must monitor and control communications at all external and key internal boundaries using managed interfaces with deny-by-default posture.
security_objective: Prevent unauthorized network access and lateral movement by enforcing Zero Trust boundary controls at all GCC network perimeters.
related_controls:
  - SC-7
  - SC-7(3)
  - SC-7(4)
  - SC-7(5)
  - SC-7(7)
  - SC-7(8)
  - SC-7(18)
validation_type: automated
evidence_sources:
  - azure_firewall
  - azure_nsg
  - sentinel
pass_criteria:
  description: "All external boundaries use deny-by-default firewall rules. Inbound and outbound traffic is inspected. Unauthorized connections are blocked and alerted within 5 minutes."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 1 hour
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
