ksi_id: KSI-CM-07
title: Least Functionality and Attack Surface Reduction
category: configuration-management
description: Systems must be configured with only necessary functionality. Unneeded services, ports, protocols, and applications must be disabled or removed.
security_objective: Minimize the attack surface by eliminating unnecessary components and capabilities.
related_controls:
  - CM-7
  - CM-7(1)
  - CM-7(2)
validation_type: automated
evidence_sources:
  - azure_policy
  - intune
pass_criteria:
  description: "Only approved services and ports are running on production systems. Unnecessary functionality is disabled or removed."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 48 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - least-functionality
  - attack-surface-reduction
