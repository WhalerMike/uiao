ksi_id: KSI-CM-08
title: Component Inventory and Asset Management
category: configuration-management
description: A complete, accurate, and automatically updated inventory of all system components must be maintained.
security_objective: Know exactly what exists in the environment to enable effective security management and compliance.
related_controls:
  - CM-8
  - CM-8(1)
  - CM-8(3)
validation_type: automated
evidence_sources:
  - azure_resource_graph
  - graph_api
pass_criteria:
  description: "Complete asset inventory exists with <1% stale records and is updated automatically on any change."
  type: threshold
  threshold: 1
  operator: less_than
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - asset-inventory
  - component-management
