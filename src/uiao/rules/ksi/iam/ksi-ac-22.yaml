ksi_id: KSI-AC-22
title: Publicly Accessible Content
category: iam
description: GCC systems must ensure that publicly accessible content does not include non-public information, and that publishing controls prevent unauthorized disclosure.
security_objective: Prevent accidental or unauthorized publication of sensitive GCC data to public-facing systems.
related_controls:
  - AC-22
validation_type: automated
evidence_sources:
