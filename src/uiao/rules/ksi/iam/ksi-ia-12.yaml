ksi_id: KSI-IA-12
title: Identity Proofing
category: iam
description: Users must undergo identity proofing at a level commensurate with the sensitivity of the systems and data they will access before accounts are provisioned.
security_objective: Ensure the identity of users is verified before granting access to GCC systems, preventing impersonation and fraudulent account creation.
related_controls:
  - IA-12
  - IA-12(2)
  - IA-12(3)
validation_type: automated
evidence_sources:
  - hr_system
  - entra_id
pass_criteria:
  description: "All users undergo IAL2+ identity proofing before account provisioning. Identity proofing records are maintained and auditable for 7 years."
  type: boolean
  threshold: 1
  measurement_frequency: per-onboarding
  remediation_sla: before-access-grant
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - identity-proofing
  - ial2
  - account-provisioning
