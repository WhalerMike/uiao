ksi_id: KSI-AC-03
title: Access Enforcement
category: iam
description: Systems must enforce approved authorizations for logical access to information and system resources using role-based and attribute-based access controls.
security_objective: Prevent unauthorized access to GCC data and systems through technically enforced access controls aligned with Zero Trust least-privilege.
