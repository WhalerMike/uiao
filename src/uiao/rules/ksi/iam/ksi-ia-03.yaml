ksi_id: KSI-IA-03
title: Device Identification and Authentication
category: iam
description: All devices connecting to GCC systems must be uniquely identified and authenticated before access is granted.
security_objective: Prevent unauthorized or unmanaged devices from connecting to GCC resources by enforcing device-based identity verification.
related_controls:
  - IA-3
validation_type: automated
evidence_sources:
  - entra_id
  - intune
pass_criteria:
  description: "100% of devices accessing GCC are Entra-joined or hybrid-joined with compliant device certificates. Unknown devices are blocked by Conditional Access."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: daily
  remediation_sla: 4 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - device-authentication
  - device-identity
  - zero-trust
