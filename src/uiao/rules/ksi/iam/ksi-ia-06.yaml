ksi_id: KSI-IA-06
title: Authentication Feedback
category: iam
description: Systems must obscure authenticator feedback (e.g., passwords) during the authentication process to prevent shoulder surfing and information leakage.
security_objective: Prevent credential exposure through UI-level feedback controls across all GCC login interfaces.
related_controls:
  - IA-6
validation_type: automated
evidence_sources:
  - entra_id
  - azure_policy
pass_criteria:
  description: "All authentication interfaces obscure credentials during entry. No system displays entered authenticators in clear text. Verified through configuration compliance scans."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - authentication-feedback
  - password-masking
  - ui-security
