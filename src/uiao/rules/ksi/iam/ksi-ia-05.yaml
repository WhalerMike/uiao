ksi_id: KSI-IA-05
title: Authenticator Management
category: iam
description: Authenticators (passwords, tokens, certificates, keys) must be issued, managed, rotated, and revoked through a formal, automated lifecycle process.
security_objective: Ensure authenticators are strong, current, and cannot be reused or shared, reducing credential compromise risk across GCC.
related_controls:
  - IA-5
  - IA-5(1)
  - IA-5(2)
  - IA-5(6)
validation_type: automated
evidence_sources:
  - entra_id
  - graph_api
pass_criteria:
  description: "Passwords meet complexity requirements and rotate per policy. Service account credentials rotate every 90 days. Compromised credentials are revoked within 1 hour."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 1 hour for compromised credentials
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - authenticator-management
  - password-policy
  - credential-lifecycle
