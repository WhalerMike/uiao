ksi_id: KSI-AC-08
title: System Use Notification
category: iam
description: Systems must display an approved use notification banner before granting access, informing users of monitoring, acceptable use, and consent to terms.
security_objective: Establish legal notice of monitoring and acceptable use to support insider threat programs and legal enforcement.
