ksi_id: KSI-AC-14
title: Permitted Actions Without Identification or Authentication
category: iam
description: Systems must identify and document any actions permitted without identification or authentication, and restrict these to an approved minimum.
security_objective: Ensure no GCC system functionality is accessible without authentication except for explicitly approved and documented exceptions.
related_controls:
  - AC-14
validation_type: automated
evidence_sources:
  - entra_id
  - azure_policy
pass_criteria:
  description: "All unauthenticated actions are documented, approved, and limited to public-facing content only. No sensitive data is accessible without authentication."
  type: boolean
  threshold: 1
  measurement_frequency: annual
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - unauthenticated-access
  - authentication-exceptions
  - zero-trust
