ksi_id: KSI-AC-12
title: Session Termination
category: iam
description: Systems must automatically terminate sessions after a defined period of inactivity or upon user logout.
security_objective: Prevent session hijacking and unauthorized access from abandoned sessions across GCC systems.
related_controls:
  - AC-12
validation_type: automated
evidence_sources:
  - entra_id
  - sentinel
pass_criteria:
  description: "Sessions are automatically terminated after 30 minutes of inactivity. All session termination events are logged."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
