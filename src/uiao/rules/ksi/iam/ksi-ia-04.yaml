ksi_id: KSI-IA-04
title: Identifier Management
category: iam
description: User, device, and service identifiers must be uniquely assigned, managed through a formal process, and disabled when no longer active.
security_objective: Prevent identifier reuse and ensure every identity in GCC is traceable to a specific individual, device, or service.
related_controls:
  - IA-4
validation_type: automated
evidence_sources:
  - entra_id
  - graph_api
pass_criteria:
  description: "All identifiers are unique and managed in Entra ID. Reuse of identifiers is prevented. Disabled identities are retained for 90 days for audit purposes."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - identifier-management
  - identity-lifecycle
  - account-management
