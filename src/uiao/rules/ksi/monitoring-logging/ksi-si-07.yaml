ksi_id: KSI-SI-07
title: Software, Firmware, and Information Integrity Monitoring
category: monitoring-logging
description: Integrity of critical software, firmware, and data must be continuously monitored using cryptographic mechanisms to detect unauthorized modifications.
security_objective: Rapidly detect tampering or malicious changes to system components and data.
related_controls:
  - SI-7
  - SI-7(1)
  - SI-7(2)
validation_type: automated
evidence_sources:
  - microsoft_defender
  - sentinel
  - azure_policy
pass_criteria:
  description: "File integrity monitoring is active on all critical systems with alerts generated for any unauthorized change within 5 minutes."
  type: boolean
  threshold: 1
  measurement_frequency: real-time
  remediation_sla: 4 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - integrity-monitoring
  - file-integrity
  - tampering-detection
