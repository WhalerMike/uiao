ksi_id: KSI-CARK-001
title: Privileged Accounts Rotate Within Declared Rotation Window
category: iam
description: >
  Every privileged account managed by CyberArk must rotate within its declared
  rotation window. Accounts outside the window are treated as authenticator
  management drift.
security_objective: >
  Enforce deterministic credential hygiene for privileged identities and
  prevent stale authenticators.
related_controls:
  - IA-5
validation_type: automated
evidence_sources:
  - custom
pass_criteria:
  description: Zero accounts with last_rotation_age_days greater than rotation_window_days.
  type: threshold
  threshold: 0
  operator: equals
  logic: >
    SELECT account_id
    FROM cyberark_accounts
    WHERE last_rotation_age_days > rotation_window_days
    HAVING COUNT(*) = 0
severity: high
nist_mappings:
  primary: IA-5
version: "1.0"
last_updated: "2026-05-18"
enabled: true
