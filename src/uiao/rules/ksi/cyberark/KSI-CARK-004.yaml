ksi_id: KSI-CARK-004
title: Privileged Accounts Have Documented Owners
category: iam
description: >
  Every privileged account in CyberArk must have an accountable owner to avoid
  orphan credentials.
security_objective: >
  Preserve accountable ownership and governance traceability for privileged
  access paths.
related_controls:
  - AC-2
  - AC-6
validation_type: automated
evidence_sources:
  - custom
pass_criteria:
  description: Zero accounts with null/empty owner values.
  type: threshold
  threshold: 0
  operator: equals
  logic: >
    SELECT account_id
    FROM cyberark_accounts
    WHERE owner IS NULL OR owner = ''
    HAVING COUNT(*) = 0
severity: high
nist_mappings:
  primary: AC-2
  secondary:
    - AC-6
version: "1.0"
last_updated: "2026-05-18"
enabled: true
