ksi_id: KSI-CARK-003
title: Service Accounts Rotate Faster Than Human Privileged Accounts
category: iam
description: >
  Service-account credentials must rotate on a shorter schedule than human
  privileged accounts.
security_objective: >
  Reduce exposure from unattended credentials with elevated privileges.
related_controls:
  - IA-5(1)
validation_type: automated
evidence_sources:
  - custom
pass_criteria:
  description: Maximum service-account rotation window must be less than minimum human-account window.
  type: threshold
  threshold: 0
  operator: equals
  logic: >
    SELECT 1
    FROM cyberark_accounts
    HAVING MAX(CASE WHEN account_type = 'service' THEN rotation_window_days END)
       >= MIN(CASE WHEN account_type = 'human' THEN rotation_window_days END)
severity: medium
nist_mappings:
  primary: IA-5(1)
version: "1.0"
last_updated: "2026-05-18"
enabled: true
