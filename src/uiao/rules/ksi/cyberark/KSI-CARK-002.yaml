ksi_id: KSI-CARK-002
title: Rotation Failures Have 24-Hour SLA Governance Coverage
category: monitoring-logging
description: >
  Rotation failures must not persist beyond 24 hours without a linked
  governance or incident ticket.
security_objective: >
  Prevent unresolved privileged-credential failures from becoming latent access
  risk.
related_controls:
  - IA-5
  - AC-2
validation_type: automated
evidence_sources:
  - custom
pass_criteria:
  description: Zero unresolved failures older than 24 hours without governance_ticket_id.
  type: threshold
  threshold: 0
  operator: equals
  logic: >
    SELECT account_id
    FROM cyberark_rotation_failures
    WHERE hours_since_failure > 24
      AND (governance_ticket_id IS NULL OR governance_ticket_id = '')
    HAVING COUNT(*) = 0
severity: high
nist_mappings:
  primary: IA-5
  secondary:
    - AC-2
version: "1.0"
last_updated: "2026-05-18"
enabled: true
