ksi_id: KSI-CARK-005
title: Every Rotation Is Followed by Successful Verification
category: monitoring-logging
description: >
  CyberArk rotations must include a post-rotation verification step that passes
  before the event is considered complete.
security_objective: >
  Close the rotation-to-verify loop and prevent silent credential drift after
  password changes.
related_controls:
  - IA-5
  - IA-5(1)
validation_type: automated
evidence_sources:
  - custom
pass_criteria:
  description: Zero rotation events where verification_passed is false.
  type: threshold
  threshold: 0
  operator: equals
  logic: >
    SELECT account_id
    FROM cyberark_rotation_events
    WHERE verification_passed = false
    HAVING COUNT(*) = 0
severity: critical
nist_mappings:
  primary: IA-5
  secondary:
    - IA-5(1)
version: "1.0"
last_updated: "2026-05-18"
enabled: true
