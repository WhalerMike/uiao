ksi_id: KSI-IR-06
title: Incident Reporting and Escalation
category: incident-response
description: All security incidents must be reported to appropriate stakeholders within defined timeframes with clear escalation paths.
security_objective: Ensure timely notification and escalation so leadership can make informed decisions quickly.
related_controls:
  - IR-6
  - IR-6(1)
  - IR-6(3)
validation_type: automated
evidence_sources:
  - sentinel
  - servicenow
pass_criteria:
  description: "Critical incidents are reported to leadership within 1 hour; all incidents are documented and escalated per policy."
  type: boolean
  threshold: 1
  measurement_frequency: per-incident
  remediation_sla: 1 hour for critical
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - incident-reporting
  - escalation
