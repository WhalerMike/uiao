  description: "100% of users complete role-based security awareness training annually. Privileged users complete additional specialized modules with phishing simulation pass rate >95%."
  type: percentage
  threshold: 95
  operator: greater_than
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
