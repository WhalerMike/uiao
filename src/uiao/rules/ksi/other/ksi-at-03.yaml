ksi_id: KSI-AT-03
title: Role-Based Security Awareness Training
category: other
description: Security awareness training must be tailored by role, with specialized modules for privileged users, administrators, and developers.
security_objective: Reduce human-enabled risk through targeted, role-specific training that drives measurable behavioral change.
related_controls:
  - AT-2
  - AT-2(2)
  - AT-3
validation_type: automated
evidence_sources:
