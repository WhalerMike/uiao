ksi_id: KSI-CA-02
title: Continuous Security Assessment and Monitoring
category: other
description: Security assessments and continuous monitoring must be performed to validate control effectiveness and detect posture changes in real time.
security_objective: Maintain ongoing, data-driven visibility into the security posture of all systems and services.
related_controls:
  - CA-2
  - CA-7
  - CA-7(1)
validation_type: automated
evidence_sources:
  - azure_policy
  - sentinel
  - scuba
pass_criteria:
  description: "Continuous monitoring covers 100% of in-scope systems with daily assessment of critical controls. Posture deviations trigger automated alerts within 15 minutes."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours for critical deviations
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - continuous-monitoring
  - security-assessment
