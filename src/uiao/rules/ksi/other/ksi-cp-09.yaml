ksi_id: KSI-CP-09
title: System Backup and Recovery Capabilities
category: other
description: Critical data and system configurations must be backed up regularly with tested, verifiable recovery procedures.
security_objective: Ensure rapid and complete recovery of critical data and systems following any disruption or loss.
related_controls:
  - CP-9
  - CP-9(1)
validation_type: automated
evidence_sources:
  - azure_backup
  - azure_site_recovery
pass_criteria:
  description: "Daily backups of critical data are performed with successful quarterly restore tests achieving Recovery Point Objective (RPO) and Recovery Time Objective (RTO) targets."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - backup
  - recovery
  - rpo-rto
