KSI_ID: KSI-003
Title: Global Administrator Count
Description: Ensures the number of global administrators is within acceptable limits.
Source:
  SCuBA_Field: AdminCount
    Data_Type: Integer
    Evaluation:
      Logic: IF AdminCount <= 5 THEN PASS ELSE WARN
      Severity:
        PASS: Low
          WARN: Medium
          Mappings:
            NIST_800-53: AC-2(1), AC-6
              FedRAMP: AC-2(1)
                CISA_SCUBA: M365-PRIV-003
                Provenance:
                  Ruleset_Version: 1.0
                    Adapter_Version: 1.0
