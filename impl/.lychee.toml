# Lychee link checker config — uiao-impl
# Docs: https://lychee.cli.rs/usage/config/

# ── Runtime ────────────────────────────────────────────────────────────
max_concurrency = 16
max_retries = 3
retry_wait_time = 5
timeout = 20
cache = true
max_cache_age = "14d"

# ── Verbosity ──────────────────────────────────────────────────────────
verbose = "info"
no_progress = true

# ── Acceptance ─────────────────────────────────────────────────────────
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 304, 307, 308, 403, 429]

# ── Exclusions ─────────────────────────────────────────────────────────
exclude_path = [
  "node_modules",
  ".venv",
  "venv",
  ".pytest_cache",
  "__pycache__",
  "build",
  "dist",
  ".eggs",
  ".tox",
  ".mypy_cache",
  ".ruff_cache",
  "htmlcov",
  "CHANGELOG.md",         # auto-generated when we wire changelog.yml
]

exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^https?://(www\\.)?example\\.(com|org|net)",
  "^https?://.*\\.local(/|$)",
  "^mailto:",
  "^tel:",
  # PlantUML render URLs (encoded diagram payloads, not real docs)
  "^https?://www\\.plantuml\\.com/plantuml/",
  # non-HTTP schemes that lychee tries to resolve
  "^postgresql://",
  "^computer://",
  # JSON Schema $id templates embedded in docs as inline code
  "^https?://github\\.com/[^/]+/uiao-core/schemas/",
]

# ── GitHub token ───────────────────────────────────────────────────────
# Use GITHUB_TOKEN env var to avoid anonymous rate limits on github.com.
