name: Adapter Conformance Check

on:
  pull_request:
    paths:
      - 'src/uiao_impl/adapters/**'
      - 'tests/test_*adapter*.py'
  push:
    branches: [main]
    paths:
      - 'src/uiao_impl/adapters/**'

permissions:
  contents: read

jobs:
  conformance:
    name: Adapter Conformance (330/330)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install -e ".[dev]"

      - name: Run conformance check
        run: |
          python -m uiao_impl.adapters.conformance_check --json > conformance-report.json
          python -m uiao_impl.adapters.conformance_check

      - name: Verify zero failures
        run: |
          FAIL=$(python -c "import json; r=json.load(open('conformance-report.json')); print(r['summary']['fail'])")
          echo "Failures: $FAIL"
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Adapter conformance check failed: $FAIL criteria did not pass"
            exit 1
          fi
          echo "::notice::All criteria passed: $(python -c "import json; r=json.load(open('conformance-report.json')); print(r['summary']['pass'])")/$(python -c "import json; r=json.load(open('conformance-report.json')); print(r['summary']['total'])")"

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: conformance-report
          path: conformance-report.json
          retention-days: 30
