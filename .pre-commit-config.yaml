# Pre-commit hooks for UIAO monorepo.
# Install with: pre-commit install
# Run against all files: pre-commit run --all-files

repos:
  # Baseline hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
        # Block accidentally committing multi-MB binaries into git. PNGs
        # that exceed this after pngquant should go via LFS or be
        # downsized before commit.
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python linting + formatting (matches .github/workflows/ruff.yml)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^impl/.*\.py$
      - id: ruff-format
        files: ^impl/.*\.py$

  # Validate JSON Schemas compile (catches syntax errors in our schemas)
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.29.3
    hooks:
      - id: check-metaschema
        files: ^core/schemas/.*\.schema\.json$

  # Prevent commit of files that are explicitly gitignored but snuck in
  # (e.g. docs/site/, docs/exports/**/*.pptx) — happens when someone
  # force-adds. This hook warns; doesn't block.
  - repo: local
    hooks:
      - id: block-tracked-build-artifacts
        name: Block tracked build artifacts
        entry: bash -c 'git diff --cached --name-only | grep -E "docs/site/|docs/exports/.+\.(pptx|docx)$" && { echo "ERROR: staged a file that should be gitignored"; exit 1; } || exit 0'
        language: system
        pass_filenames: false
