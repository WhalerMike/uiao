# NOTE: This file is managed by deployment scripts.
# The modernization sidebar and navbar entries are canonical.

project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "docs/quickstart.md"
    - "docs/adapter-authoring-tutorial.md"
    - "!scratch/"
    - "!docs/architecture/"
    - "!docs/documents/"
    - "!docs/meta/"
    - "!docs/onboarding/"

website:
  title: "UIAO"
  favicon: _assets/uiao-favicon.png

  page-navigation: true
  back-to-top-navigation: true
  bread-crumbs: true

  page-footer:
    left: "UIAO is under active development (v0.4.0). Much of this site describes target architecture — the canon is authoritative, but many components are not yet implemented, integrated, or operationally tested at scale. Do not treat statements on this site as representations of current production capability without checking the Substrate Status page for per-component adoption state. Pages describing capabilities that are canonically declared but not yet fully adopted carry an additional Aspirational callout at the top."

  navbar:
    title: "UIAO"
    background: dark
    left:
      - href: index.qmd
        text: "Home"
      - text: "Getting started"
        menu:
          - href: docs/quickstart.md
            text: "10-minute quickstart"
          - href: docs/adapter-authoring-tutorial.md
            text: "Adapter authoring tutorial (30 min)"
      - href: findings/index.qmd
        text: "Findings"
      - href: academy/index.qmd
        text: "Academy"
      - href: modernization/index.qmd
        text: "Modernization"
      - href: customer-documents/index.qmd
        text: "Customer Documents"

  sidebar:
    - id: findings
      title: "Findings"
      style: "docked"
      background: light
      contents:
        - section: "Security Findings"
          contents:
            - findings/index.qmd
            - findings/finding-template.qmd

    - id: academy
      title: "Academy"
      style: "docked"
      background: light
      contents:
        - section: "UIAO Academy"
          contents:
            - academy/index.qmd

    - id: modernization
      title: "Modernization"
      style: "docked"
      background: light
      contents:
        - section: "Modernization Canon"
          contents:
            - modernization/index.qmd
            - section: "Identity (OrgTree)"
              contents:
                - modernization/orgtree.qmd
                - modernization/codebook.qmd
                - modernization/dynamic-groups.qmd
                - modernization/delegation.qmd
            - section: "Directory Migration"
              contents:
                - modernization/directory-migration.qmd
                - modernization/adapters.qmd

    - id: customer-documents
      title: "Customer Documents"
      style: "docked"
      background: light
      contents:
        - section: "UIAO Customer Documents"
