project:
  type: website
  title: "UIAO Documentation"
  output-dir: _site
  render:
    - index.qmd
    - 404.qmd
    - docs/**/*.qmd
    - narrative/**/*.qmd
    - programs/**/*.qmd
    - series/**/*.qmd
    - findings/**/*.qmd
    - academy/**/*.qmd
  resources:
    - "docs/images/**"
    - "data/**"

website:
  title: "UIAO Modernization Atlas"
  description: "Open-source overlay architecture for FedRAMP Moderate environments — OSCAL-native, Zero Trust aligned, no rip-and-replace."
  site-url: "https://whalermike.github.io/uiao"
  repo-url: https://github.com/WhalerMike/uiao
  repo-actions: [edit, issue]

  # Sitemap — Quarto auto-generates when site-url is set.
  # A hand-crafted sitemap.xml also lives at repo root as a fallback/override.

  # Open Graph defaults (per-page og: overrides these)
  open-graph:
    title: "UIAO — Unified Identity-Addressing-Overlay Architecture"
    description: "Drop-in overlay restoring cross-service telemetry and identity correlation in FedRAMP Moderate environments. OSCAL-native, Zero Trust aligned, no rip-and-replace."
    image: "docs/images/og-image.png"
    locale: "en_US"

  # Twitter / X card defaults
  twitter-card:
    title: "UIAO — Unified Identity-Addressing-Overlay Architecture"
    description: "FedRAMP Moderate overlay: OSCAL SSP/POA&M from live telemetry, identity-to-network enforcement, zero rip-and-replace."
    image: "docs/images/og-image.png"
    card-style: summary_large_image

  # Top navbar
  navbar:
    background: primary
    search: true
    left:
      - href: docs/index.qmd
        text: "Home"
      - href: programs/index.qmd
        text: "Programs"
      - href: academy/index.qmd
        text: "Academy"
      - href: series/index.qmd
        text: "Series"
      - href: narrative/UIAO-Narrative-Layer.md
        text: "Narrative"
      - href: docs/01_UnifiedArchitecture.qmd
        text: "Architecture"
      - href: findings/index.qmd
        text: "Findings"
      - href: docs/substrate-status.qmd
        text: "Status"

  # Left sidebar — hand-crafted tree. Matches the structure discussed
  # in the site-structure plan. Auto-nav is turned off; every entry
  # listed explicitly so canon ordering, program grouping, and series
  # arc are stable.
  sidebar:
    - id: programs
      title: "Programs"
      style: "docked"
      background: light
      contents:
        - section: "Programs"
          contents:
            - programs/index.qmd
            - section: "Training (UIAO_125)"
              contents:
                - narrative/program-training.qmd
                - programs/uiao_125.qmd
            - section: "Test Plans (UIAO_126)"
              contents:
                - narrative/program-test-plans.qmd
                - programs/uiao_126.qmd
            - section: "Project Plans (UIAO_127)"
              contents:
                - narrative/program-project-plans.qmd
                - programs/uiao_127.qmd
            - section: "Education (UIAO_128)"
              contents:
                - narrative/program-education.qmd
                - programs/uiao_128.qmd

    - id: academy
      title: "Academy"
      style: "docked"
      background: light
      contents:
        - section: "Academy (learner entry point)"
          contents:
            - academy/index.qmd
            - academy/comics.qmd
            - academy/contributor-track.qmd
            - academy/contributor-tier-1-setup.qmd
            - academy/document-generation-guide.qmd
            - academy/image-pipeline-guide.qmd
            - academy/operator-track.qmd
            - section: "Adapter integration guides"
              contents:
                - academy/adapters/entra-id.qmd

    - id: series
      title: "Series"
      style: "docked"
      background: light
      contents:
        - section: "Series (10-part arc)"
          contents:
            - series/index.qmd
            - section: "Series 1 — Federal Modernization Architecture"
              contents:
                - series/series-01-federal-modernization/index.qmd
            - section: "Series 5 — Unified Identity-Addressing-Overlay Architecture"
              contents:
                - series/series-05-unified-architecture/index.qmd
            - section: "Book — FedRAMP Boundaries / Application-Aware Networking"
              contents:
                - series/application-aware-networking-book/index.qmd
                - series/application-aware-networking-book/what-we-dont-know-were-missing.qmd
                - section: "Part I — The Problems"
                  contents:
                    - series/application-aware-networking-book/article-01-blindfold-problem.qmd
                    - series/application-aware-networking-book/article-02-boundary-problem.qmd
                    - series/application-aware-networking-book/article-03-distance-problem.qmd
                    - series/application-aware-networking-book/article-04-identity-problem.qmd
                    - series/application-aware-networking-book/article-05-arbitrariness-problem.qmd
                    - series/application-aware-networking-book/article-06-telemetry-problem.qmd
                    - series/application-aware-networking-book/article-07-optimization-problem.qmd
                    - series/application-aware-networking-book/article-08-media-problem.qmd
                    - series/application-aware-networking-book/article-09-trust-problem.qmd
                    - series/application-aware-networking-book/article-10-policy-problem.qmd
                - section: "Part II — The Layers"
                  contents:
                    - series/application-aware-networking-book/article-11-visibility-layer.qmd
                    - series/application-aware-networking-book/article-12-continuity-layer.qmd
                    - series/application-aware-networking-book/article-13-control-layer.qmd
                    - series/application-aware-networking-book/article-14-signal-layer.qmd
                    - series/application-aware-networking-book/article-15-evaluation-layer.qmd
                    - series/application-aware-networking-book/article-16-decision-layer.qmd
                    - series/application-aware-networking-book/article-17-automation-layer.qmd
                    - series/application-aware-networking-book/article-18-remediation-layer.qmd
                    - series/application-aware-networking-book/article-19-recovery-layer.qmd
                    - series/application-aware-networking-book/article-20-stability-layer.qmd
                    - series/application-aware-networking-book/article-21-resilience-layer.qmd

    - id: narrative
      title: "Narrative"
      style: "docked"
      background: light
      contents:
        - section: "Narrative"
          contents:
            - narrative/UIAO-Narrative-Layer.md
            - narrative/governance-os-directory-migration.md
            - narrative/why-modernization-is-hard.qmd
            - narrative/v1-adapter-ecosystem-complete.qmd

    - id: findings
      title: "Findings"
      style: "docked"
      background: light
      contents:
        - section: "Governance Findings"
          contents:
            - findings/index.qmd

    - id: architecture
      title: "Architecture"
      style: "docked"
      background: light
      contents:
        - section: "Architecture"
          contents:
            - docs/index.qmd
            - section: "Foundations"
              contents:
                - docs/00_ControlPlaneArchitecture.qmd
                - docs/00_CorePrinciples.qmd
                - docs/01_UnifiedArchitecture.qmd
                - docs/02_CanonSpecification.qmd
            - section: "Compliance & Governance"
              contents:
                - docs/03_FedRAMP20x_Crosswalk.qmd
                - docs/04_FedRAMP20x_Phase2_Summary.qmd
                - docs/05_ManagementStack.qmd
            - section: "Program & Leadership"
              contents:
                - docs/06_ProgramVision.qmd
                - docs/07_LeadershipBriefing.qmd
                - docs/08_ModernizationTimeline.qmd
            - section: "Index & Reference"
              contents:
                - docs/09_CrosswalkIndex.qmd
                - docs/10_DirectoryStructure.qmd
                - docs/11_GlossaryAndDefinitions.qmd
            - section: "Extended Reference"
              contents:
                - docs/12_AI_SecurityPrinciples.qmd
                - docs/13_FIMF_AdapterRegistry.qmd
                - docs/14_TIC3_F5RetirementRoadmap.qmd
            - section: "Data Governance Substrate"
              contents:
                - docs/15_ProvenanceProfile.qmd
                - docs/16_DriftDetectionStandard.qmd
                - docs/17_ConsentEnvelope.qmd
                - docs/18_ClaimCatalog.qmd
                - docs/19_ReconciliationModel.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    smooth-scroll: true

# Lua filters run during render. aspirational-banner.lua injects an
# "Aspirational — canonically declared, not yet fully adopted" callout
# at the top of any page whose YAML frontmatter carries
# `aspirational: true`. Central source, zero body-text edits.
filters:
  - filters/aspirational-banner.lua
