project:
  type: website
  title: "UIAO Documentation"
  output-dir: _site
  render:
    - index.qmd
    - 404.qmd
    - docs/**/*.qmd
    - narrative/**/*.qmd
    - programs/**/*.qmd
    - series/**/*.qmd
  resources:
    - "docs/images/**"
    - "data/**"

website:
  title: "UIAO Modernization Atlas"
  description: "Open-source overlay architecture for FedRAMP Moderate environments — OSCAL-native, Zero Trust aligned, no rip-and-replace."
  site-url: "https://whalermike.github.io/uiao"
  repo-url: https://github.com/WhalerMike/uiao
  repo-actions: [edit, issue]

  # Sitemap — Quarto auto-generates when site-url is set.
  # A hand-crafted sitemap.xml also lives at repo root as a fallback/override.

  # Open Graph defaults (per-page og: overrides these)
  open-graph:
    title: "UIAO — Unified Identity-Addressing-Overlay Architecture"
    description: "Drop-in overlay restoring cross-service telemetry and identity correlation in FedRAMP Moderate environments. OSCAL-native, Zero Trust aligned, no rip-and-replace."
    image: "docs/images/og-image.png"
    locale: "en_US"

  # Twitter / X card defaults
  twitter-card:
    title: "UIAO — Unified Identity-Addressing-Overlay Architecture"
    description: "FedRAMP Moderate overlay: OSCAL SSP/POA&M from live telemetry, identity-to-network enforcement, zero rip-and-replace."
    image: "docs/images/og-image.png"
    card-style: summary_large_image

  # Top navbar
  navbar:
    background: primary
    search: true
    left:
      - href: docs/index.qmd
        text: "Home"
      - href: programs/index.qmd
        text: "Programs"
      - href: series/index.qmd
        text: "Series"
      - href: narrative/UIAO-Narrative-Layer.md
        text: "Narrative"
      - href: docs/01_UnifiedArchitecture.qmd
        text: "Architecture"
      - href: docs/substrate-status.qmd
        text: "Status"

  # Left sidebar — hand-crafted tree. Matches the structure discussed
  # in the site-structure plan. Auto-nav is turned off; every entry
  # listed explicitly so canon ordering, program grouping, and series
  # arc are stable.
  sidebar:
    - id: programs
      title: "Programs"
      style: "docked"
      background: light
      contents:
        - section: "Programs"
          contents:
            - programs/index.qmd
            - section: "Training (UIAO_125)"
              contents:
                - narrative/program-training.qmd
                - programs/uiao_125.qmd
            - section: "Test Plans (UIAO_126)"
              contents:
                - narrative/program-test-plans.qmd
                - programs/uiao_126.qmd
            - section: "Project Plans (UIAO_127)"
              contents:
                - narrative/program-project-plans.qmd
                - programs/uiao_127.qmd
            - section: "Education (UIAO_128)"
              contents:
                - narrative/program-education.qmd
                - programs/uiao_128.qmd

    - id: series
      title: "Series"
      style: "docked"
      background: light
      contents:
        - section: "Series (10-part arc)"
          contents:
            - series/index.qmd

    - id: narrative
      title: "Narrative"
      style: "docked"
      background: light
      contents:
        - section: "Narrative"
          contents:
            - narrative/UIAO-Narrative-Layer.md
            - narrative/governance-os-directory-migration.md
            - narrative/why-modernization-is-hard.qmd
            - narrative/v1-adapter-ecosystem-complete.qmd

    - id: architecture
      title: "Architecture"
      style: "docked"
      background: light
      contents:
        - section: "Architecture"
          contents:
            - docs/index.qmd
            - section: "Foundations"
              contents:
                - docs/00_ControlPlaneArchitecture.qmd
                - docs/00_CorePrinciples.qmd
                - docs/01_UnifiedArchitecture.qmd
                - docs/02_CanonSpecification.qmd
            - section: "Compliance & Governance"
              contents:
                - docs/03_FedRAMP20x_Crosswalk.qmd
                - docs/04_FedRAMP20x_Phase2_Summary.qmd
                - docs/05_ManagementStack.qmd
            - section: "Program & Leadership"
              contents:
                - docs/06_ProgramVision.qmd
                - docs/07_LeadershipBriefing.qmd
                - docs/08_ModernizationTimeline.qmd
            - section: "Index & Reference"
              contents:
                - docs/09_CrosswalkIndex.qmd
                - docs/10_DirectoryStructure.qmd
                - docs/11_GlossaryAndDefinitions.qmd
            - section: "Extended Reference"
              contents:
                - docs/12_AI_SecurityPrinciples.qmd
                - docs/13_FIMF_AdapterRegistry.qmd
                - docs/14_TIC3_F5RetirementRoadmap.qmd
            - section: "Data Governance Substrate"
              contents:
                - docs/15_ProvenanceProfile.qmd
                - docs/16_DriftDetectionStandard.qmd
                - docs/17_ConsentEnvelope.qmd
                - docs/18_ClaimCatalog.qmd
                - docs/19_ReconciliationModel.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    smooth-scroll: true
