format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    other-formats: [pdf]
    fig-responsive: true
    fig-align: center
    fig-width: 8
    fig-height: 5
    fig-format: retina
    embed-resources: false
    link-external-newwindow: true
    link-external-icon: true

  docx:
    toc: true
    toc-depth: 3
    fig-width: 6
    fig-height: 4
    fig-align: center

mermaid:
  theme: neutral
