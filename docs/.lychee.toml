# Lychee link checker config — uiao-docs
# Docs: https://lychee.cli.rs/usage/config/

# ── Runtime ────────────────────────────────────────────────────────────
max_concurrency = 16
max_retries = 3
retry_wait_time = 5
timeout = 20
cache = true
max_cache_age = "14d"

# ── Verbosity ──────────────────────────────────────────────────────────
verbose = "info"
no_progress = true

# ── Acceptance ─────────────────────────────────────────────────────────
# External sites commonly rate-limit or block HEAD requests; treat these
# as non-fatal. A 200-299 or 429 response is good enough to not flag.
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 304, 307, 308, 403, 429]

# ── Exclusions ─────────────────────────────────────────────────────────
exclude_path = [
  "_site",
  "_freeze",
  "site",                 # legacy MkDocs output still in tree
  "node_modules",
  ".venv",
  ".pytest_cache",
  "docs/session-logs",    # dev logs, not published
]

# Regex-based URL exclusions — for links we know will 404 locally or
# that are intentional placeholders.
exclude = [
  # localhost / loopback
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  # example.com placeholders
  "^https?://(www\\.)?example\\.(com|org|net)",
  # private / internal references sometimes embedded in examples
  "^https?://.*\\.local(/|$)",
  # mailto (lychee flags unreachable SMTP; not our concern)
  "^mailto:",
  # tel links
  "^tel:",
  # PlantUML render URLs (encoded diagram payloads, not real docs)
  "^https?://www\\.plantuml\\.com/plantuml/",
  # non-HTTP schemes that lychee tries to resolve
  "^postgresql://",
  "^computer://",
  # JSON Schema $id templates embedded in docs as inline code
  "^https?://github\\.com/[^/]+/uiao/schemas/",
  # uiao-gos repo — archived predecessor, consolidated into WhalerMike/uiao
  # on 2026-04-17 per ADR-028. Its content lives under uiao/core/ and
  # uiao/impl/ now; the standalone repo URLs no longer resolve and are
  # not authoritative even when cited as historical reference.
  "^https?://github\\.com/[^/]+/uiao-gos(/|$)",
  # Predecessor repos uiao, uiao-docs, uiao — same archive
  # treatment. Canonical source is now WhalerMike/uiao.
  "^https?://github\\.com/[^/]+/uiao(/|$)",
  "^https?://github\\.com/[^/]+/uiao-docs(/|$)",
  "^https?://github\\.com/[^/]+/uiao(/|$)",
  # Cisco support URLs — vendor-owned deep links rotate frequently and
  # return 404 without notice (known stability issue flagged in
  # CHANGELOG issue #19). Per-URL exclusion of the SD-WAN routers
  # series page cited in docs/vendor_stack_v1.0.qmd; widen the pattern
  # if more Cisco deep links get cited.
  "^https?://www\\.cisco\\.com/c/en/us/support/routers/sd-wan-routers/",
]

# ── GitHub token ───────────────────────────────────────────────────────
# Use GITHUB_TOKEN env var to avoid anonymous rate limits on github.com.
# The workflow wires this up automatically.
