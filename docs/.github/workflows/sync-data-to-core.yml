# Sync YAML data schemas from uiao-docs to uiao
# uiao-docs owns the data/ directory. This workflow pushes changes
# to uiao whenever data files are modified on main.
#
# Requires: UIAO_CORE_SYNC_TOKEN secret (PAT with repo scope for uiao)
# If the secret is not configured, this workflow will fail silently.

name: Sync Data to uiao

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Push data/ to uiao
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uiao-docs
        uses: actions/checkout@v6
        with:
          sparse-checkout: data

      - name: Checkout uiao
        uses: actions/checkout@v6
        with:
          repository: WhalerMike/uiao
          token: ${{ secrets.UIAO_CORE_SYNC_TOKEN }}
          path: uiao

      - name: Sync data files
        run: |
          echo "Syncing data/ from uiao-docs to uiao..."

          # Copy all YAML/JSON data files (preserving uiao-only files)
          cp data/*.yml uiao/data/ 2>/dev/null || true
          cp data/*.yaml uiao/data/ 2>/dev/null || true

          cd uiao

          # Check for changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          git config user.name "uiao-docs-sync[bot]"
          git config user.email "noreply@github.com"
          git add data/
          git commit -m "sync: update data/ from uiao-docs

          Automated sync from WhalerMike/uiao-docs.
          Source commit: ${{ github.sha }}"
          git push
          echo "Sync complete."
