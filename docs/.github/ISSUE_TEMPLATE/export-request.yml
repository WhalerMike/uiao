name: Request Document Export
description: Request a PDF or Word export of a UIAO document
title: "[Export Request] "
labels: ["export-request"]
body:
  - type: input
    id: doc_path
    attributes:
      label: Document Path
      description: Path relative to docs/ (e.g., documents/uiao-042.md)
      placeholder: documents/uiao-001.md
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Output Format
      options:
        - Word (.docx)
        - PDF (.pdf)
        - Both
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any special formatting or content requirements
      placeholder: Optional notes
