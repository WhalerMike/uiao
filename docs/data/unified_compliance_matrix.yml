unified_compliance_matrix:
  - pillar: "U (Identity)"
    visual_ref: "V1"
    cisa_pillar: "Identity"
    cisa_maturity: "Advanced"
    nist_controls: ["IA-2", "IA-5", "AC-19"]
    impact_statement: "Enforces phishing-resistant MFA and deterministic Identity-to-IP binding for all US-based endpoints via Entra ID and Infoblox."

  - pillar: "O (Overlay)"
    visual_ref: "V2"
    cisa_pillar: "Network / Environment"
    cisa_maturity: "Optimal"
    nist_controls: ["SC-7", "SC-8", "AC-4"]
    impact_statement: "Establishes a cryptographically secured overlay fabric with US-only geography enforcement."

  - pillar: "Governance"
    visual_ref: "V3"
    cisa_pillar: "Automation & Orchestration"
    cisa_maturity: "Optimal"
    nist_controls: ["CA-7", "CM-6", "IR-4"]
    impact_statement: "Real-time drift detection and automated remediation loop via ServiceNow and GitHub SCuBA."

  - pillar: "Architecture"
    visual_ref: "V4"
    cisa_pillar: "Network / Environment"
    cisa_maturity: "Advanced"
    nist_controls: ["AC-4", "SC-38"]
    impact_statement: "Collapses legacy TIC 2.2 silos into a software-defined, identity-centric perimeter."

  - pillar: "Trust Chain"
    visual_ref: "V5"
    cisa_pillar: "Device / Identity"
    cisa_maturity: "Optimal"
    nist_controls: ["SC-8", "IA-3"]
    impact_statement: "Anchors device and user trust to the GSA Federal Root CA with end-to-end channel binding."
