# Applies to every .qmd / .md under /docs/customer-documents/.
#
# Scope: Customer Documents is the only section that renders to DOCX in CI.
# All other sections stay HTML-only (see .github/workflows/quarto.yml).

format:
  html: default
  docx:
    toc: true
    toc-depth: 3
    number-sections: false
    highlight-style: github

# Surface a "DOCX" download button in the rendered HTML page header.
# The button links to <page-slug>.docx beside the .html artifact — produced
# by the DOCX render step in .github/workflows/quarto.yml.
format-links: [docx]
