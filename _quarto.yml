project:
  type: website
  title: "UIAO Documentation"
  input-dir: docs
  output-dir: _site
  resources:
    - "docs/images/**"
    - "data/**"

website:
  title: "UIAO Documentation"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Architecture"
        href: 01_UnifiedArchitecture.qmd
      - text: "Adapters"
        href: adapters/adapter-contract.qmd
      - text: "Governance"
        href: governance/doc-separation-governance.qmd
      - text: "User Guides"
        href: user-guides/README.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    df-print: default
    fig-cap-location: bottom
    fig-align: center

  docx:
    toc: true
    number-sections: true
    reference-doc: "data/docx-reference.docx"
    fig-cap-location: bottom

  pptx:
    reference-doc: "data/pptx-reference.pptx"
    fig-cap-location: bottom

execute:
  echo: true
  warning: false
  error: true


