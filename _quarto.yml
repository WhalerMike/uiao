project:
  type: default
  output-dir: _output
  pre-render: python scripts/quarto_pre_render.py
  post-render: python scripts/quarto_post_render.py
  render:
    - docs/**/*.md

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    embed-resources: true
    code-fold: true
  docx:
    toc: true
    toc-depth: 3
    number-sections: true
  pptx:
    slide-level: 2
  pdf:
    documentclass: report
    geometry:
      - margin=1in
    fontsize: 11pt
    toc: true
    toc-depth: 3
    number-sections: true
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
  gfm:
    toc: true
    number-sections: true

execute:
  echo: false
  warning: false
  freeze: auto

mermaid:
  theme: neutral

metadata:
  author: "UIAO Modernization Program"
  lang: en

crossref:
  fig-prefix: "Figure"
  tbl-prefix: "Table"
  sec-prefix: "Section"
