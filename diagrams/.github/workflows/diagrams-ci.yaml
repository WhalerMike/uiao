# UIAO Diagram Pipeline CI — v2.0 (Category-Aware)
# Validates diagram governance rules on every push/PR.
# Renders dual-form-factor outputs on merge to main.
#
# Governance: UIAO_DG_001 (DIAGRAM-GOVERNANCE.md) v2.0
# Boundary: GCC-Moderate

name: Diagram Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'diagrams/**'
  pull_request:
    paths:
      - 'diagrams/**'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Diagram Sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run diagram validation (strict)
        run: python diagrams/scripts/validate.py --strict

  render:
    name: Render Diagrams (Dual Form Factor)
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install pyyaml
          npm install -g @mermaid-js/mermaid-cli

      - name: Render all diagrams (Full + Nano, PNG)
        run: python diagrams/scripts/render.py --all --format png

      - name: Commit rendered outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/rendered/
          if git diff --staged --quiet; then
            echo "No rendering changes to commit"
          else
            git commit -m "chore(diagrams): auto-render dual-form-factor outputs

          Rendered by diagram pipeline CI v2.0.
          Categories: training, architecture, testing, planning,
          governance, identity, operations, enforcement, data."
            git push
          fi
