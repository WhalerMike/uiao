# release-drafter config — drafts release notes continuously as PRs merge
# so the next tag has notes ready without manual authoring.

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🏛️  Canon (core/)'
    labels:
      - 'canon'
      - 'governance'
    collapse-after: 10
  - title: '🐍 Implementation (impl/)'
    labels:
      - 'python'
      - 'impl'
  - title: '📖 Documentation (docs/)'
    labels:
      - 'documentation'
      - 'docs'
  - title: '⚙️  CI / infrastructure'
    labels:
      - 'ci'
      - 'dependencies'
      - 'infrastructure'
  - title: '🔌 Adapters'
    labels:
      - 'adapter'
  - title: '🔄 Drift / substrate'
    labels:
      - 'drift'
      - 'substrate'
  - title: '🔐 Security'
    labels:
      - 'security'

change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bug'
  default: minor

exclude-labels:
  - 'skip-changelog'
  - 'duplicate'
  - 'invalid'
  - 'wontfix'

template: |
  ## What's new in v$RESOLVED_VERSION

  $CHANGES

  ## Full changelog

  **Full Changelog**: https://github.com/WhalerMike/uiao/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

  See [`CHANGELOG.md`](https://github.com/WhalerMike/uiao/blob/main/CHANGELOG.md) for the detailed narrative.
