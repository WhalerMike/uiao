name: Phase 4 Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      adapter:
        description: 'Specific adapter to test (blank = all)'
        required: false
        default: ''
  schedule:
    # Weekly on Wednesday at 08:00 UTC — regular acceptance validation
    - cron: '0 8 * * 3'

permissions:
  contents: read

jobs:
  acceptance:
    name: Acceptance Tests (Live APIs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uiao
        uses: actions/checkout@v6

      - name: Checkout uiao (canon)
        uses: actions/checkout@v6
        with:
          repository: WhalerMike/uiao
          ref: main
          path: uiao

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest httpx azure-identity

      - name: Run Phase 4 acceptance tests
        env:
          UIAO_CANON_PATH: ${{ github.workspace }}/uiao
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          SERVICENOW_INSTANCE: ${{ secrets.SERVICENOW_INSTANCE }}
          SERVICENOW_TOKEN: ${{ secrets.SERVICENOW_TOKEN }}
        run: |
          if [ -n "${{ inputs.adapter }}" ]; then
            pytest tests/test_acceptance_phase4.py -v -k "${{ inputs.adapter }}" --tb=short
          else
            pytest tests/test_acceptance_phase4.py -v --tb=short
          fi

      - name: Credential availability summary
        if: always()
        run: |
          echo "## Credential Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Credential | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.ENTRA_CLIENT_ID }}" ]; then
            echo "| Graph API (Entra/M365/Intune) | ✅ Available |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Graph API (Entra/M365/Intune) | ❌ Not set |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ secrets.SERVICENOW_INSTANCE }}" ]; then
            echo "| ServiceNow | ✅ Available |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ServiceNow | ❌ Not set |" >> $GITHUB_STEP_SUMMARY
          fi
