name: Quarto

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/quarto.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

# Only allow one concurrent deploy per branch; cancel in-progress on new push
concurrency:
  group: quarto-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render:
    name: Render Quarto site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render HTML site
        working-directory: docs
        # Site-wide HTML render. PDF outputs are skipped (TinyTeX would inflate
        # CI runtime without current demand — see docs/customer-documents/
        # export pipeline notes). DOCX for the Customer Documents tree is
        # handled as a scoped second pass below.
        run: quarto render --to html

      - name: Render Customer Documents DOCX exports
        working-directory: docs
        # Scoped DOCX render: only pages under customer-documents/ opt into
        # DOCX via docs/customer-documents/_metadata.yml. Outputs land in
        # _site/customer-documents/<...>.docx alongside the HTML.
        # Uses pandoc (bundled with Quarto), no LaTeX dependency.
        #
        # Parallelism: `quarto render customer-documents --to docx` renders the
        # 242 .qmd files serially (~1m+ wall time). Pandoc invocations are
        # independent (no executable code, distinct output paths), so we fan
        # them out across the runner's cores via xargs -P. Each file inherits
        # _quarto.yml + _metadata.yml from the project root.
        run: |
          set -euo pipefail
          workers="$(nproc)"
          echo "Rendering DOCX in parallel with ${workers} workers"
          find customer-documents -name '*.qmd' -print0 \
            | xargs -0 -P "${workers}" -I {} quarto render {} --to docx --no-execute-daemon

      - name: Upload site artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: quarto-site-pr-${{ github.event.pull_request.number }}
          path: docs/_site
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: render
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
