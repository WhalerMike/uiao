name: ConMon Aggregate

# Monthly POA&M rollup + RFC-0026 dashboard card + 72-hour critical-finding
# SLA gate per ADR-025 D3, ADR-043 D2 / D4, and UIAO_132 §2.2.
#
# Inputs: per-adapter `findings.json` artifacts under
#   evidence/conformance/<adapter-id>/<run-id>/findings.json
# Outputs (exports/conmon/):
#   - conmon-poam.csv                 (FedRAMP-shaped CSV subset)
#   - conmon-aggregate-summary.json   (RFC-0026 dashboard card per adapter)
#   - conmon-sla-issues.json          (governance-issue payloads for SLA breaches)
#
# This workflow is intentionally scaffold-level today. The Connect.gov
# upload step (UIAO_132 §7 O1) is not wired yet; artifact upload to
# GitHub's artifact store is the current handoff.

on:
  schedule:
    # First day of each month, 09:00 UTC. Gives the prior month's
    # monthly scans time to land before aggregation runs.
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      open_sla_issues:
        description: 'Open governance issues for 72-hour SLA breaches'
        type: boolean
        default: true
  repository_dispatch:
    types: [conformance-run-complete]
  pull_request:
    paths:
      - 'scripts/conmon/**'
      - 'src/uiao/canon/adapter-registry.yaml'
      - '.github/workflows/conmon-aggregate.yml'

permissions:
  contents: read
  issues: write

jobs:
  aggregate:
    name: Aggregate ConMon deliverables (RFC-0026)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install --quiet pyyaml

      - name: Run aggregator
        run: |
          python scripts/conmon/aggregate.py \
            --registry src/uiao/canon/adapter-registry.yaml \
            --evidence-root evidence/conformance \
            --output-dir exports/conmon

      - name: Summarize to step output
        run: |
          echo '## ConMon Aggregate — RFC-0026 CA-7' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          jq '.adapters | map({id, status, requirement, pathway, last_run_at, counts: .finding_counts, sla: .sla_breach_count})' \
            exports/conmon/conmon-aggregate-summary.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Pathway-1 migration readiness check (RFC-0026 E8)
        id: readiness
        run: |
          python scripts/conmon/migration_readiness.py \
            --registry src/uiao/canon/adapter-registry.yaml \
            --output exports/conmon/migration-readiness.json
          breach=$(jq -r '.any_breach' exports/conmon/migration-readiness.json)
          echo "any_breach=${breach}" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "## Pathway-1 migration readiness (RFC-0026 E8)"
            echo ""
            echo '```json'
            jq '.pathways | map({adapter_id, mandatory_by, registry_status, breach, days_until_mandatory})' \
              exports/conmon/migration-readiness.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregate artifacts
        uses: actions/upload-artifact@v7
        with:
          name: conmon-aggregate-${{ github.run_id }}
          path: exports/conmon/
          retention-days: 90

      - name: Open governance issues for SLA breaches
        # PRs and scheduled runs open issues; workflow_dispatch respects
        # its input flag (default true). Skip on pull_request events so
        # PR CI doesn't file issues.
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.open_sla_issues)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payloads = JSON.parse(
              fs.readFileSync('exports/conmon/conmon-sla-issues.json', 'utf8')
            );
            if (payloads.length === 0) {
              core.info('No 72-hour SLA breaches — no issues to open.');
              return;
            }
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'conmon-cure',
              per_page: 100,
            });
            const existingFingerprints = new Set(
              existing
                .map(i => (i.body || '').match(/fingerprint:\s*`([0-9a-f]+)`/))
                .filter(Boolean)
                .map(m => m[1])
            );
            for (const p of payloads) {
              if (existingFingerprints.has(p.fingerprint)) {
                core.info(`Skipping existing SLA issue ${p.fingerprint}`);
                continue;
              }
              const body = `${p.body}\n\n---\nfingerprint: \`${p.fingerprint}\``;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: p.title,
                body,
                labels: p.labels,
              });
              core.info(`Opened SLA issue for ${p.fingerprint}`);
            }

      - name: Open governance issue for Pathway-1 readiness breach
        # Fires when today is inside the 90-day lead window of a Notice
        # 0009 deadline AND the Pathway-1 adapter is still
        # status: reserved. Idempotent: fingerprints by adapter_id +
        # mandatory_by so each deadline opens at most one live issue.
        if: >-
          github.event_name != 'pull_request' &&
          steps.readiness.outputs.any_breach == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.open_sla_issues)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(
              fs.readFileSync('exports/conmon/migration-readiness.json', 'utf8')
            );
            const breaches = payload.pathways.filter(p => p.breach);
            if (breaches.length === 0) {
              core.info('No Pathway-1 readiness breaches.');
              return;
            }
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rfc-0026-readiness',
              per_page: 100,
            });
            const existingFingerprints = new Set(
              existing
                .map(i => (i.body || '').match(/readiness-fingerprint:\s*`([a-z0-9:-]+)`/))
                .filter(Boolean)
                .map(m => m[1])
            );
            for (const b of breaches) {
              const fingerprint = `rfc-0026-readiness:${b.adapter_id}:${b.mandatory_by}`;
              if (existingFingerprints.has(fingerprint)) {
                core.info(`Skipping existing readiness issue ${fingerprint}`);
                continue;
              }
              const title = `RFC-0026 Pathway-1 readiness: ${b.adapter_id} mandatory ${b.mandatory_by}`;
              const body = [
                `FedRAMP Notice 0009 sets ${b.notice_0009_ref} mandatory on **${b.mandatory_by}**.`,
                `Today is inside the ${b.lead_days}-day lead window (opened ${b.breach_window_opened_at}) `,
                `and \`src/uiao/canon/adapter-registry.yaml\` still reports ` +
                  `\`${b.adapter_id}.status = ${b.registry_status ?? 'absent'}\`.`,
                ``,
                `### Action required`,
                ``,
                `- [ ] Flip \`${b.adapter_id}.status\` from \`reserved\` to \`proposed\` or \`active\``,
                `- [ ] Land the adapter implementation (retires the stub in ` +
                  `\`src/uiao/adapters/${b.adapter_id.replace('-', '_')}_adapter.py\`)`,
                `- [ ] Update \`docs/docs/uiao-rfc-0026-roadmap.md\` § E8 with the migration PR link`,
                `- [ ] Update ADR-043 change log with the migration completion entry`,
                ``,
                `Days until mandatory: **${b.days_until_mandatory}**`,
                ``,
                `Ref: ADR-043, UIAO_132 §2.4 / §3.4, ` +
                  `\`docs/docs/uiao-rfc-0026-roadmap.md\` § E8.`,
                ``,
                `---`,
                `readiness-fingerprint: \`${fingerprint}\``,
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['rfc-0026-readiness', 'canon', 'needs-triage'],
              });
              core.info(`Opened readiness issue for ${fingerprint}`);
            }
