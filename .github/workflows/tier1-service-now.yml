name: Tier-1 ServiceNow

# Manual-dispatch only today. Once SERVICENOW_PDI_INSTANCE / _USER / _PASSWORD
# secrets are populated, follow-on PR adds:
#   schedule:
#     - cron: '0 6 * * *'   # 06:00 UTC nightly
# See tests/integration/README.md.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  tier1:
    name: Tier-1 ServiceNow PDI
    runs-on: ubuntu-latest
    env:
      SERVICENOW_PDI_INSTANCE: ${{ secrets.SERVICENOW_PDI_INSTANCE }}
      SERVICENOW_PDI_USER: ${{ secrets.SERVICENOW_PDI_USER }}
      SERVICENOW_PDI_PASSWORD: ${{ secrets.SERVICENOW_PDI_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Report secret presence
        run: |
          if [ -z "$SERVICENOW_PDI_INSTANCE" ]; then
            echo "SERVICENOW_PDI_* secrets not set; tier-1 tests will skip cleanly."
          else
            echo "ServiceNow PDI secrets present; tier-1 tests will run live."
          fi

      - name: Run tier-1
        run: pytest tests/integration/tier1/test_service_now_tier1.py -v --no-header
