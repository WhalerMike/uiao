name: Substrate Drift

on:
  pull_request:
    paths:
      - 'core/canon/substrate-manifest.yaml'
      - 'core/canon/workspace-contract.yaml'
      - 'core/canon/document-registry.yaml'
      - 'core/schemas/substrate-manifest/**'
      - 'core/schemas/workspace-contract/**'
      - 'impl/src/uiao_impl/substrate/**'
      - '.github/workflows/substrate-drift.yml'
  push:
    branches: [main]
    paths:
      - 'core/canon/substrate-manifest.yaml'
      - 'core/canon/workspace-contract.yaml'
      - 'core/canon/document-registry.yaml'
      - 'core/schemas/substrate-manifest/**'
      - 'core/schemas/workspace-contract/**'

jobs:
  substrate-drift:
    name: Check substrate for DRIFT-SCHEMA + DRIFT-PROVENANCE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install --quiet pyyaml pydantic

      - name: Run substrate walker
        env:
          PYTHONPATH: impl/src
          UIAO_WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          python - <<'EOF' | tee substrate-report.json
          import json, sys
          from uiao_impl.substrate.walker import walk_substrate

          report = walk_substrate()
          print(json.dumps(report.as_dict(), indent=2))
          sys.exit(0 if report.ok else 1)
          EOF

      - name: Upload substrate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: substrate-report
          path: substrate-report.json
          retention-days: 30
