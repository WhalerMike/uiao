name: Substrate Drift

on:
  pull_request:
    paths:
      - 'src/uiao/canon/substrate-manifest.yaml'
      - 'src/uiao/canon/workspace-contract.yaml'
      - 'src/uiao/canon/document-registry.yaml'
      - 'src/uiao/schemas/substrate-manifest/**'
      - 'src/uiao/schemas/workspace-contract/**'
      - 'src/uiao/substrate/**'
      - '.github/workflows/substrate-drift.yml'
  push:
    branches: [main]
    paths:
      - 'src/uiao/canon/substrate-manifest.yaml'
      - 'src/uiao/canon/workspace-contract.yaml'
      - 'src/uiao/canon/document-registry.yaml'
      - 'src/uiao/schemas/substrate-manifest/**'
      - 'src/uiao/schemas/workspace-contract/**'
      - 'src/uiao/substrate/**'
      - '.github/workflows/substrate-drift.yml'

jobs:
  substrate-drift:
    name: Check substrate for DRIFT-SCHEMA + DRIFT-PROVENANCE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install --quiet pyyaml pydantic

      - name: Run substrate walker
        env:
          PYTHONPATH: src
          UIAO_WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          python - <<'EOF' | tee substrate-report.json
          import json, sys
          from uiao.substrate.walker import walk_substrate

          report = walk_substrate()
          print(json.dumps(report.as_dict(), indent=2))
          sys.exit(0 if report.ok else 1)
          EOF

      - name: Upload substrate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: substrate-report
          path: substrate-report.json
          retention-days: 30
