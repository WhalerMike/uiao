name: Docs Leak Check

# Fails if anything that belongs in the evidence/ tree (real tenant
# artifacts, POA&M CSV rows, SAR drops, ConMon meeting minutes) leaks
# into the docs/ tree that gets rendered into the public UIAO
# Modernization Atlas website.
#
# The FedRAMP-Moderate posture of this repo tolerates publishing
# architecture and governance canon. It does NOT tolerate publishing
# real evidence artifacts. This workflow is the blast-radius guardrail
# on top of that.
#
# Rules enforced on every PR that touches docs/**:
#
#  R1. No file under docs/**/ may live in a subdirectory literally
#      named `evidence`.
#  R2. No docs/**/*.{md,qmd,yml,yaml} file may reference an
#      `evidence/<subpath>` relative path (embedded include, image
#      ref, relative link, YAML path, etc.). The single permitted
#      reference is an absolute documentation citation — wrapped in
#      backticks as prose, not a live link — which is allowed via the
#      :allowlist: convention described below.
#  R3. No docs/_site/** build output is committed (that directory is
#      generated by quarto render and lives in .gitignore).
#
# Allowlist: a docs file that needs to reference the `evidence/` tree
# for documentation purposes (e.g. "artifacts land under
# evidence/conformance/<adapter>/<run-id>/") must wrap the reference
# in inline code — backticks. This workflow permits backticked
# references and fails only on live references (fenced code blocks,
# link targets, include directives, bare paths).
#
# If you're hitting R2 and you think your reference is legitimate
# documentation, wrap it in backticks.

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-leak-check.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: read

jobs:
  leak-check:
    name: Forbid evidence/** paths in docs/**
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run leak scanner
        run: python scripts/tools/docs_leak_check.py
