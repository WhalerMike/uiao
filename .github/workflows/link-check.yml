name: Link Check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.qmd'
      - '.github/workflows/link-check.yml'
      - '.lychee.toml'
      - '.lycheeignore'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.qmd'
      - '.lycheeignore'
  schedule:
    # Weekly catch-all to detect upstream link rot even when no MD/QMD
    # changed in the repo itself.
    - cron: '17 6 * * 1'
  workflow_dispatch:

jobs:
  link-check:
    name: Check markdown + quarto links
    runs-on: ubuntu-latest
    # Blocking. Baseline is clean (0 errors with the current
    # `.lycheeignore`); any new genuinely broken link should be fixed
    # in-PR or, if the URL is a CI-side false positive (e.g. cloud-IP
    # geo-gating), added to `.lycheeignore` in the same PR with an
    # explanatory comment.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 2
            --timeout 20
            --accept 200,206,403,429,503
            --exclude '^https?://(www\.)?onedrive\.com(/|$)'
            --exclude '^https?://onedrive\.live\.com(/|$)'
            --exclude-path docs/site
            --exclude-path docs/_site
            --exclude-path docs/docx
            --exclude-path docs/publications
            --exclude-path inbox/wiki
            --exclude '^https://example\.com'
            --exclude '^https://your-tenant'
            --exclude '^https://uiao\.gov/'
            --exclude '^http://localhost'
            --exclude 'github\.com/WhalerMike/uiao-docs/'
            --exclude '^https://claude\.ai/'
            --exclude '^https://github\.com/WhalerMike/[^/]+/settings/'
            --exclude '^https://www\.plantuml\.com/plantuml/(png|svg)/'
            '**/*.md'
            '**/*.qmd'
          fail: true
          output: /tmp/lychee-report.md

      - name: Upload link-check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: link-check-report
          path: /tmp/lychee-report.md
          retention-days: 30
