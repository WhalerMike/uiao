name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout uiao
        uses: actions/checkout@v4
        with:
          path: uiao

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: uiao
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest

      - name: Run tests
        working-directory: uiao
        env:
          UIAO_CANON_PATH: ${{ github.workspace }}/uiao/src/uiao/canon
        run: pytest -q
