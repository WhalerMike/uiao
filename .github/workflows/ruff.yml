name: Ruff

on:
  pull_request:
    paths:
      - 'impl/**/*.py'
      - 'impl/pyproject.toml'
      - '.github/workflows/ruff.yml'
  push:
    branches: [main]
    paths:
      - 'impl/**/*.py'
      - 'impl/pyproject.toml'

jobs:
  ruff:
    name: Lint impl/ with ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff check
        working-directory: impl
        run: ruff check .

      - name: Run ruff format (diff-only check)
        working-directory: impl
        run: ruff format --check .
        continue-on-error: true
