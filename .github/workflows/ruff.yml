name: Ruff

on:
  pull_request:
    paths:
      - 'src/uiao/**/*.py'
      - 'tests/**/*.py'
      - 'scripts/**/*.py'
      - 'deploy/**/*.py'
      - 'diagrams/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/ruff.yml'
  push:
    branches: [main]
    paths:
      - 'src/uiao/**/*.py'
      - 'tests/**/*.py'
      - 'scripts/**/*.py'
      - 'deploy/**/*.py'
      - 'diagrams/**/*.py'
      - 'pyproject.toml'

jobs:
  ruff:
    name: Lint src/uiao with ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format (diff-only check)
        run: ruff format --check .
