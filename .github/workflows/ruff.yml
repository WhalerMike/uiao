name: Ruff

on:
  pull_request:
    paths:
      - 'src/uiao/**/*.py'
      - 'tests/**/*.py'
      - 'scripts/**/*.py'
      - 'deploy/**/*.py'
      - 'diagrams/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/ruff.yml'
  push:
    branches: [main]
    paths:
      - 'src/uiao/**/*.py'
      - 'tests/**/*.py'
      - 'scripts/**/*.py'
      - 'deploy/**/*.py'
      - 'diagrams/**/*.py'
      - 'pyproject.toml'

jobs:
  ruff:
    name: Lint src/uiao with ruff
    runs-on: ubuntu-latest
    # Soft-fail: path filters were repaired post-ADR-032 but 230 pre-existing
    # lint findings surfaced when the gate started firing again. Flipping back
    # to blocking once the baseline is burned down.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format (diff-only check)
        run: ruff format --check .
        continue-on-error: true
