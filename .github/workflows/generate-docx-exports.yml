name: Generate DOCX Exports

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "templates/**"
      - "data/**"
      - "generation-inputs/**"
      - "src/**"
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  build-docx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "." || true
          pip install python-docx pyyaml jinja2

      - name: Generate topic DOCX exports
        run: |
          python - << 'PYEOF'
          import sys
          sys.path.insert(0, "src")
          from uiao_core.generators.rich_docx import generate_all_topic_docs
          from pathlib import Path
          generated = generate_all_topic_docs(
              docs_dir=Path("docs"),
              exports_dir=Path("exports"),
              classification="CUI",
          )
          print(f"Generated {len(generated)} topic DOCX file(s):")
          for p in generated:
              print(f"  {p}")
          PYEOF

      - name: Upload DOCX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uiao-docx-exports
          path: exports/docx/*.docx
          if-no-files-found: warn

      - name: Commit topic DOCX exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f exports/docx/*.docx
          git restore --staged exports/docx/UIAO_Leadership_Briefing_v1.0.docx 2>/dev/null || true
          git restore --staged exports/docx/leadership_briefing_v1.0.docx 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No DOCX changes to commit."
          else
            git commit -m "ci: regenerate topic DOCX exports via Python pipeline [skip ci]"
            git pull --rebase origin main
            git push
          fi
