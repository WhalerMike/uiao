name: Dependency Review

on:
  pull_request:
    paths:
      - '**/pyproject.toml'
      - '**/requirements*.txt'
      - '**/poetry.lock'
      - '**/uv.lock'
      - '.github/workflows/dependency-review.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        # Advisory first-run: existing deps may already contain advisories we
        # have not yet triaged. warn-only surfaces a summary in PR logs and
        # comments without failing the check. CI-012 will flip this back to
        # blocking once the baseline is clean.
        with:
          warn-only: true
          comment-summary-in-pr: always
