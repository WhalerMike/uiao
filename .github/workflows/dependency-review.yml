name: Dependency Review

on:
  pull_request:
    paths:
      - '**/pyproject.toml'
      - '**/requirements*.txt'
      - '**/poetry.lock'
      - '**/uv.lock'
      - '.github/workflows/dependency-review.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          # Advisory first-run: baseline deps may already contain high-severity
          # advisories we have not yet triaged. Keep comments informational and
          # only fail the job on CRITICAL; tighten via a follow-up once the
          # baseline is clean.
          fail-on-severity: critical
