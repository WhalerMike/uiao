name: actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'impl/.github/workflows/**'
      - 'core/.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true
          files: |
            .github/workflows/*.yml
            .github/workflows/*.yaml
            impl/.github/workflows/*.yml
            impl/.github/workflows/*.yaml
            core/.github/workflows/*.yml
            core/.github/workflows/*.yaml
