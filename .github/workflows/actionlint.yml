name: actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'impl/.github/workflows/**'
      - 'core/.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    # Advisory first-run: existing workflows have not been linted and may
    # contain baseline warnings. Keep the job informational until CI-012
    # tightens the gate and extends coverage to impl/.github/workflows and
    # core/.github/workflows.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true
