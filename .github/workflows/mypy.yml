name: mypy

on:
  pull_request:
    paths:
      - 'impl/**'
      - '.github/workflows/mypy.yml'
  push:
    branches: [main]
    paths:
      - 'impl/**'

jobs:
  mypy:
    name: mypy static type check (impl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install impl with dev extras
        run: pip install --quiet -e './impl[dev]'

      - name: Run mypy
        working-directory: impl
        run: mypy src/
