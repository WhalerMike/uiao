name: mypy

on:
  pull_request:
    paths:
      - 'impl/**'
      - '.github/workflows/mypy.yml'
  push:
    branches: [main]
    paths:
      - 'impl/**'

jobs:
  mypy:
    name: mypy static type check (impl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install impl with dev extras
        run: pip install --quiet -e './impl[dev]'

      - name: Run mypy (advisory)
        working-directory: impl
        # Advisory first-run: mypy has never been invoked on this codebase in
        # CI, so the baseline is dirty. Keep the step running so findings
        # surface in logs, but do not fail the job until CI-011 tightens.
        continue-on-error: true
        run: mypy src/
