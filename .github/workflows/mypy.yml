name: Mypy

on:
  pull_request:
    paths:
      - 'src/uiao/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/mypy.yml'
  push:
    branches: [main]
    paths:
      - 'src/uiao/**/*.py'
      - 'pyproject.toml'

jobs:
  mypy:
    name: Type-check src/uiao with mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uiao with dev extras
        run: pip install --quiet -e ".[dev]"

      - name: Run mypy
        run: mypy src/uiao --ignore-missing-imports
