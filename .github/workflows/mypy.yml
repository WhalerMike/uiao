name: Mypy

on:
  pull_request:
    paths:
      - 'impl/src/uiao/**/*.py'
      - 'impl/pyproject.toml'
      - '.github/workflows/mypy.yml'
  push:
    branches: [main]
    paths:
      - 'impl/src/uiao/**/*.py'
      - 'impl/pyproject.toml'

jobs:
  mypy:
    name: Type-check impl/src/uiao with mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impl
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with dev extras
        run: pip install --quiet -e ".[dev]"

      - name: Run mypy
        run: mypy src/uiao --ignore-missing-imports
