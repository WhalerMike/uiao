name: Mypy

on:
  pull_request:
    paths:
      - 'src/uiao/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/mypy.yml'
  push:
    branches: [main]
    paths:
      - 'src/uiao/**/*.py'
      - 'pyproject.toml'

jobs:
  mypy:
    name: Type-check src/uiao with mypy
    runs-on: ubuntu-latest
    # Soft-fail: mypy baseline was never enforced pre-ADR-032 (path filter
    # scoped to impl/**); restored here as a warning gate until types are
    # cleaned up.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with dev extras
        run: pip install --quiet -e ".[dev]"

      - name: Run mypy
        run: mypy src/uiao --ignore-missing-imports || true
