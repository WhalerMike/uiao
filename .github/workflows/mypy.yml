name: Mypy

on:
  pull_request:
    paths:
      - 'src/uiao/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/mypy.yml'
  push:
    branches: [main]
    paths:
      - 'src/uiao/**/*.py'
      - 'pyproject.toml'

jobs:
  mypy:
    name: Type-check src/uiao with mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package with dev extras
        run: pip install --quiet -e ".[dev]"

      - name: Run mypy (advisory)
        run: |
          set +e
          mypy src/uiao --ignore-missing-imports
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::mypy reported type issues (advisory gate); see output above."
          fi
          exit 0
