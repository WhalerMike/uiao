name: KSI Tier 2 Enrichment

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/enrich_ksis.py'
      - 'rules/ksi/**'

permissions:
  contents: write

jobs:
  enrich:
    name: Apply Tier 2 KSI Enrichment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run KSI enrichment script
        run: python scripts/enrich_ksis.py

      - name: Commit enriched KSIs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/ksi/
          if git diff --cached --quiet; then
            echo "No KSI enrichment changes to commit."
          else
            git commit -m "ci: apply Tier 2 enrichment to KSI library [skip ci]"
            git pull --rebase origin main
            git push
          fi
