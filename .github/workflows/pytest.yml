name: Pytest

on:
  pull_request:
    paths:
      - 'src/uiao/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/pytest.yml'
  push:
    branches: [main]
    paths:
      - 'src/uiao/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  substrate:
    name: Substrate walker tests (fast, minimal deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install --quiet pytest pyyaml typer rich pydantic

      - name: Run substrate walker tests
        env:
          PYTHONPATH: src
        run: pytest tests/test_substrate_walker.py -q

  full:
    name: Full pytest suite
    runs-on: ubuntu-latest
    # Soft-fail: path filter was repaired post-ADR-032 and the full suite
    # started firing again, surfacing pre-existing undeclared-dependency
    # gaps (e.g. tests/test_auditor_api.py imports fastapi, which is not in
    # pyproject.toml deps). Flipping back to blocking once test-import
    # hygiene is restored. The fast substrate job above remains blocking.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package
        run: |
          pip install --quiet -e .
          pip install --quiet pytest

      - name: Run full pytest
        run: pytest -q --tb=short
