name: Pytest

on:
  pull_request:
    paths:
      - 'impl/**'
      - '.github/workflows/pytest.yml'
  push:
    branches: [main]
    paths:
      - 'impl/**'

jobs:
  substrate:
    name: Substrate walker tests (fast, minimal deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install --quiet pytest pyyaml typer rich pydantic

      - name: Run substrate walker tests
        env:
          PYTHONPATH: impl/src
        run: pytest impl/tests/test_substrate_walker.py -q

  impl:
    name: Full impl pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install impl package
        run: |
          pip install --quiet -e ./impl
          pip install --quiet pytest

      - name: Run full pytest
        working-directory: impl
        run: pytest -q --tb=short
