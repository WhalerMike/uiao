name: Tier-1 Palo Alto

# Manual-dispatch only today. Once PANOS_HOST / PANOS_API_KEY secrets are
# populated, follow-on PR adds:
#   schedule:
#     - cron: '15 6 * * *'
# See tests/integration/README.md.
#
# OPEN DECISION (blocks secret population): the test file declares
# PANOS_HOST as an RFC1918 address inside the dev VPC. `ubuntu-latest`
# GitHub-hosted runners cannot reach RFC1918 ranges. Before populating
# PANOS_HOST in repository secrets, pick one of:
#   (a) self-hosted runner inside the VPC — change `runs-on:` below to
#       a self-hosted label; preferred (keeps management plane private).
#   (b) public eval VM with a non-RFC1918 IP — leave `runs-on:` as
#       ubuntu-latest; exposes the PAN-OS management plane to the
#       internet, so require IP-allowlist + short-lived API key.
#   (c) tunnel (Tailscale / Cloudflare Tunnel) on the GitHub-hosted
#       runner — leave `runs-on:` as ubuntu-latest, add a `tailscale`
#       step before `Run tier-1`; tunnels add their own auth surface.
# Track the decision in an ADR and update this comment + `runs-on:` once
# resolved.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  tier1:
    name: Tier-1 PAN-OS
    runs-on: ubuntu-latest
    env:
      PANOS_HOST: ${{ secrets.PANOS_HOST }}
      PANOS_API_KEY: ${{ secrets.PANOS_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Report secret presence
        run: |
          if [ -z "$PANOS_HOST" ]; then
            echo "PANOS_* secrets not set; tier-1 tests will skip cleanly."
          else
            echo "PAN-OS secrets present; tier-1 tests will run live."
          fi

      - name: Run tier-1
        run: pytest tests/integration/tier1/test_palo_alto_tier1.py -v --no-header
