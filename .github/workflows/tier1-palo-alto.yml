name: Tier-1 Palo Alto

# Manual-dispatch only today. Once PANOS_HOST / PANOS_API_KEY secrets are
# populated, follow-on PR adds:
#   schedule:
#     - cron: '15 6 * * *'
# See tests/integration/README.md.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  tier1:
    name: Tier-1 PAN-OS
    runs-on: ubuntu-latest
    env:
      PANOS_HOST: ${{ secrets.PANOS_HOST }}
      PANOS_API_KEY: ${{ secrets.PANOS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Report secret presence
        run: |
          if [ -z "$PANOS_HOST" ]; then
            echo "PANOS_* secrets not set; tier-1 tests will skip cleanly."
          else
            echo "PAN-OS secrets present; tier-1 tests will run live."
          fi

      - name: Run tier-1
        run: pytest tests/integration/tier1/test_palo_alto_tier1.py -v --no-header
