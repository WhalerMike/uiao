# ScubaGear upstream pin — UIAO RFC-0026 enhancement E2
#
# Records the version of cisagov/ScubaGear that UIAO's SCUBA_TO_KSI_MAP
# (src/uiao/adapters/scubagear_adapter.py) has been reconciled against.
# The companion tracker workflow
# (.github/workflows/scubagear-upstream-track.yml) watches upstream
# releases and opens a canon-change issue whenever this pin falls
# behind, so map drift can't accumulate silently.
#
# Bump this file only through a PR that also:
#   1. Updates SCUBA_TO_KSI_MAP for any new policy IDs in the release
#   2. Adds new products/prefixes to tests/fixtures/scubagear_golden_sample.json
#   3. Cites the new ScubaGear tag in the PR description
#
# Canon references:
#   - docs/docs/uiao-rfc-0026-roadmap.md (E2)
#   - src/uiao/canon/UIAO_002_SCuBA_Technical_Specification_v1.0.md (Risk G-1)
#
# Upstream:
#   - https://github.com/cisagov/ScubaGear
#   - https://github.com/cisagov/ScubaGear/releases

scubagear_version: "1.7.1"
validated_at: "2026-04-27"
upstream_repo: cisagov/ScubaGear

# Policies with MS.SECURITYSUITE.* prefix were added to SCUBA_TO_KSI_MAP
# ahead of the Qwilfish release (due 2026-06-30, cisagov/ScubaGear#2104–
# #2110). These 22 entries are based on issue descriptions and must be
# reconciled against the shipped IDs when Qwilfish releases — the tracker
# will surface this automatically.
notes: |
  v1.6.0 reconciliation: MS.AAD.3.9v1 was already in the map (forward-looking).
  MS.EXO.1.1v1 was renamed to MS.EXO.1.1v2 in v1.6.0; added v2 entry (AC-4).
  MS.AAD.3.2v2 and MS.AAD.3.5v2 corrected to v1 (v2 does not exist in v1.7.x Rego).
  v1.7.0 reconciliation: MS.TEAMS.1.2v2/2.1v2/2.2v2 were already in the map
  (forward-looking). MS.TEAMS.3.1v1 was removed upstream; it was never in the map.
  v1.7.1 is a patch release (UNC path fix only); no policy-ID changes.
  Pre-Qwilfish: SECURITYSUITE entries remain forward-looking and will be
  re-validated when cisagov/ScubaGear Qwilfish milestone ships.
