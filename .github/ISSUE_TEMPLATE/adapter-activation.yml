name: Adapter activation request
description: Promote an adapter from reserved/phase-planning to active/phase-1
labels: [adapter, canon, needs-triage]
body:
  - type: input
    id: adapter_id
    attributes:
      label: Adapter ID
      description: kebab-case ID as it appears in core/canon/modernization-registry.yaml or adapter-registry.yaml
      placeholder: "e.g. mainframe, cyberark, bluecat-address-manager"
    validations:
      required: true
  - type: dropdown
    id: registry
    attributes:
      label: Target registry
      options:
        - modernization-registry.yaml (change-making)
        - adapter-registry.yaml (conformance / read-only)
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Activation checklist (all must be true)
      options:
        - label: Implementation exists at impl/src/uiao/impl/adapters/<adapter_id>_adapter.py
        - label: Adapter inherits DatabaseAdapterBase and implements all 7 canonical domain methods
        - label: At least one test in impl/tests/test_<adapter_id>_*.py passes locally
        - label: Registry entry has all required fields per adapter-registry.schema.json
        - label: mission-class is set correctly per UIAO_003 §4.2–§4.7
        - label: gcc-boundary, ssot-mutation, certificate-anchored, object-identity-only invariants are correct
  - type: textarea
    id: test_evidence
    attributes:
      label: Test evidence
      description: Paste the passing pytest output
      render: text
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Anything reviewers should know — known gaps, follow-up work, dependencies
