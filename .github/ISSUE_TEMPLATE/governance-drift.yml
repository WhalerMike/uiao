name: Governance drift report
description: Report suspected drift detected by substrate walker, drift engine, or manual review
labels: [drift, governance, needs-triage]
body:
  - type: dropdown
    id: drift_class
    attributes:
      label: Drift class
      description: Per docs/docs/16_DriftDetectionStandard.qmd
      options:
        - DRIFT-SCHEMA (structural — module/path/schema mismatch)
        - DRIFT-SEMANTIC (value staleness / freshness threshold)
        - DRIFT-PROVENANCE (broken derivation chain)
        - DRIFT-AUTHZ (consent envelope violation)
        - DRIFT-IDENTITY (issuer resolution failure)
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P1 (critical)
        - P2 (high)
        - P3 (medium)
        - P4 (low)
    validations:
      required: true
  - type: input
    id: detected_by
    attributes:
      label: Detected by
      placeholder: "e.g. uiao substrate walk, CI workflow, manual review"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste the walker output / finding JSON / failing test
      render: text
    validations:
      required: true
  - type: textarea
    id: affected_paths
    attributes:
      label: Affected paths
      description: Canon docs, adapters, or module paths involved
    validations:
      required: true
  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed fix
      description: Optional — if you see the remediation, describe it
