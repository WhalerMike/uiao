name: Bug report
description: Report a reproducible defect in canon, schema, CI, or runtime code
labels: [bug, needs-triage]
body:
  - type: dropdown
    id: module
    attributes:
      label: Affected module
      multiple: true
      options:
        - core/ (canon / schemas / ADRs)
        - docs/ (articles / narratives / Quarto site)
        - impl/ (Python CLI / adapters / tests)
        - .github/ (CI workflows / repo config)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      description: Output of `git rev-parse HEAD` on your checkout, or a release tag
      placeholder: "e.g. 2abc1def or v0.2.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Include actual vs expected behavior, error messages, and stack traces if applicable
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. export UIAO_WORKSPACE_ROOT=...
        2. Run `uiao substrate walk`
        3. Observe...
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P1 — critical, blocks primary use case
        - P2 — high, reliable workaround exists
        - P3 — medium, workaround possible
        - P4 — low, cosmetic / nice-to-have
    validations:
      required: true
