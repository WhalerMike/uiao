name: Canon change request
description: Propose adding, updating, or deprecating a canonical document in src/uiao/canon/
labels: [canon, governance, needs-triage]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Canon change kind
      options:
        - New canonical document (requires UIAO_NNN allocation)
        - Update existing document (cite the UIAO_NNN)
        - Deprecate existing document
        - New ADR
        - ADR supersession
        - Registry edit (adapter-registry / modernization-registry)
    validations:
      required: true
  - type: input
    id: document_id
    attributes:
      label: Affected UIAO_NNN or ADR-NNN
      placeholder: "e.g. UIAO_200, ADR-028, NEW"
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why is this canon change needed? What's wrong or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Paste the proposed new / updated canon content, or summarize the doctrinal shift
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Downstream impact
      description: Which adapters / docs / impl modules will need to change in response?
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checks
      options:
        - label: I've read the relevant existing ADR(s) under src/uiao/canon/adr/
        - label: I understand the UIAO_NNN reserved ranges (document-registry.yaml header)
        - label: I've confirmed this belongs in core/ and not as a consumer doc in docs/
