# Proposed addition to src/uiao/canon/adapter-registry.yaml
# ==========================================================
#
# Status: DRAFT — not yet merged into canon.
# Pattern: mirrors the `intune` reserved-slot entry (adapter-registry.yaml L260+).
# Parent draft: inbox/drafts/surface-integration-plan.md
# Anchor ADR: ADR-071 (Intune-First Asset Onboarding). No new ADR required for
#             the slot allocation itself — slot status is `reserved` / phase
#             `phase-planning`, which the existing canon doctrine allows
#             without a per-adapter activation ADR.
#
# Insert this entry after the `intune` entry in `adapters:` (alphabetical-ish
# grouping by Microsoft device-plane surfaces). Validate the fragment against
# `src/uiao/schemas/adapter-registry/adapter-registry.schema.json` before
# merging — in particular the `gcc-boundary` enum, `mission-class` enum, and
# `status` enum must already accept these values (they do, per the existing
# `intune` entry).

  - id: surface-management-portal
    name: Microsoft Surface Management Portal Fleet Telemetry Adapter
    class: conformance
    mission-class: telemetry
    status: reserved
    phase: phase-planning
    vendor: Microsoft
    license: Commercial
    runtime: python-3.12
    runner-class: github-hosted
    tenancy: per-customer
    scope:
      - surface-fleet-inventory
      - surface-firmware-versions
      - surface-dfci-compliance
      - surface-warranty-lifecycle
      - surface-device-health
    outputs:
      - surface-fleet-inventory.json
      - surface-firmware-drift-report.json
      - surface-dfci-compliance-report.json
    triggers:
      - workflow_dispatch
      - repository_dispatch
      - schedule
    evidence-class: interval
    retention-years: 3
    controls:
      - CM-8
      - SI-2
      - CA-7
      - SC-7
    automation-domain:
      - configuration-management
      - patch-management
    gcc-boundary: gcc-moderate
    ssot-mutation: never
    certificate-anchored: true
    object-identity-only: true
    references:
      - UIAO-CANON-003
      - ADR-071
      - UIAO_132
      - https://learn.microsoft.com/en-us/surface/surface-management-portal
    notes: >-
      Reserved Tier 4 conformance slot for the Microsoft Surface
      Management Portal (SMP). Read-only first-party fleet telemetry
      for Microsoft Surface hardware — firmware versions across the
      fleet, DFCI compliance status, warranty and lifecycle drift,
      and device-health signals. Distinct from the `intune` adapter
      (which observes Intune-managed-device compliance regardless of
      hardware vendor); SMP observes Surface-specific firmware and
      warranty state that does NOT flow through `/deviceManagement/
      managedDevices`. Read-only — observes Surface fleet state,
      never mutates configuration. Surface configuration authoring
      (DFCI profiles, Surface-specific compliance settings) flows
      through the existing `intune` modernization-side reserved slot
      (ADR-049) and is NOT covered here.


      Implementation deferred. Slot allocation only. When promoted to
      `active`, a per-adapter ADR will document the chosen Graph API
      / SMP REST endpoint set, OAuth scope minimization (read-only),
      runtime pin, and evidence-pack shape. Parent doctrine for
      Surface as a first-class asset class lives in
      `inbox/drafts/intune-first-asset-onboarding/platforms/
      windows-surface.md` (IFO_014).


      fedramp-rfc-0026 (advisory; per ADR-043 D4 \ UIAO_132 §5):
        requirement: RV5-CA07-VLN (endpoint-compliance telemetry — Surface-fleet supplement)
        pathway: pathway-2-traditional
        planned-pathway: pathway-1-modernized
        pathway-transition-trigger: Publication of the VDR Balance Improvement Release
        adr: ADR-043
