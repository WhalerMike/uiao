<!DOCTYPE html>
<html lang="en">
<head>

  <title>Redirecting to UIAO docs…</title>
  <meta name="robots" content="noindex,nofollow">

    (function () {
      var path = window.location.pathname || '/';
      var target = 'https://whalermike.github.io/uiao' + path + window.location.search + window.location.hash;

    })();
  </script>

  </style>
</head>
<body>
  <h1>UIAO documentation has moved.</h1>

  <script>
    document.getElementById('from').textContent = window.location.pathname;

</html>
