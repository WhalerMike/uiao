<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting to UIAO docs…</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://whalermike.github.io/uiao/">
  <script>
    (function () {
      var path = window.location.pathname || '/';
      if (path === '/' || path === '') {
        window.location.replace('https://whalermike.github.io/uiao/');
      } else {
        window.location.replace('https://whalermike.github.io/uiao' + path + window.location.search + window.location.hash);
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=https://whalermike.github.io/uiao/">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 40em; margin: 4em auto; padding: 0 1em; color: #333; }
    a { color: #4183c4; }
  </style>
</head>

  <p>Redirecting to <a href="https://whalermike.github.io/uiao/">whalermike.github.io/uiao</a>…</p>
  <p>If you are not redirected automatically, follow the link above.</p>
</body>
</html>
