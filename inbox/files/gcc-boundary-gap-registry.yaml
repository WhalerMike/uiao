    boundary_class: DRIFT-BOUNDARY
    severity: P1
    impact_category: security_control
    microsoft_status: PLANNING_PHASE
    root_cause: >
      Expedited updates feature in planning phase for GCC High and
      DoD. No confirmed ETA. Requires Windows Update for Business
      infrastructure that has government support gaps.
      Critical for rapid zero-day patch deployment — a P1 gap
      because it impacts SI-2 (Flaw Remediation) SLA capability.
    nist_controls:
      - "SI-2 (Flaw Remediation)"
      - "RA-5 (Vulnerability Monitoring)"
    compensating_control: UIAO-PATCH-001
    compensating_control_desc: >
      Standard Windows Update rings with compressed ring schedules
      (ring 0: 0 days, ring 1: 3 days, ring 2: 7 days) as
      compensating control. UIAO drift detection monitors update
      compliance state via Graph API and escalates per Appendix Q
      when patch deadlines are missed. Documents remediation
      timeline in SSP as accepted risk pending Microsoft delivery.
    status: COMPENSATED
    ksi_ids: ["KSI-028", "KSI-029"]
    ato_note: >
      P1 gap. SSP must document this as an accepted risk with
      compensating control. AO sign-off required. Track Microsoft
      government roadmap and close when feature ships.

