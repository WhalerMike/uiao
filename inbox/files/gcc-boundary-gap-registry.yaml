# ---------------------------------------------------------------
# INTUNE DEVICE MANAGEMENT CAPABILITIES
# ---------------------------------------------------------------

  - id: GAP-INT-008
    feature: "Windows Device Health Attestation (DHA)"
    service: "Microsoft Intune"
    portal_path: "Devices > Compliance > Windows Health Attestation"
    boundary_class: DRIFT-BOUNDARY
    severity: P1
    impact_category: security_control
    microsoft_status: PLANNING_PHASE
    root_cause: >
      Device Health Attestation requires TPM attestation data flow
      to Microsoft Health Attestation Service. Government support
      in planning phase with no confirmed ETA for GCC-Moderate.
      DHA is a foundational Zero Trust device trust signal —
      its absence means device trust relies on Intune enrollment
      state rather than hardware attestation.
    nist_controls:
      - "SI-7 (Software and Information Integrity)"
      - "IA-3 (Device Identification and Authentication)"
    compensating_control: none
    status: GAP_UNMITIGATED
    ksi_ids: ["KSI-098", "KSI-099"]
    ato_note: >
      P1 UNMITIGATED gap. This is the most significant security
      control gap in the GCC-Moderate Intune deployment. Device
      trust signals rely on Intune enrollment + compliance policy
      rather than hardware attestation. AO must formally accept
      this risk. Track Microsoft roadmap for government DHA support.
      Consider TPM-based attestation via third-party FedRAMP-
      authorized tooling (e.g., Venafi, Keyfactor) as interim.

