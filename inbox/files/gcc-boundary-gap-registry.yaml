# ---------------------------------------------------------------
# AZURE ARC OBSERVABILITY
# ---------------------------------------------------------------

  - id: GAP-ARC-001
    feature: "Azure Monitor Extension Telemetry"
    service: "Azure Arc / Azure Monitor"
    portal_path: "Azure Portal > Arc > Servers > Insights"
    boundary_class: DRIFT-BOUNDARY
    severity: P2
    impact_category: operational_visibility
    microsoft_status: SILENTLY_BLOCKED
    root_cause: >
      Azure Monitor Agent (AMA) and Log Analytics Agent send
      telemetry to Azure Monitor ingestion endpoints
      (*.ods.opinsights.azure.com, *.oms.opinsights.azure.com).
      If FedRAMP network controls restrict these commercial Azure
      endpoints, monitoring extensions install successfully but
      produce no data. Servers appear enrolled but visibility
      plane is dark.
    nist_controls:
      - "SI-4 (System Monitoring)"
      - "AU-2 (Audit Events)"
    compensating_control: UIAO-TELEM-002
    compensating_control_desc: >
      UIAO in-boundary telemetry aggregation collects server health
      via WMI/CIM. For servers where Azure Monitor endpoints are
      reachable, AMA functions normally. For servers where endpoints
      are blocked, UIAO aggregation provides equivalent visibility.
      Log data forwarded to Log Analytics workspace or SIEM via
      on-premises forwarder within boundary.
    status: COMPENSATED
    ksi_ids: ["KSI-047", "KSI-052"]

  - id: GAP-ARC-002
    feature: "Azure Arc Change Tracking and Inventory"
    service: "Azure Arc / Azure Automation"
    portal_path: "Azure Portal > Arc > Servers > Change Tracking"
    boundary_class: DRIFT-BOUNDARY
    severity: P2
    impact_category: security_control
    microsoft_status: SILENTLY_BLOCKED
    root_cause: >
      Change Tracking depends on Log Analytics workspace. Same
      endpoint dependency as GAP-ARC-001. Tracks software
      installations, registry changes, file changes — a key
      ConMon signal.
    nist_controls:
      - "CM-3 (Configuration Change Control)"
      - "CM-8 (System Component Inventory)"
    compensating_control: UIAO-CHANGE-001
    compensating_control_desc: >
      UIAO survey adapter tracks installed software, running
      services, and configuration state via WMI. Compares against
      canonical baseline and emits DRIFT-SCHEMA findings for
      unauthorized changes. Feeds KSI signal set.
    status: COMPENSATED
    ksi_ids: ["KSI-041", "KSI-042"]

  - id: GAP-ARC-003
    feature: "Azure Arc VM Insights"
    service: "Azure Arc / Azure Monitor"
    portal_path: "Azure Portal > Arc > Servers > Insights > Performance"
    boundary_class: DRIFT-BOUNDARY
    severity: P3
    impact_category: operational_visibility
    microsoft_status: SILENTLY_BLOCKED
    root_cause: >
      VM Insights performance maps and dependency maps require
      Azure Monitor ingestion. Same telemetry dependency as ARC-001.
    nist_controls:
      - "SI-4 (System Monitoring)"
    compensating_control: UIAO-TELEM-002
    status: COMPENSATED
    ksi_ids: ["KSI-053"]

  - id: GAP-ARC-004
    feature: "Microsoft Defender for Servers (ARC)"
    service: "Azure Arc / Defender for Cloud"
    portal_path: "Azure Portal > Defender for Cloud > Inventory"
    boundary_class: DRIFT-BOUNDARY
    severity: P1
    impact_category: security_control
    microsoft_status: SILENTLY_BLOCKED
    root_cause: >
      Defender for Servers Plan 1/2 on Arc-enrolled servers requires
      Defender for Endpoint onboarding and telemetry to Microsoft
      Defender backend. If Defender telemetry endpoints are blocked
      per FedRAMP controls, Defender operates in degraded mode —
      enrolled but not reporting to Defender for Cloud. Security
      posture dashboard shows no data.
    nist_controls:
      - "SI-3 (Malicious Code Protection)"
      - "SI-4 (System Monitoring)"
      - "IR-5 (Incident Monitoring)"
    compensating_control: UIAO-SEC-001
    compensating_control_desc: >
      Verify Defender for Endpoint telemetry endpoints are in
      FedRAMP network allowlist (these may be separately authorized).
      If blocked: deploy on-premises SIEM (Splunk, Sentinel on-prem)
      as compensating control. UIAO KSI signal set includes Defender
      compliance state queries via Graph Security API where available.
    status: GAP_UNMITIGATED
    ksi_ids: ["KSI-015", "KSI-016"]
    ato_note: >
      P1 UNMITIGATED. Requires explicit AO risk acceptance or
      Defender endpoint allowlisting decision. Defender for Endpoint
      commercial endpoints may have separate FedRAMP authorization
      determination — verify with agency ISSO.

