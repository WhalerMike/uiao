gaps:

  - id: GAP-INT-001
    feature: "Endpoint Analytics"
    service: "Microsoft Intune"
    portal_path: "Reports > Endpoint Analytics"
    boundary_class: DRIFT-BOUNDARY
    severity: P2
    impact_category: operational_visibility
    microsoft_status: SILENTLY_BLOCKED
    root_cause: >
      Requires DiagTrack (Connected User Experiences and Telemetry)
      service running and sending functional data to Microsoft public
      cloud endpoints. FedRAMP Moderate compliance controls block
      *.events.data.microsoft.com and vortex.data.microsoft.com.
      Feature shows in portal. Dashboard permanently empty.
    nist_controls:
      - "SI-4 (System Monitoring)"
      - "SI-2 (Flaw Remediation)"
    compensating_control: UIAO-TELEM-001
    compensating_control_desc: >
      UIAO in-boundary telemetry aggregation collects equivalent
      device health signals via WMI/CIM and Graph API management
      plane. Replaces Endpoint Analytics boot score, app reliability,
      and device performance reports within FedRAMP boundary.
    status: COMPENSATED
    ksi_ids: ["KSI-047", "KSI-048"]
    ato_note: >
      SSP must not claim Endpoint Analytics as a functioning SI-4
      implementation. Document UIAO telemetry aggregation as the
      compensating control for this gap.

