    feature: "Locations (Network Fence)"
    service: "Microsoft Intune"
    portal_path: "Devices > Compliance > Locations"
    boundary_class: DRIFT-BOUNDARY
    severity: P2
    impact_category: location_compliance
    microsoft_status: EXPLICITLY_UNAVAIL
    root_cause: >
      Intune Locations feature explicitly documented as unavailable
      for GCC High and government customers. Provides network
      geofencing for device compliance policies. Cannot be enabled
      regardless of configuration.
    nist_controls:
      - "AC-17 (Remote Access)"
      - "AC-20 (Use of External Systems)"
    compensating_control: UIAO-ORG-001
    compensating_control_desc: >
      OrgPath-scoped dynamic device groups replace geographic
      location targeting with organizational identity targeting.
      Conditional Access Named Locations (IP-range based) provide
      network boundary compliance scoping where physical location
      enforcement is required. OrgPath is architecturally superior
      for centralized-datacenter environments.
    status: COMPENSATED
    ksi_ids: ["KSI-112", "KSI-113"]
    ato_note: >
      Conditional Access Named Locations (IP-range) remain available
      and serve as the primary network boundary control.
      Document OrgPath-scoped device groups as the organizational
      boundary control replacing the Locations feature.

