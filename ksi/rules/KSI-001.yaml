KSI_ID: KSI-001
Title: Multi-Factor Authentication Enforcement
Description: Evaluates whether MFA is enforced for all privileged and non-privileged accounts.
Source:
  SCuBA_Field: MFAEnabled
    Data_Type: Boolean
    Evaluation:
      Logic: IF MFAEnabled == true THEN PASS ELSE FAIL
      Severity:
        PASS: Low
          FAIL: High
          Mappings:
            NIST_800-53: IA-2, IA-2(1), IA-2(11)
              FedRAMP: IA-2, IA-2(1)
                CISA_SCUBA: M365-ACCT-001
                Provenance:
                  Ruleset_Version: 1.0
                    Adapter_Version: 1.0
