# data/control-planes.yml
# UIAO Control Planes canonical definition.
# Used by overlay_loader tests to verify vendor-neutral plane names.

control_planes:
  - id: identity
    title: Identity Plane
    subtitle: Identity Provider + ICAM + Zero Trust
    description: >
      Manages user and device identity, authentication, and access control
      across the UIAO architecture.
    components:
      - name: Identity Provider
        type: saas
      - name: MFA / FIDO2
        type: saas
      - name: Privileged Access Management
        type: saas

  - id: addressing
    title: Addressing Plane
    subtitle: IPAM Platform
    description: >
      Manages IP address space, DNS resolution, and asset tracking
      across the enterprise network.
    components:
      - name: IPAM
        type: on-prem
      - name: DNS
        type: on-prem
      - name: CMDB
        type: saas

  - id: overlay
    title: Overlay Plane
    subtitle: ZTNA / SD-WAN Platform
    description: >
      Provides secure overlay networking, zero-trust network access,
      and microsegmentation capabilities.
    components:
      - name: ZTNA Gateway
        type: saas
      - name: SD-WAN Controller
        type: saas
      - name: Microsegmentation Engine
        type: saas

  - id: telemetry
    title: Telemetry Plane
    subtitle: SIEM / Log Analytics Platform
    description: >
      Collects, aggregates, and analyzes security telemetry from all
      planes to enable continuous monitoring and threat detection.
    components:
      - name: SIEM
        type: saas
      - name: UEBA
        type: saas
      - name: Log Analytics
        type: saas

  - id: management
    title: Management Plane
    subtitle: Policy + Automation Platform
    description: >
      Orchestrates policy enforcement, automation, and continuous
      compliance monitoring across all UIAO planes.
    components:
      - name: Policy Engine
        type: saas
      - name: ConMon Dashboard
        type: internal
      - name: Automation Orchestrator
        type: saas

  - id: network
    title: Network Plane
    subtitle: SD-WAN Platform
    description: >
      Manages physical and virtual network connectivity, routing,
      and traffic engineering.
    components:
      - name: SD-WAN
        type: saas
      - name: Firewall
        type: on-prem

# FedRAMP 20x Control Plane Alignment
# Generic (vendor-neutral) evidence sources. Overlays replace these with vendor-specific values.
fedramp_20x_control_plane_alignment:
  - plane_id: identity
    evidence_source: "Identity Provider sign-in and risk logs"
  - plane_id: addressing
    evidence_source: "IPAM Platform API - deterministic IP inventory"
  - plane_id: overlay
    evidence_source: "ZTNA / SD-WAN telemetry and access logs"
  - plane_id: telemetry
    evidence_source: "SIEM aggregated log analytics"
  - plane_id: management
    evidence_source: "Policy engine audit logs and automation records"
  - plane_id: network
    evidence_source: "SD-WAN telemetry and routing logs"
  - plane_id: endpoint
    evidence_source: "Endpoint compliance state and detection signals"
