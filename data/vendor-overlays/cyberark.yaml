# CyberArk vendor overlay for UIAO-Core
#
# Apply this overlay to replace generic PAM abstract component names with
# CyberArk Privilege Cloud / PAS-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  privileged_access:
    name: CyberArk Privilege Cloud
    vendor: CyberArk
    abstract_type: PAMProvider
    capabilities:
      - Privileged Session Manager (PSM)
      - Privileged Threat Analytics (PTA)
      - Central Policy Manager (CPM)
      - Secrets Manager
      - Conjur (DevOps Secrets)
      - Just-in-Time Access

nist_mappings:
  AC-2: "CyberArk Privilege Cloud account lifecycle management"
  AC-6: "CyberArk least-privilege vault policies and safe ACLs"
  AC-17: "CyberArk PSM for remote privileged session brokering"
  IA-2: "CyberArk MFA challenge on vault authentication"
  IA-5: "CyberArk CPM automated credential rotation"
  AU-3: "CyberArk PTA session recording and keystroke audit"
  AU-12: "CyberArk Privilege Cloud audit event generation"

evidence_sources:
  - name: CyberArk Vault Configuration Export
    type: api
    endpoint: /PasswordVault/API/Configuration
  - name: CyberArk Session Recordings
    type: archive
    retention: 365 days
  - name: CyberArk PTA Analytics
    type: siem_feed
    destination: Splunk / Microsoft Sentinel
