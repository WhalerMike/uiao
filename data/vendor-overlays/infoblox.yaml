# InfoBlox vendor overlay for UIAO-Core
#
# Apply this overlay to replace generic DDI/DNS abstract component names with
# InfoBlox BloxOne DDI-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  dns_ipam:
    name: InfoBlox BloxOne DDI
    vendor: InfoBlox
    abstract_type: DNSProvider
    capabilities:
      - DNS
      - DHCP
      - IPAM
      - DNSSEC
      - Threat Intelligence
      - DNS Firewall (RPZ)

nist_mappings:
  CM-8: "InfoBlox DDI deterministic endpoint registration and IPAM inventory"
  AU-3: "InfoBlox DNS query logging with source IP and timestamp"
  SI-4: "InfoBlox DNS Firewall RPZ threat intelligence blocking"
  SC-20: "InfoBlox DNSSEC secure name resolution"
  SC-21: "InfoBlox DNSSEC resolver validation"

evidence_sources:
  - name: InfoBlox BloxOne DDI API
    type: api
    endpoint: /api/ddi/v1/ipam
  - name: InfoBlox DNS Query Log Export
    type: siem_feed
    destination: Splunk / Microsoft Sentinel
    retention: 365 days
  - name: InfoBlox Threat Intelligence Feed
    type: api
    endpoint: /api/atcfw/v1/security_policies
