# CrowdStrike EDR/EPP vendor overlay for UIAO-Core
#
# Apply this overlay to replace the generic abstract component names with
# CrowdStrike Falcon-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  edr:
    name: CrowdStrike Falcon
    vendor: CrowdStrike
    abstract_type: EDR
    fedramp_families:
      - RA
      - SI
    capabilities:
      - Endpoint Detection and Response
      - Next-Gen Antivirus (NGAV)
      - Threat Intelligence
      - Vulnerability Management
      - Device Control
      - Managed Threat Hunting (Falcon OverWatch)
      - Zero Trust Assessment
      - FedRAMP Authorized (Falcon GovCloud)
