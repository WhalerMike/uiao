control-id: AU-6
title: Audit Record Review, Analysis, and Reporting
status: implemented
implemented-by:
  - microsoft-sentinel
narrative: |
  **Automated Audit Review**
  The organization utilizes Microsoft Sentinel to automate the review and analysis of audit records. Sentinel Analytics rules scan incoming logs for Indicators of Compromise (IoC) and anomalous patterns, such as mass file deletions or impossible travel.

  **Reporting and Escalation**
  High-priority alerts are automatically escalated to the Security Operations Center (SOC) via integrated playbooks. Weekly audit summary reports are generated and reviewed by the ISSO to ensure ongoing compliance and visibility.
parameters:
  review-frequency: "Weekly"
  alert-severity-threshold: "Medium/High"
evidence:
  - type: report
    ref: sentinel-weekly-security-summary
related_controls:
  - AU-2
  - IR-4
