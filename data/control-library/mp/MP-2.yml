control_id: MP-2
title: Media Access
family: Media Protection (MP)
status: Implemented
implemented_by:
  - Microsoft Intune
  - Microsoft Defender for Endpoint
  - CrowdStrike Falcon
evidence:
  - artifact: Intune Device Compliance Policy
    location: Intune Admin Center > Device Compliance > Removable Media
    format: Policy Export
  - artifact: Endpoint DLP Policy
    location: Microsoft Purview > DLP > Endpoint Policies
    format: Policy Export
parameters:
  - id: PARAM-MP-002-001
    text: Removable media access is restricted to authorized personnel only
    value: Authorized personnel with justified need
  - id: PARAM-MP-002-002
    text: USB storage devices are blocked by default on managed endpoints
    value: Blocked by default via Intune policy
narrative: |
  **Media Access Controls**
  The organization restricts access to digital and non-digital
  media to authorized personnel only (PARAM-MP-002-001).
  Microsoft Intune enforces removable media policies that block
  USB storage devices by default on all managed endpoints
  (PARAM-MP-002-002).

  **Technical Enforcement**
  Intune device configuration profiles disable USB mass storage
  class drivers on all managed Windows endpoints. Exceptions
  require ServiceNow change request approval and are granted
  through targeted Intune policy assignments. CrowdStrike Falcon
  and Microsoft Defender for Endpoint monitor for unauthorized
  removable media connections and generate alerts.

  **Physical Media Access**
  Physical media containing system information is stored in
  controlled-access areas. Access to media storage locations
  requires badge access logged through the physical access
  control system. Media checkout and return is tracked through
  ServiceNow asset management.

  **Monitoring and Audit**
  All removable media connection events are logged to Microsoft
  Sentinel for analysis. Unauthorized media access attempts
  trigger automated alerts to the SOC under IR-4.
related_controls:
  - MP-1  # Media Protection Policy and Procedures
