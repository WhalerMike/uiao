parameters:
  - id: PARAM-SA-004-9-001
    description: >-
      Requirement for developers and vendors to identify functions, ports,
      protocols, and services required for the operation of acquired systems
      and components.
    value: "Vendors must provide a complete port, protocol, and service matrix prior to integration into the UIAO network environment"
  - id: PARAM-SA-004-9-002
    description: >-
      Process for reviewing and approving vendor-specified functions, ports,
      protocols, and services before permitting network connectivity.
    value: "ISSO and Network Security team review and approve firewall rule requests in ServiceNow before Palo Alto NGFW rules are created"

narrative: |
  **Port, Protocol, and Service Documentation Requirement**
  The organization requires developers and vendors of acquired systems
  and services to identify the functions, ports, protocols, and services
  required for their operation (PARAM-SA-004-9-001). Acquisition contracts
  include a mandatory network requirements annex where vendors document
  all required inbound and outbound communications, including port numbers,
  transport protocols, application protocols, and service descriptions.
  This documentation is reviewed by the ISSO and Network Security team
  before any network connectivity is provisioned.

  **Firewall Rule Approval Workflow**
  Vendor-specified ports, protocols, and services are reviewed and approved
  through a formal firewall rule change request process in ServiceNow
  (PARAM-SA-004-9-002). The ISSO and Network Security team evaluate
  requests against organizational security policy and minimum necessary
  access principles. Approved rules are implemented in Palo Alto NGFW
  with specific justification and review dates documented. Unapproved
  services are blocked by default per the deny-by-default posture
  enforced by **SC-7(5)** (Boundary Protection | Deny by Default).

  **DNS Service Inventory**
  Infoblox DNS maintains an authoritative inventory of services and their
  associated DNS records within the UIAO environment, providing visibility
  into active services and supporting anomaly detection. New vendor services
  require DNS registration in Infoblox before network connectivity is
  established, creating a discoverable record of all approved services.

  **Ongoing Review and Recertification**
  Annually, the ISSO reviews the approved port, protocol, and service matrix
  to identify services no longer required or whose vendor authorization has
  changed. Obsolete rules are removed through the ServiceNow change management
  process. Microsoft Sentinel monitors for traffic on unapproved ports and
  generates alerts, supporting **SI-4** (System Monitoring) requirements.

