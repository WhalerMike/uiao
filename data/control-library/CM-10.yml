# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : CM-10
# Title      : Software Usage Restrictions
# Schema     : data/control-library (uiao-core canonical format)

control_id: CM-10
title: "Software Usage Restrictions"
family: Configuration Management
status: not-implemented

implemented_by:
  - intune-mdm
  - servicenow-itsm
  - crowdstrike-falcon
  - microsoft-365

evidence:
  - uiao-software-usage-policy-document
  - intune-authorized-application-catalog
  - servicenow-software-procurement-records
  - crowdstrike-application-control-enforcement-log

parameters:
  - id: cm_10_license_tracking_method
    description: >-
      Method used to track software licenses and ensure usage
      remains within authorized quantities.
    value: "Microsoft 365 license management portal for SaaS subscriptions; ServiceNow Software Asset Management (SAM) module for on-premise and perpetual licenses; Azure subscription billing tags for cloud service entitlements"
  - id: cm_10_prohibited_software_categories
    description: >-
      Categories of software explicitly prohibited from installation
      or use within the UIAO system environment.
    value: "Unlicensed or pirated software, peer-to-peer file sharing applications, unauthorized remote access tools, cryptocurrency mining software, unapproved cloud storage applications, software from sanctioned country vendors"

narrative: |
  **Software License Compliance and Usage Tracking**
  The UIAO system ensures that software is used in accordance
  with applicable licensing agreements and contracts through
  a software asset management program that tracks software
  usage against authorized license quantities using the method
  defined in PARAM cm_10_license_tracking_method. Microsoft 365
  license assignments are managed centrally through the Microsoft
  365 Admin Center, which provides real-time visibility into
  assigned versus available license quantities. ServiceNow
  Software Asset Management (SAM) maintains records of all
  perpetual and subscription software licenses, reconciling
  installation counts against licensed quantities during
  quarterly SAM reviews. This satisfies the CM-10 requirement
  for software usage restrictions and supports **CM-7** (Least
  Functionality) and **SA-4** (Acquisition Process) objectives.

  **Software Procurement and Authorization**
  All software used within the UIAO environment must be procured
  through the approved acquisition process and authorized in the
  ServiceNow software catalog before deployment. Software requests
  are submitted as ServiceNow catalog items and reviewed by the
  ISSO for security impact, by Procurement for license compliance,
  and by the System Owner for business justification before
  approval. Software that has not completed the authorization
  process cannot be added to the Intune application catalog and
  is blocked from execution by CrowdStrike application control
  policies. This ensures that only licensed, security-reviewed
  software is deployed within the system boundary.

  **Prohibited Software Prevention**
  The software categories defined in PARAM cm_10_prohibited_software_categories
  are actively prevented from installation and execution through
  technical controls. CrowdStrike Falcon application control
  maintains a deny-list of prohibited application hashes and
  publisher identities that blocks execution of prohibited software
  regardless of user privilege level. Intune application management
  policies prevent installation of unapproved applications from
  outside the managed application catalog on mobile devices.
  Microsoft Defender for Cloud Apps identifies and blocks access
  to unauthorized cloud storage and SaaS applications, preventing
  shadow IT usage of unlicensed services.

  **Peer-to-Peer and Unauthorized Remote Access Controls**
  Palo Alto NGFW application control policies block network
  traffic associated with peer-to-peer file sharing protocols
  and unauthorized remote access tools including unapproved
  VPN clients and remote desktop software not managed by
  CyberArk PSM. These network-layer controls complement the
  endpoint-layer application controls, ensuring that prohibited
  software is prevented from operating even if it bypasses
  endpoint detection.

