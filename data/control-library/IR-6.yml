narrative: |
{{ organization.name }} reports security incidents to designated authorities within required timeframes.

**Reporting Workflow**
High-severity incidents are escalated immediately to the ISSO and external authorities (US-CERT / Agency SOC). Automated notifications from Sentinel include enriched context and investigation links.
