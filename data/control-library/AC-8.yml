# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AC-8
# Title      : System Use Notification
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-8
title: System Use Notification
family: Access Control
status: implemented

implemented_by:
    - entra-id
    - intune-mdm
    - group-policy

evidence:
    - entra-id-terms-of-use-policy
    - intune-login-banner-configuration
    - group-policy-logon-banner-settings

parameters:
    - id: PARAM-AC-008-001
      description: >-
          System use notification message displayed to users
          before granting access to the system.
      value: "See agency-approved System Use Notification Banner text"

narrative: |
  **Entra ID Terms of Use**
  The organization displays a system use notification to all users
  before granting access to cloud resources. Entra ID Conditional
  Access policies enforce a Terms of Use acceptance requirement as
  a condition of authentication. Users must acknowledge the
  organization-approved use notification (PARAM-AC-008-001) before
  being granted an access token. Acceptance records are logged in
  Entra ID audit logs and retained for compliance review, supporting
  **AU-2** (Event Logging) and **AU-11** (Audit Record Retention).

  **Windows Logon Banner via Group Policy**
  On-premises and hybrid-joined Windows endpoints display the
  approved system use notification banner at the Windows logon
  screen via Group Policy Object (GPO) settings. The interactive
  logon message title and text are configured centrally and
  deployed to all domain-joined devices. Users must click
  "OK" to acknowledge the banner before authentication proceeds.
  GPO compliance is validated through Intune configuration
  profiles for hybrid-joined devices.

  **Mobile Device Notification**
  Microsoft Intune MDM deploys a managed app configuration
  policy that presents the system use notification on managed
  mobile devices (iOS and Android) at application launch for
  all agency applications protected by Conditional Access.
  Non-compliant devices that cannot display the notification
  are blocked from accessing protected resources, consistent
  with **AC-19** (Mobile Device Access Control).

  **Privacy and Monitoring Notice**
  The system use notification includes required language
  regarding authorized use, consent to monitoring, and
  consequences of unauthorized access. The notification text
  is reviewed annually by the ISSO and updated through the
  governance process defined in **PL-4** (Rules of Behavior).

related_controls:
    - AC-2   # Account Management
    - AC-14  # Permitted Actions Without Identification
    - AC-19  # Mobile Device Access Control
