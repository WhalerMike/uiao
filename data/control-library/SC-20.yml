control_id: SC-20
title: "Secure Name/Address Resolution Service (Authoritative Source)"
family: System and Communications Protection
status: not-implemented

implemented_by:
  - infoblox
  - azure-key-vault
  - microsoft-sentinel
  - palo-alto-ngfw

evidence:
