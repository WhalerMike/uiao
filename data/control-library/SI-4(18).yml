narrative: |
  **Covert Exfiltration Detection Framework**
  The organization analyzes outbound communications traffic to discover
  or detect covert exfiltration of information (PARAM-SI-004-18-001).
  Microsoft Sentinel's User and Entity Behavioral Analytics (UEBA)
  establishes baselines for normal data transfer patterns per user,
  device, and application, and detects statistically anomalous data
  volumes that may indicate exfiltration. Network traffic analytics
  identify beaconing patterns, unusual destination geographies, and
  protocol anomalies associated with data staging and exfiltration.

  **SSL/TLS Inspection for Encrypted Exfiltration**
  Palo Alto NGFW performs SSL/TLS inspection on outbound HTTPS traffic
  (PARAM-SI-004-18-002), enabling detection of exfiltration attempts
  concealed within encrypted channels. Data Loss Prevention (DLP)
  profiles applied to decrypted outbound traffic detect sensitive
  data patterns including PII, financial data, and classified
  information in outbound streams. DLP match events are forwarded
  to Microsoft Sentinel for correlation with other exfiltration
  indicators, reducing false positive rates through multi-signal
  correlation.

  **DNS Tunneling Detection**
  Infoblox DNS monitoring applies behavioral analytics to DNS query
  patterns to detect DNS tunneling, a technique that encodes data
  within DNS queries and responses to bypass network controls.
  Indicators include unusually long DNS queries, high query frequency
  to single domains, and entropy analysis of subdomain labels.
  DNS tunneling detection alerts are forwarded to Microsoft Sentinel
  for correlation with endpoint and network telemetry to confirm
  or dismiss exfiltration activity.

  **ICMP and Non-Standard Protocol Monitoring**
  Microsoft Sentinel network traffic analytics detect covert channel
  usage in ICMP traffic, unusual TCP/UDP port utilization, and
  protocol anomalies that may indicate custom exfiltration tooling.
  Palo Alto NGFW App-ID identifies applications using unexpected
  protocols, alerting on protocol mismatches that commonly indicate
  tunneling or obfuscation techniques. Confirmed covert exfiltration
  indicators generate P1 ServiceNow incidents and trigger automated
  Sentinel response playbooks for immediate containment actions,
  supporting **IR-4** (Incident Handling) requirements.

