narrative: |
  **Insider Threat Awareness Training**
  The organization provides insider threat awareness training to all
  personnel with access to UIAO systems as part of the annual security
  literacy training program (PARAM-AT-002-2-001). Training is delivered
  through the Learning Management System (LMS) and covers recognition of
  insider threat indicators, including unusual access patterns, data
  exfiltration attempts, unauthorized system modifications, and behavioral
  warning signs. Training content aligns with NIST SP 800-55 and the
  National Insider Threat Policy established by NSPM-21.

  **Training Content and Scope**
  Insider threat training modules address the following topics
  (PARAM-AT-002-2-002): categories of insider threats (malicious,
  negligent, compromised), common data exfiltration techniques and how
  to recognize them, acceptable versus unacceptable use of organizational
  systems, consequences of insider threat activity including criminal and
  administrative penalties, and obligations to report suspicious behavior.
  Role-specific modules are delivered to privileged users, system
  administrators, and personnel with access to sensitive data, providing
  additional depth on access abuse risks and technical indicators.

  **Reporting Mechanisms and Culture**
  Personnel are trained to report suspected insider threat activity through
  ServiceNow anonymous reporting workflows and direct ISSO notification
  (PARAM-AT-002-2-003). The reporting process is reviewed during training
  with scenarios illustrating reportable behaviors. A non-retaliation
  policy is communicated to encourage reporting without fear of reprisal.
  All reports are triaged by the ISSO and escalated to the insider threat
  program manager as appropriate, supporting **IR-6** (Incident Reporting).

  **Technical Correlation with User Behavior Analytics**
  Microsoft Sentinel User and Entity Behavior Analytics (UEBA) provides
  continuous monitoring of user activity patterns to detect anomalous
  behaviors associated with insider threats, including after-hours access,
  bulk data downloads, and lateral movement. Sentinel alerts are correlated
  with HR data from ServiceNow to identify personnel in high-risk situations
  (e.g., recent termination notices, disciplinary actions). This technical
  layer complements the awareness training program and supports **SI-4**
  (System Monitoring) and **AC-2** (Account Management) objectives.

