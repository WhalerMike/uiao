narrative: |
  **Role-Based Separation via Entra ID**
  The organization enforces separation of duties through Entra ID
  Privileged Identity Management (PIM) and role-based access control
  (RBAC). Administrative roles are structured so that no single
  individual can authorize, execute, and review the same transaction.
  Security administration, audit review, and system operations are
  assigned to distinct role groups with mutually exclusive membership
  enforced by Entra ID access packages. Conditional Access policies
  prevent role stacking for incompatible functions, supporting
  **AC-2** (Account Management) and **AC-6** (Least Privilege).

  **Privileged Access Separation**
  CyberArk Privileged Access Manager enforces separation between
  standard user credentials and privileged credentials. Privileged
  accounts are vaulted and checked out through approval workflows
  that require a separate approver from the requestor. Dual-control
  access is enforced for Tier 0 assets (domain controllers, PKI,
  SIEM), ensuring no single administrator can make unilateral
  changes. All privileged session activity is recorded and streamed
  to Microsoft Sentinel for correlation with **AU-2** and **AU-6**.

  **Change Management Separation**
  ServiceNow change management workflows enforce separation between
  change requestors, approvers, and implementers. No individual can
  approve their own change request. Emergency change procedures
  require post-implementation review by an independent party.
  Change records are linked to CMDB configuration items supporting
  **CM-3** (Configuration Change Control) and **CM-5** (Access
  Restrictions for Change).

related_controls:
