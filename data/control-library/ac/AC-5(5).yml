# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AC-5(5)
# Title      : Separation of Duties | Account Types
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-5(5)
title: "Separation of Duties | Account Types"
family: Access Control
status: not-implemented

implemented_by:
  - entra-id
  - cyberark-pas
  - servicenow-itsm
  - microsoft-sentinel

evidence:
  - entra-id-role-separation-policy-configuration
