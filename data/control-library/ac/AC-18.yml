# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AC-18
# Title      : Wireless Access
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-18
title: Wireless Access
family: Access Control
status: implemented

implemented_by:
  - entra-id
  - intune-mdm
  - cisco-catalyst
  - palo-alto-ngfw

evidence:
  - intune-wireless-configuration-profiles
  - cisco-catalyst-wlan-security-policy
  - entra-id-conditional-access-device-compliance-report
  - palo-alto-wireless-segmentation-policy

parameters:
  - id: ac_18_wireless_authentication_method
    description: >-
      Authentication method required for all organizational wireless
      network connections, enforced via Cisco Catalyst and Intune.
    value: "WPA3-Enterprise with 802.1X / Entra ID device certificate"
  - id: ac_18_wireless_encryption_standard
    description: >-
      Encryption standard applied to all wireless transmissions carrying
      federal or organizational data.
    value: "AES-256 / WPA3"

narrative: |
  **Authenticated and Encrypted Wireless Access**
  The organization restricts wireless access to authorized users and
  devices through WPA3-Enterprise with 802.1X authentication backed by
  Entra ID-issued device certificates managed via Microsoft Intune MDM.
  Only Intune-compliant, Entra ID-registered devices are permitted to
  associate with organizational wireless networks, with certificate-based
  authentication eliminating the risk of credential-based wireless
  compromise. This enforces the identity verification requirements of
  **IA-2** and **IA-3** at the wireless access layer.

  **Network Segmentation and Traffic Inspection**
  Cisco Catalyst wireless infrastructure enforces SSID-level VLAN
  segmentation, isolating corporate wireless traffic from guest and IoT
  segments. Palo Alto NGFW inspects all wireless-sourced traffic at
  segment boundaries, applying user- and application-aware policies
  consistent with **AC-3** (Access Enforcement) and **SC-7** (Boundary
  Protection). All wireless traffic carrying federal data is encrypted
  end-to-end using AES-256, satisfying **SC-8** (Transmission
  Confidentiality and Integrity) requirements.

  **Continuous Compliance Monitoring**
  Microsoft Intune continuously monitors wireless configuration profile
  compliance on managed endpoints. Devices falling out of compliance with
  wireless security policies are automatically quarantined from
  organizational network segments via Entra ID Conditional Access device
  compliance signals. Wireless access events are logged to Microsoft
  Sentinel for anomaly detection in support of **AU-2** and **SI-4**
  continuous monitoring requirements.

related_controls:
  - AC-3   # Access Enforcement
  - IA-2   # Identification and Authentication
  - IA-3   # Device Identification and Authentication
  - SC-7   # Boundary Protection
  - SC-8   # Transmission Confidentiality and Integrity
  - AU-2   # Event Logging
  - SI-4   # System Monitoring
