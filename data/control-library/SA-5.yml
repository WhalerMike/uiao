# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : SA-5
# Title      : System Documentation
# Schema     : data/control-library (uiao-core canonical format)

control_id: SA-5
title: "System Documentation"
family: System and Services Acquisition
status: not-implemented

implemented_by:
  - sharepoint-policy-library
  - servicenow
  - azure-devops
  - entra-id

evidence:
  - system-security-plan-ato-package
  - sharepoint-architecture-documentation-repository
  - azure-devops-design-documentation
  - servicenow-documentation-review-records

parameters:
  - id: PARAM-SA-005-001
    description: >-
      Types of administrator documentation required for the UIAO system
      covering configuration, installation, operation, and security functions.
    value: "Administrator guides, security configuration guides, architecture diagrams, and operational runbooks maintained in SharePoint"
  - id: PARAM-SA-005-002
    description: >-
      User documentation requirements for the UIAO system describing
      accessible features, interaction methods, and user responsibilities.
    value: "End-user guides, security awareness documentation, and acceptable use procedures maintained in SharePoint and ServiceNow Knowledge Base"
  - id: PARAM-SA-005-003
    description: >-
      Process for protecting system documentation from unauthorized
      access, modification, or disclosure.
    value: "Entra ID RBAC controls access to documentation; classification markings applied per data handling policy"

narrative: |
  **Administrator Documentation**
  The organization obtains and maintains administrator documentation
  for the UIAO information system (PARAM-SA-005-001) including
  configuration guides, security configuration settings, architectural
  diagrams, and operational runbooks. Administrator documentation
  is stored in SharePoint with Entra ID RBAC limiting access to
  authorized administrators and security personnel. Azure DevOps
  maintains design and configuration documentation for infrastructure-
  as-code components, versioned alongside code changes to ensure
  documentation reflects the current deployed state.

  **User Documentation**
  User-facing documentation (PARAM-SA-005-002) describing accessible
  features, interaction methods, and security responsibilities is
  maintained in SharePoint and the ServiceNow Knowledge Base. Security
  awareness content is integrated into user documentation, referencing
  acceptable use policies and individual security obligations.
  Documentation is reviewed and updated annually or when system
  functionality changes.

  **Documentation Protection and Access Control**
  System documentation is protected from unauthorized access and
  modification through Entra ID RBAC (PARAM-SA-005-003). Sensitive
  documentation including security configuration details and vulnerability
  assessments is restricted to the ISSO, system administrators, and AO.
  All documentation access events are logged and forwarded to
  Microsoft Sentinel for monitoring, supporting **AU-2** (Event Logging)
  requirements.

  **Documentation Availability and Distribution**
  The organization makes documentation available to authorized personnel
  with a need to know. ServiceNow tracks documentation distribution
  and acknowledgment for security-sensitive materials. Documentation
  discrepancies identified during **CA-2** assessments are corrected
  as POA&M items. The FedRAMP authorization package constitutes the
  primary system documentation artifact and is maintained current
  throughout the ATO period.

related_controls:
  - SA-4   # Acquisition Process
  - SA-3   # System Development Life Cycle
  - CA-2   # Security Assessments
  - AU-2   # Event Logging
  - CM-6   # Configuration Settings
