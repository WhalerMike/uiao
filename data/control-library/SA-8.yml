narrative: |
  **Security Engineering Principles Framework**
  The organization applies established security and privacy engineering
  principles in the specification, design, development, implementation,
  and modification of the UIAO system (PARAM-SA-008-001). The engineering
  principles framework is based on NIST SP 800-160 Vol 1 and incorporates
  core principles including least privilege, defense-in-depth, fail-safe
  defaults, economy of mechanism, complete mediation, and separation of
  domains. These principles are documented in the Security Engineering
  Principles policy maintained in SharePoint and are mandatory inputs
  to SDLC phase gate reviews.

  **Threat Modeling and Architecture Review**
  Security and privacy engineering principles are enforced through
  structured threat modeling using the STRIDE methodology applied
  to all new features and significant system changes (PARAM-SA-008-002).
  Threat models are produced by the Security Engineering team in
  Azure DevOps and reviewed by the ISSO before design approval.
  Architecture reviews verify that design decisions align with
  defense-in-depth principles, with Palo Alto NGFW network segmentation
  and Entra ID zero-trust access controls representing key architectural
  implementations of these principles.

  **Cryptographic Engineering**
  Azure Key Vault provides the cryptographic foundation for the UIAO
  system, implementing fail-safe and economy-of-mechanism principles
  by centralizing key management and preventing ad-hoc cryptographic
  implementations. All encryption operations use FIPS 140-2 validated
  modules, consistent with **SC-13** (Cryptographic Protection) requirements.
  Key management procedures enforce separation of duties between key
  custodians and system operators.

  **Privacy-by-Design Integration**
  Privacy engineering principles are integrated into the design process
  through data minimization requirements, purpose limitation controls,
  and privacy impact assessments for new data processing activities.
  Entra ID Conditional Access and Azure Information Protection enforce
  data handling controls derived from privacy engineering requirements,
  supporting **PT-7** (Specific Categories of Personally Identifiable
  Information) and related privacy controls.

