# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : CM-3(2)
# Title      : Configuration Change Control | Testing, Validation, and Documentation of Changes
# Schema     : data/control-library (uiao-core canonical format)

control_id: CM-3(2)
title: "Configuration Change Control | Testing, Validation, and Documentation of Changes"
family: Configuration Management
status: not-implemented

implemented_by:
  - servicenow-itsm
  - azure-devops
  - microsoft-sentinel
  - intune-mdm

evidence:
  - servicenow-change-management-testing-checklist
  - azure-devops-pipeline-test-result-artifacts
  - sentinel-change-activity-audit-log
  - intune-test-ring-deployment-report

parameters:
  - id: cm_3_2_test_environments
    description: >-
      Environments in which configuration changes must be tested
      and validated before production deployment.
    value: "Development → Staging (non-production Azure subscription) → Production; security testing required in staging by ISSO before production approval; endpoint changes tested in Intune pilot ring before broad deployment"
  - id: cm_3_2_documentation_requirements
    description: >-
      Documentation required to accompany configuration changes
      through the testing and validation process.
    value: "ServiceNow change record with test plan, test results, rollback plan, ISSO security impact assessment, and CAB approval signature required for all standard and emergency changes"

narrative: |
  **Pre-Production Testing and Validation Requirement**
  The UIAO system requires that all configuration changes be
  tested and validated in non-production environments before
  deployment to production, following the progression defined
  in PARAM cm_3_2_test_environments. Configuration changes are
  initiated through ServiceNow ITSM change records and must
  progress through the development and staging environments with
  documented test results before the Change Advisory Board (CAB)
  approves production deployment. The ISSO reviews security
  impact assessments for all changes in staging and must certify
  that testing demonstrates no unacceptable security impact before
  the change is approved for production. This satisfies the
  CM-3(2) requirement for testing, validation, and documentation
  of configuration changes prior to production implementation.

  **Azure DevOps Pipeline-Based Change Validation**
  Configuration changes to infrastructure-as-code, application
  deployments, and Azure resource configurations are processed
  through Azure DevOps pipelines that enforce automated testing
  gates. Pipeline stages include unit testing, integration testing,
  security scanning (Microsoft Defender for DevOps, Checkov IaC
  scanning), and compliance validation against Azure Policy before
  any change is promoted to production. Test results are archived
  as pipeline artifacts and linked to the associated ServiceNow
  change record, providing auditable evidence of pre-production
  validation as required by PARAM cm_3_2_documentation_requirements.

  **Intune Staged Deployment Rings for Endpoint Changes**
  Endpoint configuration changes deployed via Intune follow a
  staged deployment ring model in which changes are applied to
  a small pilot group (ring 0) before broad deployment to the
  general user population. The ISSO reviews pilot ring compliance
  results and security impact indicators before authorizing
  promotion to subsequent deployment rings. This staged approach
  ensures that problematic configurations are identified in a
  limited blast radius before organization-wide deployment.

  **Change Documentation and Rollback Planning**
  All configuration changes must include a documented rollback
  plan in the ServiceNow change record, enabling rapid reversal
  if production deployment reveals unexpected security or
  operational impact. Rollback procedures are tested as part
  of the staging validation where feasible. Microsoft Sentinel
  monitors for anomalies following production deployments within
  a defined observation window, alerting the ISSO if post-change
  security metrics deviate, supporting **CM-3** (Configuration
  Change Control) and **CA-7** (Continuous Monitoring) objectives.

