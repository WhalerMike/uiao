narrative: |
  **PIV Product Procurement Requirements**
  The organization employs only FIPS 201-approved Personal Identity
  Verification (PIV) products and solutions in acquisitions related to
  identity verification (PARAM-SA-004-10-001). All PIV card readers,
  middleware, and associated identity verification hardware are procured
  from the GSA Approved Products List (APL), ensuring compliance with
  FIPS 201 requirements. Acquisition contracts for identity-related
  products include explicit requirements to provide GSA APL listing
  evidence prior to procurement approval. ServiceNow tracks APL
  verification status for all PIV-related acquisitions.

  **PIV Enforcement via Entra ID**
  Microsoft Entra ID Conditional Access policies enforce PIV/CAC-based
  authentication for all privileged access and federal user authentication
  to UIAO systems (PARAM-SA-004-10-002). Conditional Access policies
  require device-bound certificates from FIPS 201-compliant smart cards
  for access to sensitive resources, preventing password-only
  authentication for high-privilege operations. This supports
  **IA-2(1)** (Multi-Factor Authentication for Privileged Accounts)
  and **IA-2(2)** (MFA for Non-Privileged Accounts).

  **Device Enrollment and Certificate Validation**
  Microsoft Intune configuration profiles deploy smart card middleware
  settings to managed endpoints, ensuring PIV card readers are
  recognized and certificate validation is configured to check CRL
  and OCSP revocation status against GSA PKI infrastructure.
  Cisco ISE integrates with the PIV certificate validation chain to
  enforce 802.1X authentication for network access, requiring valid
  PIV certificate presentation for privileged workstations.

  **Compliance Verification**
  Azure DevOps pipeline security checks validate that PIV-related
  configuration changes maintain compliance with FIPS 201 requirements.
  The ISSO reviews PIV product compliance status annually and when
  the GSA APL is updated, with recertification actions tracked
  in ServiceNow, consistent with **IA-5** (Authenticator Management)
  requirements.

