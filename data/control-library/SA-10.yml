    value: "Entra ID RBAC enforces separation between development and production environments; production access requires approval workflow"

narrative: |
  **Developer Configuration Management Requirements**
  The organization requires developers of acquired and custom-developed
  systems to perform configuration management during development
  (PARAM-SA-010-001). All source code and infrastructure-as-code are
  managed in Azure DevOps repositories with Git version control.
  Branch protection policies require peer review approvals before
  merging to protected branches, and security-relevant changes require
  ISSO sign-off. Commit signatures enforce developer accountability,
  and all configuration history is retained for audit purposes.

  **Defect and Change Tracking**
  All developer-reported and user-reported problems, defects, and
  proposed changes are tracked in ServiceNow (PARAM-SA-010-002).
  Security defects receive priority classification and are linked to
  CVE references where applicable. The ISSO reviews the open security
  defect backlog weekly and escalates unresolved critical defects
  to the AO. Resolution timelines align with the vulnerability
  management policy requirements defined in **SI-2** (Flaw Remediation).

  **Access Control and Separation of Environments**
  Entra ID RBAC enforces strict separation between development, staging,
  and production environments (PARAM-SA-010-003). Developer access to
  production configuration management tools and systems requires a
  time-limited access approval workflow in ServiceNow, with all
  access events logged to Microsoft Sentinel. This separation prevents
  unauthorized configuration changes and supports **AC-6**
  (Least Privilege) and **CM-3** (Configuration Change Control).

  **Integrity Verification**
  Azure DevOps pipeline security gates perform automated integrity
  checks on build artifacts before deployment, including dependency
  vulnerability scanning and software composition analysis. Build
  artifacts are signed and their checksums verified prior to production
  deployment, detecting unauthorized modifications to the development
  environment.

