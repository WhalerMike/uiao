parameters:
  - id: PARAM-SA-010-001
    description: >-
      Configuration management requirements imposed on developers for
      systems, components, and services during development and maintenance.
    value: "Git-based version control with branch protection; all changes require peer review and ISSO approval for security-relevant modifications"
  - id: PARAM-SA-010-002
    description: >-
      Requirements for tracking and managing user-reported problems and
      proposed changes during system development.
    value: "All defects and change requests tracked in ServiceNow; security defects classified and prioritized per vulnerability management policy"
  - id: PARAM-SA-010-003
    description: >-
      Controls governing developer access to production systems and
