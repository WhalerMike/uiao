control-id: CM-6
title: Configuration Settings
status: implemented
implemented-by:
  - azure-policy
  - microsoft-intune
narrative: |
  **Security Baseline Enforcement**
  The organization establishes and enforces security configuration settings for all IT products. Azure Policy is utilized to enforce CIS Microsoft Azure Foundations Benchmark and FedRAMP Moderate baselines across all subscriptions.

  **Drift Detection and Remediation**
  System components are scanned daily for deviations from the established baseline. Non-compliant resources are automatically flagged, and where possible, Azure Policy 'DeployIfNotExists' effects are used to remediate configurations to the approved state automatically.
parameters:
  baseline-standard: "CIS Azure Benchmark / FedRAMP Moderate"
  scan-frequency: "24 Hours"
evidence:
  - type: dashboard
    ref: azure-policy-compliance-report
related_controls:
  - CM-2
  - SI-2
