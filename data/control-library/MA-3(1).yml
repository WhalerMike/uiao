# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : MA-3(1)
# Title      : Maintenance Tools | Inspect Tools
# Schema     : data/control-library (uiao-core canonical format)

control_id: MA-3(1)
title: Maintenance Tools | Inspect Tools
family: Maintenance
status: not-implemented

implemented_by:
  - microsoft-defender-for-endpoint
  - intune-mdm
  - cyberark-pam
  - servicenow

evidence:
  - defender-for-endpoint-tool-scan-reports
  - intune-application-control-policy-report
  - cyberark-session-recording-logs
