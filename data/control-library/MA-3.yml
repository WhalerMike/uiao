narrative: |
  **Maintenance Tools Overview**

  The organization approves, controls, and monitors the use of
  system maintenance tools for the UIAO system. An approved
  maintenance tools list is maintained in the SharePoint
  Compliance Library documenting authorized diagnostic,
  testing, and repair tools. All maintenance tools require
  prior approval before use (PARAM-MA-003-001).

  **Tool Authorization and Control**

  Maintenance tools are vetted through the ServiceNow change
  management process before authorization. Intune application
  control policies restrict installation of unauthorized
  software on managed endpoints. Microsoft Defender for
  Endpoint monitors for execution of unapproved maintenance
  utilities and generates alerts for unauthorized tool usage.
  The approved tools list is reviewed at least annually
  (PARAM-MA-003-002).

  **Remote Maintenance Tool Security**

  Remote maintenance sessions are conducted through CyberArk
  Privileged Session Manager (PSM) which provides session
  isolation, keystroke logging, and video recording of all
  privileged maintenance activities (PARAM-MA-003-003).
  Remote maintenance tools require multi-factor
  authentication through Entra ID and are restricted to
  authorized maintenance personnel per MA-5.

  **Tool Integrity Verification**

  Maintenance tools are verified for integrity before use
  through hash validation and digital signature checking.
  Tools brought into the environment on portable media are
  scanned by Microsoft Defender for Endpoint before
  execution. Any discrepancies trigger incident response
  procedures under IR-4.

