parameters:
  - id: ca_8_pentest_frequency
    description: >-
      Frequency at which penetration testing is conducted against the
      UIAO system boundary and internal components.
    value: "Annually at minimum; additionally required following significant architectural changes or as directed by the Authorizing Official"
  - id: ca_8_pentest_scope
    description: >-
      Defined scope and boundaries for penetration testing activities
      including included and excluded system components.
    value: "External perimeter (internet-facing endpoints, APIs), internal network segments, cloud service configurations; excludes shared infrastructure governed by Azure and FedRAMP cloud service provider boundary"
  - id: ca_8_pentest_methodology
    description: >-
      Methodology standard used to conduct penetration testing
      activities against the UIAO system.
    value: "NIST SP 800-115, PTES (Penetration Testing Execution Standard), and OWASP Testing Guide for web application components"

narrative: |
  **Penetration Testing Program and Governance**
  The UIAO organization conducts penetration testing against the system
  authorization boundary on the frequency defined in PARAM ca_8_pentest_frequency
  to identify exploitable vulnerabilities that automated scanning alone cannot
  detect. Penetration testing is performed by qualified independent testers,
  distinct from system operations and development personnel, using rules of
  engagement approved by the ISSM and Authorizing Official prior to each
  engagement. Rules of engagement define the scope (PARAM ca_8_pentest_scope),
  testing windows, notification requirements, and emergency halt procedures
  to prevent unintended impact to production services. Testing methodology
  follows PARAM ca_8_pentest_methodology and covers the full attack lifecycle
  including reconnaissance, initial access, privilege escalation, lateral
  movement, and exfiltration simulation.

  **Technical Test Surface and Tooling**
  Penetration testers assess the external attack surface protected by Palo
  Alto Next-Generation Firewall perimeter controls, cloud workload exposure
  in the Azure environment, authentication bypass vectors against Azure Entra
  ID Conditional Access policies, network segmentation integrity enforced by
  Cisco ISE, and privileged access management controls implemented in
  CyberArk. Web application and API testing covers OWASP Top 10 categories
  for all externally accessible service endpoints. Internal network testing
  evaluates east-west movement resistance between network segments defined by
  Palo Alto and Infoblox DNS/DHCP segmentation policies. All testing activity
  is monitored in near-real-time by Microsoft Sentinel to ensure the blue
  team detection capability is also validated during the engagement. This
  supports **RA-5** (Vulnerability Monitoring and Scanning) and **SC-7**
  (Boundary Protection).

  **Finding Remediation and Reporting**
  Penetration test results are documented in a formal report delivered to the
  ISSM within the timeframe specified in the rules of engagement. Critical and
  high findings are imported into ServiceNow GRC as POA&M items consistent
  with **CA-5** (Plan of Action and Milestones) and remediated within
  FedRAMP risk-based timeframes: critical within 30 days, high within 90 days.
  Retesting is performed by the original testing team to validate remediation
  effectiveness prior to POA&M closure. Penetration test results feed the
  **CA-6** (Authorization) ongoing authorization risk determination and
  inform the **RA-3** (Risk Assessment) risk register.

