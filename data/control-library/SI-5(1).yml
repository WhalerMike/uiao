parameters:
  - id: PARAM-SI-005-1-001
    description: >-
      Automated mechanisms used to distribute security alerts,
      advisories, and directives to internal organizational components.
    value: "Microsoft Sentinel threat intelligence integration; automated ServiceNow notifications for CISA KEV and vendor advisories; Azure DevOps dependency alerts"
  - id: PARAM-SI-005-1-002
    description: >-
      External threat intelligence and advisory sources integrated into
      the automated alert and advisory distribution system.
    value: "CISA Known Exploited Vulnerabilities catalog, US-CERT advisories, Microsoft Security Response Center, vendor security bulletins"

narrative: |
  **Automated Advisory Distribution**
  The organization employs automated mechanisms to deliver security
  alerts, advisories, and directives to designated internal components
  (PARAM-SI-005-1-001). Microsoft Sentinel integrates with multiple
  external threat intelligence sources and applies intelligence context
  to organizational assets, automatically alerting when assets are
  associated with newly published vulnerabilities or threat indicators.
  ServiceNow automation receives advisory feeds and creates notification
  tasks assigned to appropriate system owners and the ISSO without
  manual intervention.

  **Threat Intelligence Feed Integration**
  Automated alerts and advisories are sourced from authoritative
  external feeds (PARAM-SI-005-1-002) including the CISA Known
  Exploited Vulnerabilities (KEV) catalog, US-CERT alerts and advisories,
  Microsoft Security Response Center (MSRC) bulletins, and vendor-
  specific security update notifications. CISA KEV catalog entries
  are automatically correlated against the UIAO asset inventory in
  ServiceNow CMDB, triggering priority remediation notifications for
  any KEV items affecting UIAO components. This ensures zero-day and
  actively-exploited vulnerabilities receive immediate attention.

  **Azure DevOps Dependency Advisory Automation**
  Azure DevOps pipeline dependency vulnerability scanning automatically
  receives updated vulnerability intelligence and re-evaluates all
  active dependencies when new CVEs are published. High-severity
  dependency advisories affecting current builds trigger automated
  alerts to Security Engineering and create ServiceNow problem records
  for remediation tracking. This extends automated advisory distribution
  to the application development layer.

  **Entra ID and Platform Security Notifications**
  Microsoft Entra ID and Azure platform services generate automated
  security notifications for identity threats and platform
  vulnerabilities, forwarded to Sentinel for correlation. The ISSO
  and system owner receive automated email and ServiceNow notifications
  for advisories requiring organizational action. Advisory receipt
  and disposition are tracked in ServiceNow, providing an auditable
  record aligned with **CA-7** (Continuous Monitoring) requirements.

