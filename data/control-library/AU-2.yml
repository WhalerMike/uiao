control-id: AU-2
title: Event Logging
status: implemented
implemented-by:
  - microsoft-sentinel
  - azure-monitor
narrative: |
  **Comprehensive Event Logging**
  The organization identifies a broad range of events required for audit purposes, including successful and failed login attempts, privilege elevations via PIM, and modifications to security group memberships. 

  **Centralized Collection**
  All identified events are streamed in real-time to a centralized Log Analytics Workspace. Azure Diagnostic Settings are enforced via Azure Policy to ensure that any new resource created is automatically configured to send logs to the Telemetry Plane.
parameters:
  log-retention-period: "365 days"
  collection-method: "Azure Diagnostic Settings"
evidence:
  - type: configuration
    ref: diagnostic-settings-policy-export
related_controls:
  - AU-3
  - SI-4
