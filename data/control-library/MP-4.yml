control_id: MP-4
title: Media Storage
family: Media Protection (MP)
status: Implemented
implemented_by:
  - Physical Access Control System
  - ServiceNow Asset Management
  - BitLocker Drive Encryption
evidence:
  - artifact: Media Storage Inventory
    location: ServiceNow > Asset Management > Media Inventory
    format: CMDB Export
  - artifact: Physical Security Assessment
    location: SharePoint > UIAO Compliance > Evidence > PE Assessments
    format: DOCX/PDF
parameters:
  - id: PARAM-MP-004-001
    text: Digital and non-digital media is physically controlled and stored in controlled-access areas
    value: Controlled-access areas with badge reader access
  - id: PARAM-MP-004-002
    text: Media containing CUI is encrypted using FIPS 140-2 validated modules
    value: BitLocker with FIPS 140-2 validated TPM
narrative: |
  **Physical Storage Controls**
  The organization physically controls and securely stores
  digital and non-digital media within controlled-access areas
  (PARAM-MP-004-001). Media storage locations are protected by
  badge-access controls with access logs maintained in the
  physical access control system.

  **Encryption at Rest**
  All digital media containing CUI or sensitive information is
  encrypted using FIPS 140-2 validated cryptographic modules
  (PARAM-MP-004-002). BitLocker Drive Encryption with TPM 2.0
  is enforced on all managed endpoints through Intune. Azure
  Storage Service Encryption protects cloud-hosted data.

  **Media Inventory**
  All removable media is tracked in the ServiceNow CMDB with
  asset tags, custodian assignment, and sensitivity
  classification. Annual media inventories are conducted and
  reconciled against the CMDB.

  **Environmental Protection**
  Media storage areas maintain environmental controls for
  temperature, humidity, and fire suppression per manufacturer
  specifications to prevent media degradation.
