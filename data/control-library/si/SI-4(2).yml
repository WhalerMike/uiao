narrative: |
  **Real-Time Automated Monitoring via Microsoft Sentinel**
  The organization employs automated tools and mechanisms to support
  near real-time analysis of events within the UIAO system
  (PARAM-SI-004-2-001). Microsoft Sentinel serves as the centralized
  Security Information and Event Management (SIEM) platform, ingesting
  security event data from all UIAO technology components and applying
  automated analytics rules for real-time threat detection. Analytics
  rules evaluate events within 5-minute detection windows, providing
  near real-time alerting on security-relevant conditions without
  manual log review.

  **Comprehensive Log Source Integration**
  Microsoft Sentinel integrates log data from all major UIAO technology
  components (PARAM-SI-004-2-002) including Palo Alto NGFW network
  traffic and threat logs, Cisco ISE network access control events,
  Infoblox DNS query logs, Azure Entra ID sign-in and audit logs,
  Azure platform activity logs, Microsoft Intune device compliance
  and endpoint telemetry, CyberArk privileged session and vault
  access logs, Azure Key Vault audit logs, and ServiceNow change
  and incident records. This breadth of data collection enables
  cross-source correlation that individual tool monitoring cannot achieve.

  **Automated Analytics and Correlation**
  Sentinel's analytics engine applies scheduled and real-time analytics
  rules to identify attack patterns, policy violations, and anomalous
  behaviors across log sources. Machine learning-based behavioral
  analytics identify user and entity behavioral anomalies that rule-based
  detection may miss. Fusion correlation automatically links related
  low-confidence alerts into high-confidence multi-stage attack
  detection, reducing analyst alert fatigue while improving detection
  fidelity.

  **Alert-to-Incident Integration**
  Sentinel alerts are automatically converted to ServiceNow incidents
  through a configured integration, ensuring all detected events receive
  tracked response actions. Incident severity mapping ensures critical
  alerts generate P1 ServiceNow incidents for immediate response,
  consistent with **IR-4** (Incident Handling) and **IR-6** (Incident
  Reporting) requirements. SOC analysts triage Sentinel incidents from
  a unified investigation interface.

