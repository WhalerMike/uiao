parameters:
  - id: PARAM-SI-008-1-001
    description: >-
      Centralized management mechanism for spam protection configurations
      and policies across the UIAO system.
    value: "Microsoft 365 Defender portal provides centralized management of all anti-spam policies for the UIAO tenant; ISSO has sole administrative authority"
  - id: PARAM-SI-008-1-002
    description: >-
      Access controls governing who can modify centrally managed spam
      protection configurations.
    value: "Entra ID RBAC restricts Defender anti-spam policy management to the ISSO and designated Email Security Administrator roles"

narrative: |
  **Centralized Spam Protection Management**
  The organization centrally manages spam protection mechanisms
  to enable consistent policy application and simplified administration
  (PARAM-SI-008-1-001). The Microsoft 365 Defender portal provides
  a unified management interface for all anti-spam policies applied
  across the UIAO email environment. Centralized management ensures
  that spam filtering policies are applied uniformly to all users
  and mailboxes in the tenant, preventing inconsistent protection
  levels that could result from distributed or user-managed spam
  configurations.

  **Restricted Administrative Access**
  Administrative access to the centralized spam protection management
  interface is restricted through Entra ID RBAC (PARAM-SI-008-1-002).
  Only the ISSO and designated Email Security Administrator roles can
  modify anti-spam policies, quarantine settings, and allowed/blocked
  sender configurations. Administrative access requires phishing-
  resistant MFA authentication, consistent with **IA-2(1)** (Multi-Factor
  Authentication for Privileged Accounts). All policy changes are
  logged in the Microsoft 365 audit log and forwarded to Microsoft
  Sentinel for review.

  **Policy Change Management**
  Changes to centrally managed spam protection configurations require
  a ServiceNow change request approved by the ISSO before implementation.
  This change management process ensures spam protection policy changes
  are reviewed, justified, and reversible. Emergency policy changes
  for active spam campaigns can be expedited through the emergency
  change process with retrospective documentation.

  **Monitoring of Centralized Spam Management**
  Microsoft Sentinel monitors the Microsoft 365 audit log for
  anti-spam policy modifications, alerting on unauthorized or
  unexpected changes to spam protection configurations. This oversight
  ensures the integrity of centrally managed spam controls and detects
  potential attempts to weaken email security configurations.
  Aggregate spam filtering effectiveness metrics are reported to
  the ISSO monthly, supporting **CA-7** (Continuous Monitoring)
  requirements.

