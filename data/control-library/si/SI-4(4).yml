parameters:
  - id: PARAM-SI-004-4-001
    description: >-
      Monitoring coverage for inbound and outbound communications traffic
      at the UIAO system boundary and internal network segments.
    value: "100% of inbound and outbound traffic at organizational boundary inspected by Palo Alto NGFW; DNS traffic monitored by Infoblox; east-west traffic monitored by Cisco ISE"
  - id: PARAM-SI-004-4-002
    description: >-
      Indicators of compromise and traffic anomalies monitored in
      inbound and outbound communications traffic.
    value: "Threat indicator matches, unusual data volumes, unauthorized protocol usage, known-bad IP/domain connections, and data exfiltration patterns"

narrative: |
  **Boundary Traffic Monitoring**
  The organization monitors inbound and outbound communications traffic
  at the information system boundary and at interior points within the
  system (PARAM-SI-004-4-001). Palo Alto NGFW inspects 100% of inbound
  and outbound traffic at all organizational boundary points, applying
  application identification, user identification, threat prevention,
  URL filtering, and data loss prevention to all traffic flows. All
  traffic logs are forwarded in real time to Microsoft Sentinel for
  correlation and anomaly detection, ensuring comprehensive boundary
  visibility.

  **Threat Indicator and Anomaly Detection**
  Microsoft Sentinel applies analytics rules to network traffic data
  to detect threat indicators and anomalous patterns (PARAM-SI-004-4-002).
  Detection includes connections to known-malicious IP addresses and
  domains via Palo Alto threat intelligence feeds, unusual data transfer
  volumes indicating potential exfiltration, unauthorized protocol or
  port usage, beaconing patterns consistent with C2 communication,
  and lateral movement indicators. Behavioral analytics establish
  baselines for normal traffic patterns and alert on significant
  deviations.

  **DNS Traffic Monitoring**
  Infoblox monitors all DNS query traffic, applying Response Policy
  Zones to block malicious domain resolution and logging all DNS
  activity for Sentinel ingestion. DNS-based threat detection includes
  identification of DNS tunneling, fast-flux domain patterns, newly
  registered domain queries, and DGA (Domain Generation Algorithm)
  patterns. DNS anomaly alerts generate ServiceNow incidents for
  ISSO investigation.

  **Internal Network Segment Monitoring**
  Cisco ISE provides visibility into internal network access and
  authentication events, with logs forwarded to Microsoft Sentinel.
  Internal east-west traffic monitoring detects unauthorized lateral
  movement between network segments that boundary monitoring alone
  would not reveal. Sentinel correlates ISE authentication events
  with network traffic anomalies to identify compromised credentials
  being used for lateral movement, supporting **IR-4** (Incident
  Handling) response capabilities.

