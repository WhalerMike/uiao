parameters:
  - id: PARAM-SI-008-001
    description: >-
      Spam protection mechanisms employed at system entry and exit
      points to detect and act on unsolicited messages.
    value: "Microsoft Defender for Office 365 anti-spam policies at all email ingress and egress points; connection filtering, content filtering, and outbound spam protection enabled"
  - id: PARAM-SI-008-002
    description: >-
      Actions taken when spam or unsolicited messages are detected
      at UIAO system entry and exit points.
    value: "Detected spam quarantined or rejected at entry; outbound spam triggers immediate account block and ISSO notification; bulk email moved to Junk folder"

narrative: |
  **Spam Protection at Entry and Exit Points**
  The organization employs spam protection mechanisms at information
  system entry and exit points to detect and take action on unsolicited
  messages (PARAM-SI-008-001). Microsoft Defender for Office 365
  provides anti-spam protection for all organizational email, applying
  connection filtering, content filtering, and advanced threat protection
  to inbound and outbound email flows. Anti-spam policies are configured
  for the UIAO tenant with organizational-appropriate filtering
  thresholds, quarantine policies, and allowed/blocked sender lists
  maintained by the ISSO.

  **Inbound Spam Filtering and Quarantine**
  Inbound email identified as spam is quarantined or rejected at the
  mail gateway before delivery to user mailboxes (PARAM-SI-008-002).
  Quarantine policies define retention periods and user notification
  settings. High-confidence spam receives more restrictive treatment
  (rejection) than lower-confidence spam (quarantine with user review
  option). Microsoft Defender for Office 365 Safe Links and Safe
  Attachments policies provide additional protection against phishing
  and malware delivered via email, complementing anti-spam controls.

  **Outbound Spam Protection**
  Outbound email is monitored for spam indicators including high
  send volumes, known-bad recipient domains, and spam content patterns.
  Accounts detected sending outbound spam are automatically blocked
  through Microsoft 365 policies, and the ISSO receives immediate
  notification. Outbound spam events may indicate compromised credentials
  and trigger Entra ID risk-based remediation actions including
  password reset requirements.

  **Monitoring and Reporting**
  Microsoft Sentinel ingests Microsoft 365 Defender email security
  telemetry, enabling correlation of spam and phishing events with
  other security signals. Anti-spam effectiveness metrics including
  false positive and false negative rates are reviewed by the ISSO
  monthly using Microsoft 365 Defender reports. Policy adjustments
  are tracked in ServiceNow change records, supporting continuous
  improvement of email security controls.

