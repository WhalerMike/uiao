narrative: |
{{ organization.name }} implements an incident handling capability for security incidents.

**Full Incident Lifecycle**
Microsoft Sentinel serves as the SOAR platform covering preparation, detection, analysis, containment, eradication, recovery, and post-incident activities.

**Automated Response**
Logic Apps playbooks automatically perform initial containment actions (e.g., disable compromised accounts, isolate VMs) to reduce mean time to remediate.
