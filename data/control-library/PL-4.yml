control_id: PL-4
title: Rules of Behavior
family: Planning (PL)
status: Implemented
implemented_by:
  - SharePoint Policy Library
  - ServiceNow
  - Entra ID
evidence:
  - artifact: Rules of Behavior Document
    location: SharePoint > UIAO Compliance > Policies > Rules of Behavior
    format: DOCX/PDF
  - artifact: User Acknowledgment Records
    location: ServiceNow > Policy Management > ROB Acknowledgments
    format: CSV/PDF Export
  - artifact: Entra ID Terms of Use Acceptance
    location: Entra ID > Identity Governance > Terms of Use
    format: Portal Screenshot
parameters:
  - id: PARAM-PL-004-001
    text: Rules of behavior are acknowledged before system access is granted
    value: Prior to access
  - id: PARAM-PL-004-002
    text: Rules of behavior are reviewed and re-acknowledged periodically
    value: Annually
  - id: PARAM-PL-004-003
    text: Rules of behavior are updated when changes occur
    value: As needed with annual review
narrative: |
  **Rules of Behavior Establishment**
  The organization establishes and makes available to all UIAO
  system users the rules that describe their responsibilities
  and expected behavior for information and system usage. The
  rules of behavior cover acceptable use, data handling, remote
  access requirements, social media restrictions, and incident
  reporting obligations.

  **User Acknowledgment**
  Users acknowledge the rules of behavior before being granted
  access to the UIAO system (PARAM-PL-004-001). Entra ID Terms
  of Use policies enforce digital acknowledgment as a Conditional
  Access requirement. Users who have not accepted current terms
  are blocked from system access until acknowledgment is
  completed.

  **Periodic Re-acknowledgment**
  Users review and re-acknowledge the rules of behavior at
  least annually (PARAM-PL-004-002). ServiceNow tracks
  acknowledgment status and sends automated reminders to users
  approaching their re-acknowledgment deadline. Non-compliant
  users are flagged and access is restricted until
  re-acknowledgment is completed.

  **Rules Maintenance**
  The rules of behavior are reviewed and updated as needed
  (PARAM-PL-004-003) when significant policy changes occur.
  Updates are approved through the governance process and
  redistributed to all users with new acknowledgment required.
  The rules of behavior support PS-6 (Access Agreements) and
  AT-2 (Security Literacy Training).
