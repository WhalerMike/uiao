# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : MA-3(2)
# Title      : Maintenance Tools | Inspect Media
# Schema     : data/control-library (uiao-core canonical format)

control_id: MA-3(2)
title: Maintenance Tools | Inspect Media
family: Maintenance
status: not-implemented

implemented_by:
  - microsoft-defender-for-endpoint
  - intune-mdm
  - palo-alto-ngfw
  - servicenow

evidence:
  - defender-for-endpoint-removable-media-scan-logs
  - intune-device-control-policy-report
  - palo-alto-usb-media-block-events
  - servicenow-media-inspection-change-records

parameters:
  - id: PARAM-MA-003-2-001
    description: >-
      Inspection requirement for media containing maintenance
      tools or diagnostic software before introduction to UIAO systems.
    value: "All media scanned with Defender for Endpoint and hash-verified against approved content list prior to use"
  - id: PARAM-MA-003-2-002
    description: >-
      Policy for removable media introduced into UIAO environments
      by maintenance personnel.
    value: "Only pre-approved, organization-issued media permitted; personal removable media prohibited; Intune device control enforced"
  - id: PARAM-MA-003-2-003
    description: >-
      Disposition requirement for media used during maintenance
      activities prior to removal from the facility.
    value: "Media reviewed and sanitized or verified clean before removal; Defender for Endpoint post-scan required"

narrative: |
  **Media Inspection Prior to Maintenance Use**
  The organization inspects all media containing maintenance tools,
  diagnostic software, or data prior to use on UIAO system components
  to guard against malicious code and unauthorized content
  (PARAM-MA-003-2-001). All maintenance media is scanned using
  Microsoft Defender for Endpoint before connection to any UIAO
  system. Hash values of approved media content are maintained in
  the ServiceNow change management record associated with the
  maintenance activity, and any deviation from expected hash values
  triggers immediate rejection and incident escalation.

  **Removable Media Controls**
  Microsoft Intune device control policies restrict removable media
  usage on all managed endpoints, permitting only organization-issued
  and pre-approved media devices based on hardware ID whitelisting
  (PARAM-MA-003-2-002). Palo Alto NGFW policies enforce USB device
  class restrictions at the network perimeter layer, and Intune
  generates alerts for any attempt to connect unauthorized removable
  media. Personal removable media is prohibited in all UIAO-controlled
  areas. Maintenance personnel requiring media-based tools must
  request pre-approved, organization-issued media through the
  ServiceNow change management process prior to the maintenance
  activity.

  **Post-Maintenance Media Review**
  Before removal from the facility, media used during maintenance
  activities is reviewed to ensure that no sensitive UIAO data was
  inadvertently transferred to the media (PARAM-MA-003-2-003).
  A post-use Defender for Endpoint scan is performed to verify
  the media has not been infected during the maintenance session.
  If sensitive data is discovered on removable media, it is
  sanitized per **MP-6** (Media Sanitization) procedures before
  the media is released from organizational control.

  **Integration with Physical Security**
  Media inspection controls are coordinated with physical access
  controls at facility entry points per **PE-3** (Physical Access
  Control). Security personnel are authorized to inspect maintenance
  media at entry and exit checkpoints. All media inspection events
  are logged in ServiceNow and correlated by Microsoft Sentinel to
  detect patterns of unauthorized data movement, supporting **AU-2**
  (Event Logging) and **MP-6** (Media Sanitization) objectives.

