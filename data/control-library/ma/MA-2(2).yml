parameters:
  - id: PARAM-MA-002-2-001
    description: >-
      Automated maintenance activities that are scheduled and
      executed without manual intervention for UIAO system components.
    value: "OS patching, security updates, and configuration baseline enforcement via Azure Update Manager and Intune"
  - id: PARAM-MA-002-2-002
    description: >-
      Audit and logging requirements for all automated maintenance
      activities performed on UIAO components.
    value: "All automated maintenance activities logged in ServiceNow and Microsoft Sentinel with timestamps and component identifiers"
  - id: PARAM-MA-002-2-003
    description: >-
      Notification requirement to designated personnel upon completion
      of automated maintenance activities.
    value: "Automated notifications to ISSO and System Owner within 1 hour of completion or failure"

narrative: |
  **Automated Maintenance Framework**
  The organization employs automated mechanisms to schedule, conduct,
  and document maintenance and repair activities for UIAO system
  components (PARAM-MA-002-2-001). Azure Update Manager orchestrates
  automated patching for Azure virtual machines, Arc-enabled servers,
  and PaaS components, executing approved maintenance tasks within
  defined maintenance windows without requiring manual operator
  intervention. Microsoft Intune automates OS update deployment,
  security patch enforcement, and configuration baseline remediation
  for all managed endpoints through device update rings aligned to
  the vulnerability management SLA defined in **RA-5**.

  **Audit and Logging of Automated Activities**
  All automated maintenance activities generate structured audit
  records captured in both ServiceNow (as automated change records)
  and Microsoft Sentinel (as system activity logs) with full
  attribution: component identifier, maintenance action taken,
  initiating automation rule, start/end timestamps, and outcome
  (success/failure) (PARAM-MA-002-2-002). Sentinel analytics rules
  correlate automated maintenance records with system behavior to
  detect anomalous modifications that fall outside scheduled windows,
  supporting **AU-2** (Event Logging) and **SI-4** (System Monitoring).

  **Completion Notification and Verification**
  Upon completion of automated maintenance cycles, ServiceNow
  generates automated notifications to the ISSO and System Owner
  documenting the scope of changes, compliance delta, and any
  failures requiring manual follow-up (PARAM-MA-002-2-003). Azure
  Update Manager compliance dashboards provide real-time visibility
  into patch status across all managed resources. Failed automated
  maintenance tasks generate priority incidents in ServiceNow for
  manual remediation within the SLA timeframes established in **MA-2**
  (Controlled Maintenance).

  **Change Control Integration**
  Automated maintenance activities are pre-authorized through
  ServiceNow Change Management as standard changes, with defined
  scope and rollback criteria reviewed at least annually by the CAB.
  Any automated maintenance action outside the pre-authorized scope
  is blocked and generates an alert requiring manual approval before
  execution, maintaining alignment with **CM-3** (Configuration
  Change Control) requirements.

