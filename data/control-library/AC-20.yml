parameters:
  - id: ac_20_external_system_authorization_requirement
    description: >-
      Authorization criteria required before organizational users or
      information may be processed on or transmitted through external
      systems not owned or operated by the organization.
    value: >-
      Formal ISA or MOU required; Entra ID B2B access policies enforced;
      CyberArk PSM required for privileged external sessions
  - id: ac_20_portable_storage_restriction
    description: >-
      Policy governing use of portable storage devices on external systems
      that connect to organizational information systems.
    value: "Prohibited without explicit ISSO authorization via ServiceNow"

narrative: |
  **External System Authorization and Access Governance**
  The organization establishes and enforces terms and conditions for
  authorized individuals accessing organizational information systems
  from external systems not owned or operated by the federal agency.
  Entra ID External Identities (B2B) policies govern cross-organizational
  collaboration, requiring guest users from external tenants to satisfy
  Conditional Access policies — including MFA per **PARAM-IAM-001** and
  device compliance verification — before accessing any organizational
  resource. All external system connection authorizations are formally
  documented in ServiceNow ITSM as Interconnection Security Agreements
  (ISAs) or Memoranda of Understanding (MOUs), aligned with **CA-3**
  (Information Exchange).

  **Privileged Access Controls on External Connections**
  When organizational administrators require privileged access to external
  partner systems or cloud environments, all such sessions are brokered
  through CyberArk PSM, ensuring session isolation, recording, and
  credential vaulting regardless of the target system's ownership. Palo
  Alto NGFW inspects all outbound traffic to external systems, enforcing
  application-layer policies that prevent unauthorized data exfiltration
  and ensure only approved protocols transit organizational boundaries,
  supporting **SC-7** (Boundary Protection) and **AC-4** (Information
  Flow Enforcement).

  **Portable Storage and Data Exfiltration Prevention**
  The use of portable storage devices on external systems that interface
  with organizational information is prohibited unless explicitly
  authorized through a ServiceNow change request reviewed by the ISSO.
  Microsoft Intune endpoint DLP policies enforce portable storage
  restrictions on managed devices, while Palo Alto threat prevention
  profiles detect and block unauthorized data transfer attempts. All
  external access events are ingested by Microsoft Sentinel, supporting
  **AU-6** audit review and **SI-4** continuous monitoring obligations.

