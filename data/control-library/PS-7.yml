narrative: |
  **External Personnel Requirements**
  The organization establishes personnel security requirements
  including security roles and responsibilities for external
  providers (e.g., contractors, service providers). Security
  requirements are documented in contracts and service level
  agreements (PARAM-PS-007-001).

  **Compliance Monitoring**
  The organization monitors external provider compliance
  with personnel security requirements on a quarterly basis
  (PARAM-PS-007-002). ServiceNow Vendor Management tracks
  contractor screening status, access agreement completion,
  and security training compliance.

  **Access Controls**
  External personnel are provisioned with Entra ID B2B
  guest accounts with restricted Conditional Access policies.
  External user access is time-limited and reviewed quarterly.
  Transfer and termination notifications from external
  providers trigger immediate access review.
