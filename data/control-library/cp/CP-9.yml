control-id: CP-9
title: Information System Backup
status: implemented
implemented-by:
  - azure-backup
  - recovery-services-vault
narrative: |
  {{ organization.name }} performs regular backups of system data and state information.

  **Automated Backup Strategy**
  Azure Backup with Recovery Services Vaults handles daily/weekly backups of critical data and VMs. Cross-Region Restore is enabled for regional outage resilience.

  **Backup Protection**
  Backups are encrypted with customer-managed keys, protected by Multi-User Authorization (MUA) and immutability settings to defend against ransomware.
parameters:
  backup-frequency: "Daily incremental + Weekly full"
  retention-period: "30 Days (Production)"
evidence:
  - type: configuration
    ref: CP-9-evidence
related_controls:
  - CP-4
  - IR-5
