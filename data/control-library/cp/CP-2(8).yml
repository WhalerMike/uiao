parameters:
  - id: cp_2_8_critical_asset_classification_criteria
    description: >-
      Criteria used to classify system components as critical assets
      requiring prioritized protection and recovery under the contingency plan.
    value: "Assets supporting Tier 1 mission functions (RTO ≤ 4 hours), assets processing or storing high-value data, single points of failure with no redundancy, and assets providing security enforcement functions (authentication, logging, boundary protection)"
  - id: cp_2_8_asset_register_review_frequency
    description: >-
      Frequency at which the critical asset register is reviewed and
      updated to reflect system changes.
    value: "Annually concurrent with Contingency Plan review; additionally following CM-3 significant changes that may add, remove, or reclassify critical assets"

narrative: |
  **Critical Asset Identification Process**
  The UIAO organization formally identifies critical system assets whose
  unavailability would prevent the accomplishment of essential mission and
  business functions, ensuring that contingency planning, protection, and
  recovery resources are prioritized toward the highest-impact components.
  Asset criticality is determined through a Business Impact Analysis (BIA)
  process using the criteria defined in PARAM cp_2_8_critical_asset_classification_criteria.
  The BIA evaluates each system component's mission dependency, redundancy
  posture, data sensitivity, and security enforcement role. Critical assets
  identified through this process include Azure Entra ID (identity services),
  Microsoft Sentinel (security monitoring), Cisco ISE (network access enforcement),
  Palo Alto NGFW (boundary protection), CyberArk (privileged access management),
  and Infoblox (DNS/DHCP services). These assets receive elevated protection,
  monitoring, and recovery priority in the Contingency Plan.

  **Critical Asset Register and Inventory Integration**
  Identified critical assets are documented in a Critical Asset Register
  maintained in ServiceNow GRC, linking each asset to its mission function
  dependencies, criticality tier, protection controls, recovery procedures,
  and asset owner. The register is synchronized with the **CM-8** (System
  Component Inventory) to maintain consistency across security documentation.
  Azure Defender for Cloud and Infoblox IPAM provide authoritative technical
  inventory data that feeds the register update process, ensuring that newly
  discovered or deployed assets are evaluated for criticality. Microsoft Sentinel
  includes dedicated monitoring rules for all Tier 1 critical assets, generating
  priority alerts when critical asset health degrades to support **CP-2(5)**
  (Continue Mission and Business Functions) early warning objectives.

  **Critical Asset Protection Measures**
  Each critical asset in the register is mapped to specific protection and
  resilience measures: redundancy configurations (high availability pairs,
  geo-replication), backup and recovery procedures, enhanced monitoring
  coverage in Sentinel, and access restriction policies enforced through
  CyberArk privileged access controls. The Critical Asset Register is reviewed
  on the schedule defined in PARAM cp_2_8_asset_register_review_frequency,
  with updates triggering review of the Contingency Plan to ensure recovery
  procedures remain aligned with the current asset topology. Results of
  critical asset reviews are reported to the Authorizing Official as part
  of the **CA-7** (Continuous Monitoring) program reporting cycle.

