parameters:
  - id: PARAM-PL-011-001
    description: >-
      Authority required to approve tailoring decisions that modify
      the FedRAMP Moderate baseline for the UIAO system.
    value: "Authorizing Official (AO) approval required for all tailoring decisions; ISSO documents justification"
  - id: PARAM-PL-011-002
    description: >-
      Conditions under which baseline tailoring decisions are
      reviewed and updated for the UIAO system.
    value: "Annually, upon significant system change, or when new threats or regulatory requirements are identified"
  - id: PARAM-PL-011-003
    description: >-
      Documentation requirements for baseline tailoring decisions
