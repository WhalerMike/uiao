    value: "Tailoring rationale documented in SSP Appendix; FedRAMP significant change request submitted for AO-level tailoring"

narrative: |
  **Baseline Tailoring Framework**
  The organization tailors the FedRAMP Moderate baseline selected
  under **PL-10** (Baseline Selection) to the specific conditions,
  mission requirements, and operating environment of the UIAO system
  (PARAM-PL-011-001). Tailoring activities include adding compensating
  controls not in the baseline, adjusting control parameters within
  FedRAMP-permitted ranges, and documenting justified deviations
  for AO approval. All tailoring decisions require ISSO documentation
  of the justification and AO approval before implementation.

  **Types of Tailoring Applied**
  Tailoring for the UIAO system encompasses three categories: (1)
  parameter adjustments that set specific values within FedRAMP-
  permitted ranges (e.g., session timeout periods, password complexity
  thresholds); (2) control additions that supplement the Moderate
  baseline with organization-defined controls addressing specific
  UIAO threat scenarios or mission requirements; and (3) compensating
  controls that provide equivalent protection when baseline controls
  cannot be fully implemented as specified due to operational
  constraints. Compensating controls are risk-accepted by the AO
  and tracked as POA&M items when appropriate per **CA-5**.

  **Documentation and AO Approval**
  Tailoring decisions are documented in the System Security Plan
  (SSP) Appendix and the ServiceNow GRC tailored control matrix
  (PARAM-PL-011-003). Each tailoring decision includes the affected
  control, the tailoring action, the justification referencing the
  applicable FedRAMP tailoring guidance, the ISSO recommendation,
  and the AO approval record. FedRAMP significant change requests
  are submitted to the FedRAMP PMO when tailoring decisions represent
  a significant change to the authorization boundary or control
  implementation.

  **Review and Maintenance Cycle**
  Tailoring decisions are reviewed annually and whenever significant
  changes occur to the UIAO system, its operating environment, or
  the threat landscape (PARAM-PL-011-002). Microsoft Defender for
  Cloud compliance dashboards provide continuous visibility into
  the implementation status of both baseline and tailored controls,
  flagging gaps that may require new tailoring decisions or
  remediation. The ISSO maintains the tailored control matrix in
  ServiceNow GRC as a living document, supporting **CA-2**
  (Security Assessments) and **CA-7** (Continuous Monitoring).

