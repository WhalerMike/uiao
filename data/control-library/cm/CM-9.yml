# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : CM-9
# Title      : Configuration Management Plan
# Schema     : data/control-library (uiao-core canonical format)

control_id: CM-9
title: "Configuration Management Plan"
family: Configuration Management
status: not-implemented

implemented_by:
  - servicenow-itsm
  - azure-devops
  - intune-mdm
  - microsoft-sentinel

evidence:
  - uiao-configuration-management-plan-document
  - servicenow-change-management-process-documentation
  - azure-devops-repository-policy-configuration
  - intune-configuration-management-baseline-policy

parameters:
  - id: cm_9_plan_review_frequency
    description: >-
      Frequency at which the Configuration Management Plan is
      reviewed and updated to reflect current system state.
    value: "CMP reviewed and updated at least annually and upon significant system changes; version controlled in SharePoint with ISSM approval required for each revision"
  - id: cm_9_cm_roles
    description: >-
      Personnel roles defined within the Configuration Management
      Plan with assigned configuration management responsibilities.
    value: "Configuration Manager (CM Lead), ISSO (security review), ISSM (final approval), System Owner (change authority), CAB members (change advisory), ServiceNow administrators (process enforcement)"

narrative: |
  **Configuration Management Plan Development and Scope**
  The UIAO organization develops, documents, and implements a
  Configuration Management Plan (CMP) that addresses roles and
  responsibilities, configuration management processes, and
  tools used to manage system configurations throughout the
  system development lifecycle. The CMP defines how configuration
  items are identified, controlled, audited, and managed for
  all UIAO system components including cloud infrastructure,
  managed endpoints, network devices, and software applications.
  The CMP is reviewed and updated at the frequency defined in
  PARAM cm_9_plan_review_frequency and maintained in the SharePoint
  Policy Library with version control, ISSM approval, and
  distribution to all personnel with configuration management
  responsibilities defined in PARAM cm_9_cm_roles. This satisfies
  the CM-9 requirement for a configuration management plan and
  supports **CM-2** (Baseline Configuration), **CM-3**
  (Configuration Change Control), and **CM-8** (System Component
  Inventory) implementation.

  **Configuration Management Process Integration**
  The CMP integrates configuration management processes with the
  UIAO operational toolchain. Configuration change requests are
  processed through ServiceNow ITSM change management workflows
  that enforce the CMP-defined authorization gates, testing
  requirements, and documentation standards. Azure DevOps
  repositories enforce branch protection policies that require
  peer code review and automated pipeline validation before
  infrastructure-as-code changes can be merged, implementing
  the CMP's change control requirements for cloud configuration
  changes. The CMP explicitly maps each configuration management
  activity to the responsible role defined in PARAM cm_9_cm_roles
  and the supporting tool from the UIAO vendor stack.

  **Baseline and Inventory Management Procedures**
  The CMP documents procedures for establishing, maintaining,
  and verifying configuration baselines for each system
  component category. Baseline establishment procedures define
  the standard configuration for each component type, the
  automated tools used to enforce that baseline (Intune for
  endpoints, Azure Policy for cloud, Cisco vManage for network
  devices), and the review cycle for baseline currency. Inventory
  management procedures define how components are registered in
  ServiceNow CMDB upon installation and retired upon removal,
  implementing the requirements of **CM-8(1)** (Updates During
  Installation and Removal).

  **Security Integration in Configuration Management**
  The CMP requires security impact analysis by the ISSO for all
  configuration changes, implemented through the ServiceNow change
  record workflow. The CMP defines categories of changes that
  require ISSM approval, Board of Directors notification, or
  FedRAMP Joint Authorization Board reporting based on the
  potential security impact. Microsoft Sentinel monitoring of
  configuration change activity provides real-time visibility
  into CMP process compliance, supporting **CA-7**
  (Continuous Monitoring) requirements.

