# CM-4 - Impact Analyses
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Configuration Management (CM)
# Last Reviewed: 2025-06-15

control_id: CM-4
family: Configuration Management
title: Impact Analyses
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Security Impact Analysis Process**
  The UIAO platform requires mandatory security impact analysis for
  all proposed configuration changes prior to implementation. Change
  requests submitted through ServiceNow ITSM are evaluated by the
  ISSO and designated security engineers to determine potential
  impacts on confidentiality, integrity, and availability of system
  components. The analysis considers effects on the security posture
  of Azure cloud resources, Microsoft Intune endpoint configurations,
  Palo Alto NGFW firewall rules, CyberArk Privileged Access Security
  policies, Cisco SD-WAN routing configurations, and Azure Active
  Directory (Entra ID) identity policies. All impact analyses are
  documented within the ServiceNow change record and require ISSO
  approval before proceeding through the **CM-3** (Configuration
  Change Control) workflow.

  **Testing and Validation in Non-Production Environments**
  Significant configuration changes undergo testing in isolated
  non-production environments before deployment to production systems.
  Azure DevOps pipelines facilitate automated testing of infrastructure
  changes defined as Infrastructure-as-Code templates. Network rule
  changes for Palo Alto NGFW are validated in lab environments using
  Panorama device groups before propagation to production firewalls.
  Entra ID Conditional Access policy changes are tested using
  report-only mode to assess impact on user authentication flows
  before enforcement. Test results are attached to the ServiceNow
  change record as evidence artifacts.

  **Post-Implementation Review and Monitoring**
  Following change implementation, a post-implementation review is
  conducted to verify that the change achieved its intended outcome
  without introducing adverse security impacts. Microsoft Sentinel
  monitors for anomalous activity patterns following change windows,
  with automated analytics rules configured to detect deviations from
  established baselines. Azure Defender for Cloud continuously
  evaluates resource compliance against security benchmarks, alerting
  on any configuration drift introduced by changes. Post-implementation
  findings feed back into **CA-7** (Continuous Monitoring) and **CM-2**
  (Baseline Configuration) update processes.

