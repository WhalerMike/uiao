parameters:
  - id: cm_12_1_discovery_tools
    description: >-
      Automated tools used to discover, catalog, and maintain
      the information location inventory.
    value: "Microsoft Purview Information Protection (sensitive information type scanning), Microsoft Defender for Cloud Apps (SaaS information location discovery), Azure Resource Graph (cloud storage inventory), Microsoft Purview Data Map (enterprise data catalog)"
  - id: cm_12_1_scan_frequency
    description: >-
      Frequency at which automated discovery tools scan for
      sensitive information in known and potentially unknown locations.
    value: "Continuous real-time classification for new files in Microsoft 365; weekly full-scope Purview scan of Azure Storage and databases; daily Defender for Cloud Apps shadow IT inventory refresh"

narrative: |
  **Automated Sensitive Information Discovery**
  The UIAO system employs automated tools defined in PARAM
  cm_12_1_discovery_tools to discover and maintain information
  location data with greater accuracy and breadth than manual
  methods permit. Microsoft Purview Information Protection
  performs automated sensitive information type classification
  across all Microsoft 365 workloads and Azure data stores at
  the scan frequency defined in PARAM cm_12_1_scan_frequency,
  identifying locations containing Controlled Unclassified
  Information (CUI), PII, and other sensitive information types
  without requiring manual file review. Purview Data Map builds
  an enterprise-wide data catalog that maps sensitive information
  types to specific storage locations, data owners, and retention
  policies. This satisfies the CM-12(1) requirement for automated
  tools supporting information location and enhances the manual
  inventory process under **CM-12** (Information Location).

  **Cloud Application Shadow IT Discovery**
  Microsoft Defender for Cloud Apps continuously monitors network
  traffic logs from Palo Alto NGFW and Entra ID sign-in data
  to identify cloud applications in use across the organization,
  including unsanctioned applications that may be storing
  organizational information outside the approved information
  location inventory. Discovered applications are assessed for
  risk and compliance posture, and information stored in
  unsanctioned applications is flagged for remediation — either
  migration to an approved location or formal sanctioning through
  the software authorization process under **CM-10**
  (Software Usage Restrictions).

  **Azure Resource Automated Information Location**
  Azure Resource Graph queries executed by Azure Policy continuously
  catalog all storage accounts, SQL databases, Cosmos DB instances,
  and key vaults within the UIAO Azure subscriptions. Data
  classification tags on these resources are automatically
  validated against the Purview-discovered information types,
  generating compliance findings where classification tags
  do not reflect actual content. Microsoft Sentinel analytic
  rules alert the ISSO when new storage resources are created
  without required classification tags or when Purview discovers
  sensitive information in a location not listed in the approved
  information location inventory.

  **Automated Inventory Update and Reporting**
  Automated tool outputs from Purview, Defender for Cloud Apps,
  and Azure Resource Graph are consolidated in the Microsoft
  Purview Compliance Portal into a unified sensitive information
  location report available to the ISSO on demand. Discovery
  results that reveal new sensitive information locations
  automatically generate ServiceNow workflow items to update
  the information location inventory and apply appropriate
  data protection controls, ensuring that the inventory
  reflects the current state of information distribution
  across the enterprise and supports **RA-2** (Security
  Categorization) assessments.

