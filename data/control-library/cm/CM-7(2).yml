parameters:
  - id: cm_7_2_prevention_mechanism
    description: >-
      Technical mechanism used to prevent execution of software
      programs not authorized for use within the system.
    value: "CrowdStrike Falcon application control with allow-list enforcement; Windows Defender Application Control (WDAC) policies deployed via Intune; macOS Gatekeeper enforced via Intune configuration profile"
  - id: cm_7_2_authorized_software_catalog
    description: >-
