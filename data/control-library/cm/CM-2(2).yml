parameters:
  - id: cm_2_2_automation_tools
    description: >-
      Automated tools used to maintain accuracy and currency of
      baseline configuration documentation and enforcement.
    value: "Microsoft Intune (endpoint baselines), Azure Policy (cloud resource baselines), CrowdStrike Falcon (endpoint configuration assessment), ServiceNow CMDB (authoritative baseline record store)"
  - id: cm_2_2_review_frequency
    description: >-
      Frequency at which automated tools validate current
      configurations against documented baselines.
    value: "Continuous for cloud resources via Azure Policy; daily for endpoints via Intune compliance evaluation; weekly CrowdStrike configuration drift report"

narrative: |
  **Automated Baseline Configuration Maintenance**
  The UIAO system employs automated tools to maintain an accurate,
  current, and complete inventory of baseline configurations for
  all system components, eliminating the need for manual baseline
  documentation updates. Microsoft Intune manages endpoint
  configuration baselines for Windows and macOS devices using
  Intune Security Baselines, which are automatically applied to
  enrolled devices and continuously evaluated for compliance at
  the frequency defined in PARAM cm_2_2_review_frequency. Azure
  Policy enforces cloud resource configuration baselines across
  Azure subscriptions using built-in and custom policy definitions
  aligned to the NIST SP 800-53 and FedRAMP policy initiatives,
  evaluating compliance continuously and reporting drift in the
  Azure Security Center Compliance Dashboard. This satisfies the
  CM-2(2) requirement for automated support of baseline accuracy
  and currency and supports **CM-2** (Baseline Configuration) and
  **CA-7** (Continuous Monitoring) objectives.

  **ServiceNow CMDB as Authoritative Baseline Record**
  The ServiceNow Configuration Management Database (CMDB) serves
  as the authoritative record of approved baseline configurations
  for all system components. Automated integrations between Azure
  Resource Graph, Intune, and the CMDB synchronize discovered
  configuration states against approved baselines, flagging
  deviations as configuration items (CIs) requiring review.
  Changes to approved baselines are processed through the
  ServiceNow change management workflow, ensuring that the CMDB
  always reflects the current authorized baseline rather than
  a static point-in-time snapshot.

  **CrowdStrike Configuration Assessment**
  CrowdStrike Falcon's configuration assessment capability
  continuously evaluates endpoint configurations against CIS
  benchmark-aligned assessment profiles for Windows, macOS,
  and Linux. Assessment findings that represent deviations from
  approved baselines are forwarded to ServiceNow as incidents
  and to Microsoft Sentinel for correlation with security events,
  enabling detection of configuration drift as a potential
  indicator of compromise. This supports **CM-6** (Configuration
  Settings) and **SI-4** (System Monitoring) requirements.

  **Automated Remediation of Baseline Drift**
  Intune configuration profiles and Azure Policy remediation
  tasks automatically restore non-compliant endpoints and cloud
  resources to their approved baseline states where technically
  feasible. Automated remediation events are logged in Intune
  and Azure Activity Logs, forwarded to Sentinel, and linked
  to the originating CMDB baseline record in ServiceNow for
  full traceability of baseline enforcement actions.

