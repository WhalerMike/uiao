# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : CM-2(2)
# Title      : Baseline Configuration | Automation Support for Accuracy and Currency
# Schema     : data/control-library (uiao-core canonical format)

control_id: CM-2(2)
title: "Baseline Configuration | Automation Support for Accuracy and Currency"
family: Configuration Management
status: not-implemented

implemented_by:
  - intune-mdm
  - azure-policy
  - servicenow-cmdb
  - crowdstrike-falcon

evidence:
  - intune-configuration-baseline-compliance-report
