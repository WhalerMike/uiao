# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : CM-6(1)
# Title      : Configuration Settings | Automated Management, Application, and Verification
# Schema     : data/control-library (uiao-core canonical format)

control_id: CM-6(1)
title: "Configuration Settings | Automated Management, Application, and Verification"
family: Configuration Management
status: not-implemented

implemented_by:
  - intune-mdm
  - azure-policy
  - crowdstrike-falcon
  - servicenow-cmdb

evidence:
  - intune-security-baseline-compliance-report
  - azure-policy-configuration-compliance-dashboard
  - crowdstrike-configuration-assessment-findings
  - servicenow-configuration-verification-log

parameters:
  - id: cm_6_1_automated_tools
    description: >-
      Automated tools used to manage, apply, and verify configuration
      settings across system components.
    value: "Microsoft Intune (endpoint settings management and verification), Azure Policy (cloud resource configuration enforcement), CrowdStrike Falcon (endpoint configuration assessment and drift detection), Azure Desired State Configuration (server baseline enforcement)"
  - id: cm_6_1_verification_frequency
    description: >-
      Frequency at which automated tools verify that configuration
      settings remain compliant with approved baselines.
    value: "Continuous for cloud resources; every 8 hours for endpoint Intune compliance re-evaluation; daily CrowdStrike configuration drift scan"

narrative: |
  **Automated Configuration Setting Management**
  The UIAO system manages, applies, and verifies configuration
  settings for all system components through automated tools,
  eliminating reliance on manual configuration processes that
  are error-prone and difficult to audit. Microsoft Intune applies
  security configuration settings to managed Windows and macOS
  endpoints through Security Baseline and device configuration
  profiles, automatically enforcing settings for Windows Defender,
  BitLocker encryption, firewall rules, account lockout thresholds,
  and screen lock timers. Azure Policy applies configuration
  settings to Azure cloud resources through policy assignments
  with automatic remediation tasks that correct non-compliant
  resources without manual intervention. This satisfies the
  CM-6(1) requirement for automated management, application,
  and verification of configuration settings and supports **CM-6**
  (Configuration Settings) and **CM-2(2)** (Automation Support
  for Accuracy and Currency) objectives.

  **Continuous Configuration Verification**
  Automated verification of configuration settings occurs at the
  frequency defined in PARAM cm_6_1_verification_frequency.
  Intune re-evaluates device compliance against configuration
  profiles and reports non-compliant settings to Entra ID
  Conditional Access, which can restrict resource access until
  settings are remediated. Azure Policy continuously evaluates
  resource configurations against policy assignments and publishes
  compliance states to the Azure Security Center compliance
  dashboard. CrowdStrike Falcon performs daily configuration
  assessment scans against CIS benchmark profiles, generating
  scored assessment reports that identify configuration deviations
  not covered by Intune or Azure Policy.

  **Automated Drift Remediation**
  Configuration drift — unauthorized changes to approved settings —
  is automatically detected and remediated where technically
  feasible. Intune's device configuration profiles are re-applied
  on each policy check-in cycle, overwriting any local modifications
  to managed settings. Azure Policy remediation tasks automatically
  modify non-compliant resource configurations using authorized
  service principal identities. Drift events that cannot be
  auto-remediated are escalated to ServiceNow ITSM as incidents
  linked to the affected CMDB configuration item, ensuring human
  review and manual remediation within defined SLAs.

  **Verification Evidence and Reporting**
  Configuration verification results from Intune, Azure Policy,
  and CrowdStrike are aggregated in Microsoft Sentinel workbooks
  and the ServiceNow configuration compliance dashboard, providing
  the ISSO with consolidated visibility into configuration posture
  across all system components. Compliance reports are reviewed
  monthly by the ISSO as part of the continuous monitoring program
  under **CA-7** (Continuous Monitoring) and are included in
  the annual authorization assessment evidence package under **CA-2**.

