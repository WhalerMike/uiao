parameters:
  - id: ca_2_1_assessor_independence_requirement
    description: >-
      Requirement for organizational or personal independence of security
      control assessors from the system owner and authorizing official.
    value: "Independent Third-Party Assessment Organization (3PAO) with no financial or organizational conflict of interest with UIAO system owner; FedRAMP-recognized 3PAO required for annual assessments"
  - id: ca_2_1_assessment_frequency
    description: >-
      Frequency at which independent assessments of security controls
      are conducted for FedRAMP Moderate authorization maintenance.
    value: "Annually at minimum; additionally triggered by significant system changes or when directed by the Authorizing Official"
  - id: ca_2_1_assessment_scope
    description: >-
      Scope of controls evaluated by the independent assessor during
      each assessment cycle.
    value: "All FedRAMP Moderate baseline controls; subset selection for continuous monitoring per FedRAMP ConMon guidance"

narrative: |
  **Independent Assessor Engagement and Qualification**
  The UIAO organization employs independent assessors to conduct security
  control assessments in accordance with CA-2 (Security Assessments). All
  assessors engaged for FedRAMP authorization and continuous monitoring
  assessments are recognized Third-Party Assessment Organizations (3PAOs)
  accredited by the American Association for Laboratory Accreditation (A2LA)
  under the FedRAMP 3PAO program. The independence requirement precludes any
  assessor who has participated in system design, development, implementation,
  or management from conducting assessments of those same controls, ensuring
  objective evaluation free from organizational or financial conflict of
  interest. Assessor qualifications and engagement terms are reviewed by the
  Authorizing Official prior to each assessment cycle.

  **Assessment Execution and Scope**
  Independent assessors evaluate the full FedRAMP Moderate baseline control
  set during initial authorization and a risk-prioritized subset annually
  per FedRAMP continuous monitoring guidance (PARAM ca_2_1_assessment_scope).
  Assessment activities include document review, interviews with system owners
  and administrators, and technical testing of controls implemented via Azure
  Entra ID, Microsoft Sentinel, Palo Alto Next-Generation Firewall, Cisco ISE,
  Infoblox, CyberArk, Intune, and ServiceNow. Assessment scheduling,
  evidence collection requests, and finding disposition are tracked within
  ServiceNow GRC to provide a complete audit trail through the authorization
  lifecycle. This directly supports **CA-6** (Authorization) and **CA-7**
  (Continuous Monitoring).

  **Finding Remediation and Reporting**
  Assessment findings are documented in a Security Assessment Report (SAR)
  delivered by the 3PAO to the ISSM and Authorizing Official. Findings are
  imported into ServiceNow GRC as Plan of Action and Milestones (POA&M) items
  with assigned owners, risk ratings, and remediation target dates consistent
  with **CA-5** (Plan of Action and Milestones) requirements. Microsoft
  Sentinel dashboards track the closure status of technical findings, providing
  near-real-time visibility into remediation progress and supporting **RA-3**
  (Risk Assessment) and **SI-4** (System Monitoring) objectives.

