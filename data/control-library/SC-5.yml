control-id: SC-5
title: Denial-of-Service Protection
status: implemented
implemented-by:
  - azure-ddos-protection
  - azure-front-door
narrative: |
  **Edge Protection and Traffic Scrubbing**
  The system protects against denial-of-service (DoS) attacks by routing all external traffic through Azure Front Door. Azure DDoS Protection (Network Protection) is enabled on all virtual networks to provide layer 3 and 4 protection with automatic mitigation.

  **Application Layer Defense**
  The Web Application Firewall (WAF) integrated with Front Door provides layer 7 protection, utilizing rate-limiting and custom rules to block malicious traffic patterns and volumetric attacks before they reach the application origin.
parameters:
