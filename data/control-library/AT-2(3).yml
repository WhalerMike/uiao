narrative: |
  **Social Engineering Awareness Training**
  The organization provides training on social engineering and data
  mining threats to all personnel with access to UIAO systems
  (PARAM-AT-002-3-001). Training is delivered through the Learning
  Management System (LMS) and covers the full spectrum of social
  engineering attack techniques (PARAM-AT-002-3-002), including
  phishing, spear phishing, vishing (voice phishing), smishing (SMS
  phishing), pretexting, tailgating, and open-source intelligence
  (OSINT) data mining risks arising from oversharing on social media
  and public platforms. Scenarios are updated quarterly to reflect
  current threat landscape intelligence sourced from Microsoft
  Defender for Office 365 threat reports and CISA advisories.

  **Phishing Simulation Program**
  Monthly phishing simulation campaigns are conducted using an automated
  simulation platform to test and reinforce awareness training. Simulations
  include credential harvesting, malicious attachment, and link-based
  scenarios targeting different user populations. Results are tracked
  per user, per department, and over time to measure training effectiveness.
  Users who fail a simulation are immediately assigned remedial training
  modules (PARAM-AT-002-3-003). Repeat failures within a 90-day window
  are escalated to the user's supervisor and the ISSO for additional
  intervention, supporting **AT-4** (Training Records) and
  **IR-2** (Incident Response Training) objectives.

  **Technical Countermeasures Integration**
  Microsoft Defender for Office 365 anti-phishing policies provide
  technical reinforcement of awareness training by automatically
  quarantining suspected phishing messages, applying impersonation
  protection, and labeling external email. Training modules reference
  these technical controls to help users understand the defense-in-depth
  posture and recognize messages that may have bypassed automated
  filters. Security awareness metrics are reported through ServiceNow
  and shared with the ISSO monthly.

  **OSINT and Data Mining Threat Awareness**
  Training specifically addresses the risks of OSINT data mining by
  adversaries who aggregate publicly available information about
  organizational personnel, infrastructure, and operations to craft
  targeted social engineering attacks. Personnel are trained on
  minimizing their digital footprint, identifying suspicious inquiries,
  and following the social media restrictions defined in **PL-4(1)**
  (Rules of Behavior — Social Media Restrictions). This supports
  the broader information security awareness objectives of **AT-2**
  and **PL-4**.

