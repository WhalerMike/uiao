narrative: |
  **Development Process and Standards**
  The organization requires developers to follow a documented development
  process and standards throughout the UIAO system lifecycle
  (PARAM-SA-015-001). The UIAO Secure SDLC is based on NIST SP 800-160
  Vol 1 principles and incorporates OWASP Secure Coding Practices as
  mandatory development standards. The process defines security activities
  at each SDLC phase including threat modeling during design, code review
  during development, security testing before deployment, and post-
  deployment monitoring. The policy is maintained in SharePoint and
  reviewed annually (PARAM-SA-015-003).

  **Tool Approval and Management**
  Development tools used in UIAO system development are subject to security
  assessment and ISSO approval prior to adoption (PARAM-SA-015-002).
  The approved tool inventory is maintained in ServiceNow, listing each
  tool, version, approval status, and security assessment date. Azure
  DevOps serves as the primary development platform, with all
  pipeline integrations reviewed before activation. Entra ID enforces
  access controls to development tools, preventing unauthorized tool
  installation or pipeline modifications.

  **Pipeline Security Enforcement**
  Azure DevOps pipeline configurations enforce compliance with development
  standards by automating security gate checks at each deployment stage.
  These include dependency license compliance checks, secrets scanning
  to prevent credential exposure in code repositories, and container
  image scanning for base image vulnerabilities. Pipeline violations
  generate ServiceNow incidents for Security Engineering review.

  **Developer Training and Accountability**
  Developers receive secure coding training aligned with the development
  standards, tracked in ServiceNow. Training completion is a prerequisite
  for Entra ID role assignment to developer positions with production
  pipeline access. This supports **AT-3** (Role-Based Training)
  requirements and ensures the human element of the development process
  aligns with technical standards.

