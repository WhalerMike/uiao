    value: "All UIAO system components including Azure platform services, identity (Entra ID/Cisco ISE), security monitoring (Sentinel), and network infrastructure"
  - id: PARAM-RA-009-002
    description: >-
      Criteria used to assign criticality ratings to UIAO system
