narrative: |
  **Criticality Analysis Purpose and Scope**
  The organization conducts criticality analyses to identify and
  prioritize the UIAO system components and missions that are most
  critical to organizational operations, enabling risk-informed
  decision-making for protection, resilience, and supply chain
  risk management (PARAM-RA-009-001). Criticality analysis results
  inform control selection and tailoring decisions under **PL-11**
  (Baseline Tailoring), supply chain risk assessments under
  **RA-3(1)** (Supply Chain Risk Assessment), and contingency
  planning priorities under **CP-2** (Contingency Plan).

  **Criticality Rating Methodology**
  UIAO system components are assigned criticality ratings using
  a structured methodology that evaluates five dimensions
  (PARAM-RA-009-002): mission dependency (extent to which the
  component supports mission-essential functions), recovery time
  objective (RTO) impact of component unavailability, information
  sensitivity of data processed or accessible through the component,
  availability of alternative components or services, and supply
  chain substitutability (difficulty of replacing the component
  if the supplier is compromised or unavailable). Ratings are
  aggregated into a High/Medium/Low criticality classification
  documented in the UIAO Component Criticality Matrix.

  **Component Criticality Registry**
  All UIAO system components are inventoried in the ServiceNow
  CMDB with criticality attributes populated from the Component
  Criticality Matrix. High-criticality components include Microsoft
  Entra ID (identity and access foundation), Microsoft Sentinel
  (security monitoring and alerting), Cisco ISE (network access
  control), and Azure core platform services. These components
  receive priority in resource allocation, enhanced monitoring
  configurations, and accelerated patching SLAs. Azure Resource
  Graph queries provide automated reconciliation between the CMDB
  criticality registry and the live Azure resource inventory.

  **Integration with Risk and Resilience Planning**
  Criticality analysis results are integrated into the risk
  assessment process under **RA-3** to ensure that high-criticality
  components receive proportionally greater attention in threat and
  vulnerability analysis. Supply chain assessments under **RA-3(1)**
  prioritize high-criticality component suppliers for deeper
  evaluation and more frequent re-assessment (PARAM-RA-009-003).
  Criticality ratings inform the contingency planning priorities
  and recovery sequence established in **CP-2**, ensuring that
  restoration efforts focus first on the components most essential
  to UIAO mission continuity.

