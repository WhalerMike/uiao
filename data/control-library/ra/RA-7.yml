parameters:
  - id: PARAM-RA-007-001
    description: >-
      Risk response options applied to identified risks for
      the UIAO system following risk assessment.
    value: "Accept, mitigate, transfer, or avoid; AO approval required for risk acceptance; ISSO documents all response decisions"
  - id: PARAM-RA-007-002
    description: >-
      Timeframe for initiating risk response actions following
      identification of a risk in the UIAO risk register.
    value: "Risk response initiated within 30 days of risk identification; critical risks within 5 business days"
  - id: PARAM-RA-007-003
    description: >-
      Personnel responsible for approving and implementing risk
      response decisions for the UIAO system.
    value: "AO approves risk acceptance; ISSO coordinates mitigation; System Owner implements operational responses"
  - id: PARAM-RA-007-004
    description: >-
      Monitoring approach for tracking the effectiveness of
      implemented risk response actions.
    value: "Microsoft Sentinel continuous monitoring; ServiceNow POA&M milestone tracking; quarterly risk register review"

narrative: |
  **Risk Response Framework**
  The organization responds to identified risks in accordance with
  the UIAO risk management strategy by selecting and implementing
  appropriate risk response options (PARAM-RA-007-001). Following
  each risk assessment cycle under **RA-3** (Risk Assessment), the
  ISSO coordinates with the System Owner and AO to determine the
  appropriate response for each identified risk: mitigation through
  control implementation, risk acceptance documented with AO approval,
  risk transfer through contracts or insurance mechanisms, or risk
  avoidance through elimination of the risk-generating activity.

  **Risk Response Initiation and Timeliness**
  Risk response actions are initiated within 30 days of risk
  identification for standard risks, and within 5 business days
  for critical risks (PARAM-RA-007-002). The ServiceNow GRC Risk
  Register provides automated SLA tracking with escalation alerts
  when response initiation deadlines are approaching. Critical risks
  identified through Microsoft Sentinel security analytics or
  Microsoft Defender for Cloud threat protection alerts are triaged
  through the incident response process under **IR-4** before formal
  risk register entry, ensuring that immediate threats receive
  real-time response without delay.

  **Risk Acceptance Authority**
  When risks are accepted rather than mitigated, the AO formally
  documents the acceptance decision with supporting rationale
  (PARAM-RA-007-003). Risk acceptance records are maintained in the
  SharePoint Compliance Library with the risk identifier, acceptance
  rationale, AO signature, acceptance expiration date, and any
  compensating controls in place during the acceptance period.
  Accepted risks are reviewed at each subsequent risk assessment
  cycle to determine whether changed circumstances warrant a different
  response, supporting the continuous monitoring objectives of **CA-7**.

  **Risk Response Effectiveness Monitoring**
  The effectiveness of implemented risk responses is continuously
  monitored through Microsoft Sentinel dashboards that track the
  security posture metrics associated with each mitigated risk,
  and through ServiceNow POA&M milestone tracking for scheduled
  remediation activities (PARAM-RA-007-004). Quarterly risk register
  reviews assess whether implemented responses have reduced risk to
  acceptable levels or whether additional action is required. Risk
  response outcomes are incorporated into the next risk assessment
  cycle, completing the continuous risk management loop required
  by the FedRAMP Moderate baseline.

