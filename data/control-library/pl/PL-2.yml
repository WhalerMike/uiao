control_id: PL-2
title: System Security and Privacy Plans
family: Planning (PL)
status: Implemented
implemented_by:
  - SharePoint Policy Library
  - ServiceNow
  - Microsoft Sentinel
evidence:
  - artifact: System Security Plan (SSP)
    location: SharePoint > UIAO Compliance > Authorization Package > SSP
    format: DOCX/PDF
  - artifact: SSP Review and Approval Records
    location: ServiceNow > Change Management > SSP Updates
    format: CSV/PDF Export
  - artifact: Authorization Boundary Diagram
    location: SharePoint > UIAO Compliance > Architecture > Boundary
    format: Visio/PDF
parameters:
  - id: PARAM-PL-002-001
    text: System security plan is reviewed and updated at least annually
    value: Annually
  - id: PARAM-PL-002-002
    text: SSP is distributed to authorized personnel
    value: ISSO, ISSM, AO, System Owners
  - id: PARAM-PL-002-003
    text: SSP updates are protected from unauthorized disclosure
    value: CUI handling required
narrative: |
  **System Security Plan Development**
  The organization develops a system security plan for the UIAO
  system that defines the authorization boundary, describes the
  operational context and security categorization, documents
  security control implementations, and is reviewed and approved
  by the Authorizing Official. The SSP is maintained in the
  SharePoint Authorization Package library.

  **Plan Content and Structure**
  The SSP documents all implemented security controls per NIST
  SP 800-53 Rev 5 at the FedRAMP Moderate baseline. Each control
  narrative describes the implementation approach, responsible
  parties, supporting technologies, and evidence artifacts. The
  plan includes the authorization boundary diagram, data flow
  diagrams, and interconnection details.

  **Plan Maintenance**
  The SSP is reviewed and updated at least annually
  (PARAM-PL-002-001) and whenever significant changes occur to
  the system or operating environment. Updates follow the
  ServiceNow change management process. The SSP is distributed
  to authorized personnel (PARAM-PL-002-002) and protected from
  unauthorized disclosure (PARAM-PL-002-003).

  **Continuous Monitoring Integration**
  The SSP feeds the continuous monitoring program under CA-7.
  Control implementation status is tracked in the UIAO control
  matrix and reflected in the Executive Dashboard compliance
  posture score. Deficiencies identified during assessments
  are tracked through the POA&M process under CA-5.
related_controls:
