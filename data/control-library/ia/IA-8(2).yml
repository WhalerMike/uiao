    value: "Minimum NIST SP 800-63B AAL2 required for all external authenticators; phishing-resistant authenticators (AAL3) required for external users accessing privileged or sensitive functions"

narrative: |
  **Acceptance Policy for External Authenticators**
  The UIAO system accepts external authenticators for
  non-organizational users only when those authenticators
  meet the assurance level requirements defined in PARAM
  ia_8_2_assurance_requirements, limiting acceptance to
  the approved external authenticator types specified in
  PARAM ia_8_2_accepted_external_authenticators. Entra ID
  External Identities (B2B) federation configuration
  specifies approved external identity providers and their
  assurance levels, blocking authentication from unapproved
  external sources. All external identity provider federations
  are reviewed and approved by the ISSO before configuration,
  with approval documented in ServiceNow to provide traceability
  of the risk acceptance decision. This satisfies the IA-8(2)
  requirement for acceptance of external authenticators meeting
  federal standards and supports **IA-8** (Identification and
  Authentication for Non-Organizational Users) and **IA-2(12)**
  (PIV Credentials) objectives.

  **Federal Agency B2B Direct Connect**
  Federal agency personnel accessing UIAO resources through
  their agency's Entra ID tenant are supported through Entra
  ID B2B Direct Connect, which establishes a trust relationship
  between the UIAO tenant and authorized agency tenants.
  Authentication is performed by the user's home agency IdP
  using the agency's established authenticators, with the
  assurance level claims passed to UIAO Entra ID through
  federation metadata. Conditional Access policies evaluate
  the claims from the external IdP and enforce minimum
  authenticator strength requirements before granting access.

  **Login.gov and Max.gov Integration**
  Login.gov and Max.gov are approved external authenticators
  for contractors and other non-federal users requiring
  verified identity access to specific UIAO system components.
  Both services provide NIST SP 800-63 IAL2/AAL2 identity
  verification and authentication, satisfying the minimum
  assurance threshold. Entra ID federation with these services
  is scoped to specific application assignments and access
  package entitlements, ensuring that external authenticator
  users are granted only the access scope authorized by their
  identity proofing level and business relationship.

  **External Authenticator Monitoring and Review**
  Microsoft Sentinel monitors authentication events from
  all external identity providers, generating behavioral
  baselines for external user access patterns and alerting
  on anomalous activity. External IdP federation configurations
  are reviewed by the ISSO semi-annually to verify that
  accepted authenticators continue to meet assurance level
  requirements and that federation trust configurations
  remain current and accurately scoped.

