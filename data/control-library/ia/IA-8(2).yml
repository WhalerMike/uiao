parameters:
  - id: ia_8_2_accepted_external_authenticators
    description: >-
      External authenticator types accepted for non-organizational
      user authentication, with associated assurance level requirements.
    value: "NIST SP 800-63 IAL2/AAL2-compliant external authenticators accepted; approved external IdPs include federal agency Entra ID tenants via B2B direct connect, Login.gov (IAL2), and Max.gov; all external authenticators subject to ISSO review and approval"
  - id: ia_8_2_assurance_requirements
    description: >-
      Identity and authenticator assurance level requirements
