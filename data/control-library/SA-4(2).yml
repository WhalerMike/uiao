parameters:
  - id: PARAM-SA-004-2-001
    description: >-
      Design and implementation information required from developers of
      acquired systems, components, and services for security controls.
    value: "Security-relevant external interfaces, high-level design documentation, and source code for custom components upon request"
  - id: PARAM-SA-004-2-002
    description: >-
      Conditions under which source code review or hardware schematics
      may be required from vendors of acquired components.
    value: "Source code review required for custom-developed components; waived for FedRAMP-authorized commercial services with equivalent documentation"

narrative: |
  **Design Information Requirements**
  The organization requires developers and vendors to provide design
  and implementation information for the security controls employed
  in acquired systems and components (PARAM-SA-004-2-001). Contract
  templates in SharePoint specify required design artifacts including
  security-relevant external interface descriptions, high-level design
  documentation, and security architecture diagrams. This information
  enables UIAO security engineers to assess how vendor security controls
  interoperate with the organizational security architecture.

  **Interface and Architecture Documentation**
  Vendors must provide documentation describing security-relevant
  external interfaces including API endpoints, authentication mechanisms,
  encryption configurations, and logging capabilities. The ISSO reviews
  interface documentation to identify integration risks prior to onboarding
  vendor services into the UIAO environment. Azure DevOps tracks integration
  points and links to corresponding vendor design documentation artifacts
  in SharePoint.

  **Source Code and Custom Development**
  For custom-developed components, design and implementation information
  including source code is required per PARAM-SA-004-2-002. Source code
  reviews are conducted by the Security Engineering team and tracked in
  Azure DevOps. Commercial off-the-shelf products with FedRAMP
  authorization are exempt from source code review requirements, with
  the FedRAMP SSP control implementation summary serving as the
  equivalent design documentation. Entra ID access controls limit
  access to sensitive design documentation to authorized personnel.

  **Documentation Retention and Review**
  Vendor design and implementation documentation is retained in SharePoint
  with version control for the life of the system. ServiceNow tracks
  the status of design documentation reviews as part of the vendor
  management workflow. Updates to vendor products trigger re-review
  of affected design documentation to ensure continued alignment
  with UIAO security requirements, supporting **SA-10**
  (Developer Configuration Management) and **SA-11** (Developer
  Testing and Evaluation).

