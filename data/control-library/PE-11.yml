evidence:
  - artifact: UPS and Generator Maintenance Records
    location: Facilities Management > Power Systems
    format: XLSX/PDF
parameters:
  - id: PARAM-PE-011-001
    text: UPS runtime capacity for orderly shutdown
    value: 30 minutes minimum
narrative: |
  **Emergency Power Supply**
  The organization provides an uninterruptible power supply to facilitate an orderly shutdown of the UIAO system in the event of a primary power source loss. UPS systems provide minimum 30 minutes runtime (PARAM-PE-011-001) for critical infrastructure.

  **Backup Generation**
  Diesel generators provide long-term backup power with automatic transfer capability. Generators are tested monthly under load and maintained per manufacturer specifications.

  **Monitoring**
  Power status is monitored continuously by the Data Center Operations team. Power anomalies and failover events trigger automated alerts.
