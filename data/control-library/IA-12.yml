# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : IA-12
# Title      : Identity Proofing
# Schema     : data/control-library (uiao-core canonical format)

control_id: IA-12
title: Identity Proofing
family: Identification and Authentication
status: implemented

implemented_by:
  - entra-id
  - servicenow-itsm
  - cyberark-psm

evidence:
  - entra-id-verified-id-configuration
  - servicenow-identity-proofing-workflow-records
  - hr-identity-verification-process-documentation
  - cyberark-privileged-account-vetting-records

parameters:
  - id: ia_12_identity_proofing_level
    description: >-
      Identity assurance level required for proofing new users before
      credential issuance, aligned with NIST SP 800-63A.
    value: "IAL2 minimum for standard users; IAL2 with in-person verification for privileged accounts"
  - id: ia_12_evidence_requirements
    description: >-
      Identity evidence required during the proofing process before
      organizational credentials are issued.
    value: >-
      Government-issued photo ID plus one additional corroborating
      document; PIV/CAC card for federal employees

narrative: |
  **Identity Proofing Process and Assurance Levels**
  The organization identity-proofs users prior to issuing system
  credentials, ensuring that individuals are who they claim to be
  before granting access to organizational information systems.
  Identity proofing is conducted at IAL2 (Identity Assurance Level 2)
  or higher as defined in NIST SP 800-63A, requiring presentation of
  government-issued photo identification and one additional
  corroborating document. Federal employees and contractors present
  PIV or CAC credentials as authoritative identity evidence. The
  identity proofing process is initiated through ServiceNow ITSM
  onboarding workflows and completed by authorized HR and security
  personnel before Entra ID account provisioning, supporting **IA-4**
  (Identifier Management) and **AC-2** (Account Management).

  **Privileged Account Enhanced Proofing**
  Users designated for privileged access undergo enhanced identity
  proofing that includes in-person identity verification by a trusted
  registration authority in addition to standard IAL2 requirements.
  CyberArk privileged account vetting records document the enhanced
  proofing process, ensuring that only fully verified individuals
  receive privileged credentials through CyberArk PSM. Entra ID
  Privileged Identity Management (PIM) enforces that privileged role
  eligibility is contingent upon completed enhanced proofing,
  supporting **AC-6** (Least Privilege) and **IA-5** (Authenticator
  Management) requirements.

  **Credential Binding and Continuous Verification**
  Upon successful identity proofing, organizational credentials are
  bound to the verified identity through Entra ID Verified ID
  (decentralized identity) capabilities, creating a cryptographically
  verifiable link between the proofed individual and their digital
  identity. Identity proofing records are retained in ServiceNow for
  audit purposes, and all credential issuance events are logged to
  Microsoft Sentinel, supporting **AU-2** (Event Logging) and **IA-1**
  (Identification and Authentication Policy) compliance requirements.

