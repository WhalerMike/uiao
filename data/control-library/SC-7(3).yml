parameters:
  - id: PARAM-SC-007-3-001
    description: >-
      Number and types of external network connections permitted for
      the UIAO system boundary.
    value: "Minimized to approved internet egress points via Palo Alto NGFW; dedicated interconnections for approved ISA-covered external systems"
  - id: PARAM-SC-007-3-002
    description: >-
      Controls applied at external access points to enforce boundary
      protection requirements.
    value: "Palo Alto NGFW with application-layer inspection at all external access points; Cisco ISE for network access control at internal boundary points"

narrative: |
  **Minimized External Access Points**
  The organization limits the number of external network connections
  to the UIAO system (PARAM-SC-007-3-001). External connectivity is
  consolidated through a minimal number of approved internet egress
  points, each protected by Palo Alto Next-Generation Firewalls with
  application-layer inspection, threat prevention, and URL filtering
  capabilities. This consolidation reduces the attack surface and
  ensures all external traffic traverses monitored control points.
  Dedicated physical or logical interconnections are maintained only
  for systems covered by approved Interconnection Security Agreements.

  **Access Point Security Controls**
  Each approved external access point implements layered security
  controls (PARAM-SC-007-3-002). Palo Alto NGFW enforces application
  identification, user identification, and content inspection at
  all external boundary points. Security zones are defined for each
  network segment, and inter-zone traffic is subject to explicit
  policy evaluation. Cisco ISE provides network access control at
  internal boundary points, authenticating users and devices before
  permitting access to sensitive network segments.

  **Infoblox DNS at Boundary**
  Infoblox provides DNS services at the network boundary, implementing
  DNS firewall capabilities through Response Policy Zones (RPZ) to
  block DNS resolution to known malicious domains and prevent
  DNS-based exfiltration. All external DNS queries from UIAO systems
  are resolved through Infoblox, providing visibility and control
  over DNS-based communications at the boundary.

  **Boundary Monitoring and Alerting**
  Microsoft Sentinel aggregates logs from all boundary access points
  including Palo Alto NGFW traffic logs, Cisco ISE authentication events,
  and Infoblox DNS query logs. Correlation rules detect anomalous
  boundary activity including unusual access point usage patterns,
  unexpected protocol usage, and potential exfiltration indicators.
  Alerts generate ServiceNow incidents for ISSO investigation, supporting
  **SI-4** (System Monitoring) and **IR-4** (Incident Handling) requirements.

