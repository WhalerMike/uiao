# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : SC-7(3)
# Title      : Boundary Protection | Access Points
# Schema     : data/control-library (uiao-core canonical format)

control_id: SC-7(3)
title: "Boundary Protection | Access Points"
family: System and Communications Protection
status: not-implemented

implemented_by:
  - palo-alto-ngfw
  - cisco-ise
  - infoblox
  - microsoft-sentinel

evidence:
  - palo-alto-ngfw-network-topology-documentation
