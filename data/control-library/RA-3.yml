narrative: |
  **Risk Assessment Overview**

  The organization conducts comprehensive risk assessments of the
  UIAO system in accordance with NIST SP 800-30 Rev 1 (Guide for
  Conducting Risk Assessments). Risk assessments identify, evaluate,
  and prioritize risks arising from the operation and use of the
  information system. Assessments consider threats, vulnerabilities,
  likelihood of exploitation, and potential impact to organizational
  operations, assets, and individuals.

  **Assessment Methodology**

  Risk assessments follow a structured methodology encompassing
  threat identification using Microsoft Sentinel threat intelligence
  feeds and MITRE ATT&CK framework mapping. Vulnerability analysis
  leverages Microsoft Defender for Cloud security recommendations
  and CyberArk privileged access analytics. Likelihood determination
  incorporates historical incident data from ServiceNow and current
  threat landscape analysis. Impact determination aligns with the
  FIPS 199 security categorization established under RA-2.

  **Risk Register and Tracking**

  Identified risks are documented in the ServiceNow GRC Risk
  Register with risk owner assignment, risk rating (likelihood x
  impact), and planned risk response (accept, mitigate, transfer,
  avoid). Risks requiring remediation are tracked through the
  Plan of Action and Milestones (POA&M) process. The POA&M tracker
  in SharePoint maintains milestone dates, responsible parties,
  and completion status.

  **Assessment Frequency and Dissemination**

  Risk assessments are conducted at least annually
  (PARAM-RA-003-001) or when triggered by significant system
  changes, new threat intelligence, or security incidents.
  Assessment results are disseminated to the AO, ISSO, System
  Owner, and CISO (PARAM-RA-003-002) through the Executive
  Dashboard and formal risk assessment briefings. Results inform
  the continuous monitoring strategy and control selection updates.

