# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AT-2
# Title      : Security Literacy Training
# Schema     : data/control-library (uiao-core canonical format)

control_id: AT-2
title: Security Literacy Training
family: Awareness and Training
status: implemented

implemented_by:
    - security-training-program
    - lms-platform
    - phishing-simulation

evidence:
    - lms-training-completion-reports
    - phishing-simulation-results
    - annual-security-awareness-completion-records

parameters:
    - id: PARAM-AT-002-001
      description: >-
          Frequency of security literacy training for all
          organizational personnel.
      value: "Within 30 days of hire and annually thereafter"
    - id: PARAM-AT-002-002
      description: >-
          Frequency of refresher training following significant
          security events or policy changes.
      value: "Within 30 days of event or change"

narrative: |
  **Security Literacy Training Program**
  The organization provides security literacy training to all
  personnel within 30 days of initial hire (PARAM-AT-002-001)
  and annually thereafter. Training is delivered through the
  organization's Learning Management System (LMS) and covers:
  social engineering and phishing recognition, password hygiene
  and MFA usage, insider threat indicators, data handling and
  classification, acceptable use policies, incident reporting
  procedures, and physical security awareness. Completion is
  tracked in the LMS with automated reminders for delinquent
  personnel.

  **Phishing Awareness and Simulation**
  The organization conducts monthly phishing simulation campaigns
  using an automated phishing simulation platform. Simulation
  results are tracked per user and per department. Users who
  fail simulations receive immediate remedial training and are
  enrolled in enhanced awareness modules. Repeat failures are
  escalated to supervisors and reported to the ISSO. Phishing
  simulation metrics feed the Executive Dashboard under
  **AT-4** (Training Records) and support the compliance
  posture score.

  **Event-Driven Refresher Training**
  When significant security events occur (active phishing
  campaigns, new threat advisories, policy changes), the
  organization deploys targeted refresher training within
  30 days (PARAM-AT-002-002). Refresher modules are developed
  in coordination with the SOC and ISSO to address the
  specific threat or change. Completion tracking follows the
  same LMS workflow as annual training.

  **Non-Compliance Enforcement**
  Personnel who fail to complete required training within the
  specified timeframe are flagged in the compliance dashboard.
  After a 15-day grace period, non-compliant accounts are
  restricted via Entra ID Conditional Access policies until
  training is completed, supporting **AC-2** (Account
  Management) enforcement.

