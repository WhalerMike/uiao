parameters:
  - id: PARAM-SA-001-001
    description: >-
      Frequency at which the system and services acquisition policy is reviewed
      and updated to reflect organizational and regulatory changes.
    value: "Annually and following significant system or regulatory changes"
  - id: PARAM-SA-001-002
    description: >-
      Organizational entities designated to receive dissemination of the
      system and services acquisition policy and associated procedures.
    value: "All personnel with acquisition, procurement, and system development responsibilities"
  - id: PARAM-SA-001-003
    description: >-
      Frequency at which system and services acquisition procedures are
      reviewed and updated.
    value: "Annually or following changes to acquisition processes or regulatory guidance"

narrative: |
  **Policy Development and Maintenance**
  The organization develops, documents, and disseminates a System and
  Services Acquisition policy that addresses purpose, scope, roles,
  responsibilities, management commitment, coordination among
  organizational entities, and compliance with NIST SP 800-53 Rev 5
  SA controls and FedRAMP Moderate requirements. The policy is
  maintained in the SharePoint Policy Library, reviewed annually
  (PARAM-SA-001-001), and updated following significant organizational
  or regulatory changes. Policy documents are version-controlled with
  ISSM approval required prior to publication.

  **Policy Dissemination and Acknowledgment**
  The acquisition policy is disseminated to all personnel with
  acquisition, procurement, and system development responsibilities
  (PARAM-SA-001-002). ServiceNow tracks policy acknowledgments,
  generating automated reminders for overdue acknowledgments and
  producing compliance reports for ISSO review. Entra ID role
  assignments ensure policy recipients are accurately identified
  based on current job functions.

  **Procedures Development and Review**
  The organization maintains acquisition procedures that address
  the acquisition lifecycle, vendor assessment, security requirements
  integration, and contract management. Procedures are reviewed
  annually (PARAM-SA-001-003) by the ISSO and Acquisition team,
  updated in SharePoint with change history preserved, and aligned
  with FedRAMP Marketplace requirements for cloud service provider
  selection. Azure DevOps pipeline templates operationalize
  acquisition security requirements within development workflows.

  **Governance Integration**
  The acquisition policy is integrated into the UIAO governance
  framework, feeding into the compliance posture dashboard and
  informing the Authorization to Operate (ATO) package under
  **CA-6**. Policy gaps identified during **CA-2** assessments
  are tracked as POA&M items in ServiceNow.

