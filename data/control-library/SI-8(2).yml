parameters:
  - id: PARAM-SI-008-2-001
    description: >-
      Mechanism by which spam protection definitions and signatures
      are automatically updated.
    value: "Microsoft Defender for Office 365 automatically receives spam signatures and threat intelligence updates from Microsoft cloud intelligence; no manual update required"
  - id: PARAM-SI-008-2-002
    description: >-
      Frequency and source of automatic updates to spam protection
      definitions and mechanisms.
    value: "Continuous automatic updates from Microsoft Intelligent Security Graph; new spam campaigns and threat indicators incorporated within hours of discovery"

narrative: |
  **Automatic Spam Signature Updates**
  The organization ensures spam protection mechanisms receive automatic
  updates to spam definitions, signatures, and detection rules
  (PARAM-SI-008-2-001). Microsoft Defender for Office 365 is designed
  as a cloud-native service that automatically receives spam signatures,
  machine learning model updates, and threat intelligence from the
  Microsoft Intelligent Security Graph without requiring manual
  administrator intervention. This architecture ensures spam protection
  capabilities remain current with evolving spam techniques and
  threat actor campaigns.

  **Continuous Threat Intelligence Updates**
  Spam protection definitions and detection mechanisms are updated
  continuously from Microsoft's cloud threat intelligence infrastructure
  (PARAM-SI-008-2-002). The Microsoft Intelligent Security Graph
  processes signals from billions of endpoints, emails, and web
  transactions globally, enabling detection of new spam campaigns
  within hours of initial discovery. This scale of threat intelligence
  provides substantially more current protection than signature-based
  systems requiring scheduled updates, ensuring UIAO email protection
  keeps pace with rapidly evolving spam and phishing campaigns.

  **Update Integrity and Availability**
  Microsoft Defender for Office 365 update delivery is managed by
  Microsoft's cloud infrastructure, ensuring update availability
  and integrity without organizational management overhead. The
  ISSO monitors the Microsoft 365 Service Health Dashboard and
  Microsoft Sentinel for indicators of degraded spam protection
  effectiveness that might suggest update failures or evasion
  of current signatures.

  **Update Status Monitoring**
  Microsoft Sentinel monitors spam detection effectiveness metrics
  and alerts on significant changes in spam detection rates that
  may indicate update failures or emerging detection gaps.
  ServiceNow incident records are created when spam protection
  effectiveness falls below baseline thresholds, triggering
  ISSO investigation. Regular reviews of Microsoft Security
  Intelligence reports confirm ongoing update currency and
  protection effectiveness, supporting **SI-3** (Malicious Code
  Protection) monitoring alignment.

