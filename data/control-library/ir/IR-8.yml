parameters:
  - id: ir_8_plan_review_frequency
    description: >-
      Frequency at which the Incident Response Plan is reviewed,
      updated, and redistributed to all stakeholders.
    value: "Annually at minimum; additionally following any incident activation, significant system change, personnel change affecting IR roles, or update to applicable federal guidance (NIST SP 800-61, US-CERT guidelines)"
  - id: ir_8_plan_distribution_scope
    description: >-
      Personnel and organizational elements that receive and acknowledge
      the current Incident Response Plan.
    value: "ISSM, ISSO, System Owner, Authorizing Official, all SOC analysts, O&M team leads, Help Desk supervisor, and all personnel with designated IR roles; distribution and acknowledgment tracked in ServiceNow GRC"
  - id: ir_8_incident_categories
    description: >-
      Incident categories defined in the Incident Response Plan covering
      the threat landscape of the UIAO environment.
    value: "Category 1: Unauthorized Access; Category 2: Denial of Service; Category 3: Malicious Code; Category 4: Improper Usage; Category 5: Scans/Probes/Attempted Access; Category 6: Investigation/Undetermined — severity levels P1-P4 with defined response SLAs for each category"

narrative: |
  **Incident Response Plan Development and Content**
  The UIAO organization develops, documents, and maintains a comprehensive
  Incident Response Plan (IRP) that provides structured guidance for detecting,
  analyzing, containing, eradicating, and recovering from security incidents
  affecting the UIAO information system. The IRP defines organizational roles
  and responsibilities for all incident response functions, incident categories
  and severity levels (PARAM ir_8_incident_categories), response time objectives
  by severity, escalation procedures, external reporting requirements per
  **IR-6** (Incident Reporting), and post-incident review requirements. The plan
  is developed consistent with NIST SP 800-61 Rev 2 (Computer Security Incident
  Handling Guide) and FedRAMP incident reporting requirements, and directly
  references the technology-specific playbooks for Microsoft Sentinel, Cisco ISE,
  Azure Entra ID, CyberArk, and Palo Alto response procedures.

  **Technology-Specific Response Playbooks**
  The IRP includes or references dedicated response playbooks for the UIAO
  vendor technology stack, providing step-by-step analyst procedures for each
  major incident category. Sentinel playbooks document the query language,
  investigation workflows, and SOAR automation actions available for each
  incident type. Cisco ISE quarantine procedures define the network isolation
  steps for compromised endpoints by device type and segment. Azure Entra ID
  procedures cover account suspension, session revocation, Conditional Access
  emergency policy activation, and MFA reset workflows. CyberArk procedures
  address privileged session termination, credential rotation, and vault
  lockdown. Palo Alto procedures cover emergency rule additions, traffic
  capture, and threat prevention profile updates. These technology-specific
  procedures ensure that analysts can execute effective containment actions
  quickly without requiring improvisation during active incidents, supporting
  **IR-4(1)** (Automated Incident Handling Processes) integration.

  **Plan Review, Distribution, and Maintenance**
  The IRP is reviewed, updated, and redistributed on the schedule defined in
  PARAM ir_8_plan_review_frequency. The ISSM owns the review process, coordinating
  with system owners, SOC leadership, and the O&M team to ensure plan currency.
  Plan updates incorporate lessons learned from incident activations, tabletop
  exercise findings from **IR-2(1)** (Incident Response Training: Simulated
  Events), and changes to the UIAO system architecture or vendor stack. The
  current IRP version is stored in SharePoint with version control and
  distributed to all personnel identified in PARAM ir_8_plan_distribution_scope
  via ServiceNow GRC workflow, which tracks acknowledgment and maintains
  evidence of distribution for FedRAMP audit purposes. The IRP is coordinated
  with the Contingency Plan per **CP-2(1)** (Contingency Plan: Coordinate with
  Related Plans) to ensure consistent activation procedures across both plans.

  **Post-Incident Review and Continuous Improvement**
  Following each incident activation, the ISSM conducts a post-incident review
  within thirty days, documenting lessons learned and identifying IRP updates
  required to address gaps or improve response effectiveness. Post-incident
  review findings are tracked as action items in ServiceNow GRC and drive both
  plan updates and training curriculum improvements per **IR-2** (Incident
  Response Training). Metrics from incident response activations — including
  MTTA, MTTC (mean time to contain), and external reporting timeliness — are
  reported in the **CA-7** (Continuous Monitoring) monthly ConMon report to
  the Authorizing Official, providing ongoing visibility into IR program
  effectiveness.

