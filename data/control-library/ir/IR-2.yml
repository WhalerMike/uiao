# IR-2 - Incident Response Training
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Incident Response (IR)
# Last Reviewed: 2025-06-15

control_id: IR-2
family: Incident Response
title: Incident Response Training
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Role-Based Incident Response Training Program**
  The UIAO platform provides incident response training to personnel
  with assigned incident response roles and responsibilities within
  10 days of assuming their role, when required by system changes,
  and annually thereafter. Training content is tailored to specific
  roles including CSIRT analysts, system administrators, network
  engineers, and security operations personnel. Training covers
  incident detection using Microsoft Sentinel SIEM analytics,
  endpoint investigation through CrowdStrike Falcon EDR console,
  network forensics using Palo Alto NGFW traffic analysis, identity
  compromise response through Azure Active Directory (Entra ID)
  Conditional Access, and privileged credential incident procedures
  through CyberArk Privileged Access Security.

  **Hands-On Training and Simulation Exercises**
  Incident response training incorporates practical exercises using
  simulated attack scenarios aligned with current threat intelligence.
  Personnel practice Microsoft Sentinel incident triage workflows,
  CrowdStrike Falcon Real Time Response containment procedures,
  Palo Alto NGFW emergency blocking rules, and CyberArk emergency
  credential rotation processes. Training scenarios address common
  incident types including ransomware, phishing campaigns, insider
  threats, advanced persistent threats, and identity compromise.
  Exercises are coordinated with **IR-3** (Incident Response Testing)
  activities to maximize training effectiveness.

  **Training Documentation and Compliance Tracking**
  All incident response training activities are documented and tracked
  through ServiceNow ITSM learning management integration. Training
  records include participant identification, training dates, topics
  covered, and assessment scores. The ISSO monitors training
  compliance quarterly and reports completion metrics as part of the
  continuous monitoring program under **CA-7** (Continuous Monitoring).
  Training content is updated following actual incidents, lessons
  learned sessions, and changes to the incident response plan under
  **IR-1** (Incident Response Policy) to ensure currency and
  relevance of training materials.

