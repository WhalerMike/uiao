parameters:
  - id: ir_2_1_simulation_frequency
    description: >-
      Frequency at which simulated incident response events are conducted
      to train and evaluate incident response personnel.
    value: "Annually at minimum; tabletop exercises conducted semi-annually; technical simulations using Sentinel alert injection conducted quarterly for SOC personnel"
  - id: ir_2_1_simulation_scenarios
    description: >-
      Categories of incident scenarios used in simulated event exercises
      to ensure broad coverage of likely threat vectors.
    value: "Ransomware/destructive malware activation; unauthorized privileged account access via CyberArk; data exfiltration via compromised Entra ID credential; supply chain compromise; DDoS impacting Palo Alto-protected perimeter; phishing leading to Intune device compromise"

narrative: |
  **Simulated Incident Event Training Program**
  The UIAO organization incorporates simulated incident events into the incident
  response training curriculum to give personnel direct, realistic practice
  executing incident response procedures under controlled conditions before
  facing actual incidents. Simulated events are conducted on the schedule defined
  in PARAM ir_2_1_simulation_frequency and cover the threat scenarios enumerated
  in PARAM ir_2_1_simulation_scenarios, ensuring training addresses the full
  spectrum of realistic threats to the UIAO environment. Simulations range
  from facilitated tabletop exercises for leadership and cross-functional teams
  to technical inject-based exercises using Microsoft Sentinel alert injection
  for SOC analysts, providing role-appropriate training for all incident
  response function holders as required by **IR-2** (Incident Response Training).

  **Tabletop Exercise Design and Execution**
  Semi-annual tabletop exercises present realistic incident scenarios to the
  UIAO Incident Response Team, ISSM, system owners, and leadership stakeholders.
  Scenarios are designed to exercise the full IR lifecycle including detection,
  analysis, containment, eradication, recovery, and post-incident review steps
  documented in the **IR-8** (Incident Response Plan). Facilitators introduce
  scenario injects that simulate actions the incident response team would take
  in a live event, including querying Microsoft Sentinel for IOCs, isolating
  compromised devices through Cisco ISE dynamic policy changes, revoking
  sessions in Azure Entra ID, and initiating CyberArk privileged session
  termination. Participation is tracked in ServiceNow GRC and attendance records
  are maintained as training evidence.

  **Technical Simulation and SOC Readiness Testing**
  Quarterly technical simulations for SOC personnel use Microsoft Sentinel's
  alert testing capabilities to inject synthetic security events into the
  analyst queue, exercising detection triage, escalation, and ServiceNow
  incident ticket creation workflows without affecting production systems.
  Simulation results measure analyst mean time to acknowledge (MTTA), mean
  time to escalate (MTTE), and procedural accuracy against the IR playbooks
  documented in the **IR-8** plan. Gaps identified during simulations drive
  targeted training updates and playbook refinements. All simulation events
  are clearly tagged in Sentinel to prevent confusion with real incidents,
  and simulation closure records feed the **CA-7** (Continuous Monitoring)
  training metric reporting cycle.

