parameters:
  - id: PARAM-MP-003-001
    text: All removable media is marked with applicable sensitivity and distribution limitations
    value: CUI, FOUO, and classification markings applied
  - id: PARAM-MP-003-002
    text: Digital media is labeled using Microsoft Purview sensitivity labels
    value: Purview sensitivity labels enforced
narrative: |
  **Media Marking Requirements**
  The organization marks information system media indicating
  the distribution limitations, handling caveats, and applicable
  security markings of the information (PARAM-MP-003-001).
  All CUI and FOUO designations follow NARA CUI Registry
  requirements.

  **Digital Media Labeling**
  Microsoft Purview Information Protection applies sensitivity
  labels to digital media and documents (PARAM-MP-003-002).
  Labels are automatically applied based on content inspection
  rules and manually applied by users for sensitive content.
  SharePoint and OneDrive enforce label inheritance for
  documents stored in classified libraries.

  **Physical Media Marking**
  Physical media (USB drives, backup tapes, optical media) is
  marked with external labels indicating sensitivity level,
  distribution restrictions, and owning organization. Unmarked
  media is treated as the highest sensitivity level until
  properly categorized.

  **Exemptions**
  Media marking exemptions are documented and approved by the
  ISSM. Exemptions apply only to media within controlled-access
  areas where all personnel hold appropriate clearances.
