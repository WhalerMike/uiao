# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : SI-2(6)
# Title      : Flaw Remediation | Removal of Previous Versions of Software and Firmware
# Schema     : data/control-library (uiao-core canonical format)

control_id: SI-2(6)
title: "Flaw Remediation | Removal of Previous Versions of Software and Firmware"
family: System and Information Integrity
status: not-implemented

implemented_by:
  - intune-mdm
  - azure-devops
  - servicenow
  - microsoft-sentinel

evidence:
  - intune-software-version-compliance-reports
  - azure-devops-deployment-version-control-records
  - servicenow-software-removal-change-requests
  - intune-application-inventory-reports

parameters:
  - id: PARAM-SI-002-6-001
    description: >-
      Requirement to remove previous versions of software and firmware
      after updates are installed on UIAO system components.
    value: "Previous software versions removed upon successful update installation; superseded versions purged within 30 days; Azure DevOps pipeline artifacts retain only current and N-1 versions"
  - id: PARAM-SI-002-6-002
    description: >-
      Automated mechanism used to enforce removal of previous software
      and firmware versions.
    value: "Intune application deployment policies replace previous versions; Azure DevOps artifact retention policies expire old build artifacts automatically"

narrative: |
  **Previous Version Removal Policy**
  The organization removes previous versions of software and firmware
  after updates are applied to UIAO system components (PARAM-SI-002-6-001).
  Retaining previous versions of vulnerable software creates unnecessary
  attack surface even when the updated version is active. The software
  lifecycle policy requires that superseded versions be removed within
  30 days of update installation, with immediate removal for critical
  security update scenarios. This reduces the risk of administrators
  or attackers reverting to vulnerable versions.

  **Automated Removal via Intune**
  Microsoft Intune application deployment policies are configured to
  replace previous application versions during update deployment,
  triggering automatic removal of superseded versions
  (PARAM-SI-002-6-002). Intune application inventory reports provide
  visibility into detected application versions across all managed
  endpoints, allowing the ISSO to identify systems retaining obsolete
  versions. Compliance policies flag endpoints with prohibited
  previous-version software installations, restricting their access
  to organizational resources until remediated.

  **Build Artifact Version Control**
  Azure DevOps artifact retention policies automatically expire and
  remove old build artifacts beyond the defined retention period,
  preventing deployment of obsolete application versions from
  organizational artifact stores. Deployment pipelines reference
  only the current approved artifact version, preventing inadvertent
  deployment of previous versions through automation. ServiceNow
  change requests document planned version updates and confirm
  successful removal of superseded versions.

  **Firmware Version Management**
  Firmware updates for network devices, servers, and endpoint hardware
  are managed through coordinated processes that include verification
  of successful update installation and confirmation of previous
  firmware version removal or deactivation. Microsoft Sentinel
  monitors for systems reporting outdated firmware versions through
  asset telemetry, generating alerts for ISSO follow-up. Firmware
  version compliance is reported in the ServiceNow CMDB, supporting
  **CM-8** (System Component Inventory) accuracy requirements.

