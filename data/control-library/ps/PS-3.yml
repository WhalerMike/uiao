control_id: PS-3
title: Personnel Screening
family: Personnel Security (PS)
status: Implemented
implemented_by:
  - ServiceNow
  - SharePoint Policy Library
evidence:
  - artifact: Background Investigation Records
    location: ServiceNow > HR Module > Background Checks
    format: CSV/PDF Export
  - artifact: Screening Completion Verification
    location: SharePoint > UIAO Compliance > Personnel > Screening
    format: XLSX/PDF
parameters:
  - id: PARAM-PS-003-001
    text: Personnel are screened before authorized access to the system
    value: Prior to access
  - id: PARAM-PS-003-002
    text: Personnel are rescreened per position risk level requirements
    value: Per OPM reinvestigation schedule
narrative: |
  **Initial Screening**
  The organization screens individuals prior to authorizing
  access to the UIAO system. Screening is commensurate with
  the risk designation of the position as determined under
  PS-2. Background investigations are conducted consistent
  with applicable federal laws, executive orders, directives,
  regulations, policies, and OPM guidance.

  **Screening Levels**
  High Risk positions require Tier 4 (T4) background
  investigations. Moderate Risk positions require Tier 2 (T2)
  investigations. Low Risk positions require Tier 1 (T1)
  investigations. All screening results are verified before
  system access is granted (PARAM-PS-003-001).

  **Rescreening**
  Personnel are rescreened per the OPM reinvestigation
  schedule (PARAM-PS-003-002). Continuous vetting through
  the Continuous Evaluation program supplements periodic
  reinvestigations. Adverse information triggers review
  and potential access revocation.
related_controls:
