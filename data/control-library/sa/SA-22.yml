# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : SA-22
# Title      : Unsupported System Components
# Schema     : data/control-library (uiao-core canonical format)

control_id: SA-22
title: "Unsupported System Components"
family: System and Services Acquisition
status: not-implemented

implemented_by:
  - servicenow
  - intune-mdm
  - microsoft-sentinel
  - azure-devops

evidence:
  - servicenow-eol-component-inventory-records
  - intune-os-version-compliance-reports
  - microsoft-sentinel-unsupported-software-detection-alerts
  - eol-remediation-plan-documentation-sharepoint

parameters:
  - id: PARAM-SA-022-001
    description: >-
      Actions required when system components can no longer be supported
      by the developer, vendor, or manufacturer.
    value: "Replace unsupported components within 90 days of end-of-support; obtain AO risk acceptance for components requiring extended use with compensating controls"
  - id: PARAM-SA-022-002
    description: >-
      Compensating controls required for unsupported components that
      cannot be immediately replaced due to mission or operational necessity.
    value: "Network isolation via Palo Alto NGFW VLAN segmentation; enhanced monitoring via Microsoft Sentinel; documented risk acceptance by AO"

narrative: |
  **Unsupported Component Detection and Tracking**
  The organization identifies and tracks system components that are
  approaching or have reached end-of-support from their developer,
  vendor, or manufacturer. ServiceNow maintains a component lifecycle
  inventory that records support end dates for all hardware and software
  components in the UIAO environment. Microsoft Sentinel monitors for
  software versions associated with end-of-life products and generates
  alerts when unsupported versions are detected. Intune device compliance
  policies flag endpoints running unsupported operating system versions,
  restricting their access to organizational resources.

  **Remediation and Replacement Requirements**
  When system components reach end-of-support, the organization takes
  action within defined timelines (PARAM-SA-022-001). Unsupported
  components are replaced within 90 days of end-of-support notification.
  Replacement projects are tracked as ServiceNow change requests with
  milestone tracking visible to the ISSO and AO. Azure DevOps pipeline
  dependency scanning prevents introduction of new components with
  known upcoming end-of-support dates without documented justification.

  **Compensating Controls for Extended Use**
  When mission or operational constraints prevent immediate replacement
  of unsupported components (PARAM-SA-022-002), the organization
  implements compensating controls and obtains formal AO risk acceptance.
  Compensating controls include network isolation of affected components
  using Palo Alto NGFW VLAN segmentation to limit lateral movement risk,
  enhanced monitoring via Microsoft Sentinel custom detection rules,
  and restricted access controls enforced through Entra ID Conditional
  Access. All compensating control implementations are documented in
  the POA&M with target replacement dates.

  **Vendor Support Monitoring**
  The ISSO monitors vendor end-of-life announcements and updates the
  ServiceNow component lifecycle inventory proactively, providing
  advance warning of upcoming support terminations. This enables
  planned, budget-cycle replacement rather than emergency remediation,
  consistent with **SA-2** (Allocation of Resources) and **SA-4**
  (Acquisition Process) requirements.

