narrative: |
  **SDLC Policy and Methodology**
  The organization manages the UIAO system using a defined System
  Development Life Cycle (SDLC) that incorporates information security
  and privacy considerations throughout all phases (PARAM-SA-003-001).
  The UIAO Secure SDLC follows NIST SP 800-64 guidance and includes
  defined phase gates for requirements analysis, design, development,
  testing, deployment, and disposal. Each phase gate requires ISSO
  sign-off before progression, ensuring security requirements are
  addressed continuously rather than only at deployment.

  **Security Roles and Responsibilities**
  The organization assigns individuals with information security roles
  and responsibilities throughout the SDLC (PARAM-SA-003-002). The
  ISSO and Security Engineering team lead security reviews at each phase.
  Entra ID role assignments enforce that only authorized personnel hold
  DevSecOps pipeline permissions, and Azure DevOps branch protection
  policies require security review approvals before merging to production
  branches. Developers receive role-appropriate security training tracked
  in ServiceNow, aligned with **AT-3** (Role-Based Training).

  **Pipeline Security Integration**
  Azure DevOps CI/CD pipelines enforce automated security gates including
  static application security testing (SAST), dependency vulnerability
  scanning, and infrastructure-as-code (IaC) security checks. Pipeline
  results are logged and reviewed by the Security Engineering team.
  ServiceNow change management records link deployment activities to
  SDLC phase completion documentation, creating an auditable trail
  from requirement to production deployment.

  **Continuous Monitoring Integration**
  Microsoft Sentinel monitors production environments for deviations
  from secure baseline configurations, feeding findings back into
  the SDLC as corrective action requirements. This closed-loop process
  ensures that operational security incidents inform future development
  cycles, supporting **CA-7** (Continuous Monitoring) and **SI-2**
  (Flaw Remediation) requirements.

