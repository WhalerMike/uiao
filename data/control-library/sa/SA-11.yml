parameters:
  - id: PARAM-SA-011-001
    description: >-
      Security testing and evaluation activities required of developers
      prior to system deployment and during the development lifecycle.
    value: "SAST, DAST, dependency scanning, and infrastructure-as-code security scanning in CI/CD pipeline; annual penetration testing"
  - id: PARAM-SA-011-002
    description: >-
      Testing artifacts and evidence required from developers to demonstrate
      security testing was performed and findings addressed.
    value: "Scan reports, penetration test reports, and remediation evidence required before production deployment approval"
  - id: PARAM-SA-011-003
    description: >-
      Depth and coverage requirements for security testing of custom-developed
      and significantly modified components.
    value: "100% of new and modified code subjected to SAST; penetration testing covers all externally facing interfaces annually"

narrative: |
  **Security Testing in CI/CD Pipelines**
  The organization requires developers to implement a security testing
  program throughout the development lifecycle (PARAM-SA-011-001).
  Azure DevOps CI/CD pipelines enforce mandatory security testing gates
  including Static Application Security Testing (SAST), Dynamic
  Application Security Testing (DAST), software composition analysis
  for dependency vulnerabilities, and infrastructure-as-code security
  scanning. Pipeline gates block deployments when critical or high
  severity findings remain unresolved, ensuring security defects are
  remediated before production deployment.

  **Testing Documentation and Evidence**
  Developers must provide security testing artifacts and evidence
  as a prerequisite for production deployment approval (PARAM-SA-011-002).
  Scan reports are generated automatically by Azure DevOps pipeline tools
  and archived as build artifacts. Penetration test reports are delivered
  to the ISSO and retained in SharePoint. Remediation evidence for
  identified findings is tracked in ServiceNow and linked to the
  original test finding before closure.

  **Testing Coverage Requirements**
  Security testing coverage requirements ensure comprehensive evaluation
  (PARAM-SA-011-003). All new and modified code undergoes SAST analysis.
  Externally facing interfaces are subjected to annual penetration testing
  by a qualified third party. Test scope and findings are reviewed by the
  ISSO prior to production deployment approval, and unresolved high or
  critical findings require AO risk acceptance before deployment proceeds.

  **Continuous Security Validation**
  Post-deployment, Microsoft Sentinel continuously monitors production
  systems for behaviors inconsistent with test environment baselines,
  providing ongoing validation that security controls function as intended.
  Sentinel findings that indicate control failures are fed back to the
  development team as defects in ServiceNow, closing the loop between
  development security testing and operational monitoring.

