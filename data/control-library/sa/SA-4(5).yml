parameters:
  - id: PARAM-SA-004-5-001
    description: >-
      Security configuration requirements that developers and integrators
      must implement when deploying acquired systems, components, and services.
    value: "CIS Benchmarks Level 2 for all operating systems; UIAO hardening baselines for all cloud services and network devices"
  - id: PARAM-SA-004-5-002
    description: >-
      Approved configuration checklists or baselines that must be applied
      to acquired components prior to operational deployment.
    value: "DISA STIGs and CIS Benchmarks as implemented in Intune configuration profiles and Azure Policy initiatives"

narrative: |
  **Configuration Requirements in Acquisitions**
  The organization requires developers and integrators of acquired systems,
  components, and services to implement security configurations that meet
  organizational baseline requirements (PARAM-SA-004-5-001) prior to
  delivery or deployment. Acquisition contracts specify that delivered
  systems must conform to CIS Benchmark Level 2 configurations and
  UIAO hardening baselines, with evidence of configuration compliance
  provided as a contract deliverable. This requirement prevents the
  introduction of misconfigured components into the operational environment.

  **Baseline Configuration Enforcement**
  Microsoft Intune MDM enforces approved configuration baselines
  (PARAM-SA-004-5-002) on all managed endpoints, applying CIS Benchmark-
  derived configuration profiles at enrollment. Azure Policy initiatives
  enforce infrastructure-as-code security configurations across Azure
  services, preventing deployment of non-compliant resources. Azure DevOps
  pipeline security gates validate IaC templates against organizational
  baseline configuration requirements before deployment proceeds,
  supporting **CM-6** (Configuration Settings) requirements.

  **Vendor Configuration Documentation**
  Vendors must provide configuration documentation demonstrating how
  their products implement required security settings. The ISSO reviews
  vendor configuration documentation during acquisition assessment
  and records findings in ServiceNow. Discrepancies between vendor
  default configurations and organizational baselines are documented
  as acceptance criteria requiring remediation before integration,
  tracked as ServiceNow change requests.

  **Ongoing Configuration Compliance**
  After initial deployment, Intune and Azure Policy continuously monitor
  configuration compliance and alert on drift. Configuration deviations
  are reported to Microsoft Sentinel for correlation and trigger
  ServiceNow incident creation, ensuring acquired components maintain
  their approved configuration state throughout their operational
  lifetime, consistent with **CM-2** (Baseline Configuration)
  and **CM-3** (Configuration Change Control).

