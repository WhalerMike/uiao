parameters:
  - id: PARAM-SA-015-5-001
    description: >-
      Attack surface reduction requirements applied during development
      to minimize the exposure of the UIAO system to potential threats.
    value: "Principle of least functionality enforced: only required ports, protocols, services, and code components included in deployments"
  - id: PARAM-SA-015-5-002
    description: >-
      Mechanisms and tools used to identify and reduce attack surface
      during the development and deployment process.
    value: "Automated dependency analysis in Azure DevOps pipelines; Microsoft Defender ASR rules enforced via Intune; quarterly attack surface reviews"

narrative: |
  **Attack Surface Reduction Policy**
  The organization requires developers to minimize the attack surface
  of the UIAO system throughout development and deployment (PARAM-SA-015-5-001).
  The attack surface reduction policy, maintained in SharePoint, mandates
  application of the principle of least functionality: only required ports,
  protocols, services, and code components are included in system builds
  and deployments. Developers must justify the inclusion of each external
  dependency, network-exposed service, and privileged operation in design
  documentation reviewed by the Security Engineering team.

  **Automated Attack Surface Analysis**
  Azure DevOps CI/CD pipelines perform automated attack surface analysis
  (PARAM-SA-015-5-002) including dependency inventory analysis to identify
  unused or unnecessary libraries, software composition analysis to detect
  components with known vulnerabilities, and static analysis rules that
  flag dangerous function usage patterns. Pipeline results are reviewed
  by Security Engineering and tracked in ServiceNow. Unnecessary
  dependencies identified during analysis are removed before deployment,
  directly reducing the exploitable attack surface.

  **Endpoint Attack Surface Reduction**
  Microsoft Intune deploys Microsoft Defender Attack Surface Reduction
  (ASR) rules to all managed endpoints, blocking attack techniques
  commonly used to exploit development and operational systems. ASR
  rule configurations are reviewed quarterly and updated based on
  current threat intelligence. ASR rule events are forwarded to
  Microsoft Sentinel for monitoring and correlation with other
  security telemetry.

  **Network Attack Surface Control**
  Palo Alto NGFW enforces network-level attack surface reduction by
  maintaining an inventory of exposed services and applying deny-by-default
  policies per **SC-7(5)**. Quarterly attack surface reviews conducted
  by the ISSO and Network Security team identify and remove unnecessary
  network exposures, with findings tracked and remediated through
  ServiceNow change management.

