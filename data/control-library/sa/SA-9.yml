parameters:
  - id: PARAM-SA-009-001
    description: >-
      Requirements that external service providers must meet to be approved
      for integration with the UIAO system.
    value: "FedRAMP authorization required for cloud services; equivalent FISMA compliance documentation for non-cloud external services"
  - id: PARAM-SA-009-002
    description: >-
      Method for monitoring external service provider compliance with
      organizational security requirements on an ongoing basis.
    value: "Annual third-party assessment reviews; continuous monitoring of security posture via ServiceNow vendor management; FedRAMP ConMon report review"
  - id: PARAM-SA-009-003
    description: >-
      Government oversight applied to external service providers handling
      federal information or operating on behalf of the organization.
    value: "Interconnection Security Agreements (ISAs) and Memoranda of Understanding (MOUs) required for all external system connections"

narrative: |
  **External Service Requirements and Approval**
  The organization requires external service providers to comply with
  organizational information security and privacy requirements
  (PARAM-SA-009-001). All cloud service providers must maintain a
  current FedRAMP authorization at the Moderate impact level or higher.
  Non-cloud external services must provide equivalent FISMA compliance
  documentation reviewed and approved by the ISSO. An inventory of
  authorized external services is maintained in ServiceNow, including
  authorization status, data flows, and security contact information.

  **Interconnection Agreements**
  External system connections are governed by Interconnection Security
  Agreements (ISAs) or Memoranda of Understanding (MOUs)
  (PARAM-SA-009-003) that define security responsibilities, data
  handling requirements, incident notification obligations, and
  termination procedures. Entra ID application registrations document
  OAuth/OIDC integrations with external services, and Conditional
  Access policies enforce security requirements for external application
  access. Palo Alto NGFW enforces network-level controls for external
  service connections, permitting only approved traffic per documented
  ISA requirements.

  **Ongoing Compliance Monitoring**
  External service provider compliance is monitored on an ongoing basis
  (PARAM-SA-009-002) through annual third-party assessment reviews
  conducted by the ISSO, supplemented by continuous review of FedRAMP
  Continuous Monitoring reports for authorized cloud services.
  ServiceNow vendor management records track assessment findings,
  remediation timelines, and authorization renewals. Microsoft Sentinel
  monitors traffic to and from external services for anomalous behavior,
  alerting on deviations from baseline communication patterns.

  **Non-Compliance Response**
  When an external service provider fails to meet security requirements
  or loses FedRAMP authorization, the ISSO initiates a risk assessment
  and documents findings in ServiceNow. The AO decides whether to accept
  residual risk, require remediation, or terminate the service relationship.
  Palo Alto NGFW rules can be immediately updated to block external service
  traffic pending resolution, supporting **IR-4** (Incident Handling) requirements.

