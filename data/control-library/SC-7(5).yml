parameters:
  - id: PARAM-SC-007-5-001
    description: >-
      Default traffic disposition applied at network boundary devices
      when no explicit permit rule exists for the communication.
    value: "Deny-all implicit rule applied at all Palo Alto NGFW security zones; explicit permit rules required for all approved traffic flows"
  - id: PARAM-SC-007-5-002
    description: >-
      Process for requesting and approving exceptions to the default deny
      policy for boundary communications.
    value: "ServiceNow firewall rule change request workflow; requires business justification, ISSO review, and Network Security approval before implementation"

narrative: |
  **Default Deny Implementation**
  The organization's boundary protection infrastructure operates on
  a deny-by-default, allow-by-exception principle (PARAM-SC-007-5-001).
  Palo Alto NGFW applies an implicit deny-all rule at all security zone
  boundaries, meaning all traffic not explicitly permitted by a named
  security policy rule is automatically blocked. This posture ensures
  that new services, applications, or communication paths cannot become
  active without an explicit approval and policy creation process.
  Security zone definitions enforce this posture across all network
  segments including internet-facing, DMZ, internal, and management zones.

  **Exception Request and Approval Workflow**
  Exceptions to the default deny policy are managed through a formal
  change request process in ServiceNow (PARAM-SC-007-5-002). Requestors
  must provide business justification, source and destination specifications,
  protocol and port details, and risk assessment documentation. The ISSO
  and Network Security team review each request against organizational
  security policy before approving. Approved rules are implemented with
  expiration review dates and tagged with the ServiceNow change record
  for auditability.

  **Network Access Control Default Deny**
  Cisco ISE enforces a default deny posture at the network access layer,
  placing unauthenticated or non-compliant devices into a quarantine VLAN
  with no access to organizational resources. Only devices that successfully
  complete 802.1X authentication and pass compliance posture checks are
  granted network access, consistent with **IA-3** (Device Identification
  and Authentication) requirements.

  **Identity-Layer Default Block**
  Entra ID Conditional Access policies implement an identity-layer
  deny-by-default posture, blocking all access attempts that do not
  satisfy explicitly defined conditions including device compliance,
  authentication strength, network location, and session risk level.
  This layered approach ensures the deny-by-default principle is
  enforced at both the network and identity layers, consistent with
  **AC-3** (Access Enforcement) requirements.

