control_id: PE-8
title: Visitor Access Records
family: Physical and Environmental Protection (PE)
status: Implemented
implemented_by:
  - Physical Security Office
  - Visitor Management System
evidence:
  - artifact: Visitor Access Logs
    location: Physical Security Office > Visitor Logs
    format: Database/PDF
parameters:
  - id: PARAM-PE-008-001
    text: Retention period for visitor access records
    value: 1 year
narrative: |
  **Visitor Records**
  The organization maintains visitor access records to the facility that include name, organization, sponsor, purpose, date/time of entry and departure. Records are maintained in the Visitor Management System.

  **Record Retention**
  Visitor access records are retained for one year (PARAM-PE-008-001). Records are reviewed monthly by the Physical Security Office to identify patterns or anomalies.

  **Visitor Oversight**
  All visitors require an authorized sponsor. Visitors are escorted in restricted areas and issued temporary badges that are collected upon departure.
related_controls:
