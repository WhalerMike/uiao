narrative: |
  **Intrusion Alarm System**
  UIAO facilities deploy a comprehensive intrusion detection and
  alarm system to monitor for unauthorized physical access attempts
  to areas housing system components (PARAM-PE-006-1-001). Motion
  sensors, door contact sensors, and vibration detectors are installed
  at all entry points to restricted areas, server rooms, and network
  equipment rooms. Intrusion alarms are monitored 24/7 by the Security
  Operations Center (SOC) with automated alert generation for any
  activation. Alarm events are logged with timestamps and sensor
  identifiers and forwarded to Microsoft Sentinel for correlation
  with logical security events.

  **CCTV Surveillance Coverage**
  Closed-circuit television (CCTV) cameras provide continuous visual
  monitoring of all entry and exit points, hallways leading to
  restricted areas, and the full interior of server rooms and network
  equipment spaces (PARAM-PE-006-1-002). Surveillance coverage is
  designed to achieve 100% visibility of all UIAO system component
  areas with no blind spots. Camera positions are reviewed annually
  by the Physical Security Officer and updated when facility changes
  occur. Digital video recordings are maintained with tamper-evident
  logging to preserve evidentiary value.

  **Surveillance Data Retention**
  CCTV footage is retained for a minimum of 90 days and intrusion
  alarm logs are retained for at least three years (PARAM-PE-006-1-003),
  consistent with federal records management requirements and supporting
  forensic investigation needs. Footage and log archives are stored
  in access-controlled systems with integrity verification. Sentinel
  retains alarm event data in the centralized SIEM to enable long-term
  trend analysis and correlation with other security events.

  **Alarm Response Procedures**
  Upon activation of an intrusion alarm, the SOC acknowledges the
  alert within 5 minutes and dispatches physical security personnel
  to investigate within 15 minutes (PARAM-PE-006-1-004). All alarm
  activations are documented as incidents in ServiceNow regardless
  of outcome, and are classified and escalated per **IR-4** (Incident
  Handling) procedures when unauthorized access is confirmed or
  suspected. False alarm patterns are tracked and reported to the
  Physical Security Officer for corrective action.

