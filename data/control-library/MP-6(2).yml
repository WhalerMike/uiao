parameters:
  - id: PARAM-MP-006-2-001
    description: >-
      Frequency at which sanitization equipment and procedures
      are tested to verify they perform as intended.
    value: "Annually and following any change to sanitization equipment or procedures"
  - id: PARAM-MP-006-2-002
    description: >-
      Method used to test sanitization equipment effectiveness
      for UIAO media protection activities.
    value: "Residual data verification using forensic analysis tools on test media post-sanitization; calibration verification for degaussers"
  - id: PARAM-MP-006-2-003
    description: >-
      Personnel responsible for conducting sanitization equipment
      testing and documenting results.
    value: "ISSO-designated media protection officer with dual-witness verification"

narrative: |
  **Sanitization Equipment Testing Program**
  The organization tests sanitization equipment and procedures used
  for UIAO media protection activities to verify that sanitization is
  achieving the intended results and that residual data cannot be
  recovered after the sanitization process (PARAM-MP-006-2-001).
  Equipment testing is conducted annually and whenever sanitization
  equipment, software, or procedures are changed. Test activities
  are documented in ServiceNow and stored in the SharePoint Compliance
  Library as evidence of due diligence in the media sanitization program.

  **Testing Methodology**
  Sanitization equipment effectiveness is verified through residual
  data analysis on test media processed through the standard
  sanitization workflow (PARAM-MP-006-2-002). For software-based
  overwrite processes (BitLocker crypto-erase, software wipe),
  Microsoft Defender for Endpoint verifies drive encryption status
  and post-wipe read verification confirms no recoverable data
  remains. For hardware-based degaussers used on magnetic media,
  annual calibration verification is performed by qualified technicians
  with documentation of field strength measurements against NIST SP
  800-88 Rev 1 requirements.

  **Test Execution and Documentation**
  Testing is conducted by the ISSO-designated media protection officer
  with dual-witness verification (PARAM-MP-006-2-003). Test results
  are documented in ServiceNow with the equipment identifier, test
  date, test method, pass/fail result, and any corrective actions
  taken for equipment that fails testing. Failed sanitization
  equipment is immediately taken out of service, tagged for repair
  or replacement, and media that may have been processed on failed
  equipment is re-sanitized using verified alternative methods per
  **MP-6** (Media Sanitization).

  **Intune Drive Encryption Verification**
  For endpoint devices sanitized through BitLocker crypto-erase,
  Microsoft Intune compliance policies verify full-drive encryption
  status prior to initiating the wipe command, ensuring that the
  crypto-erase method is effective only when encryption was confirmed
  active. Post-wipe Intune enrollment attempts are blocked until
  manual verification is completed, supporting the testing objectives
  of this control and the documentation requirements of **AU-2**
  (Event Logging).

