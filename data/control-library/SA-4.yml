narrative: |
  **Security Requirements in Acquisitions**
  The organization includes the following requirements, descriptions,
  and criteria, explicitly or by reference, in acquisition contracts
  for systems, components, and services: security and privacy functional
  requirements (PARAM-SA-004-001), security assurance requirements
  (PARAM-SA-004-002), and documentation requirements (PARAM-SA-004-003).
  Contract templates maintained in SharePoint incorporate standard
  security clauses derived from NIST SP 800-53 Rev 5 and FedRAMP
  Moderate requirements. All contracts are reviewed by the ISSO
  prior to execution.

  **FedRAMP Marketplace Compliance**
  Cloud service acquisitions prioritize vendors with existing FedRAMP
  authorizations listed on the FedRAMP Marketplace. For services lacking
  FedRAMP authorization, the ISSO performs a compensating controls
  assessment and documents the risk acceptance in ServiceNow before
  procurement proceeds. Azure DevOps pipeline integrations require
  all third-party components to have been vetted through the acquisition
  process prior to inclusion.

  **Vendor Security Assessment**
  ServiceNow tracks vendor security assessments, contract security
  addenda, and ongoing compliance obligations. Entra ID enforces
  conditional access controls for vendor personnel accessing UIAO
  systems, ensuring external users comply with organizational
  authentication requirements. Assessment records are retained for
  the duration of the contract plus three years.

  **Supply Chain Considerations**
  Acquisition contracts include requirements for vendors to disclose
  country of origin for critical components, software bill of materials
  (SBOM) for software products, and incident notification obligations
  per **IR-6** (Incident Reporting). These requirements align with
  **SR-3** (Supply Chain Controls and Processes) and **SA-12**
  (Supply Chain Protection) objectives.

