    description: >-
      Security and privacy functional requirements that must be included in
      information system acquisition contracts.
    value: "Security functional requirements per NIST SP 800-53 Rev 5, FedRAMP Moderate baseline, and UIAO SSP"
  - id: PARAM-SA-004-002
    description: >-
      Security assurance requirements applied to vendor-supplied systems,
