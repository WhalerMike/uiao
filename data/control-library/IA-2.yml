# NIST SP 800-53 Rev 5 Control Narrative
# Control: IA-2 — Identification and Authentication (Organizational Users)
# Schema: control-library v1.0

control_id: IA-2
title: "Identification and Authentication (Organizational Users)"
status: implemented
family: IA

narrative: >-
  {{ organization.name }} uniquely identifies and authenticates all organizational
  users prior to granting access to any system resource. Multi-factor authentication
  (MFA) is enforced for all accounts in accordance with {{ parameters.mfa-requirement }}.
  Phishing-resistant MFA mechanisms — including FIDO2 hardware security keys and
  PIV/CAC smart cards — are required for all privileged accounts and for all federal
  personnel accessing federal systems. PIV/CAC enforcement is managed through the
  PIV Authentication Service, which validates certificate chains against the Federal
  PKI trust anchor. Non-privileged accounts are subject to phishing-resistant MFA
  via the Identity Provider conditional access policies. Shared or group accounts
  are prohibited; every user is assigned a unique identifier that cannot be reused.

implemented_by:
  - IdentityProvider
  - PIVAuthenticationService

parameters:
  - id: mfa-requirement
    value: "Phishing-resistant MFA (FIDO2 / PIV / CAC) for all accounts"
  - id: piv-requirement
    value: "PIV/CAC required for all federal personnel and privileged users"

evidence:
  - mfa-enrollment-report

references:
  - NIST SP 800-53 Rev 5, IA-2
  - M-22-09 (Zero Trust Strategy)
  - M-24-15 (Phishing-Resistant MFA)
  - FIPS 201-3 (PIV Standard)
