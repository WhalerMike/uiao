# SC-4 - Information in Shared System Resources
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: System and Communications Protection (SC)
# Last Reviewed: 2025-06-15

control_id: SC-4
family: System and Communications Protection
title: Information in Shared System Resources
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Prevention of Unauthorized Information Transfer**
  The UIAO platform prevents unauthorized and unintended information
  transfer via shared system resources by implementing memory
  isolation, storage sanitization, and process separation controls
  across all computing environments. Azure virtual machines leverage
  hypervisor-enforced memory isolation that prevents cross-tenant
  data leakage in the shared cloud infrastructure. Microsoft Intune
  managed endpoints enforce Data Loss Prevention (DLP) policies
  through Microsoft Purview that prevent unauthorized data transfer
  between applications, clipboard sharing restrictions, and
  controlled file access aligned with **AC-4** (Information Flow
  Enforcement) requirements.

  **Storage and Memory Resource Protection**
  Azure Storage accounts are configured with customer-dedicated
  storage containers protected by Azure Storage Service Encryption
  (SSE) and Azure Private Endpoints that prevent shared resource
  exposure. Virtual machine temporary disk storage is encrypted and
  automatically sanitized upon deallocation. CrowdStrike Falcon EDR
  monitors for memory scraping attacks, process injection attempts,
  and unauthorized inter-process communication on managed endpoints.
  Palo Alto NGFW deep packet inspection prevents data exfiltration
  through shared network resources and covert channel exploitation
  across network boundaries.

  **Continuous Monitoring of Shared Resource Access**
  Microsoft Sentinel analytics rules monitor for anomalous access
  patterns to shared system resources including unusual file sharing
  activity, cross-boundary data transfers, and unauthorized clipboard
  operations. Azure Defender for Cloud provides continuous assessment
  of storage account configurations to detect misconfigured shared
  access signatures (SAS) or overly permissive access policies.
  CyberArk Privileged Access Security session recording captures
  all administrative interactions with shared infrastructure
  components for forensic review. Shared resource protection
  controls are validated quarterly supporting **CA-7** (Continuous
  Monitoring) and **SC-7** (Boundary Protection) requirements.

related_controls:
  - AC-3   # Access Enforcement
  - AC-4   # Information Flow Enforcement
  - SC-2   # Separation of System and User Functionality
  - SC-7   # Boundary Protection
  - SC-28  # Protection of Information at Rest
  - CA-7   # Continuous Monitoring

automation:
