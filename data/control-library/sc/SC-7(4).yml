narrative: |
  **Managed Interfaces for External Telecommunications**
  The organization implements managed interfaces for each external
  telecommunications service connecting to the UIAO environment
  (PARAM-SC-007-4-001). Managed interfaces are implemented at
  demarcation points between organizational networks and external
  telecommunications providers, with Palo Alto NGFW providing traffic
  inspection, access control, and logging at each interface. Interconnection
  Security Agreements (ISAs) govern the security requirements for each
  external telecommunications connection, documenting approved traffic
  flows and security responsibilities.

  **Traffic Policy Enforcement**
  External telecommunications service connections operate under
  default-deny traffic policies with explicit permit rules for approved
  traffic (PARAM-SC-007-4-002). Palo Alto NGFW security policies are
  scoped to each external telecommunications interface, permitting only
  the protocols and applications documented in the corresponding ISA.
  All sensitive data transmitted over external telecommunications circuits
  is encrypted using organizational-approved encryption algorithms,
  consistent with **SC-8(1)** (Cryptographic Protection) requirements.
  Entra ID Conditional Access enforces authentication requirements for
  users accessing UIAO resources over external telecommunications links.

  **Service Inventory and Documentation**
  ServiceNow maintains an inventory of all external telecommunications
  services, including service provider details, connection specifications,
  ISA references, and security control implementation status. The ISSO
  reviews the inventory annually and following changes to telecommunications
  services, ensuring documentation remains current and accurate.

  **Monitoring External Telecommunications Traffic**
  Microsoft Sentinel monitors traffic on all external telecommunications
  interfaces for anomalous patterns, unauthorized protocol usage, and
  potential data exfiltration indicators. Palo Alto NGFW logs for external
  telecommunications interfaces are forwarded to Sentinel as a dedicated
  log source with custom detection rules applied. Significant anomalies
  trigger ServiceNow incident creation for immediate ISSO investigation,
  supporting **SI-4(4)** (Inbound and Outbound Communications Traffic)
  monitoring requirements.

