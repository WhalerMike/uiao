narrative: |
  **Red Team Exercise Program**
  The UIAO organization conducts red team exercises as an advanced supplement
  to standard penetration testing (CA-8), employing adversary simulation
  techniques to evaluate the effectiveness of defensive controls, detection
  capabilities, and incident response procedures under realistic threat
  conditions. Red team exercises are performed by independent teams with
  specialized offensive security expertise and no prior knowledge of defensive
  playbooks or Sentinel detection rules, ensuring unbiased assessment of
  detection fidelity. Exercise objectives (PARAM ca_8_2_red_team_objectives)
  are approved by the ISSM and Authorizing Official and documented in a
  formal rules of engagement prior to exercise commencement.

  **Adversary Simulation Scope and Techniques**
  Red team operators simulate tactics, techniques, and procedures (TTPs)
  mapped to the MITRE ATT&CK framework, targeting high-value assets including
  Azure Entra ID identity infrastructure, CyberArk privileged access vaults,
  Palo Alto perimeter controls, and data stores containing controlled
  unclassified information. Exercises evaluate the blue team's ability to
  detect lateral movement across Cisco ISE-segmented network zones, identify
  anomalous privileged account activity in CyberArk session recordings, and
  generate actionable Microsoft Sentinel alerts from Palo Alto and Infoblox
  telemetry streams. Results measure both attacker dwell time and blue team
  mean time to detect (MTTD) and mean time to respond (MTTR), providing
  quantitative improvement metrics over successive exercise cycles.
  This directly informs **IR-4** (Incident Handling) and **SI-4**
  (System Monitoring) capability maturity.

  **After-Action Review and Improvement**
  Following each red team exercise, a joint red team/blue team after-action
  review produces prioritized improvement recommendations for detection
  engineering, playbook updates, and control hardening. Findings are tracked
  in ServiceNow GRC as improvement items with assigned owners. Microsoft
  Sentinel detection rules are updated to address observed blind spots, and
  updated rules are validated against recorded exercise telemetry before
  deployment to production. Improvements to identity controls are coordinated
  with **IA-2** (Identification and Authentication) and **AC-6**
  (Least Privilege) implementation teams to harden the attack surface
  identified during exercises.

