# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AC-6
# Title      : Least Privilege
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-6
title: Least Privilege
family: Access Control
status: implemented

implemented_by:
  - azure-pim
  - azure-rbac

evidence:
  - pim-elevation-logs
  - rbac-role-assignment-report

parameters:
  - id: ac_6_elevation_timeout
    description: >-
      Maximum duration for JIT privileged sessions.
    value: "8 hours"

narrative: |
  The system enforces least privilege by restricting user access to the minimum
  necessary for assigned duties.  Privileged access is managed via **Azure
  Privileged Identity Management (PIM)**, requiring Just-In-Time (JIT)
  elevation and multi-factor authentication (MFA).

  Non-privileged users are assigned specific **Azure RBAC** roles (e.g.,
  Reader, Contributor) restricted to relevant Resource Groups.
  Administrative accounts are strictly separated from standard user accounts,
  and all privileged elevations are logged and audited within **Microsoft
  Sentinel**.

related_controls:
  - AC-2  # Account Management
  - AC-3  # Access Enforcement
  - IA-2  # Identification and Authentication
