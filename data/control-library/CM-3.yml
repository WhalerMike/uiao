control-id: CM-3
title: Configuration Change Control
status: implemented
implemented-by:
  - github-actions
  - terraform-cloud
narrative: |
  **Infrastructure as Code (IaC) Governance**
  All changes to the system configuration are managed through a formal "Changes as Code" process. Configuration updates are submitted as Pull Requests (PRs), requiring mandatory peer review and automated security linting before they can be merged into the production baseline.

  **Automated Deployment and Audit**
  Approved changes are deployed via automated CI/CD pipelines, ensuring that manual intervention is minimized. A complete audit trail of who changed what, when, and who approved it is maintained within the version control system history.
parameters:
  review-requirement: "Minimum 1 Peer Reviewer"
  deployment-method: "Automated CI/CD Pipeline"
evidence:
  - type: repository
    ref: github-pull-request-history
related_controls:
