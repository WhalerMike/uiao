control-id: SI-4
title: System Monitoring
status: implemented
implemented-by:
  - microsoft-sentinel
  - defender-for-cloud
narrative: |
  **Continuous Security Monitoring**
  The system is monitored 24/7 for unauthorized activity and performance anomalies. Microsoft Defender for Cloud provides real-time workload protection, while Sentinel provides the overarching SIEM capability.

  **Custom Detection Rules**
  The organization employs custom Kusto Query Language (KQL) rules to detect specific threats relevant to the environment. Monitoring covers all entry and exit points, including the WAF, VPN gateways, and administrative consoles.
parameters:
  monitoring-coverage: "100% of Production Resources"
  detection-logic: "KQL / Sentinel Analytics"
evidence:
  - type: configuration
    ref: sentinel-analytics-rule-list
related_controls:
  - SC-7
  - AU-2
