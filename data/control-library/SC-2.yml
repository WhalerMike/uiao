# SC-2 - Separation of System and User Functionality
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: System and Communications Protection (SC)
# Last Reviewed: 2025-06-15

control_id: SC-2
family: System and Communications Protection
title: Separation of System and User Functionality
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Logical Separation of Management and User Functions**
  The UIAO platform separates user functionality from system
  management functionality through architectural isolation of
  administrative and operational planes. Azure management plane
  access is restricted to designated administrators through Azure
  Active Directory (Entra ID) Privileged Identity Management (PIM)
  with dedicated administrative accounts separate from standard
  user accounts. CyberArk Privileged Access Security enforces
  separation by vaulting administrative credentials and providing
  isolated session management through PSM jump servers, ensuring
  administrative activities occur in controlled environments
  isolated from user workstations aligned with **AC-6** (Least
  Privilege) requirements.

  **Network and Application Tier Separation**
  Network segmentation enforces separation between user-facing
  services and system management infrastructure. Palo Alto NGFW
  micro-segmentation policies isolate management VLANs from user
  network segments, restricting cross-zone traffic to explicitly
  authorized administrative protocols. Azure Virtual Network
  architecture separates management subnets from application and
  data subnets using Network Security Groups (NSGs) and Azure
  Private Endpoints. Cisco SD-WAN VPN segmentation isolates
  management traffic from user traffic across branch and remote
  site connections. Microsoft Intune management communications
  traverse dedicated management channels separate from user
  application traffic.

  **Monitoring and Enforcement of Separation Controls**
  Separation of system and user functionality is continuously
  monitored through Microsoft Sentinel analytics rules that detect
  attempts to access management interfaces from unauthorized network
  segments or user accounts. CrowdStrike Falcon EDR monitors for
  privilege escalation attempts and unauthorized execution of
  administrative tools on user endpoints. Azure Defender for Cloud
  evaluates network segmentation compliance and alerts on
  misconfigured NSG rules that could compromise management plane
  isolation. Separation controls are validated quarterly through
  network penetration testing and compliance assessments supporting
  **CA-7** (Continuous Monitoring) and **SC-7** (Boundary
  Protection) requirements.

