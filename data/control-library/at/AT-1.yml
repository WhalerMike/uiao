# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AT-1
# Title      : Policy and Procedures
# Schema     : data/control-library (uiao-core canonical format)

control_id: AT-1
title: Security Awareness and Training Policy and Procedures
family: Awareness and Training
status: implemented

implemented_by:
    - security-training-program
    - sharepoint-policy-library
    - servicenow

evidence:
    - security-awareness-training-policy-document
    - policy-review-approval-records
    - policy-distribution-acknowledgment-logs

parameters:
    - id: PARAM-AT-001-001
      description: >-
          Frequency of security awareness and training policy
          review and update.
      value: "Annually, or upon significant change"
    - id: PARAM-AT-001-002
      description: >-
          Personnel or roles to whom the policy is disseminated.
      value: "All organizational personnel and contractors"

narrative: |
  **Security Awareness and Training Policy**
  The organization develops, documents, and disseminates a security
  awareness and training policy that addresses purpose, scope, roles,
  responsibilities, management commitment, coordination among
  organizational entities, and compliance. The policy is approved by
  the Authorizing Official (AO) and reviewed at least annually
  (PARAM-AT-001-001). The policy is maintained in the organization's
  SharePoint policy library with version control and access logging.
  Policy updates trigger redistribution to all personnel
  (PARAM-AT-001-002) with acknowledgment tracking through ServiceNow.

  **Training Procedures**
  The organization develops, documents, and maintains procedures to
  facilitate the implementation of the security awareness and
  training policy and associated controls. Procedures define the
  training program structure, delivery methods, completion tracking,
  role-based training requirements, and remediation processes for
  non-compliance. Procedures are reviewed and updated at least
  annually, consistent with the policy review cycle.

  **Governance Integration**
  The security awareness and training policy is integrated into the
  organization's governance framework. Policy compliance is monitored
  through the compliance dashboard defined in the Executive Dashboard
  Specification. Non-compliance triggers the remediation workflow
  defined in the Operational Governance Charter, supporting **PM-1**
  (Information Security Program Plan) and **PM-2** (Senior
  Information Security Officer).

related_controls:
    - AT-2   # Security Literacy Training
    - AT-3   # Role-Based Security Training
    - AT-4   # Training Records
    - PM-1   # Information Security Program Plan
    - PM-2   # Senior Information Security Officer
