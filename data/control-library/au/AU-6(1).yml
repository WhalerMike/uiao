narrative: |
  **Automated Audit Analysis via Microsoft Sentinel**
  The UIAO system integrates audit record review into automated
  analysis processes through Microsoft Sentinel, which continuously
  ingests and analyzes audit records from all platform components
  using scheduled and real-time analytic rules. Sentinel analytic
  rules defined in PARAM au_6_1_automation_tools evaluate audit
  record streams against a library of detection logic covering
  account anomalies, lateral movement indicators, data exfiltration
  patterns, privilege escalation, and compliance deviations. When
  a rule fires, Sentinel automatically escalates the finding to the
  integration targets defined in PARAM au_6_1_integration_targets,
  enabling machine-speed transition from audit event to actionable
  incident without requiring manual analyst review as a prerequisite.
  This satisfies the AU-6(1) requirement to integrate audit review
  with automated analysis and response processes.

  **SOAR Playbook Integration**
  Microsoft Sentinel SOAR automation playbooks execute automated
  response workflows triggered by high-confidence alerts, including
  account disablement in Entra ID, IP block rule creation in Palo
  Alto NGFW, and CrowdStrike host containment actions. These playbooks
  directly link audit analysis findings to remediation actions,
  closing the loop between audit event detection and protective
  response without manual intervention for well-defined threat
  scenarios. All playbook executions are logged in Sentinel as
  separate audit records, maintaining full traceability of automated
  response actions and supporting **IR-4** (Incident Handling) and
  **SI-4** (System Monitoring) requirements.

  **Microsoft Defender XDR Automated Investigation**
  Microsoft Defender XDR performs automated investigation and response
  (AIR) for endpoint, identity, email, and cloud app threats detected
  across the UIAO environment. When Defender XDR identifies a
  suspicious activity cluster correlating multiple audit sources,
  it automatically initiates an investigation graph, collects
  additional evidence, and proposes or executes approved remediation
  actions. Investigation results are forwarded to Microsoft Sentinel
  for cross-platform correlation and to ServiceNow ITSM for
  case management, supporting **AU-6(3)** (Correlate Audit Record
  Repositories) and **CA-7** (Continuous Monitoring) workflows.

  **Reporting and Metrics Integration**
  Audit analysis outputs are automatically aggregated into the
  UIAO Executive Security Dashboard in Microsoft Sentinel workbooks,
  providing real-time visibility into audit coverage, alert volumes,
  mean time to detect, and mean time to respond metrics. Dashboard
  data feeds the continuous monitoring reporting required under
  **CA-7** and informs the ISSM's monthly security posture review.

