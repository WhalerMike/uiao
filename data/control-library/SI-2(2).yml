parameters:
  - id: PARAM-SI-002-2-001
    description: >-
      Automated tools and mechanisms used to determine the status of
      information system component flaw remediation at an organizational
      frequency.
    value: "Microsoft Intune patch compliance reporting; Microsoft Sentinel vulnerability management workbook; automated ServiceNow ticket creation for unpatched systems"
  - id: PARAM-SI-002-2-002
    description: >-
      Frequency at which automated flaw remediation status is assessed
      and reported to ISSO and management.
    value: "Continuous automated monitoring with weekly remediation status reports to ISSO; monthly aggregate reports to AO"

narrative: |
  **Automated Patch Compliance Monitoring**
  The organization employs automated mechanisms to determine the state
  of information system component flaw remediation (PARAM-SI-002-2-001).
  Microsoft Intune provides real-time patch compliance reporting for
  all managed endpoints, displaying patch status by device, operating
  system version, and patch category. Intune compliance policies
  automatically restrict access to organizational resources from
  devices with unpatched critical or high severity vulnerabilities,
  creating automated enforcement of remediation timelines.

  **Centralized Remediation Status Dashboard**
  Microsoft Sentinel's vulnerability management workbook aggregates
  flaw remediation status data from multiple sources including Intune
  patch compliance, Azure Defender vulnerability assessments, and
  third-party scanner feeds (PARAM-SI-002-2-002). The ISSO reviews
  the remediation status dashboard weekly. Monthly aggregate reports
  are generated for AO review, providing trend data on remediation
  velocity and outstanding vulnerability risk. Automated alerts
  notify the ISSO when remediation SLAs are approaching or exceeded.

  **Automated ServiceNow Ticket Creation**
  Unpatched systems and unresolved vulnerabilities beyond defined SLA
  thresholds automatically generate ServiceNow incident or problem
  tickets through Sentinel integration. Tickets are assigned to the
  appropriate system owner and include vulnerability details, affected
  asset information, and remediation deadline. Ticket aging reports
  identify persistent remediation gaps for ISSO escalation and
  POA&M tracking.

  **Application Dependency Flaw Remediation Status**
  Azure DevOps pipeline dependency vulnerability scanning provides
  automated flaw remediation status for software libraries and
  dependencies. Unresolved high-severity dependency vulnerabilities
  block pipeline deployments, preventing introduction of known-
  vulnerable components. Remediation status for application-layer
  flaws is reported in the Azure DevOps security dashboard and
  integrated with ServiceNow for unified vulnerability tracking,
  consistent with **RA-5** (Vulnerability Monitoring and Scanning).

