parameters:
  - id: PARAM-PL-010-001
    description: >-
      Security control baseline selected for the UIAO system based
      on FIPS 199 security categorization and FedRAMP requirements.
    value: "FedRAMP Moderate baseline (NIST SP 800-53 Rev 5 Moderate impact)"
  - id: PARAM-PL-010-002
    description: >-
      FIPS 199 security impact levels driving the baseline selection
