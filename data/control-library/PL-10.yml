    value: "NIST SP 800-53B, FedRAMP Moderate Baseline Requirements, FIPS 199"

narrative: |
  **Baseline Selection Rationale**
  The organization selects the FedRAMP Moderate security control
  baseline as the foundation for the UIAO system's security program
  (PARAM-PL-010-001). This selection is grounded in the FIPS 199
  security categorization of the UIAO system, which establishes
  Moderate impact levels across all three security objectives:
  confidentiality, integrity, and availability (PARAM-PL-010-002).
  The baseline selection follows the methodology defined in NIST SP
  800-53B (Control Baselines for Information Systems and Organizations)
  and satisfies FedRAMP authorization requirements (PARAM-PL-010-003).

  **Categorization-Driven Selection**
  The FIPS 199 security categorization documented in **RA-2**
  (Security Categorization) drives the baseline selection. The overall
  system impact level of Moderate triggers the selection of the NIST
  SP 800-53 Rev 5 Moderate baseline as specified in NIST SP 800-53B.
  This baseline encompasses the full set of controls required to
  protect UIAO system information at the Moderate impact level,
  addressing the threat environment, mission requirements, and
  regulatory obligations applicable to the system.

  **Baseline Documentation and Governance**
  The selected baseline is documented in the System Security Plan
  (SSP) maintained in the SharePoint Compliance Library and tracked
  in the ServiceNow GRC module. The ISSM reviews the baseline
  selection annually and following any significant change to the
  system's mission, operating environment, or threat landscape.
  Microsoft Defender for Cloud regulatory compliance dashboards
  are configured against the FedRAMP Moderate control framework to
  provide continuous visibility into control implementation status.

  **Relationship to Tailoring**
  The selected FedRAMP Moderate baseline serves as the starting
  point for tailoring activities documented in **PL-11** (Baseline
  Tailoring). Any additions, removals, or modifications to baseline
  controls are justified, documented, and approved by the Authorizing
  Official (AO) in accordance with FedRAMP tailoring guidance. The
  current tailored baseline is reflected in the control selection
  matrix maintained in ServiceNow GRC, supporting **CA-2**
  (Security Assessments) and **CA-6** (Authorization) activities.

