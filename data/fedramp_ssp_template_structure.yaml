# data/fedramp_ssp_template_structure.yaml
# FedRAMP SSP template structure definition.
# Used by TestSSPBuilder tests to validate SSP generation.

metadata:
  title: FedRAMP System Security Plan Template
  version: "Rev5"
  published: "2024-01-01"
  last-modified: "2024-01-01"

system-characteristics:
  system-name: UIAO Core Platform
  description: >
    Unified Identity-Addressing-Overlay Architecture for FedRAMP modernization.
  system-ids:
    - id: uiao-core-001
      identifier-type: https://ietf.org/rfc/rfc4122
  system-status:
    state: operational
  authorization-boundary:
    description: >
      The authorization boundary includes all cloud-hosted components
      and the management interfaces used to operate them.
  security-impact-level:
    security-objective-confidentiality: moderate
    security-objective-integrity: moderate
    security-objective-availability: moderate

roles:
  - id: system-owner
    title: System Owner
  - id: authorizing-official
    title: Authorizing Official
  - id: system-security-officer
    title: System Security Officer
  - id: information-system-security-officer
    title: Information System Security Officer

responsible-parties:
  - role-id: system-owner
    party-uuids:
      - "00000000-0000-4000-8000-000000000001"
  - role-id: authorizing-official
    party-uuids:
      - "00000000-0000-4000-8000-000000000002"

control-implementation:
  description: >
    Implementation details for all applicable FedRAMP Rev5 controls.
  implemented-requirements: []

back-matter:
  resources: []
