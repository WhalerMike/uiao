# data/fedramp_ssp_template_structure.yaml
# FedRAMP Rev 5 SSP template structure definition.
# Used by build_ssp_skeleton() and TestSSPBuilder tests to validate SSP generation.

version: "rev5"
impact_level: "moderate"
fedramp_rev: "5"
oscal_version: "1.0.4"
profile_href: "https://raw.githubusercontent.com/GSA/fedramp-automation/refs/heads/develop/src/content/rev5/baselines/json/FedRAMP_rev5_MODERATE-baseline_profile.json"

# FedRAMP Rev 5 Section map (1-12 + Appendix A)
sections:
  - number: "1"
    title: "Information System Name and Title"
  - number: "2"
    title: "Information System Categorization"
  - number: "3"
    title: "Information System Owner"
  - number: "4"
    title: "Authorizing Official"
  - number: "5"
    title: "Other Designated Contacts"
  - number: "6"
    title: "Assignment of Security Responsibility"
  - number: "7"
    title: "Information System Operational Status"
  - number: "8"
    title: "Information System Type"
  - number: "9"
    title: "General System Description"
  - number: "10"
    title: "System Environment and Inventory"
  - number: "11"
    title: "System Interconnections"
  - number: "12"
    title: "Laws, Regulations, Standards and Guidance"

# Appendix A: FedRAMP Moderate Rev 5 baseline profile reference
appendix_a:
  title: "FedRAMP Moderate Control Baseline (Rev 5)"
  profile_href: "https://raw.githubusercontent.com/GSA/fedramp-automation/refs/heads/develop/src/content/rev5/baselines/json/FedRAMP_rev5_MODERATE-baseline_profile.json"

# Section 12: Laws and Regulations (minimum 5 required)
laws_and_regulations:
  - title: "Federal Information Security Modernization Act (FISMA)"
    href: "https://www.congress.gov/bill/113th-congress/senate-bill/2521"
    resource_id: "fisma-2014"
  - title: "NIST SP 800-53 Rev 5: Security and Privacy Controls"
    href: "https://doi.org/10.6028/NIST.SP.800-53r5"
    resource_id: "nist-sp-800-53r5"
  - title: "NIST SP 800-37 Rev 2: Risk Management Framework"
    href: "https://doi.org/10.6028/NIST.SP.800-37r2"
    resource_id: "nist-sp-800-37r2"
  - title: "FedRAMP Authorization Act"
    href: "https://www.congress.gov/bill/117th-congress/house-bill/7776"
    resource_id: "fedramp-auth-act"
  - title: "OMB Circular A-130: Managing Information as a Strategic Resource"
    href: "https://www.whitehouse.gov/sites/whitehouse.gov/files/omb/circulars/A130/a130revised.pdf"
    resource_id: "omb-a-130"
  - title: "NIST SP 800-60 Vol 2 Rev 1: Information Types"
    href: "https://doi.org/10.6028/NIST.SP.800-60v2r1"
    resource_id: "nist-sp-800-60v2r1"

# Section 3-6: Required FedRAMP Rev 5 roles
required_roles:
  - id: "system-owner"
    title: "System Owner"
  - id: "authorizing-official"
    title: "Authorizing Official"
  - id: "information-system-security-officer"
    title: "Information System Security Officer"
  - id: "system-poc-technical"
    title: "System Point of Contact (Technical)"
  - id: "system-poc-management"
    title: "System Point of Contact (Management)"
  - id: "prepared-by"
    title: "Prepared By"

# Section 3-6: Required metadata props for FedRAMP Rev 5
required_metadata_props:
  - name: "fedramp-version"
    value: "rev5"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "impact-level"
    value: "moderate"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "authorization-type"
    value: "fedramp-agency"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "authorization-date"
    value: "PLACEHOLDER_DATE"
    ns: "https://fedramp.gov/ns/oscal"

# Section 8: Required system-characteristics props (cloud model, deployment)
required_system_props:
  - name: "cloud-service-model"
    value: "saas"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "cloud-deployment-model"
    value: "government-only"
    ns: "https://fedramp.gov/ns/oscal"
