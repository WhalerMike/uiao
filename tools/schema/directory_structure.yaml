# UIAO-Core Repository Directory Structure Payload
# ==================================================
# Conforms to tools/schema/directory_schema.json.
# Consumed by tools/validators/structure_validator.py.
#
# Update this file when adding or removing canonical directories/files.
# Do NOT list every file — only those that form part of the repository
# invariant (e.g. CLAUDE.md, pyproject.toml, the canon/ root).

required_directories:
  # NOTE: .claude/ scaffolding (rules/, agents/, skills/, commands/) is a
  # tracked backlog item; add it back here once the directory exists.
  - .github/workflows
  - canon
  - canon/specs
  - generation-inputs
  - rules
  - schemas
  - scripts
  - tools
  - tools/schema
  - tools/validators

required_files:
  - CLAUDE.md
  - PROJECT-CONTEXT.md
  - README.md
  - SECURITY.md
  - VISION.md
  - pyproject.toml
  - canon/UIAO-SSOT.md
  - canon/document-registry.yaml
  - canon/adapter-registry.yaml
  - canon/modernization-registry.yaml
  - canon/data/crosswalk-index.yml
  - tools/schema/canon_schema.json
  - tools/schema/crosswalk_schema.json
  - tools/schema/directory_schema.json

forbidden_patterns:
  # CI/log noise that should never be committed
  - "*.log"
  # Build/dist output
  - "build"
  - "dist"
  - "*.egg-info"
  # Python bytecode
  - "__pycache__"
  # IDE/OS noise
  - ".DS_Store"
  - "Thumbs.db"
