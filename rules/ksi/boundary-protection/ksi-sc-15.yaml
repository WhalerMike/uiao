ksi_id: KSI-SC-15
title: Collaborative Computing Devices and Applications
category: boundary-protection
description: Collaborative computing devices and applications must provide explicit indication of use to users present in meeting spaces and prevent remote activation without consent.
security_objective: Prevent unauthorized surveillance through GCC collaboration tools by enforcing explicit consent and activation controls.
related_controls:
  - SC-15
validation_type: automated
evidence_sources:
  - intune
  - azure_policy
pass_criteria:
  description: "All collaboration devices provide visual/audio indicators when active. Remote activation is disabled by policy. Compliance verified through Intune configuration profiles."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
