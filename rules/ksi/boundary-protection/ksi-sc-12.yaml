ksi_id: KSI-SC-12
title: Cryptographic Key Establishment and Management
category: boundary-protection
description: Cryptographic keys must be generated, distributed, stored, accessed, retired, and destroyed through a formal, auditable key management lifecycle.
security_objective: Ensure cryptographic keys protecting GCC data are managed securely and cannot be compromised through weak key practices.
related_controls:
  - SC-12
validation_type: automated
evidence_sources:
  - azure_key_vault
  - azure_policy
pass_criteria:
  description: "All cryptographic keys are stored in Azure Key Vault with HSM protection. Key rotation is automated per policy. Key access is logged and audited."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - key-management
  - azure-key-vault
  - cryptography
