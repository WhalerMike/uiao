ksi_id: KSI-SC-08
title: Transmission Confidentiality and Integrity
category: boundary-protection
description: All GCC data in transit must be protected using approved encryption protocols to ensure confidentiality and integrity.
security_objective: Prevent eavesdropping, tampering, and man-in-the-middle attacks on GCC data in transit by enforcing strong encryption.
related_controls:
  - SC-8
  - SC-8(1)
validation_type: automated
evidence_sources:
  - azure_policy
  - azure_front_door
pass_criteria:
  description: "All data in transit uses TLS 1.2 or higher. TLS 1.0 and 1.1 are disabled. Certificate validity is monitored and alerts fire 30 days before expiration."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - encryption-in-transit
  - tls
  - data-protection
