ksi_id: KSI-SC-02
title: Separation of System and User Functionality
category: boundary-protection
description: System management functionality must be physically or logically separated from user functionality to prevent privilege escalation and unauthorized system modifications.
security_objective: Prevent users from accessing or interfering with system management functions by enforcing strict functional separation.
related_controls:
  - SC-2
validation_type: automated
evidence_sources:
  - azure_policy
  - entra_id
pass_criteria:
  description: "Administrative interfaces are segregated from user interfaces. Admin access requires dedicated privileged workstations or PAW. Verified through configuration compliance."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - separation-of-functions
  - privileged-workstation
  - paw
