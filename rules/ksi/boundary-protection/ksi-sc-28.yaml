ksi_id: KSI-SC-28
title: Protection of Information at Rest
category: boundary-protection
description: All GCC data at rest must be encrypted using approved encryption algorithms to protect against unauthorized access to stored information.
security_objective: Ensure sensitive GCC data cannot be accessed if storage media is lost, stolen, or accessed by unauthorized parties.
related_controls:
  - SC-28
  - SC-28(1)
validation_type: automated
evidence_sources:
  - azure_policy
  - microsoft_defender
pass_criteria:
  description: "100% of storage accounts, databases, and managed disks use AES-256 encryption at rest. Customer-managed keys are stored in Azure Key Vault HSM."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - encryption-at-rest
  - data-protection
  - aes-256
