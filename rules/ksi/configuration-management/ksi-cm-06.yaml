ksi_id: KSI-CM-06
title: Secure Configuration Baseline Enforcement
category: configuration-management
description: All systems must comply with approved secure configuration baselines with automated enforcement and drift detection.
security_objective: Prevent configuration drift and ensure systems remain in a known secure state at all times.
related_controls:
  - CM-6
  - CM-6(1)
validation_type: automated
evidence_sources:
  - azure_policy
  - sentinel
pass_criteria:
  description: "100% of systems comply with approved secure baselines. Any drift is detected and remediated within 24 hours."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - baseline-enforcement
  - drift-detection
