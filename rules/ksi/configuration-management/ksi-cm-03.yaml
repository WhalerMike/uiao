ksi_id: KSI-CM-03
title: Configuration Change Control Process
category: configuration-management
description: All configuration changes must follow a formal, auditable change control process including approval, testing, and post-change validation.
security_objective: Prevent untested or unauthorized changes that could introduce security vulnerabilities or compliance gaps.
related_controls:
  - CM-3
  - CM-3(2)
validation_type: automated
evidence_sources:
  - azure_policy
  - servicenow
pass_criteria:
  description: "100% of production configuration changes follow the approved change control process with testing and validation."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: per-change
  remediation_sla: before-deployment
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - change-control
  - configuration-change
