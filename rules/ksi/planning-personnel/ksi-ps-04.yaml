ksi_id: KSI-PS-04
title: Personnel Sanctions and Disciplinary Actions
category: planning-personnel
description: Clear sanctions must be defined and consistently applied for violations of security policies by personnel.
security_objective: Deter security violations through transparent, enforceable disciplinary measures.
related_controls:
