ksi_id: KSI-PL-02
title: System Security Plan Development and Maintenance
category: planning-personnel
description: A comprehensive System Security Plan (SSP) must be developed, maintained, and updated to accurately reflect the current security posture.
security_objective: Provide a single source of truth for how security requirements are implemented and maintained.
related_controls:
  - PL-2
validation_type: automated
evidence_sources:
  - oscal_ssp
pass_criteria:
  description: "System Security Plan is complete, up-to-date, and reviewed at least annually or after any major system change."
  type: boolean
  threshold: 1
  measurement_frequency: annual
  remediation_sla: 90 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - system-security-plan
  - ssp
