ksi_id: KSI-AU-12
title: Audit Generation and Central Collection
category: monitoring-logging
description: All security-relevant events must generate detailed audit records that are automatically collected and forwarded to a central secure logging platform.
security_objective: Ensure complete, tamper-evident, and immediately available audit trails for all critical actions and events.
related_controls:
  - AU-12
  - AU-12(1)
  - AU-12(3)
validation_type: automated
evidence_sources:
  - sentinel
  - azure_monitor
  - graph_api
pass_criteria:
  description: "100% of required audit events are generated and forwarded to central logging within 60 seconds with no collection gaps exceeding 5 minutes."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - audit-generation
  - central-logging
  - audit-trail
