ksi_id: KSI-IA-01
title: Identification and Authentication Policy and Procedures
category: iam
description: Formal identification and authentication policy and procedures must be established and disseminated to govern how users and devices are identified and authenticated.
security_objective: Ensure all GCC system access is governed by documented, consistently enforced identity and authentication policies.
related_controls:
  - IA-1
validation_type: automated
evidence_sources:
  - entra_id
  - azure_policy
pass_criteria:
  description: "I&A policy is documented, reviewed annually, and enforced through Entra ID and conditional access policies across all GCC systems."
  type: boolean
  threshold: 1
  measurement_frequency: annual
  remediation_sla: 60 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - identification
  - authentication
  - policy
