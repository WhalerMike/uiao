ksi_id: KSI-IA-07
title: Cryptographic Module Authentication
category: iam
description: GCC systems must use FIPS 140-2 or FIPS 140-3 validated cryptographic modules for all authentication operations.
security_objective: Ensure authentication cryptography meets federal standards and cannot be bypassed or weakened by non-validated implementations.
