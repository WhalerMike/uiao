ksi_id: KSI-IA-11
title: Re-Authentication
category: iam
description: GCC systems must require re-authentication when sessions exceed defined time limits or when sensitive operations are performed.
security_objective: Prevent unauthorized use of abandoned or hijacked sessions by requiring step-up authentication for sensitive operations.
related_controls:
  - IA-11
validation_type: automated
evidence_sources:
  - entra_id
  - conditional_access
pass_criteria:
  description: "Sessions require re-authentication after 12 hours or after inactivity. Privileged operations require step-up MFA. Enforced via Conditional Access policies."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - re-authentication
  - step-up-auth
  - session-security
