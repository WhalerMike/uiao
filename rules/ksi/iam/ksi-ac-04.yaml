ksi_id: KSI-AC-04
title: Information Flow Enforcement
category: iam
description: Information flows between system components, networks, and external systems must be controlled and restricted based on approved security policies.
security_objective: Prevent unauthorized data exfiltration and lateral movement by enforcing approved information flows across all boundaries.
related_controls:
  - AC-4
validation_type: automated
evidence_sources:
  - azure_firewall
  - sentinel
pass_criteria:
  description: "All information flows are governed by documented policies. Unapproved flows are blocked and alerted within 5 minutes of detection."
  type: boolean
  threshold: 1
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - information-flow
  - data-loss-prevention
  - network-segmentation
