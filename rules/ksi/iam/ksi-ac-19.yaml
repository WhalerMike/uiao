ksi_id: KSI-AC-19
title: Access Control for Mobile Devices
category: iam
description: Mobile devices accessing GCC systems must be enrolled in MDM, compliant with security policies, and able to be remotely wiped if lost or stolen.
security_objective: Ensure mobile devices meet security requirements before accessing GCC data and can be secured or wiped upon compromise.
related_controls:
  - AC-19
validation_type: automated
evidence_sources:
  - intune
  - entra_id
pass_criteria:
  description: "100% of mobile devices accessing GCC are enrolled in Intune, compliant with policy, and capable of remote wipe. Non-compliant devices are blocked."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: daily
  remediation_sla: 4 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - mobile-device-management
  - mdm
  - byod
