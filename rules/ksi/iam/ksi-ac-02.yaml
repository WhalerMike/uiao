ksi_id: KSI-AC-02
title: Account Management
category: iam
description: All user accounts must be formally requested, approved, provisioned, reviewed, and revoked through an automated, auditable lifecycle management process.
security_objective: Ensure only authorized users have active accounts and that accounts are promptly disabled when no longer needed.
related_controls:
  - AC-2
  - AC-2(1)
  - AC-2(3)
  - AC-2(4)
  - AC-2(5)
  - AC-2(12)
validation_type: automated
evidence_sources:
  - entra_id
  - graph_api
pass_criteria:
  description: "100% of accounts are reviewed quarterly. Inactive accounts are disabled within 30 days. All account changes are logged and auditable."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: quarterly
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - account-management
  - lifecycle
  - access-review
