ksi_id: KSI-IA-02
title: Identification and Authentication
category: iam
description: All users, devices, and services must be uniquely identified and authenticated using phishing-resistant MFA before accessing any GCC system or data.
security_objective: Eliminate credential-based attacks by requiring phishing-resistant MFA for all GCC access, aligned with CISA MFA guidance and Zero Trust principles.
related_controls:
  - IA-2
  - IA-2(1)
  - IA-2(2)
  - IA-2(6)
  - IA-2(8)
validation_type: automated
evidence_sources:
  - entra_id
  - graph_api
pass_criteria:
  description: "100% of user accounts require phishing-resistant MFA (FIDO2 or CBA). Legacy authentication is blocked. MFA coverage is verified daily."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: daily
  remediation_sla: 24 hours
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - mfa
  - phishing-resistant
  - authentication
  - fido2
