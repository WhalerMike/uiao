ksi_id: KSI-AC-01
title: Access Control Policy and Procedures
category: iam
description: Formal access control policy and procedures must be established, documented, and disseminated to govern how access to systems and data is granted, managed, and revoked.
security_objective: Ensure all access to GCC systems is governed by documented, consistently enforced policies aligned with Zero Trust principles.
related_controls:
  - AC-1
validation_type: automated
evidence_sources:
  - entra_id
  - azure_policy
pass_criteria:
  description: "Access control policy is documented, reviewed annually, and actively enforced across all systems. All access decisions are traceable to policy."
  type: boolean
  threshold: 1
  measurement_frequency: annual
  remediation_sla: 60 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - access-control
  - policy
  - governance
