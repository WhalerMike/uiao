ksi_id: KSI-AC-17
title: Remote Access
category: iam
description: Remote access to GCC systems must be controlled through approved mechanisms with MFA, encryption, and continuous session monitoring.
security_objective: Ensure all remote access is authenticated, encrypted, and monitored to prevent unauthorized access to GCC resources.
