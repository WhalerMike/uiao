ksi_id: KSI-RA-07
title: Risk Response and Acceptance Process
category: other
description: All identified risks must have a formal response (mitigate, accept, transfer, avoid) with documented rationale and approval.
security_objective: Ensure every risk has a deliberate, approved, and auditable response aligned with organizational risk tolerance.
related_controls:
  - RA-7
validation_type: automated
evidence_sources:
  - risk_register
  - servicenow
pass_criteria:
  description: "100% of identified risks have a documented response strategy with appropriate approvals and residual risk acceptance where applicable."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: quarterly
  remediation_sla: "60 days"
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - risk-response
  - risk-acceptance
