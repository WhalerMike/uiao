ksi_id: KSI-SA-04
title: Acquisition Process and Security Controls
category: other
description: Acquisition processes must incorporate security controls, including supply chain risk management and continuous monitoring of third-party services.
security_objective: Reduce risk from external providers and ensure acquired systems/services meet FedRAMP Moderate security standards.
related_controls:
  - SA-4
  - SA-4(1)
  - SA-4(2)
validation_type: automated
evidence_sources:
  - procurement_system
  - azure_policy
pass_criteria:
  description: "All acquisitions undergo formal security review. Third-party services maintain current FedRAMP Moderate authorization or equivalent."
  type: boolean
  threshold: 1
  measurement_frequency: per-acquisition
  remediation_sla: "Before deployment"
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - acquisition-process
  - third-party-risk
