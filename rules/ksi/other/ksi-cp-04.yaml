ksi_id: KSI-CP-04
title: Contingency Plan Testing
category: other
description: >
  Tests the GCC High contingency plan to verify recovery procedures are
  effective and recovery objectives can be met. Conducts annual tabletop
  exercises, functional tests of Azure Site Recovery, and backup restoration
  tests to validate recovery capabilities.
security_objective: >
  Validate GCC High system recovery within documented RTO/RPO through annual
  contingency plan tests, with all test findings documented and remediated
  within 90 days per NIST SP 800-53 CP-4 requirements.
related_controls:
  - CP-4
  - CP-2
  - CP-3
  - CP-9
  - CP-10
validation_type: automated
evidence_sources:
  - azure_site_recovery
  - azure_backup
  - gcc_compliance_manager
  - azure_monitor
pass_criteria:
  description: >
    Annual contingency plan test conducted with documented test scenario,
    participants, and results. Azure Site Recovery test failover completed
    successfully with RTO validated. Backup restoration test verifies
    RPO compliance with data integrity confirmed. Test findings tracked
    in POAM with remediation within 90 days.
  type: test_completion
  threshold: 100
  operator: gte
  measurement_frequency: annual
  remediation_sla: 90_days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - contingency-testing
  - DR-test
  - failover
  - CP-4
  - gcc-high
  - RTO-validation
