ksi_id: KSI-SA-01
title: System and Services Acquisition Policy
category: other
description: Formal policies and procedures for the acquisition of systems and services must ensure security requirements are addressed throughout the lifecycle.
security_objective: Integrate security into all acquisition and procurement activities to reduce supply chain risk.
