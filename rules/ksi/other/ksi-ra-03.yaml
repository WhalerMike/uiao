ksi_id: KSI-RA-03
title: Risk Assessment and Mitigation Process
category: other
description: Formal risk assessments must be conducted regularly with documented mitigation plans for identified high and critical risks.
security_objective: Proactively identify, prioritize, and mitigate risks to the GCC environment before they impact operations or compliance.
related_controls:
  - RA-3
  - RA-3(1)
validation_type: automated
evidence_sources:
  - azure_security_center
  - sentinel
  - risk_register
pass_criteria:
  description: "Risk assessments are performed quarterly. All high and critical risks have approved mitigation plans with tracked remediation within defined SLAs."
  type: boolean
  threshold: 1
  measurement_frequency: quarterly
  remediation_sla: "30 days for critical risks, 90 days for high risks"
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - risk-assessment
  - risk-mitigation
