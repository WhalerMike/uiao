ksi_id: KSI-CP-06
title: Alternate Storage Site
category: other
description: >
  Establishes and maintains an alternate storage site to store backup copies of
  information system data and software, ensuring geographic separation from the
  primary site and enabling recovery operations in the event of a primary site
  failure or disaster.
security_objective: >
  Ensure that backup data is stored at a geographically separate alternate site
  with equivalent security controls, enabling restoration of critical systems
  within defined recovery time and recovery point objectives.
related_controls:
  - CP-6
  - CP-6(1)
  - CP-6(2)
  - CP-6(3)
  - CP-9
  - CP-10
validation_type: automated
evidence_sources:
  - Azure Backup Vault geo-redundant replication reports
  - Azure Storage geo-redundant storage (GRS) configuration audit
  - Microsoft Defender for Cloud backup coverage assessment
  - Azure Policy compliance reports for backup geo-separation requirements
  - Azure Site Recovery replication health dashboard
  - GCC High compliance center backup policy status
pass_criteria:
  description: >
    All critical system data and software must be stored at a geographically
    separate alternate site with GRS or GZRS replication enabled, replication
    lag under 15 minutes, and all backup vaults configured with cross-region
    restore capability.
  type: threshold
  threshold: 100
  operator: gte
  measurement_frequency: daily
  remediation_sla: 24h
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - contingency-planning
  - alternate-storage
  - backup
  - geo-redundancy
  - recovery
  - cp-6
