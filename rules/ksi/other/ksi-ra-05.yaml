ksi_id: KSI-RA-05
title: Vulnerability Scanning and Remediation
category: other
description: Systems must be scanned for vulnerabilities on a regular schedule with prioritized remediation based on risk severity.
security_objective: Identify and remediate vulnerabilities before they can be exploited by adversaries.
related_controls:
  - RA-5
  - RA-5(2)
  - RA-5(5)
validation_type: automated
evidence_sources:
  - microsoft_defender
  - azure_security_center
pass_criteria:
  description: "Vulnerability scans run weekly. Critical and high-severity vulnerabilities are remediated within 7 days; medium within 30 days."
  type: boolean
  threshold: 1
  measurement_frequency: weekly
  remediation_sla: "7 days critical/high, 30 days medium"
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - vulnerability-management
  - scanning
  - remediation
