ksi_id: KSI-IR-03
title: Incident Response Testing and Exercises
category: incident-response
description: The incident response capability must be regularly tested through simulations, tabletop exercises, and red-team activities.
security_objective: Validate the effectiveness of incident response processes before a real incident occurs and identify gaps proactively.
related_controls:
  - IR-3
validation_type: automated
evidence_sources:
  - servicenow
  - exercise_reports
pass_criteria:
  description: "Incident response capability is tested at least annually with documented lessons learned and corrective actions tracked to closure."
  type: boolean
  threshold: 1
  measurement_frequency: annual
  remediation_sla: 90 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - incident-testing
  - exercises
  - lessons-learned
