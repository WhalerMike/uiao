ksi_id: KSI-IR-02
title: Incident Response Training and Awareness
category: incident-response
description: All personnel with incident response responsibilities must receive regular, role-specific training and participate in tabletop exercises.
security_objective: Maintain a skilled, prepared incident response team capable of effective and coordinated action during incidents.
related_controls:
  - IR-2
  - IR-2(1)
validation_type: automated
evidence_sources:
  - training_system
  - entra_id
pass_criteria:
  description: "100% of incident response team members complete required training annually and participate in at least one tabletop exercise per year."
  type: percentage
  threshold: 100
  operator: equals
  measurement_frequency: annual
  remediation_sla: 30 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - incident-response-training
  - tabletop-exercises
