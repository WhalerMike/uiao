ksi_id: KSI-IR-08
title: Incident Response Plan Testing and Continuous Improvement
category: incident-response
description: The incident response plan must be regularly tested and updated based on lessons learned from incidents and exercises.
security_objective: Keep the response capability current and effective through continuous testing and refinement.
related_controls:
  - IR-8
validation_type: automated
evidence_sources:
  - servicenow
  - exercise_reports
pass_criteria:
  description: "Incident response plan is tested at least annually with documented lessons learned and corrective actions implemented within 90 days."
  type: boolean
  threshold: 1
  measurement_frequency: annual
  remediation_sla: 90 days
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: false
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - incident-plan
  - testing
  - lessons-learned
