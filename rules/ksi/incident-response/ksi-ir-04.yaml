ksi_id: KSI-IR-04
title: Incident Handling and Response Capability
category: incident-response
description: Formal procedures for detecting, analyzing, and responding to security incidents must be established and followed.
security_objective: Enable rapid containment, eradication, and recovery from security incidents with minimal impact.
related_controls:
  - IR-4
  - IR-4(1)
validation_type: automated
evidence_sources:
  - sentinel
  - servicenow
pass_criteria:
  description: "All incidents are handled according to documented procedures with mean time to containment under 4 hours for critical incidents."
  type: boolean
  threshold: 1
  measurement_frequency: per-incident
  remediation_sla: 4 hours for critical
uiao_extensions:
  gcc_moderate_focus: true
  zero_trust_telemetry: true
oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"
version: "1.2"
last_updated: "2026-04-06"
enabled: true
tags:
  - incident-handling
  - response-capability
