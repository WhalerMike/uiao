[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "uiao-gos"
version = "0.1.0"
description = "UIAO Governance OS — deterministic governance, drift detection, remediation, and evidence pipeline."
authors = [
    { name = "Michael Stratton", email = "michael@example.com" }
    ]
    readme = "README.md"
    requires-python = ">=3.10"

    dependencies = [
        "pydantic>=2.0",
        ]
        classifiers = [
                "Programming Language :: Python :: 3",
                    "License :: OSI Approved :: MIT License",
                        "Operating System :: OS Independent",
        ]

        [project.scripts]
        gos = "core.cli.gos_cli:main"

        [project.urls]
        Homepage = "https://github.com/WhalerMike/uiao-gos"
        Source = "https://github.com/WhalerMike/uiao-gos"
        Issues = "https://github.com/WhalerMike/uiao-gos/issues"

        [tool.setuptools.packages.find]
        where = ["."]
        include = ["core*"]
        