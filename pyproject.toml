[project]
name = "uiao"
version = "0.2.0"
description = "Unified Identity-Addressing-Overlay Architecture — YAML SSOT → OSCAL / POA&M / KSI / drift automation for FedRAMP Moderate, TIC 3.0, Zero Trust"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "WhalerMike", email = "your-email@example.com" }]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "typer[all]>=0.12",
    "rich>=13",
    "pydantic>=2.8",
    "pyyaml>=6",
    "jinja2>=3",
    "compliance-trestle>=2.0",
    "python-docx>=1.0",
    "python-pptx>=0.6",
    "pandas>=2",
    "matplotlib>=3",
]

[project.scripts]
uiao = "uiao.cli:app"

[project.optional-dependencies]
dev = ["ruff", "mypy", "pytest", "pytest-cov", "pre-commit", "pip-audit"]
docs = ["quarto-cli", "jupyter"]

[tool.setuptools]
package-dir = { "" = "src" }
packages = ["uiao"]

[tool.setuptools.package-data]
uiao = ["canon/**/*", "schemas/**/*", "rules/**/*"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
