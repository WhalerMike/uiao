[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uiao-core"
version = "0.1.0"
description = "UIAO Core - Unified Identity-Addressing-Overlay Architecture for FedRAMP modernization pipelines"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [{name = "WhalerMike"}]
keywords = ["fedramp", "oscal", "trestle", "zero-trust", "tic-3.0", "compliance", "uiao"]
dependencies = [
    "jinja2>=3.1.0",
    "pyyaml>=6.0",
    "jsonschema>=4.17.0",
    "markdown>=3.4.0",
    "python-docx>=0.8.11",
    "python-pptx>=0.6.21",
    "openpyxl>=3.1.0",
    "matplotlib>=3.8.0",
    "numpy>=1.24.0",
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocs-mermaid2-plugin>=0.6.0",
    "pymdown-extensions>=10.0",
    "compliance-trestle>=4.0.0",
    "compliance-trestle-fedramp",
    "pydantic>=2.8.0",
    "pydantic-settings>=2.0",
    "typer[all]>=0.12.3",
    "rich>=13.7.0",
]

[project.scripts]
uiao = "uiao_core.cli.app:app"

[tool.setuptools.packages.find]
where = ["src"]
include = ["uiao_core*"]
